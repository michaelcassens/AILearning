// =============================================================
//  OBJECTIVES
// =============================================================
function getObjectiveText() {
  if (momentFired) return null;
  let ct = cType();
  if (ct === 'escape') {
    if (escapeExpired) return null;
    let secs = Math.ceil((ESCAPE_TIME_MS - escapeTimer) / 1000);
    let urgency = escapeTimer / ESCAPE_TIME_MS;
    if (!babyFound) {
      let prefix = urgency > 0.7 ? 'HURRY — ' : urgency > 0.4 ? 'the fire is spreading — ' : '';
      return prefix + 'search the cribs  ' + checkedCount + '/' + bassinetOrbs.length + '  [' + secs + 's]';
    }
    return 'get out now  [' + secs + 's]';
  }
  if (ct === 'tasks') {
    return 'keep working  ' + taskTotalDone + '/' + RANCH_TOTAL_NEEDED;
  }
  if (ct === 'gather') {
    return 'gather what you need  ' + tasksCollected + '/' + TASKS_REQUIRED;
  }
  if (ct === 'social') {
    if (socialAccepted) return 'one door stayed open';
    if (socialRejections > 0) return 'find where you belong  (rejected ' + socialRejections + ' time' + (socialRejections===1?'':'s') + ')';
    return 'find where you belong';
  }
  if (ct === 'gravity') {
    return 'find your horizon  ' + waypointsClaimed + '/' + waypoints.length;
  }
  if (ct === 'fans') {
    if (ch3Phase === 1) return 'find somewhere safe';
    if (ch3Phase === 2) return "find your friend's house";
  }
  return null;
}

// =============================================================
//  SETUP / DRAW
// =============================================================
function setup() {
  createCanvas(W, H);
  colorMode(HSB, 360, 100, 100, 100);
  textFont('Georgia');
  for (let i=0; i<68; i++)
    stars.push({ x:random(W), y:random(H*0.72), r:random(0.4,1.5),
                 base:random(8,32), fl:random(TWO_PI), sp:random(0.008,0.022) });
  sx = W/2; sy = H/2;
  stats.chapterTimes = new Array(CHAPTERS.length).fill(0);
}

function draw() {
  let dt = min(deltaTime, 50);
  noStroke();

  if (state === 'intro' || state === 'reflect' || state === 'end') {
    fill(0, 0, 0, 100); rect(0, 0, W, H);
  } else if (state !== 'failed') {
    // Escape chapter: darker, warmer background shifting with hope
    if (cType() === 'escape') {
      let warmth = ch1HopeGlow * 0.5;
      let bgHue = lerp(15, 42, warmth);
      let bgBri = lerp(2, 6, ch1HopeGlow);
      fill(bgHue, 40, bgBri, 22); rect(0, 0, W, H);
    } else {
      fill(238, 28, 4, 18); rect(0, 0, W, H);
    }
  }

  push();
  if (screenShake > 0.1) {
    translate(random(-screenShake, screenShake), random(-screenShake, screenShake));
    screenShake *= pow(0.9, dt / 16.67);
  }

  if      (state==='title')   drawTitle(dt);
  else if (state==='intro')   drawIntro(dt);
  else if (state==='chapter') drawChapter(dt);
  else if (state==='fadeout') drawFadeout(dt);
  else if (state==='fadein')  drawFadein(dt);
  else if (state==='reflect') drawReflect(dt);
  else if (state==='failed')  drawFailed(dt);
  else if (state==='end')     drawEnd(dt);

  updateParticles(dt);
  paintParticles();
  pop();

  if (fadeAlpha > 0.1) {
    noStroke(); fill(0,0,0,min(fadeAlpha,100)); rect(0,0,W,H);
  }
  if (state==='fadein') drawTransLabel();
}

  for (let s of stars) {
    let a = (s.base*0.35) + sin(millis()*s.sp*0.001+s.fl)*4;

  text(ch.label, W/2, 130);
  fill(210,10,72,titleAlpha*0.6); textSize(11);

  let ctxAlpha = constrain(map(introTimer, 600, 1400, 0, 1), 0, 1) * 55;

// =============================================================
//  CHAPTER STATES
// =============================================================
function drawChapter(dt) {
  chapterMs += dt;
  let ct = cType();

  if (ct === 'escape')  { updateEscapeMechanic(dt); updateFireSystem(dt); }
  if (ct === 'tasks' || ct === 'gather') updateTaskMechanic(dt);
  if (ct === 'social')  updateSocialMechanic(dt);
  if (ct === 'fans')    updateFanMechanic(dt);
  if (ct === 'gravity') updateGravityMechanic(dt);

  updateAbility(dt);
  updateResilience(dt);

  let nat = getActivePath();
  updateSelf(nat.x, nat.y, dt);
  updateBarriers(dt);

  let buildProx = ct === 'escape' || ct === 'social';
  updateCluster(sx, sy, dt, buildProx);

  // Fire system renders in layers around the scene
  if (ct === 'escape') paintFireSystem();
  paintScene();
  if (ct === 'escape') { paintDarknessOverlay(); paintHopeTransition(); }

  paintText(dt);
  paintContinuePrompt(dt);
  paintMomentText(dt);
  paintHUD(dt);

  if (resilience <= 0 && momentState === 'none') {
    state = 'failed'; failTimer = 0; screenShake = 6;
  }
}

function drawFadeout(dt) {
  chapterMs += dt;
  let ct = cType();
  let nat = CHAPTERS[chapterIndex].naturalPath(chapterMs*0.001);
  if (ct === 'fans') updateFanMechanic(dt);
  updateSelf(nat.x, nat.y, dt);
  updateBarriers(dt);
  updateCluster(sx, sy, dt, false);
  updateAbility(dt);
  paintScene();
  fadeAlpha = min(fadeAlpha + dt*FADE_PER_MS, 100);
  if (fadeAlpha >= 100) {
    stats.chapterTimes[chapterIndex] = chapterMs;
    state = 'reflect'; reflectTimer = 0;
  }
}

function drawFadein(dt) {
  chapterMs += dt;
  let ct = cType();
  let nat = CHAPTERS[chapterIndex].naturalPath(chapterMs*0.001);
  if (ct === 'fans') updateFanMechanic(dt);
  updateSelf(nat.x, nat.y, dt);
  updateBarriers(dt);
  updateCluster(sx, sy, dt, false);
  updateAbility(dt);
  paintScene();
  let elapsed = millis() - transStart;
  if (elapsed > 1400) fadeAlpha = max(fadeAlpha - dt*FADE_PER_MS*0.8, 0);
  if (elapsed > 1400 && fadeAlpha <= 0) state = 'chapter';
}

function drawTransLabel() {
  if (chapterIndex >= CHAPTERS.length) return;
  let ch = CHAPTERS[chapterIndex];
  let elapsed = millis() - transStart;
  let la = elapsed < 500 ? map(elapsed,0,500,0,68)
         : elapsed < 1400 ? 68
         : map(elapsed,1400,2000,68,0);
  if (la <= 0) return;
  noStroke();
  fill(210,10,97,la); textAlign(CENTER,CENTER); textSize(22);
  text(ch.label, W/2, H/2-14);
  fill(210,10,72,la*0.58); textSize(11);
  text(ch.sublabel, W/2, H/2+18);
}

function getActivePath() {
  if (momentState === 'active') {
    if (cType() === 'fans' && friendhouseOrb && ch3Phase === 2) {
      return { x: friendhouseOrb.x, y: friendhouseOrb.y };
    }
    let cc = (chosenCluster === 'A') ? ccA : ccB;
    return { x: cc.x, y: cc.y };
  }
  return CHAPTERS[chapterIndex].naturalPath(chapterMs * 0.001);
}

// =============================================================
function paintScene() {
  let ct = cType();

  // Stars in escape chapters
  if (ct === 'escape') {
    for (let s of stars) {
      let a = (s.base + sin(millis()*s.sp*0.001+s.fl)*10) * 0.55;
      fill(215,18,100,a); noStroke(); ellipse(s.x,s.y,s.r*2);
    }
    if (!momentFired) {
      // Only show plane beacon/arrow/trail after baby is found
      if (babyFound) {
        paintGoalBeacon(ccB.x, ccB.y, orbsB.length ? orbsB[0].hue : 36);
        paintGoalArrow();
        paintGoalTrail();
      }
      // Show arrow toward nearest unchecked bassinet
      if (!babyFound) paintBassinetGuide();
    }
  }

  // Goal beacon for gravity chapters too
  if (ct === 'gravity') {
    if (!momentFired) paintGoalBeacon(ccB.x, ccB.y, orbsB.length ? orbsB[0].hue : 206);
    if (!momentFired) paintGravityLines();
  }

  // Bridge line for escape
  if (ct === 'escape') {
    noFill(); stroke(210,12,45,7); strokeWeight(0.4);
    drawingContext.setLineDash([4,14]);
    line(ccA.x, ccA.y, ccB.x, ccB.y);
    drawingContext.setLineDash([]); noStroke();
  }

  paintConnections();
  paintBarriers();
  if (ct === 'escape') paintBassinetOrbs();
  if (ct === 'tasks' || ct === 'gather') paintTaskOrbs();
  if (ct === 'social') paintSocialGroupProgress();
  if (ct === 'gravity') { paintGravityWaypoints(); paintGravityObstacles(); }
  if (ct === 'fans') { paintDestinationOrbs(); paintFanOrbs(); }
  paintClusterOrbs();
  paintSelfOrb(sx, sy, selfHue, repulsionHeat);
  updateAudio(sx, sy);
}

// --- Ch0 directional arrow ---
function paintGoalArrow() {
  let ang = atan2(ccB.y - sy, ccB.x - sx);
  let ax = sx + cos(ang) * 42;
  let ay = sy + sin(ang) * 42;
  let pulse = sin(millis()*0.003)*0.5+0.5;
  let alpha = 22 + pulse*18;
  stroke(36, 50, 88, alpha); strokeWeight(1.4);
  let bodyLen = 14;
  line(ax-cos(ang)*bodyLen, ay-sin(ang)*bodyLen, ax, ay);
  let hs = 6;
  line(ax, ay, ax+cos(ang+PI*0.75)*hs, ay+sin(ang+PI*0.75)*hs);
  line(ax, ay, ax+cos(ang-PI*0.75)*hs, ay+sin(ang-PI*0.75)*hs);
  noStroke();
}

// --- Ch0 dotted trail ---
function paintGoalTrail() {
  let dx = ccB.x - sx, dy = ccB.y - sy;
  let d = sqrt(dx*dx + dy*dy);
  let steps = floor(d / 22);
  let pulse = sin(millis()*0.0025)*0.5+0.5;
  noStroke();
  for (let i=3; i<steps; i++) {
    let t = i/steps;
    let px = sx + dx*t, py = sy + dy*t;
    let a = map(t,0,1,14,5)*(0.7+pulse*0.3);
    fill(36,40,82,a); ellipse(px,py,2.2,2.2);
  }
}

// --- Bassinet guide arrow (points to nearest unchecked crib) ---
function paintBassinetGuide() {
  let nearest = null, nearDist = Infinity;
  for (let b of bassinetOrbs) {
    if (b.checked) continue;
    let d = dist(sx, sy, b.x, b.y);
    if (d < nearDist) { nearDist = d; nearest = b; }
  }
  if (!nearest || nearDist < BASSINET_CHECK_R) return;
  let ang = atan2(nearest.y - sy, nearest.x - sx);
  let pulse = sin(millis()*0.004)*0.5+0.5;
  let alpha = 35 + pulse*25;

  // Bright dotted trail to nearest crib
  let steps = floor(nearDist / 14);
  noStroke();
  for (let i=2; i<min(steps,16); i++) {
    let t = i/steps;
    let px = sx + (nearest.x-sx)*t, py = sy + (nearest.y-sy)*t;
    let a = map(t,0,1,22,6)*(0.6+pulse*0.4);
    let sz = map(t,0,1,3.5,1.5);
    fill(nearest.hue,45,88,a); ellipse(px,py,sz,sz);
  }
  // Larger, more visible arrow
  let ax = sx + cos(ang) * 42;
  let ay = sy + sin(ang) * 42;
  stroke(nearest.hue, 50, 95, alpha); strokeWeight(2.2);
  let bodyLen = 16;
  line(ax-cos(ang)*bodyLen, ay-sin(ang)*bodyLen, ax, ay);
  let hs = 8;
  line(ax, ay, ax+cos(ang+PI*0.75)*hs, ay+sin(ang+PI*0.75)*hs);
  line(ax, ay, ax+cos(ang-PI*0.75)*hs, ay+sin(ang-PI*0.75)*hs);
  noStroke();

  // "nearest crib" label near arrow
  let lx = sx + cos(ang) * 62;
  let ly = sy + sin(ang) * 62;
  fill(nearest.hue, 30, 95, alpha * 0.6);
  textAlign(CENTER, CENTER); textSize(8);
  text('\u2192 nearest crib', lx, ly);
}

// --- Stronger beacon ---
function paintGoalBeacon(cx, cy, hue) {
  let t = millis()*0.001;
  let pulse = sin(t*0.8)*0.5+0.5;
  noFill();
  stroke(hue,55,85,22*pulse); strokeWeight(1.2);
  ellipse(cx,cy,155+pulse*18,105+pulse*12);
  stroke(hue,45,90,14*pulse); strokeWeight(0.8);
  ellipse(cx,cy,210+pulse*24,140+pulse*16);
  stroke(hue,35,95,8*pulse); strokeWeight(0.5);
  ellipse(cx,cy,270+pulse*28,180+pulse*18);
  noStroke();
}

// --- Gravity chapter pull visualization ---
function paintGravityLines() {
  let d = dist(sx,sy,ccA.x,ccA.y);
  if (d > 400) return;
  let alpha = map(d, 0, 400, 18, 0) * gravityPullScale;
  let ang = atan2(ccA.y-sy, ccA.x-sx);
  noFill();
  for (let i=0; i<4; i++) {
    let spread = (i-1.5)*0.3;
    let la = alpha*(1-abs(i-1.5)*0.3);
    stroke(30, 40, 70, min(la, 30)); strokeWeight(0.5);
    let startD = 30;
    let endD = min(d*0.6, 120);
    let sx2 = sx+cos(ang+spread)*startD;
    let sy2 = sy+sin(ang+spread)*startD;
    let ex2 = sx+cos(ang)*endD;
    let ey2 = sy+sin(ang)*endD;
    line(sx2,sy2,ex2,ey2);
  }
  noStroke();
}

function paintConnections() {
  noFill();
  for (let i=0; i<orbsA.length; i++) for (let j=i+1; j<orbsA.length; j++) {
    let d = dist(orbsA[i].x,orbsA[i].y,orbsA[j].x,orbsA[j].y);
    if (d<66) { stroke(orbsA[i].hue,50,76,map(d,0,66,20,0)); strokeWeight(0.38); line(orbsA[i].x,orbsA[i].y,orbsA[j].x,orbsA[j].y); }
  }
  for (let i=0; i<orbsB.length; i++) for (let j=i+1; j<orbsB.length; j++) {
    let d = dist(orbsB[i].x,orbsB[i].y,orbsB[j].x,orbsB[j].y);
    if (d<66) { stroke(orbsB[i].hue,50,76,map(d,0,66,20,0)); strokeWeight(0.38); line(orbsB[i].x,orbsB[i].y,orbsB[j].x,orbsB[j].y); }
  }
  for (let o of [...orbsA,...orbsB]) {
    let d = dist(sx,sy,o.x,o.y);
    if (d<54) { stroke(selfHue,32,68,map(d,0,54,8,0)); strokeWeight(0.28); line(sx,sy,o.x,o.y); }
  }
  noStroke();
}

function paintBarriers() {
  for (let b of barriers) {
    let pulse = sin(millis()*0.0018+b.phase)*0.5;
    let r = 6.5+pulse;
    for (let gr=r*4; gr>0; gr-=1.0) {
      fill(245,52,36, map(gr,r*4,0,0,8)*(b.active?1.4:0.8)); ellipse(b.x,b.y,gr*2);
    }
    fill(240,48,50, b.active?88:65); ellipse(b.x,b.y,r*2);
    noFill(); stroke(240,38,68, b.active?40:16); strokeWeight(0.6);
    ellipse(b.x,b.y,r*5.8); noStroke();
  }
}

function paintTaskOrbs() {
  let ct = cType();

  // === Frost zone visual (Ranch) ===
  if (ct === 'tasks' && frostZone) {
    let pulse = sin(millis()*0.0012)*0.5+0.5;
    noStroke();
    // Outer frost haze
    for (let gr=FROST_RADIUS; gr>0; gr-=8) {
      let a = map(gr, FROST_RADIUS, 0, 0, 3.5)*(0.6+pulse*0.4);
      fill(210, 28, 65, a); ellipse(frostZone.x, frostZone.y, gr*2);
    }
    // Frost boundary ring
    noFill(); stroke(210, 20, 70, 8+pulse*6); strokeWeight(0.5);
    ellipse(frostZone.x, frostZone.y, FROST_RADIUS*2);
    noStroke();
    // Scattered frost particles
    for (let i=0; i<6; i++) {
      let a2 = millis()*0.0004+i*1.05;
      let fr = FROST_RADIUS*(0.3+sin(a2*0.7+i)*0.35);
      let fx = frostZone.x + cos(a2)*fr;
      let fy = frostZone.y + sin(a2)*fr;
      fill(210, 18, 85, 8+pulse*5); ellipse(fx, fy, 2.5);
    }
  }

  // === Carrying indicator ===
  if (carryingTask !== null && carryingTask < taskOrbs.length) {
    let ct2 = taskOrbs[carryingTask];
    let pulse = sin(millis()*0.004)*0.5+0.5;
    // Small orb trailing the player
    let trailAng = atan2(svy, svx) + PI;
    let trailR = 14 + pulse*3;
    let tx = sx + cos(trailAng)*trailR;
    let ty = sy + sin(trailAng)*trailR;
    fill(ct2.hue, 55, 88, 55); ellipse(tx, ty, 6);
    fill(ct2.hue, 35, 95, 22); ellipse(tx, ty, 12);
    // Dotted line to destination
    let ddx = ct2.dstX - sx, ddy = ct2.dstY - sy;
    let dd = sqrt(ddx*ddx+ddy*ddy);
    let steps = floor(dd/18);
    noStroke();
    for (let i=2; i<steps; i++) {
      let tt = i/steps;
      let px = sx + ddx*tt, py = sy + ddy*tt;
      let a3 = map(tt,0,1,16,5)*(0.6+pulse*0.4);
      fill(ct2.hue, 40, 82, a3); ellipse(px,py,2,2);
    }
  }

  for (let idx=0; idx<taskOrbs.length; idx++) {
    let t = taskOrbs[idx];

    // --- COLLECTED state ---
    if (t.collected) {
      if (ct === 'tasks' && t.decayTimer !== undefined) {
        // Decay visual for Ranch
        let decayProg = t.decayTimer / TASK_DECAY_MS;
        let fadeA = map(decayProg, 0, 1, 72, 8);
        let pulse = sin(millis()*0.0018+t.phase)*0.5+0.5;
        let r = 8 + pulse*1.5;
        let ringR = map(decayProg, 0, 1, TASK_COLLECT_R*2, 8);
        noFill(); stroke(t.hue, 35, 75, fadeA*0.4); strokeWeight(0.5);
        ellipse(t.x, t.y, ringR); noStroke();
        fill(t.hue, 70*max(1-decayProg,0.2), 90, fadeA);
        ellipse(t.x, t.y, r*2*max(1-decayProg*0.5,0.3));
        // Frost-accelerated decay shows icy tint
        if (frostZone && dist(t.x,t.y,frostZone.x,frostZone.y) < FROST_RADIUS) {
          fill(210, 30, 80, 12+sin(millis()*0.008)*8); ellipse(t.x,t.y,r*3);
        }
        if (decayProg > 0.7) {
          let flicker = sin(millis()*0.015)*0.5+0.5;
          fill(8, 60, 80, flicker*22); ellipse(t.x, t.y, r*3);
        }
      } else {
        // Non-decaying completed (Home chapter)
        t.flashAlpha = max((t.flashAlpha||0)-3.5, 0);
        if (t.flashAlpha > 0) { fill(t.hue,55,100,t.flashAlpha); ellipse(t.x,t.y,46); }
        let orbAngle = millis()*0.001 + t.phase;
        let orbR = 22 + sin(millis()*0.0008+t.phase)*6;
        let ox = sx + cos(orbAngle)*orbR;
        let oy = sy + sin(orbAngle)*orbR;
        fill(t.hue, 55, 88, 42); ellipse(ox, oy, 5);
        fill(t.hue, 35, 95, 18); ellipse(ox, oy, 10);
      }
      continue;
    }

    // --- CARRY TASK rendering ---
    if (t.taskType === 'carry') {
      let pulse = sin(millis()*0.0022+t.phase)*0.5+0.5;

      if (t.carryPhase === 'pickup') {
        // Source point (where to pick up)
        let r = 9 + pulse*2.5;
        // Dashed line connecting source to destination
        noFill(); stroke(t.hue, 25, 65, 10); strokeWeight(0.4);
        drawingContext.setLineDash([3,10]);
        line(t.srcX, t.srcY, t.dstX, t.dstY);
        drawingContext.setLineDash([]); noStroke();
        // Destination ghost (dim)
        fill(t.hue, 25, 55, 14+pulse*6); ellipse(t.dstX, t.dstY, 8);
        fill(t.hue, 15, 75, 8); textAlign(CENTER,CENTER); textSize(7);
        text(t.dstLabel, t.dstX, t.dstY+14);
        // Source orb (active)
        let prog = t.holdProgress || 0;
        if (prog > 0.01) {
          noFill(); stroke(t.hue, 60, 95, 55*prog); strokeWeight(2.2);
          arc(t.srcX, t.srcY, CARRY_COLLECT_R*2, CARRY_COLLECT_R*2, -HALF_PI, -HALF_PI+prog*TWO_PI);
          noStroke(); fill(t.hue, 40, 100, 12*prog);
          ellipse(t.srcX, t.srcY, CARRY_COLLECT_R*2*prog);
        }
        for (let gr=r*3.5; gr>0; gr-=1.0) {
          fill(t.hue,62,82, map(gr,r*3.5,0,0,14)*pulse); ellipse(t.srcX,t.srcY,gr*2);
        }
        fill(t.hue,70,90,90); ellipse(t.srcX,t.srcY,r*2);
        noFill(); stroke(t.hue,35,75,18); strokeWeight(0.5);
        ellipse(t.srcX,t.srcY,CARRY_COLLECT_R*2); noStroke();
        // Labels
        let d = dist(sx,sy,t.srcX,t.srcY);
        let la = constrain(map(d,0,200,52,10),8,52);
        fill(t.hue,20,95,la); textAlign(CENTER,CENTER); textSize(8.5); textStyle(ITALIC);
        text(t.srcLabel + ' \u2192 ' + t.dstLabel, t.srcX, t.srcY+r+12); textStyle(NORMAL);

      } else {
        // Deliver phase — destination is active
        let r = 9 + pulse*2.5;
        // Source ghost (dim, already picked up)
        fill(t.hue, 20, 50, 10); ellipse(t.srcX, t.srcY, 6);
        // Destination orb (active)
        let prog = t.holdProgress || 0;
        if (prog > 0.01) {
          noFill(); stroke(t.hue, 60, 95, 55*prog); strokeWeight(2.2);
          arc(t.dstX, t.dstY, CARRY_COLLECT_R*2, CARRY_COLLECT_R*2, -HALF_PI, -HALF_PI+prog*TWO_PI);
          noStroke(); fill(t.hue, 40, 100, 12*prog);
          ellipse(t.dstX, t.dstY, CARRY_COLLECT_R*2*prog);
        }
        for (let gr=r*3.5; gr>0; gr-=1.0) {
          fill(t.hue,65,85, map(gr,r*3.5,0,0,16)*pulse); ellipse(t.dstX,t.dstY,gr*2);
        }
        fill(t.hue,72,92,90); ellipse(t.dstX,t.dstY,r*2);
        noFill(); stroke(t.hue,40,80,22); strokeWeight(0.5);
        ellipse(t.dstX,t.dstY,CARRY_COLLECT_R*2); noStroke();
        let d = dist(sx,sy,t.dstX,t.dstY);
        let la = constrain(map(d,0,200,52,10),8,52);
        fill(t.hue,20,95,la); textAlign(CENTER,CENTER); textSize(8.5); textStyle(ITALIC);
        text('deliver \u2192 ' + t.dstLabel, t.dstX, t.dstY+r+12); textStyle(NORMAL);
      }
      continue;
    }

    // --- MASH TASK rendering ---
    if (t.taskType === 'mash') {
      let pulse = sin(millis()*0.003+t.phase)*0.5+0.5;
      let r = 11 + pulse*3;
      let prog = t.holdProgress || 0;
      let d = dist(sx,sy,t.x,t.y);
      let isNear = d < MASH_COLLECT_R;

      // Mash progress — segmented ring
      if (prog > 0.01) {
        let segs = t.mashNeeded || MASH_PRESSES_NEEDED;
        let filled = Math.floor(prog * segs);
        for (let s=0; s<segs; s++) {
          let a1 = -HALF_PI + (s/segs)*TWO_PI + 0.06;
          let a2 = -HALF_PI + ((s+1)/segs)*TWO_PI - 0.06;
          noFill();
          if (s < filled) {
            stroke(t.hue, 65, 95, 70); strokeWeight(3);
          } else {
            stroke(t.hue, 20, 50, 18); strokeWeight(1.5);
          }
          arc(t.x, t.y, MASH_COLLECT_R*2, MASH_COLLECT_R*2, a1, a2);
        }
        noStroke();
      }

      // Bouncing orb effect when mashing
      let mashBounce = isNear ? sin(millis()*0.012)*2 : 0;
      for (let gr=r*3.5; gr>0; gr-=1.0) {
        fill(t.hue,62,82, map(gr,r*3.5,0,0,14)*pulse); ellipse(t.x,t.y+mashBounce,gr*2);
      }
      fill(t.hue,70,90,90); ellipse(t.x,t.y+mashBounce,r*2);
      noFill(); stroke(t.hue,35,75,18); strokeWeight(0.5);
      ellipse(t.x,t.y,MASH_COLLECT_R*2); noStroke();

      // Label with [SPACE] hint
      let la = map(d,0,210,52,10); la = constrain(la,8,52);
      fill(t.hue,20,95,la);
      textAlign(CENTER,CENTER); textSize(8.5); textStyle(ITALIC);
      let hint = isNear ? '\u2191 mash SPACE' : t.label;
      text(hint, t.x, t.y + r + 14); textStyle(NORMAL);
      continue;
    }

    // --- CLICK TASK rendering ---
    if (t.taskType === 'click') {
      let pulse = sin(millis()*0.0025+t.phase)*0.5+0.5;
      let r = 10 + pulse*2.5;
      let d = dist(sx,sy,t.x,t.y);
      let isNear = t.clickReady;

      // Diamond shape instead of circle
      push(); translate(t.x, t.y); rotate(PI/4);
      noStroke();
      for (let gr=r*3; gr>0; gr-=1.0) {
        fill(t.hue,58,82, map(gr,r*3,0,0,12)*(isNear?1.4:0.8)*pulse);
        rect(-gr,-gr,gr*2,gr*2,2);
      }
      fill(t.hue,70,isNear?95:85,isNear?95:80);
      rect(-r,-r,r*2,r*2,2);
      pop();

      // Ready indicator ring
      if (isNear) {
        let readyPulse = sin(millis()*0.006)*0.5+0.5;
        noFill(); stroke(t.hue,55,95,40+readyPulse*30); strokeWeight(1.5);
        ellipse(t.x, t.y, CLICK_TASK_R*2); noStroke();
      } else {
        noFill(); stroke(t.hue,25,65,14); strokeWeight(0.5);
        ellipse(t.x, t.y, CLICK_TASK_R*2); noStroke();
      }

      // Label with [E] hint
      let la = map(d,0,210,52,10); la = constrain(la,8,52);
      fill(t.hue,20,95,la);
      textAlign(CENTER,CENTER); textSize(8.5); textStyle(ITALIC);
      let hint = isNear ? '[E] ' + t.label : t.label;
      text(hint, t.x, t.y + r + 14); textStyle(NORMAL);
      continue;
    }

    // --- SIMPLE / EXTENDED task rendering ---
    let pulse = sin(millis()*0.0022+t.phase)*0.5+0.5;
    let r = (t.taskType === 'extended') ? 12 + pulse*3.5 : 10 + pulse*3;

    // Hold progress ring
    let prog = t.holdProgress || 0;
    if (prog > 0.01) {
      noFill();
      let ringHue = (t.taskType === 'extended') ? 30 : t.hue;
      stroke(ringHue, 60, 95, 55*prog); strokeWeight(t.taskType === 'extended' ? 2.8 : 2.2);
      arc(t.x, t.y, TASK_COLLECT_R*2, TASK_COLLECT_R*2, -HALF_PI, -HALF_PI + prog*TWO_PI);
      noStroke(); fill(t.hue, 40, 100, 12*prog);
      ellipse(t.x, t.y, TASK_COLLECT_R*2*prog);
    }

    // Shy behavior visual for Home chapter
    if (ct === 'gather') {
      let playerSpeed = sqrt(svx*svx + svy*svy);
      let d2 = dist(sx, sy, t.x, t.y);
      if (d2 < SHY_FLEE_DIST*1.5 && playerSpeed > SHY_SPEED_LIMIT) {
        let flicker = sin(millis()*0.02+t.phase)*0.5+0.5;
        noFill(); stroke(t.hue, 25, 90, 12*flicker); strokeWeight(0.4);
        let jx = random(-2,2), jy = random(-2,2);
        ellipse(t.x+jx, t.y+jy, r*5); noStroke();
      }
    }

    // Extended tasks have a double-ring look
    if (t.taskType === 'extended') {
      noFill(); stroke(t.hue, 30, 65, 10+pulse*5); strokeWeight(0.4);
      ellipse(t.x, t.y, TASK_COLLECT_R*2.6); noStroke();
    }

    for (let gr=r*3.5; gr>0; gr-=1.0) {
      fill(t.hue,62,82, map(gr,r*3.5,0,0,14)*pulse); ellipse(t.x,t.y,gr*2);
    }
    fill(t.hue,70,90,90); ellipse(t.x,t.y,r*2);
    noFill(); stroke(t.hue,35,75,18); strokeWeight(0.5);
    ellipse(t.x,t.y,TASK_COLLECT_R*2); noStroke();

    let d = dist(sx,sy,t.x,t.y);
    let la = map(d,0,210,52,10); la = constrain(la,8,52);
    fill(t.hue,20,95,la);
    textAlign(CENTER,CENTER); textSize(8.5); textStyle(ITALIC);
    let lbl = t.label;
    if (t.taskType === 'extended') lbl = '\u25c9 ' + lbl; // ring symbol for extended
    text(lbl, t.x, t.y + r + 12); textStyle(NORMAL);
  }

  // Click flash feedback
  if (clickFlashTimer > 0 && clickFlashPos) {
    clickFlashTimer -= deltaTime;
    let a = (clickFlashTimer / CLICK_FLASH_MS) * 75;
    let r2 = (1 - clickFlashTimer / CLICK_FLASH_MS) * 50;
    noFill(); stroke(140, 55, 95, a); strokeWeight(2);
    ellipse(clickFlashPos.x, clickFlashPos.y, r2); noStroke();
  }
}

// --- Fragment orbs (Arrival/Escape) ---
function paintBassinetOrbs() {
  let t = millis()*0.001;

  for (let b of bassinetOrbs) {
    let pulse = sin(t*0.8 + b.phase)*0.5+0.5;

    // --- Checked wrong: dim with X mark ---
    if (b.checked && !b.isKey) {
      // Flash on recent check
      if (b.flashAlpha > 0) {
        noStroke();
        for (let gr=28; gr>0; gr-=2) {
          fill(8, 55, 80, map(gr,28,0,0,b.flashAlpha*0.08));
          ellipse(b.x, b.y, gr*2);
        }
      }
      // Dim oval bassinet
      noStroke();
      fill(b.hue, 12, 28, 18); ellipse(b.x, b.y, 18, 12);
      // X mark
      stroke(8, 40, 60, 22); strokeWeight(1.2);
      line(b.x-4, b.y-4, b.x+4, b.y+4);
      line(b.x+4, b.y-4, b.x-4, b.y+4);
      noStroke();
      continue;
    }

    // --- Key baby found: disappears (carried by nurse) ---
    if (b.checked && b.isKey) {
      if (b.flashAlpha > 0) {
        noStroke();
        for (let gr=40; gr>0; gr-=1.5) {
          fill(42, 55, 95, map(gr,40,0,0,b.flashAlpha*0.16));
          ellipse(b.x, b.y, gr*2);
        }
      }
      continue;
    }

    // --- Unchecked bassinet ---
    let r = 14 + pulse*2.5;

    // Large bright outer glow so cribs are easy to spot
    noStroke();
    for (let gr=r*6; gr>r*2; gr-=2) {
      fill(b.hue, 35, 82, map(gr,r*6,r*2,0,8)*(0.6+pulse*0.4));
      ellipse(b.x, b.y, gr*2, gr*1.5);
    }

    // Collect radius ring — always visible so player knows the interaction zone
    noFill(); stroke(b.hue, 30, 80, 18+pulse*10); strokeWeight(0.7);
    ellipse(b.x, b.y, BASSINET_CHECK_R*2);
    noStroke();

    // Bassinet shape — larger warm oval
    fill(b.hue, 42, 80, 78); noStroke();
    ellipse(b.x, b.y, r*2.6, r*1.8);
    // Inner rim
    fill(b.hue, 30, 90, 40);
    ellipse(b.x, b.y, r*2, r*1.3);

    // Inner baby dot — larger
    let babyPulse = sin(t*1.5 + b.phase + 1)*0.5+0.5;
    fill(b.hue, 55, 92, 78+babyPulse*20);
    ellipse(b.x, b.y-1, 7+babyPulse*1.5, 5.5+babyPulse);

    // Hold progress ring — thicker and brighter
    if (b.holdProgress > 0.01) {
      noFill(); stroke(b.hue, 70, 98, 78); strokeWeight(3.5);
      arc(b.x, b.y, r*4.5, r*4.5, -HALF_PI, -HALF_PI + b.holdProgress*TWO_PI);
      noStroke();
      // Filling glow
      fill(b.hue, 40, 100, 18*b.holdProgress);
      ellipse(b.x, b.y, r*4*b.holdProgress, r*3*b.holdProgress);
    }

    // Label — always visible, bright
    let d = dist(sx, sy, b.x, b.y);
    let la = constrain(map(d, 0, 300, 72, 28), 28, 72);
    fill(210, 10, 100, la);
    textAlign(CENTER,CENTER); textSize(9.5); textStyle(NORMAL);
    text('crib ' + (bassinetOrbs.indexOf(b)+1), b.x, b.y + r + 16);
    // "move here" hint when nearby
    if (d < BASSINET_CHECK_R * 3 && d > BASSINET_CHECK_R) {
      let hintA = map(d, BASSINET_CHECK_R, BASSINET_CHECK_R*3, 45, 8);
      fill(b.hue, 25, 95, hintA);
      textSize(8); textStyle(ITALIC);
      text('move closer to check', b.x, b.y + r + 28);
      textStyle(NORMAL);
    }
    if (d < BASSINET_CHECK_R && b.holdProgress < 0.5) {
      let hintA = 35 + sin(millis()*0.005)*12;
      fill(b.hue, 30, 98, hintA);
      textSize(8.5); textStyle(ITALIC);
      text('hold position...', b.x, b.y + r + 28);
      textStyle(NORMAL);
    }
  }

  // --- Feedback text near nurse ---
  if (checkFeedbackText && checkFeedbackTimer > 0) {
    let fa = min(checkFeedbackTimer / 400, 1.0) * 55;
    let fy = sy - 28 - (1 - min(checkFeedbackTimer/600,1)) * 12;
    if (babyFound) {
      // Hope text — warm gold
      fill(42, 50, 95, fa * 1.3); noStroke();
      textAlign(CENTER,CENTER); textSize(12); textStyle(BOLD);
    } else {
      fill(8, 45, 90, fa); noStroke();
      textAlign(CENTER,CENTER); textSize(10); textStyle(ITALIC);
    }
    text(checkFeedbackText, sx, fy); textStyle(NORMAL);
  }
}

// --- Social group approach progress ---
function paintSocialGroupProgress() {
  for (let i=0; i<socialGroupData.length; i++) {
    let g = socialGroupData[i];
    let w = socialWindows[i];

    // Timed window indicator — ring that opens/closes
    if (w && !socialAccepted) {
      let windowPulse = sin(millis()*0.005+w.phase)*0.5+0.5;
      if (w.open) {
        // Open window — bright green-ish gap indicator
        let openProg = w.timer / SOCIAL_WINDOW_OPEN_MS;
        let remaining = 1 - openProg;
        noFill();
        stroke(140, 55, 88, 35+windowPulse*25); strokeWeight(2.2);
        // Draw an arc showing the "gap" — a welcoming opening
        let gapSize = 0.6 + remaining * 0.3;
        let gapAngle = millis()*0.001 + w.phase;
        arc(g.cx, g.cy, SOCIAL_APPROACH_R*2.8, SOCIAL_APPROACH_R*2.8,
            gapAngle+gapSize, gapAngle+TWO_PI-gapSize);
        noStroke();
        // "gap open" flash dots at gap edges
        let dotA = 14+windowPulse*12;
        let r2 = SOCIAL_APPROACH_R*1.4;
        fill(140, 50, 92, dotA);
        ellipse(g.cx+cos(gapAngle+gapSize)*r2, g.cy+sin(gapAngle+gapSize)*r2, 4);
        ellipse(g.cx+cos(gapAngle-gapSize+TWO_PI)*r2, g.cy+sin(gapAngle-gapSize+TWO_PI)*r2, 4);
        // Hint text
        let d = dist(sx, sy, g.cx, g.cy);
        if (d < SOCIAL_APPROACH_R * 1.5) {
          fill(140, 30, 92, 28+windowPulse*18);
          textAlign(CENTER,CENTER); textSize(7.5);
          text('[SPACE]', g.cx, g.cy + SOCIAL_APPROACH_R + 18);
        }
      } else {
        // Closed window — dim barrier ring
        noFill();
        stroke(240, 20, 50, 10+windowPulse*5); strokeWeight(0.6);
        ellipse(g.cx, g.cy, SOCIAL_APPROACH_R*2.8);
        noStroke();
      }
    }

    if (g.progress < 0.01) continue;
    let pulse = sin(millis()*0.003)*0.5+0.5;
    // Progress ring around group
    noFill();
    stroke(210, 35, 85, 35*g.progress); strokeWeight(1.8);
    arc(g.cx, g.cy, SOCIAL_APPROACH_R*2.4, SOCIAL_APPROACH_R*2.4,
        -HALF_PI, -HALF_PI + g.progress * TWO_PI / SOCIAL_REJECT_AT);
    // Warming glow
    noStroke();
    fill(36, 35, 85, 8*g.progress); ellipse(g.cx, g.cy, SOCIAL_APPROACH_R*2*g.progress);
  }

  // Social rejection flash
  if (socialRejectFlash) {
    socialRejectFlash.timer += deltaTime;
    let a = max(1 - socialRejectFlash.timer/1800, 0) * 65;
    if (a > 0.5) {
      fill(240, 30, 90, a); noStroke();
      textAlign(CENTER, CENTER); textSize(11); textStyle(ITALIC);
      text(socialRejectFlash.text, W/2, H/2 + 60);
      textStyle(NORMAL);
    }
    if (socialRejectFlash.timer > 1800) socialRejectFlash = null;
  }

  // Accepted glow on cluster B
  if (socialAccepted && !momentFired) {
    let pulse = sin(millis()*0.0016)*0.5+0.5;
    noFill();
    stroke(36, 50, 88, 22+pulse*18); strokeWeight(1.2);
    ellipse(ccB.x, ccB.y, 100+pulse*14, 80+pulse*10);
    stroke(36, 35, 92, 12+pulse*10); strokeWeight(0.6);
    ellipse(ccB.x, ccB.y, 145+pulse*18, 120+pulse*14);
    noStroke();
    let la = 28+pulse*16;
    fill(36, 18, 95, la); textAlign(CENTER,CENTER); textSize(8.5); textStyle(ITALIC);
    text('one door stayed open', ccB.x, ccB.y + 55); textStyle(NORMAL);
  }
}

// --- Gravity waypoint beacons ---
function paintGravityWaypoints() {
  for (let i=0; i<waypoints.length; i++) {
    let wp = waypoints[i];
    let isCurrent = (i === waypointsClaimed && !wp.claimed);
    let isNext = (i > waypointsClaimed);
    let pulse = sin(millis()*0.0018+i*1.5)*0.5+0.5;

    if (wp.claimed) {
      // Claimed: bright steady glow
      let r = 7;
      fill(180, 55, 88, 62); noStroke(); ellipse(wp.x, wp.y, r*2);
      fill(180, 30, 95, 22); ellipse(wp.x, wp.y, r*5);
      // Connect to previous with line
      if (i > 0) {
        let prev = waypoints[i-1];
        stroke(180, 35, 80, 18); strokeWeight(0.5);
        drawingContext.setLineDash([3,8]);
        line(prev.x, prev.y, wp.x, wp.y);
        drawingContext.setLineDash([]); noStroke();
      }
    } else if (isCurrent) {
      // Current target: pulsing beacon
      let r = 8 + pulse*3;
      for (let gr=r*4; gr>0; gr-=1.0) {
        fill(180, 50, 82, map(gr,r*4,0,0,12)*pulse); ellipse(wp.x,wp.y,gr*2);
      }
      fill(180, 62, 90, 85); ellipse(wp.x, wp.y, r*2);
      noFill(); stroke(180, 40, 88, 20+pulse*18); strokeWeight(0.7);
      ellipse(wp.x, wp.y, WAYPOINT_COLLECT_R*2); noStroke();
      // Progress ring
      let prog = wp.progress || 0;
      if (prog > 0.01) {
        noFill(); stroke(140, 60, 95, 55*prog); strokeWeight(2.5);
        arc(wp.x, wp.y, WAYPOINT_COLLECT_R*2+8, WAYPOINT_COLLECT_R*2+8,
            -HALF_PI, -HALF_PI + prog*TWO_PI);
        noStroke();
      }
      // Label — show milestone name if available, otherwise number
      fill(180, 20, 92, 32+pulse*18); textAlign(CENTER,CENTER); textSize(8);
      let wpLabel = wp.label || ((i+1) + '/' + waypoints.length);
      text(wpLabel, wp.x, wp.y + r + 14);
      // Connect to previous
      if (i > 0) {
        let prev = waypoints[i-1];
        stroke(180, 35, 80, 18); strokeWeight(0.5);
        drawingContext.setLineDash([3,8]);
        line(prev.x, prev.y, wp.x, wp.y);
        drawingContext.setLineDash([]); noStroke();
      }
      // Arrow from player
      let ang = atan2(wp.y-sy, wp.x-sx);
      let d = dist(sx,sy,wp.x,wp.y);
      if (d > 60) {
        let ax = sx + cos(ang)*38;
        let ay = sy + sin(ang)*38;
        stroke(180, 40, 85, 18+pulse*12); strokeWeight(1.0);
        let bl = 10;
        line(ax-cos(ang)*bl, ay-sin(ang)*bl, ax, ay);
        let hs = 5;
        line(ax, ay, ax+cos(ang+PI*0.8)*hs, ay+sin(ang+PI*0.8)*hs);
        line(ax, ay, ax+cos(ang-PI*0.8)*hs, ay+sin(ang-PI*0.8)*hs);
        noStroke();
      }
    } else if (isNext) {
      // Future: dim, barely visible
      let r = 5;
      fill(180, 25, 60, 12+pulse*6); noStroke(); ellipse(wp.x, wp.y, r*2);
      noFill(); stroke(180, 18, 50, 8); strokeWeight(0.4);
      ellipse(wp.x, wp.y, WAYPOINT_COLLECT_R*2); noStroke();
    }
  }

  // Gravity intensity indicator
  if (gravityPullScale > 1.05) {
    let intensity = map(gravityPullScale, 1, 3, 0, 1);
    let pulse = sin(millis()*0.004)*0.5+0.5;
    let lineCount = floor(intensity*6)+2;
    let ang = atan2(ccA.y-sy, ccA.x-sx);
    for (let i=0; i<lineCount; i++) {
      let spread = (i - (lineCount-1)/2) * 0.2;
      let la = 8+intensity*12+pulse*6;
      stroke(30, 50, 70, la); strokeWeight(0.4+intensity*0.3);
      let sd = 24+i*3;
      let ed = sd+18+intensity*16;
      let px1 = sx+cos(ang+spread)*sd, py1 = sy+sin(ang+spread)*sd;
      let px2 = sx+cos(ang+spread*0.5)*ed, py2 = sy+sin(ang+spread*0.5)*ed;
      line(px1,py1,px2,py2);
    }
    noStroke();
  }
}

function paintGravityObstacles() {
  // Memory surge visual — warm glow pulling toward home with memory text
  if (!surgeActive || surgePhase < 0.01) return;
  let alpha = surgePhase * 45;

  // Warm radial glow emanating from home cluster toward player
  let homeX = ccA.x, homeY = ccA.y;
  let ang = atan2(sy - homeY, sx - homeX);
  let pullDist = dist(sx, sy, homeX, homeY);

  // Pulsing rings expanding from home toward player
  let ringCount = 4;
  let t = (millis() * 0.001) % 1.0;
  for (let i = 0; i < ringCount; i++) {
    let phase = (t + i / ringCount) % 1.0;
    let ringR = phase * pullDist * 0.8;
    let ringAlpha = (1 - phase) * alpha * 0.4;
    noFill(); stroke(32, 45, 75, ringAlpha); strokeWeight(1.2);
    ellipse(homeX, homeY, ringR * 2);
  }
  noStroke();

  // Warm haze around home
  for (let gr = 120; gr > 0; gr -= 3) {
    fill(35, 40, 65, map(gr, 120, 0, 0, alpha * 0.15));
    ellipse(homeX, homeY, gr * 2);
  }

  // Streaks pulling from player toward home
  let streakCount = 5 + floor(surgePhase * 4);
  for (let i = 0; i < streakCount; i++) {
    let spread = (i - (streakCount-1)/2) * 0.15;
    let sa = alpha * (0.3 + surgePhase * 0.4);
    stroke(35, 40, 70, sa); strokeWeight(0.6 + surgePhase * 0.4);
    let sd = 20 + i * 5;
    let ed = sd + 25 + surgePhase * 20;
    let px1 = sx + cos(ang + PI + spread) * sd;
    let py1 = sy + sin(ang + PI + spread) * sd;
    let px2 = sx + cos(ang + PI + spread * 0.5) * ed;
    let py2 = sy + sin(ang + PI + spread * 0.5) * ed;
    line(px1, py1, px2, py2);
  }
  noStroke();

  // Memory text floating near the player
  if (currentSurgeMemory) {
    let textAlpha = surgePhase * 52;
    let textY = sy - 38 + sin(millis() * 0.002) * 4;
    fill(35, 30, 90, textAlpha);
    textAlign(CENTER, CENTER); textSize(10); textStyle(ITALIC);
    text(currentSurgeMemory, sx, textY);
    textStyle(NORMAL);
  }

  // Screen edge warmth during surge
  let edgeAlpha = surgePhase * 18;
  noStroke();
  // Left edge warm glow (toward home)
  for (let x = 0; x < 60; x++) {
    fill(30, 45, 55, edgeAlpha * (1 - x / 60));
    rect(x, 0, 1, H);
  }
}

function paintDestinationOrbs() {
  if (safespotOrb && ch3Phase === 1) {
    let pulse = sin(millis()*0.0014+1.2)*0.5+0.5;
    let r = 8+pulse*2.5;
    for (let gr=r*4.2; gr>0; gr-=1.0) {
      fill(215,28,48, map(gr,r*4.2,0,0,9)*pulse); ellipse(safespotOrb.x,safespotOrb.y,gr*2);
    }
    fill(215,25,60,72); ellipse(safespotOrb.x,safespotOrb.y,r*2);
    noFill(); stroke(215,18,70,20+pulse*14); strokeWeight(0.6);
    ellipse(safespotOrb.x,safespotOrb.y,52); noStroke();
    let d = dist(sx,sy,safespotOrb.x,safespotOrb.y);
    let la = constrain(map(d,0,250,55,10),8,55);
    fill(215,15,90,la); textAlign(CENTER,CENTER); textSize(8.5); textStyle(ITALIC);
    text('safe place', safespotOrb.x, safespotOrb.y + r + 12); textStyle(NORMAL);
  }
  if (friendhouseOrb && ch3Phase === 2) {
    let pulse = sin(millis()*0.0019+0.5)*0.5+0.5;
    let r = 9+pulse*3;
    for (let gr=r*4.5; gr>0; gr-=1.0) {
      fill(38,65,72, map(gr,r*4.5,0,0,12)*pulse); ellipse(friendhouseOrb.x,friendhouseOrb.y,gr*2);
    }
    fill(40,70,82,85); ellipse(friendhouseOrb.x,friendhouseOrb.y,r*2);
    noFill(); stroke(40,50,85,22+pulse*18); strokeWeight(0.8);
    ellipse(friendhouseOrb.x,friendhouseOrb.y,58); noStroke();
    let d = dist(sx,sy,friendhouseOrb.x,friendhouseOrb.y);
    let la = constrain(map(d,0,300,58,10),8,58);
    fill(38,20,96,la); textAlign(CENTER,CENTER); textSize(8.5); textStyle(ITALIC);
    text("friend's house", friendhouseOrb.x, friendhouseOrb.y + r + 12); textStyle(NORMAL);
  }
}

function paintFanOrbs() {
  for (let f of fanOrbs) {
    let scatter = ch3SafeFlash || (momentState==='active');
    let pulse = sin(millis()*0.0038+f.phase)*0.5;
    let r = f.r + pulse*2;
    let d = dist(f.x,f.y,sx,sy);
    let intensity = scatter ? 0.28 : map(d,0,200,1.4,0.65);
    for (let gr=r*3.8; gr>0; gr-=1.0) {
      fill(f.hue,72,82, map(gr,r*3.8,0,0,13)*intensity*(0.8+pulse*0.2));
      ellipse(f.x,f.y,gr*2);
    }
    fill(f.hue,78,90, scatter?32:88); ellipse(f.x,f.y,r*2);
  }
}

function paintClusterOrbs() {
  let clusterRingAlpha = 0;
  if (cType()==='fans' && chosenCluster==='B' && momentState!=='none') {
    clusterRingAlpha = momentState==='active' ? min(momentTimer/900,1)*38 : max(1-momentTimer/1400,0)*38;
  }
  for (let o of [...orbsA,...orbsB]) {
    let pulse = sin(millis()*o.speed*0.001*60+o.phase);
    let r = o.r+pulse*1.5;
    for (let gr=r*3.8; gr>0; gr-=1.0) {
      fill(o.hue,o.sat*0.64,o.bri, map(gr,r*3.8,0,0,11)*(0.82+pulse*0.18));
      ellipse(o.x,o.y,gr*2);
    }
    fill(o.hue,o.sat,o.bri,90); ellipse(o.x,o.y,r*2);
    if (clusterRingAlpha > 0) {
      noFill();
      stroke(o.hue,o.sat*0.4,100,clusterRingAlpha); strokeWeight(0.65); ellipse(o.x,o.y,r*5.5);
      stroke(o.hue,o.sat*0.2,90,clusterRingAlpha*0.45); strokeWeight(0.35); ellipse(o.x,o.y,r*9.2);
      noStroke();
    }
  }
}

function paintSelfOrb(x, y, hue, heat) {
  let t = millis()*0.001;
  let pulseSpeed = 0.72 + selfState*1.4;
  let pulse = sin(t*pulseSpeed+1.1);
  let r = SELF_R+pulse*1.2;
  let ct = cType();

  let stunFlicker = isStunned ? (sin(millis()*0.045)>0?1.0:0.18) : 1.0;
  let blendMult = (abilityActive && ct==='fans') ? 0.3 : 1.0;

  // Surge trail
  if (abilityActive && ct==='escape' && (state==='chapter'||state==='fadein')) {
    for (let i=1; i<=4; i++) {
      fill(30,60,92,map(i,1,4,22,4));
      ellipse(x-svx*i*3.5, y-svy*i*3.5, r*(2-i*0.3));
    }
  }
  // Steady/persist ring
  if (abilityActive && (ct==='tasks'||ct==='social'||ct==='gather') && (state==='chapter'||state==='fadein')) {
    noFill(); stroke(140,50,85,28); strokeWeight(1.2);
    let rr = 48+sin(t*3.5)*4; ellipse(x,y,rr);
    stroke(140,35,90,14); strokeWeight(0.6); ellipse(x,y,rr+16); noStroke();
  }
  // Resolve shimmer
  if (abilityActive && ct==='gravity' && (state==='chapter'||state==='fadein')) {
    noFill(); stroke(180,45,88,25); strokeWeight(1.0);
    ellipse(x,y,44+sin(t*4)*3); noStroke();
  }

  // Carrying baby glow (Arrival chapter)
  if (ct === 'escape' && carryingBaby) {
    let warmPulse = sin(t*0.6)*0.5+0.5;
    noStroke();
    for (let gr=r*8; gr>0; gr-=1.5) {
      fill(42, 50, 94, map(gr,r*8,0,0,4.5)*(0.6+warmPulse*0.4));
      ellipse(x,y,gr*2);
    }
    // Small baby dot riding with nurse
    fill(42, 55, 92, 75+warmPulse*20);
    ellipse(x+3, y-3, 5, 4);
  }

  let orbAlpha = 92 * stunFlicker * blendMult;
  for (let gr=r*4.5; gr>0; gr-=1.0) {
    fill(hue,SELF_BASE_SAT*0.60,SELF_BASE_BRI,
         map(gr,r*4.5,0,0,9)*(0.78+pulse*0.22)*stunFlicker*blendMult);
    ellipse(x,y,gr*2);
  }
  fill(hue,SELF_BASE_SAT,SELF_BASE_BRI,orbAlpha); ellipse(x,y,r*2);

  let ringAlpha = (40+heat*55+selfState*18)*stunFlicker*blendMult;
  let ringWeight = 0.7+heat*0.9;
  let ringScale = isStunned?(3.5+sin(t*18)*1.8):(5.5+heat*sin(t*8)*0.6);
  noFill();
  stroke(hue,SELF_BASE_SAT*0.44,100,ringAlpha); strokeWeight(ringWeight);
  ellipse(x,y,r*ringScale);
  stroke(hue,SELF_BASE_SAT*0.22,90,ringAlpha*0.42); strokeWeight(0.38);
  ellipse(x,y,r*9.2); noStroke();
}

// =============================================================
//  HUD
// =============================================================
function paintHUD(dt) {
  let ct = cType();
  if (ct === 'escape') { paintEscapeBar(); paintBassinetDots(); }
  if (ct === 'tasks') paintRanchDots();
  if (ct === 'gather') paintTaskDots();
  if (ct === 'social') paintSocialHUD();
  if (ct === 'gravity') paintWaypointHUD();
  if (ct === 'fans') paintStunIndicator();
  paintObjective();
  paintResilienceBar();
  paintAbilityCooldown();
  paintControlsHint();
}

function paintObjective() {
  let obj = getObjectiveText();
  if (!obj) return;
  let ct = cType();
  // Position below escape bar (y=18) and resilience bar (y=14)
  let objY = (ct === 'escape') ? 38 : 30;
  // Dark background strip for readability
  fill(220, 15, 6, 32);
  textSize(11);
  let objW = textWidth(obj) + 30;
  rectMode(CENTER);
  rect(W/2, objY, max(objW, 200), 22, 4);
  rectMode(CORNER);
  // Text — larger and brighter
  fill(210,10,95,55); noStroke();
  textAlign(CENTER,CENTER); textSize(11);
  text(obj, W/2, objY);
}

function paintResilienceBar() {
  let barW=100, barH=2.5, bx=W-36-barW, by=14;
  let prog = resilience / RESILIENCE_MAX;
  noFill(); stroke(210,8,22,20); strokeWeight(barH);
  line(bx,by,bx+barW,by);
  let hue = map(prog,0,1,8,204);
  stroke(hue,55,85,40*prog+18); strokeWeight(barH);
  line(bx,by,bx+barW*prog,by);
  if (prog < 0.28) {
    let urgPulse = sin(millis()*0.01)*0.5+0.5;
    stroke(8,72,92,28*urgPulse); strokeWeight(barH+1.2);
    line(bx,by,bx+barW*prog,by);
  }
  noStroke();
  fill(210,10,65,20); textAlign(RIGHT,CENTER); textSize(7);
  text('resilience', bx-5, by);
}

function paintAbilityCooldown() {
  if (abilityActive) {
    let prog = 1-(abilityTimer/ABILITY_DURATION[chapterIndex]);
    noFill(); stroke(140,60,88,40*prog); strokeWeight(1.5);
    arc(sx,sy,40,40,-HALF_PI,-HALF_PI+prog*TWO_PI); noStroke();
  } else if (abilityCooldown > 0) {
    let prog = abilityCooldown/ABILITY_COOLDOWN[chapterIndex];
    noFill(); stroke(210,18,45,18); strokeWeight(1);
    arc(sx,sy,44,44,-HALF_PI,-HALF_PI+prog*TWO_PI); noStroke();
  }
}

// Plain-English ability descriptions per chapter
const ABILITY_DESCRIPTIONS = [
  'speed boost',        // escape
  'steady yourself',    // tasks
  'hold your ground',   // social
  'resist the pull',    // gravity
  'become less visible',// fans
  'reach out gently'    // gather
];

function paintControlsHint() {
  let ct = cType();
  let desc = ABILITY_DESCRIPTIONS[chapterIndex] || 'ability';
  let ready = !abilityActive && abilityCooldown <= 0 && !isStunned;

  // --- Fade-in overlay at chapter start (first 8 seconds) ---
  let overlayFade = constrain(1 - chapterMs / 8000, 0, 1);
  if (overlayFade > 0.01) {
    let oa = overlayFade * 68;
    // Centered panel below top HUD elements (escape bar ~y18, objective ~y38)
    let ctrlY = (ct === 'escape') ? 58 : 50;
    let panelW = 460, panelH2 = 48;
    fill(220, 18, 6, oa * 0.7);
    rect(W/2 - panelW/2, ctrlY, panelW, panelH2, 5);

    // Two-line controls inside panel
    fill(210, 15, 95, oa);
    textAlign(CENTER, CENTER); textSize(12);
    text('WASD keys or hold mouse = move', W/2, ctrlY + 14);

    fill(140, 30, 95, oa);
    textSize(11);
    let actionHint = 'SPACE = ' + desc;
    if (ct === 'tasks') actionHint += '  \u00b7  E = interact with nearby tasks';
    if (ct === 'escape') actionHint += '  \u00b7  stay near cribs to search them';
    if (ct === 'social') actionHint += '  \u00b7  press SPACE when a gap opens in a group';
    if (ct === 'gravity') actionHint += '  \u00b7  push through the memory surges';
    text(actionHint, W/2, ctrlY + 34);
  }

  // --- Persistent bottom-edge hints (tiny, below all other UI) ---
  let baseAlpha = 28 + sin(millis()*0.002)*3;
  let readyPulse = ready ? 32+sin(millis()*0.004)*6 : 16;

  // Single line at very bottom edge
  fill(140, 25, 78, readyPulse); textAlign(LEFT, BOTTOM); textSize(8);
  let spaceHint = '[SPACE] ' + desc;
  if (ct === 'tasks' && mashActiveTask >= 0) spaceHint = '[SPACE] mash!';
  text(spaceHint, 8, H - 1);

  fill(210, 10, 68, baseAlpha); textAlign(RIGHT, BOTTOM); textSize(8);
  text('WASD / mouse to move', W - 8, H - 1);
}

function paintEscapeBar() {
  if (momentFired || escapeExpired) return;
  let progress = constrain(1-(escapeTimer/ESCAPE_TIME_MS), 0, 1);
  let urgency = 1 - progress;
  let hue = babyFound ? lerp(42, 52, sin(millis()*0.002)*0.5+0.5) : map(progress,0,1,5,204);
  let barW = W-80, y = 18;
  noFill(); stroke(210,8,22,25); strokeWeight(1.8); line(40,y,W-40,y);

  // Bar color shifts to warm gold when baby is found
  let barAlpha = babyFound ? 60 : 48*(0.7+progress*0.3);
  stroke(hue,62,88,barAlpha); strokeWeight(babyFound ? 2.5 : 1.8);
  line(40,y,40+progress*barW,y);

  // Urgent pulsing when low on time
  if (progress < 0.35 && !babyFound) {
    let u = sin(millis()*0.015)*0.5+0.5;
    stroke(5,90,98,45*u); strokeWeight(3); line(40,y,40+progress*barW,y);
    // Flicker text warning
    if (progress < 0.2) {
      noStroke();
      let wa = sin(millis()*0.01)*0.5+0.5;
      fill(5,85,95,35*wa); textAlign(CENTER,CENTER); textSize(8);
      text('THE FIRE IS CLOSE', W/2, y+14);
    }
  }
  noStroke();
}

// Bassinet dots (Arrival — nurse search)
function paintBassinetDots() {
  if (bassinetOrbs.length === 0) return;
  let total = bassinetOrbs.length;
  let dotSpacing = 11;
  let startX = W/2 - ((total-1)*dotSpacing)*0.5;
  let y = H-22;
  for (let i=0; i<total; i++) {
    let b = bassinetOrbs[i];
    noStroke();
    if (b.checked && b.isKey) {
      // Key baby — bright gold
      fill(42, 60, 95, 82);
    } else if (b.checked) {
      // Wrong — dim red
      fill(8, 40, 55, 30);
    } else if (b.holdProgress > 0.01) {
      let pulse = sin(millis()*0.008+i)*0.5+0.5;
      fill(b.hue, 45, 85, 25+pulse*35);
    } else {
      // Unchecked — dim gray
      fill(210, 10, 45, 20);
    }
    ellipse(startX+i*dotSpacing, y, 4.5, 4.5);
  }
  // Status label
  let msgAlpha = babyFound ? 45 : 22;
  let msgHue = babyFound ? 42 : 210;
  fill(msgHue,babyFound?35:10,babyFound?95:70,msgAlpha); textAlign(CENTER,CENTER); textSize(7);
  let msg = babyFound ? 'carry them out — run' : checkedCount + '/' + total + ' searched';
  text(msg, W/2, y+10);
}

// Ranch: show active completed count as dots, plus total counter
function paintRanchDots() {
  let total = taskOrbs.length;
  let dotSpacing = 12;
  let startX = W/2 - ((total-1)*dotSpacing)*0.5;
  for (let i=0; i<total; i++) {
    let t = taskOrbs[i];
    let filled = t && t.collected;
    let isCarry = t && t.taskType === 'carry';
    let isExtended = t && t.taskType === 'extended';
    let decaying = filled && t.decayTimer !== undefined && t.decayTimer > TASK_DECAY_MS * 0.65;
    let inFrost = filled && frostZone && dist(t.x,t.y,frostZone.x,frostZone.y) < FROST_RADIUS;
    noStroke();
    if (decaying || inFrost) {
      let flicker = sin(millis()*0.012+i)*0.5+0.5;
      fill(inFrost ? 210 : 8, 60, 85, 30+flicker*35);
    } else {
      fill(36, filled?62:18, filled?88:40, filled?65:28);
    }
    let isMash = t && t.taskType === 'mash';
    let isClick = t && t.taskType === 'click';
    // Carry tasks shown as diamond, mash as star-burst, click as square, extended as larger dot
    if (isCarry) {
      push(); translate(startX+i*dotSpacing, H-22); rotate(PI/4);
      rect(-2.5,-2.5,5,5); pop();
    } else if (isMash) {
      // Star shape for mash
      push(); translate(startX+i*dotSpacing, H-22);
      for (let s2=0; s2<4; s2++) {
        let a=s2*PI/2;
        ellipse(cos(a)*2.5, sin(a)*2.5, 2, 2);
      }
      ellipse(0, 0, 3, 3);
      pop();
    } else if (isClick) {
      // Small square for click
      rectMode(CENTER);
      rect(startX+i*dotSpacing, H-22, 5, 5);
      rectMode(CORNER);
    } else {
      let sz = isExtended ? 6.5 : 5.5;
      ellipse(startX+i*dotSpacing, H-22, sz, sz);
    }
    if (filled && !decaying && !inFrost) {
      noFill(); stroke(36,45,80,25); strokeWeight(0.5);
      ellipse(startX+i*dotSpacing, H-22, 10, 10); noStroke();
    }
  }
  // Total completions counter + carrying status
  let msg = taskTotalDone + '/' + RANCH_TOTAL_NEEDED + ' done';
  if (carryingTask !== null) msg += '  \u00b7  carrying';
  fill(210,10,65,22); textAlign(CENTER,BOTTOM); textSize(7);
  text(msg, W/2, H-28);
}

function paintTaskDots() {
  let total = TASKS_REQUIRED;
  let dotSpacing = 14;
  let startX = W/2 - ((total-1)*dotSpacing)*0.5;
  for (let i=0; i<total; i++) {

}
