// =============================================================
//  ABILITY SYSTEM
// =============================================================
function activateAbility() {
  abilityActive = true; abilityTimer = 0;
  stats.abilityUses++;
  spawnParticles(sx, sy, 140, 14);
}

function updateAbility(dt) {
  if (abilityActive) {
    abilityTimer += dt;
    if (abilityTimer >= ABILITY_DURATION[chapterIndex]) {
      abilityActive = false;
      abilityCooldown = ABILITY_COOLDOWN[chapterIndex];
    }
  } else if (abilityCooldown > 0) {
    abilityCooldown = max(abilityCooldown - dt, 0);
  }
}

// =============================================================
//  RESILIENCE SYSTEM
// =============================================================
function updateResilience(dt) {
  if (momentState !== 'none') return;
  resilience += RESILIENCE_REGEN * dt / 1000;
  resilience = constrain(resilience, 0, RESILIENCE_MAX);
}
function drainResilience(amount) {
  if (momentState !== 'none') return;
  resilience -= amount;
  if (amount > 5) screenShake = max(screenShake, amount*0.2);
  resilience = max(resilience, 0);
}
function restoreResilience(amount) {
  resilience = min(resilience+amount, RESILIENCE_MAX);
}

// =============================================================
//  PARTICLES
// =============================================================
function spawnParticles(x, y, hue, count) {
  for (let i=0; i<count; i++) {
    let ang=random(TWO_PI), spd=random(1.5,4.5);
    particles.push({ x, y, vx:cos(ang)*spd, vy:sin(ang)*spd,
      hue:hue+random(-15,15), life:1.0, decay:random(0.016,0.038), r:random(2,4.5) });
  }
}
function updateParticles(dt) {
  let dtF = dt/16.67;
  for (let i=particles.length-1; i>=0; i--) {
    let p=particles[i];
    p.x+=p.vx*dtF; p.y+=p.vy*dtF; p.vx*=0.96; p.vy*=0.96;
    p.life-=p.decay*dtF;
    if (p.life<=0) particles.splice(i,1);
  }
}
function paintParticles() {
  noStroke();
  for (let p of particles) {
    fill(p.hue,55,92,p.life*60); ellipse(p.x,p.y,p.r*2*p.life);
  }
}

// =============================================================
//  Ch1 FIRE / DARKNESS SYSTEM
// =============================================================
function spawnFireParticles(dt) {
  let timeRatio = escapeTimer / ESCAPE_TIME_MS; // 0..1
  let spawnRate = 0.3 + timeRatio * 1.8; // more fire as time runs out
  if (babyFound) spawnRate *= 0.15; // fire fades when baby found

  ch1EmberTimer += dt * spawnRate;
  while (ch1EmberTimer > 40) {
    ch1EmberTimer -= 40;
    // Fire from edges
    let edge = floor(random(4));
    let fx, fy, fvx, fvy;
    if (edge === 0) { fx=random(W); fy=H+10; fvx=random(-0.4,0.4); fvy=random(-2.5,-0.8); }
    else if (edge === 1) { fx=-10; fy=random(H*0.3,H); fvx=random(0.5,1.8); fvy=random(-1.5,-0.3); }
    else if (edge === 2) { fx=W+10; fy=random(H*0.3,H); fvx=random(-1.8,-0.5); fvy=random(-1.5,-0.3); }
    else { fx=random(W); fy=H+10; fvx=random(-0.6,0.6); fvy=random(-2.0,-0.6); }
    fireParticles.push({
      x:fx, y:fy, vx:fvx, vy:fvy,
      hue: random(5,30), sat: random(70,100), bri: random(80,100),
      life:1.0, decay:random(0.008,0.022), r:random(3,8+timeRatio*6)
    });
    // Smoke
    if (random() < 0.4 + timeRatio * 0.3) {
      smokeParticles.push({
        x: random(W), y: H + random(20,60),
        vx: random(-0.3,0.3), vy: random(-1.2,-0.3),
        alpha: random(15,35) + timeRatio * 20,
        life: 1.0, decay: random(0.004,0.012), r: random(30,80)
      });
    }
  }
}

function updateFireSystem(dt) {
  let dtF = dt / 16.67;
  // Fire particles
  for (let i=fireParticles.length-1; i>=0; i--) {
    let p = fireParticles[i];
    p.x += p.vx * dtF; p.y += p.vy * dtF;
    p.vx += random(-0.05,0.05) * dtF; // flicker
    p.vy -= 0.015 * dtF; // rise
    p.life -= p.decay * dtF;
    if (p.life <= 0 || p.y < -20) fireParticles.splice(i,1);
  }
  // Smoke particles
  for (let i=smokeParticles.length-1; i>=0; i--) {
    let p = smokeParticles[i];
    p.x += p.vx * dtF; p.y += p.vy * dtF;
    p.vx += random(-0.02,0.02) * dtF;
    p.life -= p.decay * dtF;
    if (p.life <= 0 || p.y < -40) smokeParticles.splice(i,1);
  }

  // Heartbeat phase (speeds up as timer runs out)
  let urgency = escapeTimer / ESCAPE_TIME_MS;
  let heartRate = 1.5 + urgency * 4.5;
  ch1HeartbeatPhase += dt * 0.001 * heartRate;

  // Fire intensity ramps up
  let targetFire = babyFound ? max(ch1FireIntensity * 0.92, 0) : urgency;
  ch1FireIntensity += (targetFire - ch1FireIntensity) * 0.008 * dtF;

  // Darkness: starts low, grows slowly as fire spreads, lifts when baby found
  if (babyFound) {
    ch1TargetDarkness = max(0.03, ch1TargetDarkness - 0.004 * dtF);
    ch1HopeGlow = min(ch1HopeGlow + 0.004 * dtF, 1.0);
  } else {
    ch1TargetDarkness = 0.12 + urgency * 0.35;
  }
  ch1Darkness += (ch1TargetDarkness - ch1Darkness) * 0.012 * dtF;

  // Hope flash decay
  if (ch1HopeFlash > 0) ch1HopeFlash = max(ch1HopeFlash - dt * 0.0006, 0);

  // Urgency screen shake
  if (!babyFound && urgency > 0.6) {
    let shakeAmt = (urgency - 0.6) * 4.0 * (sin(ch1HeartbeatPhase * TWO_PI) * 0.5 + 0.5);
    screenShake = max(screenShake, shakeAmt);
  }

  spawnFireParticles(dt);
}

function paintFireSystem() {
  // --- Smoke layer (behind everything) ---
  noStroke();
  for (let p of smokeParticles) {
    let a = p.alpha * p.life * (1 - ch1HopeGlow * 0.7);
    fill(0, 0, 12, a);
    ellipse(p.x, p.y, p.r * 2, p.r * 1.4);
  }

  // --- Fire glow on edges ---
  let fireA = ch1FireIntensity * 45 * (1 - ch1HopeGlow * 0.8);
  let pulse = sin(ch1HeartbeatPhase * TWO_PI) * 0.5 + 0.5;
  // Bottom fire glow
  for (let y=H; y>H-120*ch1FireIntensity; y-=4) {
    let a = map(y, H, H-120*ch1FireIntensity, fireA, 0) * (0.7 + pulse*0.3);
    fill(12, 85, 90, a); rect(0, y, W, 4);
  }
  // Left fire glow
  for (let x=0; x<60*ch1FireIntensity; x+=4) {
    let a = map(x, 0, 60*ch1FireIntensity, fireA*0.6, 0) * (0.6 + pulse*0.4);
    fill(18, 80, 85, a); rect(x, H*0.3, 4, H*0.7);
  }
  // Right fire glow
  for (let x=W; x>W-60*ch1FireIntensity; x-=4) {
    let a = map(x, W, W-60*ch1FireIntensity, fireA*0.6, 0) * (0.6 + pulse*0.4);
    fill(15, 80, 85, a); rect(x, H*0.3, 4, H*0.7);
  }

  // --- Fire particles ---
  for (let p of fireParticles) {
    let a = p.life * 55 * (1 - ch1HopeGlow * 0.5);
    fill(p.hue, p.sat, p.bri, a);
    ellipse(p.x, p.y, p.r*2*p.life, p.r*1.6*p.life);
    // Inner bright core
    fill(40, 50, 100, a * 0.4);
    ellipse(p.x, p.y, p.r*0.8*p.life);
  }
}

function paintDarknessOverlay() {
  // Main darkness vignette
  let darkAlpha = ch1Darkness * 70;
  noStroke();

  // Vignette from edges — generous radius so player can see nearby cribs
  let vigRadius = map(ch1Darkness, 0, 1, W*1.5, W*0.42);
  if (babyFound) vigRadius = lerp(vigRadius, W*2.0, ch1HopeGlow);

  // Draw concentric dark rings for vignette
  let steps = 24;
  for (let i=steps; i>0; i--) {
    let r = vigRadius + (W*0.9 - vigRadius) * (i / steps);
    let a = map(i, steps, 0, darkAlpha, 0);
    fill(0, 0, 2, a);
    ellipse(sx, sy, r*2, r*1.6);
  }

  // Extra darkness in corners — grows with urgency
  if (ch1Darkness > 0.35) {
    let ca = (ch1Darkness - 0.35) * 55;
    fill(0, 0, 2, ca);
    rect(0, 0, 60, 60); rect(W-60, 0, 60, 60);
    rect(0, H-60, 60, 60); rect(W-60, H-60, 60, 60);
  }

  // Heartbeat pulse overlay (red throb)
  if (!babyFound) {
    let heartPulse = pow(max(sin(ch1HeartbeatPhase * TWO_PI), 0), 3);
    let urgency = escapeTimer / ESCAPE_TIME_MS;
    let heartA = heartPulse * urgency * 18;
    fill(5, 80, 50, heartA);
    rect(0, 0, W, H);
  }
}

function paintHopeTransition() {
  if (ch1HopeFlash <= 0 && ch1HopeGlow <= 0 && !babyFoundCelebration) return;

  // Bright white-gold flash on finding baby
  if (ch1HopeFlash > 0) {
    let a = ch1HopeFlash * 85;
    fill(42, 20, 100, a);
    rect(0, 0, W, H);
    // Radial light burst from player — bigger
    for (let r=300; r>0; r-=4) {
      fill(45, 15, 100, ch1HopeFlash * map(r, 300, 0, 0, 30));
      ellipse(sx, sy, r*2);
    }
  }

  // Sustained warm glow
  if (ch1HopeGlow > 0.05) {
    for (let r=220; r>0; r-=4) {
      let a = ch1HopeGlow * map(r, 220, 0, 0, 14);
      fill(42, 35, 95, a);
      ellipse(sx, sy, r*2);
    }
    fill(38, 25, 90, ch1HopeGlow * 6);
    rect(0, 0, W, H);
  }

  // === BABY FOUND CELEBRATION OVERLAY ===
  if (babyFoundCelebration) {
    let prog = min(babyCelebrationTimer / BABY_CELEBRATION_MS, 1);

    // Warm golden overlay — pulses gently
    let pulse = sin(babyCelebrationTimer * 0.003)*0.5+0.5;
    fill(42, 25, 95, 12 + pulse*8);
    rect(0, 0, W, H);

    // Expanding rings of light from player
    let ringCount = 4;
    for (let i=0; i<ringCount; i++) {
      let ringProg = constrain((babyCelebrationTimer - i*300) / 1200, 0, 1);
      if (ringProg <= 0) continue;
      let ringR = ringProg * 350;
      let ringA = (1-ringProg) * 35;
      noFill(); stroke(42, 40, 95, ringA); strokeWeight(2.5 - ringProg*2);
      ellipse(sx, sy, ringR*2);
    }
    noStroke();

    // Big central text — "YOU FOUND THEM"
    let textFade = constrain(map(babyCelebrationTimer, 400, 1200, 0, 1), 0, 1);
    let textSize1 = 28;

    fill(42, 35, 100, textFade * 85);
    textAlign(CENTER, CENTER); textSize(textSize1);
    textStyle(BOLD);
    text('YOU FOUND THEM', W/2, H/2 - 30);
    textStyle(NORMAL);

    // Subtitle
    let subFade = constrain(map(babyCelebrationTimer, 1000, 1800, 0, 1), 0, 1);
    fill(42, 20, 98, subFade * 60);
    textSize(14); textStyle(ITALIC);
    text('the baby is safe', W/2, H/2 + 10);
    textStyle(NORMAL);

    // Sparkle particles around player
    if (babyCelebrationTimer < 2000 && random() < 0.4) {
      let sparkAng = random(TWO_PI);
      let sparkR = random(30, 120);
      spawnParticles(
        sx + cos(sparkAng)*sparkR,
        sy + sin(sparkAng)*sparkR,
        random(36, 52), 2
      );
    }

    // "Press any key to continue" prompt
    if (babyCanContinue) {
      let promptPulse = map(sin(millis()*0.004), -1, 1, 0.5, 1.0);
      fill(210, 10, 98, 62 * promptPulse);
      textSize(13);
      text('press any key to continue', W/2, H/2 + 55);
    }
  }
}

// =============================================================
//  Ch ESCAPE MECHANIC
// =============================================================
function updateEscapeMechanic(dt) {
  if (momentFired || escapeExpired) return;

  // --- Baby found celebration pause ---
  if (babyFoundCelebration) {
    babyCelebrationTimer += dt;
    // Don't advance the escape timer during celebration
    if (babyCelebrationTimer >= BABY_CELEBRATION_MS) {
      babyCanContinue = true;
    }
    return; // skip all other escape logic while celebrating
  }

  escapeTimer += dt;

  // --- Feedback text decay ---
  if (checkFeedbackTimer > 0) checkFeedbackTimer = max(checkFeedbackTimer - dt, 0);
  if (checkFeedbackTimer <= 0) checkFeedbackText = null;

  // --- Flash decay for all bassinets ---
  for (let b of bassinetOrbs) {
    if (b.flashAlpha > 0) b.flashAlpha = max(b.flashAlpha - dt*0.06, 0);
  }

  // --- Phase 1: Search bassinets ---
  if (!babyFound) {
    let checkR = BASSINET_CHECK_R;
    if (abilityActive) checkR *= 1.3;
    for (let i=0; i<bassinetOrbs.length; i++) {
      let b = bassinetOrbs[i];
      if (b.checked) continue;
      let d = dist(sx, sy, b.x, b.y);
      if (d < checkR) {
        b.holdProgress = min((b.holdProgress||0) + dt/BASSINET_HOLD_MS, 1.0);
        if (b.holdProgress >= 1.0) {
          b.checked = true;
          b.flashAlpha = 100;
          checkedCount++;
          if (b.isKey) {
            // Found the right baby! — BIG celebration
            babyFound = true;
            carryingBaby = true;
            babyFoundCelebration = true;
            babyCelebrationTimer = 0;
            babyCanContinue = false;
            spawnParticles(b.x, b.y, 42, 55);
            spawnParticles(b.x, b.y, 36, 30);
            spawnParticles(b.x, b.y, 52, 25);
            restoreResilience(RESILIENCE_MAX);
            ch1HopeFlash = 1.0;
            screenShake = 5;
            checkFeedbackText = "";
            checkFeedbackTimer = 0;
          } else {
            // Wrong baby — the desperation grows
            spawnParticles(b.x, b.y, 8, 5);
            drainResilience(3.5);
            screenShake = max(screenShake, 1.5);
            checkFeedbackText = WRONG_BABY_TEXTS[i % WRONG_BABY_TEXTS.length];
            checkFeedbackTimer = 1600;
          }
        }
      } else {
        b.holdProgress = max((b.holdProgress||0) - dt*0.001, 0);
      }
    }
  }

  // --- Timer expiry ---
  if (escapeTimer >= ESCAPE_TIME_MS) {
    escapeExpired = true;
    let dA=dist(sx,sy,ccA.x,ccA.y), dB=dist(sx,sy,ccB.x,ccB.y);
    chosenCluster = (dA<dB)?'A':'X';
    momentFired=true; momentState='active'; momentTimer=0; momentHomes=[];
    let cc=dA<dB?ccA:ccB, target=dA<dB?orbsA:orbsB;
    for (let o of target) {
      let ang=atan2(o.homeY-cc.y,o.homeX-cc.x);
      let d=max(dist(o.homeX,o.homeY,cc.x,cc.y),20);
      momentHomes.push({x:cc.x+cos(ang)*(d+58),y:cc.y+sin(ang)*(d+48)});
    }
    momentRepMult = 0.05;
  }
}

// =============================================================
//  Ch TASK MECHANIC — hold-to-complete + decay + carry (Ranch)
//                     + shy/patience (Home/gather)
// =============================================================
function updateTaskMechanic(dt) {
  if (momentFired) return;
  let ct = cType();
  let dtF = dt / 16.67;

  let collectR = TASK_COLLECT_R;
  if (abilityActive && ct === 'gather') collectR *= 1.5;
  if (abilityActive && ct === 'tasks') collectR *= 1.3;

  // === Frost zone drift (Ranch) ===
  if (ct === 'tasks' && frostZone) {
    frostZone.x += frostZone.vx * dtF;
    frostZone.y += frostZone.vy * dtF;
    // Bounce off edges
    if (frostZone.x < FROST_RADIUS*0.5 || frostZone.x > W-FROST_RADIUS*0.5) frostZone.vx *= -1;
    if (frostZone.y < FROST_RADIUS*0.5 || frostZone.y > H-FROST_RADIUS*0.5) frostZone.vy *= -1;
    frostZone.x = constrain(frostZone.x, 40, W-40);
    frostZone.y = constrain(frostZone.y, 40, H-40);
    // Drain resilience if player is in frost
    let fd = dist(sx, sy, frostZone.x, frostZone.y);
    if (fd < FROST_RADIUS && !abilityActive) {
      drainResilience(FROST_DRAIN_RATE * map(fd, 0, FROST_RADIUS, 1.2, 0.1) * dtF);
    }
  }

  // === Shy behavior for Home chapter ===
  if (ct === 'gather') {
    let playerSpeed = sqrt(svx*svx + svy*svy);
    for (let i=0; i<taskOrbs.length; i++) {
      let t = taskOrbs[i];
      if (t.collected) continue;
      let d = dist(sx, sy, t.x, t.y);
      if (d < SHY_FLEE_DIST && playerSpeed > SHY_SPEED_LIMIT) {
        let ang = atan2(t.y - sy, t.x - sx);
        let fleeForce = SHY_FLEE_FORCE * map(d, 0, SHY_FLEE_DIST, 1.5, 0.3);
        t.x += cos(ang) * fleeForce * dtF;
        t.y += sin(ang) * fleeForce * dtF;
        t.x = constrain(t.x, 45, W-45);
        t.y = constrain(t.y, 45, H-45);
        t.holdProgress = max((t.holdProgress||0) - dt*0.002, 0);
      } else {
        t.x += (t.homeX - t.x) * SHY_RETURN_RATE * dtF;
        t.y += (t.homeY - t.y) * SHY_RETURN_RATE * dtF;
      }
    }
  }

  // === Hold-to-complete + carry + decay ===
  for (let i=0; i<taskOrbs.length; i++) {
    let t = taskOrbs[i];

    // --- Completed task decay (Ranch) ---
    if (t.collected) {
      if (ct === 'tasks') {
        // Frost zone accelerates decay
        let decayMult = 1.0;
        if (frostZone) {
          let fd = dist(t.x, t.y, frostZone.x, frostZone.y);
          if (fd < FROST_RADIUS) decayMult = FROST_DECAY_MULT;
        }
        t.decayTimer = (t.decayTimer||0) + dt * decayMult;
        if (t.decayTimer >= TASK_DECAY_MS) {
          t.collected = false;
          t.holdProgress = 0;
          t.decayTimer = 0;
          tasksCollected = max(tasksCollected - 1, 0);
          // Carry tasks reset to pickup phase
          if (t.taskType === 'carry') {
            t.carryPhase = 'pickup';
            t.x = t.srcX; t.y = t.srcY;
            if (carryingTask === i) carryingTask = null;
          }
          // Mash tasks reset count
          if (t.taskType === 'mash') { t.mashCount = 0; }
          // Click tasks reset readiness
          if (t.taskType === 'click') { t.clickReady = false; }
          spawnParticles(t.x, t.y, 8, 6);
          screenShake = 1.5;
        }
      }
      continue;
    }

    // --- CARRY TASK logic ---
    if (t.taskType === 'carry') {
      if (t.carryPhase === 'pickup') {
        // Player needs to be near the source
        let d = dist(sx, sy, t.srcX, t.srcY);
        if (d < CARRY_COLLECT_R) {
          t.holdProgress = (t.holdProgress||0) + dt / CARRY_PICKUP_MS;
          if (t.holdProgress >= 1.0) {
            // Picked up! Now carrying
            t.carryPhase = 'deliver';
            t.holdProgress = 0;
            carryingTask = i;
            spawnParticles(t.srcX, t.srcY, t.hue, 8);
            // Move the task orb visuals to destination
            t.x = t.dstX; t.y = t.dstY;
          }
        } else {
          t.holdProgress = max((t.holdProgress||0) - dt*0.0006, 0);
        }
      } else if (t.carryPhase === 'deliver') {
        // Player needs to reach the destination
        let d = dist(sx, sy, t.dstX, t.dstY);
        if (d < CARRY_COLLECT_R) {
          t.holdProgress = (t.holdProgress||0) + dt / CARRY_DELIVER_MS;
          if (t.holdProgress >= 1.0) {
            // Delivered! Task complete
            t.collected = true;
            t.flashAlpha = 88;
            t.holdProgress = 0;
            t.decayTimer = 0;
            tasksCollected++;
            carryingTask = null;
            taskTotalDone++;
            restoreResilience(TASK_RESTORE * 0.8);
            spawnParticles(t.dstX, t.dstY, t.hue, 12);
            if (taskTotalDone >= RANCH_TOTAL_NEEDED) triggerMoment('B');
          }
        } else {
          t.holdProgress = max((t.holdProgress||0) - dt*0.0006, 0);
        }
      }
      continue; // skip normal hold logic
    }

    // --- MASH TASK logic ---
    if (t.taskType === 'mash') {
      let d = dist(sx, sy, t.x, t.y);
      if (d < MASH_COLLECT_R) {
        mashActiveTask = i;
        // Mash progress decays slowly
        t.mashCount = max((t.mashCount||0) - MASH_DECAY_RATE * dt, 0);
        t.holdProgress = t.mashCount / t.mashNeeded;
        if (t.mashCount >= t.mashNeeded) {
          t.collected = true; t.flashAlpha = 88;
          t.holdProgress = 0; t.mashCount = 0; t.decayTimer = 0;
          tasksCollected++; taskTotalDone++;
          mashActiveTask = -1;
          restoreResilience(TASK_RESTORE * 0.7);
          spawnParticles(t.x, t.y, t.hue, 14);
          screenShake = 2;
          if (taskTotalDone >= RANCH_TOTAL_NEEDED) triggerMoment('B');
        }
      } else {
        if (mashActiveTask === i) mashActiveTask = -1;
        t.mashCount = max((t.mashCount||0) - MASH_DECAY_RATE * dt * 3, 0);
        t.holdProgress = t.mashCount / t.mashNeeded;
      }
      continue;
    }

    // --- CLICK TASK logic ---
    if (t.taskType === 'click') {
      let d = dist(sx, sy, t.x, t.y);
      t.clickReady = (d < CLICK_TASK_R);
      // Click tasks are completed via keyPressed('E'), handled in input
      continue;
    }

    // --- SIMPLE / EXTENDED hold tasks ---
    let holdTime = t.holdMs || TASK_HOLD_MS;
    let d = dist(sx, sy, t.x, t.y);
    if (d < collectR) {
      t.holdProgress = (t.holdProgress||0) + dt / holdTime;
      if (t.holdProgress >= 1.0) {
        t.collected = true;
        t.flashAlpha = 88;
        t.holdProgress = 0;
        t.decayTimer = 0;
        tasksCollected++;

        if (ct === 'tasks') {
          taskTotalDone++;
          let restore = (t.taskType === 'extended') ? TASK_RESTORE * 0.9 : TASK_RESTORE * 0.5;
          restoreResilience(restore);
          spawnParticles(t.x, t.y, t.hue, t.taskType === 'extended' ? 14 : 8);
          if (taskTotalDone >= RANCH_TOTAL_NEEDED) triggerMoment('B');
        } else {
          restoreResilience(TASK_RESTORE);
          spawnParticles(t.x, t.y, t.hue, 12);
          if (tasksCollected >= TASKS_REQUIRED) triggerMoment('B');
        }
      }
    } else {
      t.holdProgress = max((t.holdProgress||0) - dt * 0.0005, 0);
    }
  }
}

// =============================================================
//  Ch SOCIAL MECHANIC — approach groups, get rejected
// =============================================================
function updateSocialMechanic(dt) {
  if (momentFired) return;
  let dtF = dt / 16.67;

  socialRejectCool = max(socialRejectCool - dt, 0);

  // Update timed windows for each group
  for (let i=0; i<socialWindows.length; i++) {
    let w = socialWindows[i];
    w.timer += dt;
    if (w.open) {
      // Window is open — player can press SPACE to attempt entry
      if (w.timer >= SOCIAL_WINDOW_OPEN_MS) {
        w.open = false; w.timer = 0;
      }
    } else {
      // Window is closed — cycling toward next opening
      let closedTime = SOCIAL_WINDOW_CLOSED_MS + sin(w.phase + millis()*0.0003) * 800;
      if (w.timer >= closedTime) {
        w.open = true; w.timer = 0;
      }
    }
  }

  if (!socialAccepted) {
    // Check proximity to each clusterA group center
    for (let i=0; i<socialGroupData.length; i++) {
      let g = socialGroupData[i];
      let w = socialWindows[i];
      let d = dist(sx, sy, g.cx, g.cy);

      if (d < SOCIAL_APPROACH_R && socialRejectCool <= 0) {
        // Build progress toward this group (slower now, window-dependent)
        let progressRate = w.open ? 1.8 : 0.4;
        g.progress += dt / SOCIAL_HOLD_MS * progressRate;

        if (g.progress >= SOCIAL_REJECT_AT) {
          // === REJECTION ===
          socialRejections++;
          g.progress = 0;
          socialRejectCool = SOCIAL_REJECT_COOLDOWN_MS;

          // Push player away
          let ang = atan2(sy - g.cy, sx - g.cx);
          svx += cos(ang) * SOCIAL_REJECT_BURST;
          svy += sin(ang) * SOCIAL_REJECT_BURST;
          screenShake = 5;
          drainResilience(10);
          spawnParticles(g.cx, g.cy, 240, 10);

          // Flash text
          let msgs = [
            'the circle closed',
            'not quite one of them',
            'the door shut',
            'no room for you'
          ];
          socialRejectFlash = {
            text: msgs[min(socialRejections-1, msgs.length-1)],
            timer: 0
          };

          if (socialRejections >= SOCIAL_REJECTIONS_NEEDED) {
            socialAccepted = true;
            for (let gg of socialGroupData) gg.progress = 0;
            spawnParticles(ccB.x, ccB.y, 36, 18);
          }
        }
      } else {
        g.progress = max(g.progress - dt * 0.0003, 0);
      }
    }
  }
}

// =============================================================
//  Ch FAN MECHANIC
// =============================================================
function updateFanMechanic(dt) {
  let dtF = dt/16.67;
  if (ch3SafeFlash) {
    ch3SafeFlashTimer += dt;
    if (ch3SafeFlashTimer >= CH3_SAFE_FLASH_MS) {
      ch3SafeFlash=false; ch3Phase=2;
      let ch=CHAPTERS[chapterIndex];
      friendhouseOrb={x:ch.friendhousePos.x,y:ch.friendhousePos.y};
    }
    for (let f of fanOrbs) { f.x+=(f.fx-f.x)*0.022*dtF; f.y+=(f.fy-f.y)*0.022*dtF; }
    return;
  }
  let blending = abilityActive && cType()==='fans';
  let chasing = (momentState!=='active') && !blending;

  if (ch3Phase===1 && safespotOrb && !ch3SafeFlash && !momentFired) {
    if (dist(sx,sy,safespotOrb.x,safespotOrb.y)<45) {
      ch3SafeFlash=true; ch3SafeFlashTimer=0;
      restoreResilience(15); spawnParticles(safespotOrb.x,safespotOrb.y,215,12);
    }
  }
  if (ch3Phase===2 && friendhouseOrb && !momentFired) {
    if (dist(sx,sy,friendhouseOrb.x,friendhouseOrb.y)<48) {
      triggerMoment('A');
      restoreResilience(20); spawnParticles(friendhouseOrb.x,friendhouseOrb.y,38,14);
    }
  }

  if (!isStunned && stunCooldown<=0 && chasing) {
    for (let f of fanOrbs) {
      if (dist(f.x,f.y,sx,sy)<STUN_RADIUS) {
        isStunned=true; stunTimer=0; stats.stunCount++;
        drainResilience(STUN_DRAIN); screenShake=4;
        spawnParticles(sx,sy,220,8); break;
      }
    }
  }
  if (isStunned) { stunTimer+=dt; if (stunTimer>=STUN_DURATION_MS){isStunned=false;stunCooldown=STUN_COOLDOWN_MS;} }
  else { stunCooldown=max(stunCooldown-dt,0); }

  for (let f of fanOrbs) {
    let tx,ty;
    if (chasing) { tx=sx+f.jx; ty=sy+f.jy; f.jx=lerp(f.jx,random(-24,24),0.014*dtF); f.jy=lerp(f.jy,random(-18,18),0.014*dtF); }
    else { tx=f.fx; ty=f.fy; }
    f.x+=(tx-f.x)*FAN_CHASE_SPEED*dtF; f.y+=(ty-f.y)*FAN_CHASE_SPEED*dtF;
    if (!isStunned && chasing) {
      let d=dist(f.x,f.y,sx,sy);
      if (d<FAN_REPEL_R && d>0.1) {
        let force=map(d,0,FAN_REPEL_R,FAN_REPEL_F,0);
        let ang=atan2(sy-f.y,sx-f.x);
        svx+=cos(ang)*force*0.065*dtF; svy+=sin(ang)*force*0.065*dtF;
        repulsionHeat=max(repulsionHeat,map(d,0,FAN_REPEL_R,1,0));
      }
    }
  }
}

// =============================================================
//  Ch GRAVITY MECHANIC — waypoints + increasing pull
// =============================================================
function updateGravityMechanic(dt) {
  if (momentFired) return;
  let dtF = dt/16.67;

  // Gravity pull from home cluster
  let pullDist = dist(sx, sy, ccA.x, ccA.y);
  if (pullDist > 20) {
    let pullForce = map(pullDist, 20, 500, 3.2, 0.3) * gravityPullScale;
    if (abilityActive) pullForce *= 0.1; // Resolve negates most pull
    let pullAng = atan2(ccA.y-sy, ccA.x-sx);
    svx += cos(pullAng)*pullForce*0.032*dtF;
    svy += sin(pullAng)*pullForce*0.032*dtF;
  }

  // Emotional toll of proximity to home
  if (pullDist < 220 && !abilityActive) {
    drainResilience(map(pullDist, 20, 220, 0.25, 0) * dtF);
  }

  // === Waypoint progress ===
  if (waypointsClaimed < waypoints.length) {
    let wp = waypoints[waypointsClaimed];
    let d = dist(sx, sy, wp.x, wp.y);

    if (d < WAYPOINT_COLLECT_R) {
      wp.progress = (wp.progress||0) + dt / WAYPOINT_HOLD_MS;
      if (wp.progress >= 1.0) {
        // Claimed!
        wp.claimed = true;
        wp.progress = 1.0;
        waypointsClaimed++;
        gravityPullScale += GRAVITY_MULT_PER_WP;
        restoreResilience(12);
        spawnParticles(wp.x, wp.y, 180, 14);
        screenShake = 2;

        if (waypointsClaimed >= waypoints.length) {
          // All waypoints claimed — trigger moment
          triggerMoment('B');
        }
      }
    } else {
      // Lose progress when away (faster than task decay)
      wp.progress = max((wp.progress||0) - dt * 0.0008, 0);
    }
  }

  // === Memory surges — periodic waves of intensified pull ===
  surgeTimer += dt;
  let cyclePos = surgeTimer % SURGE_CYCLE_MS;
  let wasSurge = surgeActive;
  surgeActive = cyclePos < SURGE_DURATION_MS;

  // Pick a new memory when a surge starts
  if (surgeActive && !wasSurge) {
    currentSurgeMemory = SURGE_MEMORIES[floor(random(SURGE_MEMORIES.length))];
  }

  if (surgeActive) {
    // Ramp up then down within the surge
    surgePhase = sin(map(cyclePos, 0, SURGE_DURATION_MS, 0, PI));
    let surgePull = surgePhase * SURGE_PULL_MULT * gravityPullScale;
    if (!abilityActive) {
      let pullAng = atan2(ccA.y-sy, ccA.x-sx);
      svx += cos(pullAng) * surgePull * 0.025 * dtF;
      svy += sin(pullAng) * surgePull * 0.025 * dtF;
      drainResilience(SURGE_DRAIN * surgePhase * dtF);
    }
  } else {
    surgePhase = 0;
  }
}

// =============================================================
//  SELF ORB PHYSICS
// =============================================================
function updateSelf(natX, natY, dt) {
  let dtF = dt/16.67;
  let ct = cType();

  if (isStunned) {
    svx*=pow(0.72,dtF); svy*=pow(0.72,dtF);
    sx+=svx; sy+=svy;
    sx=constrain(sx,8,W-8); sy=constrain(sy,8,H-8);
    return;
  }

  let kx=0, ky=0, usingKeys=false;
  if (keyIsDown(87)||keyIsDown(UP_ARROW))   {ky-=1;usingKeys=true;}
  if (keyIsDown(83)||keyIsDown(DOWN_ARROW)) {ky+=1;usingKeys=true;}
  if (keyIsDown(65)||keyIsDown(LEFT_ARROW)) {kx-=1;usingKeys=true;}
  if (keyIsDown(68)||keyIsDown(RIGHT_ARROW)){kx+=1;usingKeys=true;}

  if (usingKeys) {
    if (kx!==0 && ky!==0) {kx*=0.707;ky*=0.707;}
    let keySpeed = 3.5;
    if (abilityActive && ct==='escape') keySpeed=7.5;
    if (carryingBaby && ct==='escape') keySpeed *= CARRY_SPEED_PENALTY;
    svx+=kx*keySpeed*0.14*dtF; svy+=ky*keySpeed*0.14*dtF;
    svx*=pow(0.82,dtF); svy*=pow(0.82,dtF);
  } else {
    let tx,ty,spring,damp;
    if (mouseIsPressed && mouseX>0 && mouseX<W && mouseY>0 && mouseY<H) {
      tx=mouseX; ty=mouseY; spring=0.044; damp=0.80;
      if (abilityActive && ct==='escape') spring=0.088;
      if (carryingBaby && ct==='escape') spring *= CARRY_SPEED_PENALTY;
    } else {
      tx=natX; ty=natY; spring=0.023; damp=0.86;
    }
    svx=svx*pow(damp,dtF)+(tx-sx)*spring*dtF;
    svy=svy*pow(damp,dtF)+(ty-sy)*spring*dtF;
  }

  if (selfState > 0.08) {
    let jitter = selfState*2.8;
    let jitterMult = (abilityActive && (ct==='tasks'||ct==='social'||ct==='gather')) ? 0.2 : 1.0;
    svx+=random(-jitter,jitter)*0.22*dtF*jitterMult;
    svy+=random(-jitter,jitter)*0.22*dtF*jitterMult;
  }
  sx+=svx; sy+=svy;
  sx=constrain(sx,8,W-8); sy=constrain(sy,8,H-8);
}

// =============================================================
//  BARRIER PHYSICS
// =============================================================
function updateBarriers(dt) {
  if (barriers.length===0) return;
  let dtF=dt/16.67;
  if (momentFired) {
    for (let b of barriers){b.active=false;b.x+=(b.hx-b.x)*0.015*dtF;b.y+=(b.hy-b.y)*0.015*dtF;}
    return;
  }
  let distToB=dist(sx,sy,ccB.x,ccB.y);
  let chasing=distToB<BARRIER_CHASE_R;
  for (let b of barriers) {
    b.active=chasing;
    let tx=chasing?(sx+ccB.x)*0.5:b.hx;
    let ty=chasing?(sy+ccB.y)*0.5:b.hy;
    b.x+=(tx-b.x)*(chasing?0.028:0.018)*dtF;
    b.y+=(ty-b.y)*(chasing?0.028:0.018)*dtF;
    let d=dist(b.x,b.y,sx,sy);
    if (d<BARRIER_REPEL_R&&d>0.1) {
      let force=map(d,0,BARRIER_REPEL_R,BARRIER_REPEL_F,0);
      let ang=atan2(sy-b.y,sx-b.x);
      svx+=cos(ang)*force*0.07*dtF; svy+=sin(ang)*force*0.07*dtF;
      drainResilience(map(d,0,BARRIER_REPEL_R,BARRIER_DRAIN_RATE,0)*dtF);
    }
  }
}

// =============================================================
//  CLUSTER PHYSICS + MOMENT MACHINE
// =============================================================
function initChapter(idx) {
  let ch = CHAPTERS[idx];
  orbsA=ch.clusterA(); orbsB=ch.clusterB();
  noiseOffA=orbsA.map(()=>random(1000));
  noiseOffB=orbsB.map(()=>random(1000));
  chapterMs=0;

  barriers=ch.barriers.map(b=>({x:b.hx,y:b.hy,hx:b.hx,hy:b.hy,phase:random(TWO_PI),active:false}));
  ccA=computeGroupCenter(orbsA); ccB=computeGroupCenter(orbsB);

  lines=ch.texts; lineIdx=0; lineAlpha=0;
  linePhase='fadein'; lineTimer=0;
  allLinesShown=false; continueAlpha=0;

  sx=ch.selfStart.x; sy=ch.selfStart.y; svx=0; svy=0;
  selfHue = (ch.type==='fans') ? 206 : SELF_BASE_HUE;

  repulsionHeat=0; selfState=0;
  momentState='none'; momentTimer=0; momentFired=false;
  momentHomes=[]; momentRepMult=1.0; chosenCluster=null;
  proximityTimerA=0; proximityTimerB=0;
  mTextLine=null; mTextAlpha=0; mTextTarget=0;

  escapeTimer=0; escapeExpired=false;

  // Bassinet orbs (Arrival — nurse search)
  bassinetOrbs=[]; babyFound=false; carryingBaby=false;
  babyFoundCelebration=false; babyCelebrationTimer=0; babyCanContinue=false;
  checkedCount=0; keyBassinetIdx=-1;
  checkFeedbackText=null; checkFeedbackTimer=0;

  // Fire/darkness system reset
  fireParticles=[]; smokeParticles=[];
  ch1Darkness=0.15; ch1TargetDarkness=0.15;
  ch1FireIntensity=0; ch1HeartbeatPhase=0;
  ch1HopeFlash=0; ch1HopeGlow=0; ch1EmberTimer=0;
  if (ch.bassinets) {
    keyBassinetIdx = floor(random(ch.bassinets.length));
    for (let i=0; i<ch.bassinets.length; i++) {
      let b = ch.bassinets[i];
      bassinetOrbs.push({
        x:b.x, y:b.y, homeX:b.x, homeY:b.y,
        hue:b.hue, isKey:(i === keyBassinetIdx),
        checked:false, holdProgress:0,
        phase:random(TWO_PI), flashAlpha:0
      });
    }
  }

  // Task orbs (Ranch + Home)
  taskOrbs=[]; tasksCollected=0; taskTotalDone=0;
  carryingTask=null;
  if (ch.tasks) {
    for (let t of ch.tasks) {
      let taskType = t.type || 'simple';
      if (taskType === 'carry') {
        taskOrbs.push({
          taskType:'carry',
          x:t.srcX, y:t.srcY, homeX:t.srcX, homeY:t.srcY,
          srcX:t.srcX, srcY:t.srcY, dstX:t.dstX, dstY:t.dstY,
          hue:t.hue, label:t.label, srcLabel:t.srcLabel, dstLabel:t.dstLabel,
          carryPhase:'pickup', // 'pickup' or 'deliver'
          collected:false, flashAlpha:0, phase:random(TWO_PI),
          holdProgress:0, decayTimer:0
        });
      } else if (taskType === 'mash') {
        taskOrbs.push({
          taskType:'mash',
          x:t.x, y:t.y, homeX:t.x, homeY:t.y,
          hue:t.hue, label:t.label,
          mashNeeded: t.mashNeeded || MASH_PRESSES_NEEDED,
          mashCount:0,
          collected:false, flashAlpha:0, phase:random(TWO_PI),
          holdProgress:0, decayTimer:0
        });
      } else if (taskType === 'click') {
        taskOrbs.push({
          taskType:'click',
          x:t.x, y:t.y, homeX:t.x, homeY:t.y,
          hue:t.hue, label:t.label,
          clickReady:false,
          collected:false, flashAlpha:0, phase:random(TWO_PI),
          holdProgress:0, decayTimer:0
        });
      } else {
        taskOrbs.push({
          taskType:taskType,
          x:t.x, y:t.y, homeX:t.x, homeY:t.y,
          hue:t.hue, label:t.label,
          holdMs: t.holdMs || TASK_HOLD_MS,
          collected:false, flashAlpha:0, phase:random(TWO_PI),
          holdProgress:0, decayTimer:0
        });
      }
    }
  }

  // Frost zone (Ranch only)
  frostZone = null;
  if (ch.type === 'tasks') {
    let angle = random(TWO_PI);
    frostZone = {
      x: W/2 + cos(angle)*180,
      y: H/2 + sin(angle)*100,
      vx: cos(angle+HALF_PI)*FROST_SPEED,
      vy: sin(angle+HALF_PI)*FROST_SPEED*0.6
    };
  }

  // Social groups (School)
  socialGroupData = [];
  socialRejections = 0;
  socialAccepted = false;
  socialRejectCool = 0;
  socialRejectFlash = null;
  socialWindows = [];
  if (ch.socialGroups) {
    for (let i=0; i<ch.socialGroups.length; i++) {
      let g = ch.socialGroups[i];
      socialGroupData.push({ cx:g.cx, cy:g.cy, progress:0 });
      socialWindows.push({
        timer: random(SOCIAL_WINDOW_CLOSED_MS * 0.3, SOCIAL_WINDOW_CLOSED_MS),
        open: false,
        pressTimer: 0,
        phase: random(TWO_PI)
      });
    }
  }

  // Gravity waypoints (Leaving)
  waypoints = [];
  waypointsClaimed = 0;
  gravityPullScale = 1.0;
  gravObstacles = [];
  surgeTimer = 0;
  surgeActive = false;
  surgePhase = 0;
  currentSurgeMemory = '';
  if (ch.waypointDefs) {
    for (let w of ch.waypointDefs) {
      waypoints.push({ x:w.x, y:w.y, claimed:false, progress:0, label:w.label||'' });
    }
  }
  if (ch.obstacleDefs) {
    for (let o of ch.obstacleDefs) {
      gravObstacles.push({
        x:o.x, y:o.y, vx:o.vx, vy:o.vy,
        homeX:o.x, homeY:o.y,
        phase: random(TWO_PI), r: 28
      });
    }
  }

  // Mash/click state
  mashCount = 0; mashActiveTask = -1;
  clickFlashTimer = 0; clickFlashPos = null;

  // Fan orbs (Asian country)
  fanOrbs=[]; isStunned=false; stunTimer=0; stunCooldown=0;
  ch3Phase=1; safespotOrb=null; friendhouseOrb=null;
  ch3SafeFlash=false; ch3SafeFlashTimer=0;
  if (ch.fans) {
    for (let f of ch.fans)
      fanOrbs.push({x:f.ix,y:f.iy,fx:f.fx,fy:f.fy,hue:random(38,52),r:random(6,9.5),phase:random(TWO_PI),jx:0,jy:0});
  }
  if (ch.refugePos) safespotOrb={x:ch.refugePos.x,y:ch.refugePos.y};

  abilityActive=false; abilityTimer=0; abilityCooldown=0;
  resilience=RESILIENCE_MAX; particles=[]; screenShake=0;

  if (audioReady) {
    droneOsc.frequency.linearRampToValueAtTime(ch.droneFreq,actx.currentTime+1.6);
    proximityOsc.frequency.linearRampToValueAtTime(ch.proximityFreq,actx.currentTime+1.6);
  }
}

function computeGroupCenter(grp) {
  if(!grp||grp.length===0) return {x:450,y:235};
  let cx=0,cy=0;
  for(let o of grp){cx+=o.homeX;cy+=o.homeY;}
  return {x:cx/grp.length,y:cy/grp.length};
}

function triggerMoment(cluster) {
  chosenCluster=cluster; momentFired=true; momentState='active';
  momentTimer=0; momentHomes=[];
  let ct=cType();
  let cc=(cluster==='A'||cluster==='X')?ccA:ccB;
  let targetOrbs=(cluster==='A'||cluster==='X')?orbsA:orbsB;

  if (ct==='escape') {
    for (let o of targetOrbs) {
      let ang=atan2(o.homeY-cc.y,o.homeX-cc.x);
      let d=max(dist(o.homeX,o.homeY,cc.x,cc.y),20);
      momentHomes.push({x:cc.x+cos(ang)*(d+58),y:cc.y+sin(ang)*(d+48)});
    }
    momentRepMult=0.05;
  } else if (ct==='tasks'||ct==='gather') {
    let ringR=98;
    for (let i=0;i<targetOrbs.length;i++) {
      let ang=(TWO_PI*i)/targetOrbs.length;
      momentHomes.push({x:sx+cos(ang)*ringR,y:sy+sin(ang)*ringR*0.65});
    }
    momentRepMult=0.05;
  } else if (ct==='fans') {
    for (let o of targetOrbs) momentHomes.push({x:o.homeX,y:o.homeY});
    momentRepMult=(cluster==='B')?1.35:0.12;
  } else {
    // social, gravity — scatter outward
    for (let o of targetOrbs) {
      let ang=atan2(o.homeY-cc.y,o.homeX-cc.x);
      let d=max(dist(o.homeX,o.homeY,cc.x,cc.y),20);
      momentHomes.push({x:cc.x+cos(ang)*(d+45),y:cc.y+sin(ang)*(d+35)});
    }
    momentRepMult=0.08;
  }
}

function updateCluster(selfX, selfY, dt, buildProximity) {
  repulsionHeat=0;
  ccA=computeGroupCenter(orbsA); ccB=computeGroupCenter(orbsB);
  let distA=dist(selfX,selfY,ccA.x,ccA.y);
  let distB=dist(selfX,selfY,ccB.x,ccB.y);
  let ct=cType();

  if (!momentFired && momentState==='none') {
    if (buildProximity) {
      let canTriggerA = ct !== 'social';
      // Social chapter: block proximity trigger until accepted
      if (ct === 'social' && !socialAccepted) {
        proximityTimerA = 0;
        proximityTimerB = 0;
      } else {
        if (canTriggerA && distA<PROXIMITY_R) {
          proximityTimerA+=dt; proximityTimerB=max(proximityTimerB-dt*0.5,0);
        } else if (distB<PROXIMITY_R) {
          proximityTimerB+=dt; proximityTimerA=max(proximityTimerA-dt*0.5,0);
        } else {
          proximityTimerA=max(proximityTimerA-dt*0.6,0);
          proximityTimerB=max(proximityTimerB-dt*0.6,0);
        }
        if (canTriggerA && proximityTimerA>=MOMENT_TRIGGER_MS) triggerMoment('A');
        else if (proximityTimerB>=MOMENT_TRIGGER_MS) triggerMoment('B');
      }
    }
  } else if (momentState==='active') {
    momentTimer+=dt;
    if (momentTimer>=MOMENT_ACTIVE_MS) {
      momentState='expelled'; momentTimer=0;
      momentRepMult=(ct==='fans')?1.0:1.8;
    }
  } else if (momentState==='expelled') {
    momentTimer+=dt;
    if (ct!=='fans') momentRepMult=max(1.0+0.8*max(1-momentTimer/900,0),1.0);
    if (momentTimer>=MOMENT_EXPELLED_MS){momentState='none';momentRepMult=1.0;}
  }

  updateOrbGroup(orbsA, noiseOffA, 'A', selfX, selfY);
  updateOrbGroup(orbsB, noiseOffB, 'B', selfX, selfY);

  let minDist=min(distA,distB);
  let targetSt=repulsionHeat*0.85;
  if (ct==='fans') {
    let nearestFan=Infinity;
    for (let f of fanOrbs) nearestFan=min(nearestFan,dist(selfX,selfY,f.x,f.y));
    targetSt=max(targetSt,map(nearestFan,0,120,0.95,0));
  }
  if (minDist>200 && fanOrbs.length===0) targetSt=0;
  selfState+=(targetSt-selfState)*dt*0.0018;
  selfState=constrain(selfState,0,1);

  if (ct==='fans' && selfState>0.35) {
    selfHue=lerp(selfHue,SELF_BASE_HUE,selfState*0.00018*dt);
  }
}

function updateOrbGroup(group, offsets, label, selfX, selfY) {
  let isChosen=(chosenCluster===label||(label==='A'&&chosenCluster==='X'));
  let inMoment=(momentState==='active'||momentState==='expelled');
  let useHomes=inMoment && isChosen && momentHomes.length===group.length;
  let ct=cType();

  // Steady/persist/embrace reduces repulsion
  let steadyMult = (abilityActive && (ct==='tasks'||ct==='social'||ct==='gather')) ? 0.12 : 1.0;

  // Social chapter repulsion
  let socialMult = 1.0;
  if (ct === 'social') {
    if (label === 'A') {
      socialMult = 2.8;
    } else {
      socialMult = socialAccepted ? 0.08 : 3.2;
    }
  }

  // Escape chapter: plane repulsion drops when baby is found
  if (ct === 'escape' && label === 'B') {
    socialMult = babyFound ? ESCAPE_REPEL_OPEN : ESCAPE_REPEL_CLOSED;
  }

  for (let i=0; i<group.length; i++) {
    let o=group[i];
    let homeX=o.homeX, homeY=o.homeY;
    if (useHomes) {
      let prog;
      if (momentState==='active'){let t=min(momentTimer/900,1);t=t*t*(3-2*t);prog=t;}
      else{let t=min(momentTimer/1400,1);t=t*t*(3-2*t);prog=1-t;}
      homeX=lerp(o.homeX,momentHomes[i].x,prog);
      homeY=lerp(o.homeY,momentHomes[i].y,prog);
    }
    let noiseAmt=(momentState==='active'&&isChosen)?6:30;
    let nx=(noise(offsets[i],millis()*0.0000032*1000)-0.5)*noiseAmt;
    let ny=(noise(offsets[i]+90,millis()*0.0000032*1000)-0.5)*noiseAmt*0.75;
    o.x+=(homeX+nx-o.x)*0.021;
    o.y+=(homeY+ny-o.y)*0.021;

    let d=dist(o.x,o.y,selfX,selfY);
    if (d<REP_R&&d>0.1) {
      repulsionHeat=max(repulsionHeat,map(d,0,REP_R,1,0));
      let force=map(d,0,REP_R,REP_FORCE,0)*momentRepMult*steadyMult*socialMult;
      let ang=atan2(o.y-selfY,o.x-selfX);
      o.x+=cos(ang)*force*REP_MULT_BASE;
      o.y+=sin(ang)*force*REP_MULT_BASE;
    }
  }
}

// =============================================================
//  TEXT
// =============================================================
function paintText(dt) {
  let suppress=(momentState!=='none'&&mTextAlpha>30);
  lineTimer+=dt;
  let holdMs=lines[lineIdx].split('\n').length>2?3600:2900;
  if (!suppress) {
    if (linePhase==='fadein') {
      lineAlpha=min(lineAlpha+dt*0.055,75);
      if (lineAlpha>=75){linePhase='hold';lineTimer=0;}
    } else if (linePhase==='hold') {
      if (lineTimer>holdMs) linePhase='fadeout';
    } else {
      lineAlpha=max(lineAlpha-dt*0.038,0);
      if (lineAlpha<=0){lineIdx++;if(lineIdx>=lines.length){allLinesShown=true;lineIdx=0;}linePhase='fadein';}
    }
  } else { lineAlpha=max(lineAlpha-dt*0.06,0); }

  noStroke(); fill(210,10,97,lineAlpha);
  textAlign(CENTER,CENTER); textSize(13.5); textLeading(24);
  text(lines[lineIdx%lines.length], W/2, H-72);
  fill(selfHue,32,70,lineAlpha*0.36); ellipse(W/2,H-44,2.5,2.5);
}

function paintMomentText(dt) {
  let key=chosenCluster;
  if (!key){mTextTarget=0;}
  else if (momentState==='active') {
    let nl=MOMENT_TEXTS[chapterIndex]?.[key]?.active;
    if (nl&&mTextLine!==nl) mTextLine=nl;
    mTextTarget=78;
  } else if (momentState==='expelled') {
    let nl=MOMENT_TEXTS[chapterIndex]?.[key]?.expelled;
    if (nl&&mTextLine!==nl){mTextLine=nl;mTextAlpha=0;}
    mTextTarget=78;
  } else { mTextTarget=0; }
  mTextAlpha+=(mTextTarget-mTextAlpha)*dt*0.0045;
  if (mTextAlpha<0.5||!mTextLine) return;
  noStroke(); fill(210,10,97,mTextAlpha);
  textAlign(CENTER,CENTER); textStyle(ITALIC); textSize(14); textLeading(25);
  text(mTextLine, W/2, H-72); textStyle(NORMAL);
  fill(selfHue,32,70,mTextAlpha*0.36); ellipse(W/2,H-44,2.5,2.5);
}

function paintContinuePrompt(dt) {
  if (!allLinesShown||!momentFired||momentState!=='none') return;
  continueAlpha=min(continueAlpha+dt*0.03,52);
  let pulse=map(sin(millis()*0.038*0.001*60),-1,1,0.55,1.0);
  fill(210,10,90,continueAlpha*pulse); noStroke();
  textAlign(CENTER,CENTER); textSize(10);
  text('click or press any key to continue', W/2, H-42);
}

// =============================================================
//  AUDIO
// =============================================================
function initAudio() {
  actx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=actx.createGain();
  masterGain.gain.setValueAtTime(0,actx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.09,actx.currentTime+2.5);
  masterGain.connect(actx.destination);
  let filt=actx.createBiquadFilter();
  filt.type='lowpass';filt.frequency.value=700;filt.connect(masterGain);
  droneOsc=actx.createOscillator();droneOsc.type='sine';
  droneOsc.frequency.value=CHAPTERS[0].droneFreq;
  let dg=actx.createGain();dg.gain.value=0.55;
  droneOsc.connect(dg);dg.connect(filt);droneOsc.start();
  proximityOsc=actx.createOscillator();proximityOsc.type='sine';
  proximityOsc.frequency.value=CHAPTERS[0].proximityFreq;
  proximityGain=actx.createGain();proximityGain.gain.value=0;
  proximityOsc.connect(proximityGain);proximityGain.connect(masterGain);
  proximityOsc.start();
  audioReady=true;
}

function updateAudio(selfX, selfY) {
  if (!audioReady) return;
  let minD=Infinity;
  for (let o of [...orbsA,...orbsB]){let d=dist(selfX,selfY,o.x,o.y);if(d<minD)minD=d;}
  let vol=minD<130?map(minD,0,130,0.07,0):0;
  proximityGain.gain.linearRampToValueAtTime(vol,actx.currentTime+0.12);
}

// =============================================================
//  INPUT
// =============================================================
function handleAdvance() {
  if (!audioReady) initAudio();
  if (state==='title') { state='intro'; introTimer=0; fadeAlpha=80; return true; }
  if (state==='intro' && introTimer>1800) {
    initChapter(chapterIndex); state='fadein'; fadeAlpha=100; transStart=millis(); return true;
  }
  // Baby found celebration — press key to skip to next chapter
  if (state==='chapter' && babyFoundCelebration && babyCanContinue) {
    babyFoundCelebration = false;
    // Trigger the moment and immediately go to fadeout -> reflect
    momentFired = true; momentState = 'none';
    allLinesShown = true;
    state='fadeout'; fadeAlpha=0;
    return true;
  }
  if (state==='chapter' && allLinesShown && momentFired && momentState==='none') {
    state='fadeout'; fadeAlpha=0; return true;
  }
  if (state==='failed' && failTimer>2800) {
    initChapter(chapterIndex); state='fadein'; fadeAlpha=100; transStart=millis(); return true;
  }
  if (state==='reflect' && reflectTimer>2200) {
    chapterIndex++;
    if (chapterIndex>=CHAPTERS.length){initEndScreen();state='end';fadeAlpha=100;}
    else{state='intro';introTimer=0;fadeAlpha=100;}
    return true;
  }
  if (state==='end' && endTimer>8000) { restartGame(); return true; }
  return false;
}

function restartGame() {
  state='title'; chapterIndex=0; fadeAlpha=100;
  resilience=RESILIENCE_MAX;
  stats={chapterTimes:new Array(CHAPTERS.length).fill(0),stunCount:0,abilityUses:0};
  particles=[]; endOrbs=[]; carryingTask=null; frostZone=null;
  abilityActive=false; abilityTimer=0; abilityCooldown=0; screenShake=0;
  gravObstacles=[]; socialWindows=[]; mashCount=0; mashActiveTask=-1;
  surgeTimer=0; surgeActive=false; surgePhase=0; currentSurgeMemory='';
  clickFlashTimer=0; clickFlashPos=null;
  babyFoundCelebration=false; babyCelebrationTimer=0; babyCanContinue=false;
}

function mousePressed() { handleAdvance(); return false; }

function keyPressed() {
  if (!audioReady) initAudio();

  if (state==='chapter') {
    // During baby celebration, any key advances
    if (babyFoundCelebration && babyCanContinue) {
      handleAdvance();
      return false;
    }

    let ct = cType();

    // SPACE key — ability, mash tasks, or social window press
    if (keyCode===32) {
      // Mash task: increment mash count when near a mash task
      if (ct === 'tasks' && mashActiveTask >= 0 && mashActiveTask < taskOrbs.length) {
        let t = taskOrbs[mashActiveTask];
        if (t.taskType === 'mash' && !t.collected) {
          t.mashCount = (t.mashCount||0) + 1;
          spawnParticles(t.x, t.y, t.hue, 2);
          screenShake = max(screenShake, 0.5);
          return false;
        }
      }
      // Social window: pressing SPACE near an open window boosts progress
      if (ct === 'social' && !socialAccepted) {
        for (let i=0; i<socialGroupData.length; i++) {
          let g = socialGroupData[i];
          let w = socialWindows[i];
          let d = dist(sx, sy, g.cx, g.cy);
          if (d < SOCIAL_APPROACH_R * 1.3 && w.open) {
            g.progress += 0.18;
            spawnParticles(g.cx, g.cy, 140, 4);
            w.pressTimer = SOCIAL_WINDOW_PRESS_MS;
            return false;
          }
        }
      }
      // Default: activate ability
      if (!abilityActive && abilityCooldown<=0 && !isStunned && momentState==='none') activateAbility();
      return false;
    }

    // E key — click tasks
    if (keyCode===69 && ct === 'tasks') {
      for (let i=0; i<taskOrbs.length; i++) {
        let t = taskOrbs[i];
        if (t.taskType === 'click' && t.clickReady && !t.collected) {
          t.collected = true; t.flashAlpha = 88;
          t.holdProgress = 0; t.decayTimer = 0;
          tasksCollected++; taskTotalDone++;
          restoreResilience(TASK_RESTORE * 0.6);
          spawnParticles(t.x, t.y, t.hue, 10);
          screenShake = 1.5;
          clickFlashTimer = CLICK_FLASH_MS;
          clickFlashPos = { x:t.x, y:t.y };
          if (taskTotalDone >= RANCH_TOTAL_NEEDED) triggerMoment('B');
          return false;
        }
      }
    }
  }

  if (keyCode===87||keyCode===65||keyCode===83||keyCode===68||keyCode===69||
      keyCode===UP_ARROW||keyCode===DOWN_ARROW||keyCode===LEFT_ARROW||keyCode===RIGHT_ARROW) return false;
  handleAdvance();
  return false;
}
</script>
