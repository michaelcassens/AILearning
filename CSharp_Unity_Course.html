<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C# in Unity — 16-Week Course</title>
  <style>
    :root {
      --blue:        #00c8a8;
      --yellow:      #ae81ff;
      --dark:        #1a1a2e;
      --dark2:       #16213e;
      --sidebar-w:   270px;
      --bg:          #f0f4f8;
      --border:      #e1e8ed;
      --text:        #1a2332;
      --muted:       #5a6a7a;
      --shadow:      0 2px 10px rgba(0,0,0,.07);
      --c-setup:     #7b1fa2;
      --c-activity:  #1565c0;
      --c-assign:    #2e7d32;
      --c-assess:    #e65100;
      --bg-setup:    #f3e5f5;
      --bg-activity: #e3f2fd;
      --bg-assign:   #e8f5e9;
      --bg-assess:   #fff3e0;
      --code-bg:     #1e1e2e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; height: 100vh; overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--dark); display: flex; flex-direction: column; height: 100vh;
    }
    .sidebar-head {
      padding: 18px 14px 14px; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(150deg, #1a1a2e, #16213e);
    }
    .logo-row { display: flex; align-items: center; gap: 10px; }
    .py-badge {
      width: 38px; height: 38px; background: var(--blue); border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 13px; color: #fff; flex-shrink: 0;
    }
    .sidebar-head h1 { color: #fff; font-size: 14px; font-weight: 700; line-height: 1.3; }
    .sidebar-head .sub { color: #7a9bbb; font-size: 11px; margin-top: 2px; }
    .hamburger {
      display: none; margin-left: auto;
      background: none; border: none; color: #aaa; font-size: 22px; cursor: pointer; padding: 2px 4px;
    }
    .nav-scroll {
      flex: 1; overflow-y: auto; padding: 6px 0 16px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.15) transparent;
    }
    .nav-scroll::-webkit-scrollbar { width: 4px; }
    .nav-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }
    .nav-group-label {
      padding: 12px 14px 4px; font-size: 9.5px; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase; color: #445566;
    }
    .nav-item {
      display: flex; align-items: center; padding: 8px 14px; gap: 10px;
      cursor: pointer; color: #97aabb; font-size: 13px;
      border-left: 3px solid transparent;
      transition: background .12s, color .12s; user-select: none;
    }
    .nav-item:hover { background: var(--dark2); color: #fff; }
    .nav-item.active { background: rgba(0,200,168,.12); border-left-color: var(--blue); color: #fff; }
    .nav-num {
      width: 26px; height: 26px; background: rgba(255,255,255,.08); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0; color: #778899;
    }
    .nav-item.active .nav-num { background: var(--blue); color: #fff; }
    .nav-label { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .pill {
      font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: .4px; flex-shrink: 0;
    }
    .pill-quiz    { background: #bf360c; color: #fff; }
    .pill-midterm { background: #6a0d91; color: #fff; }
    .pill-final   { background: #b71c1c; color: #fff; }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar {
      height: 54px; flex-shrink: 0; background: #fff; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px; gap: 12px;
    }
    .topbar h2 {
      font-size: 17px; font-weight: 700; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar .chip {
      font-size: 12px; color: var(--muted);
      background: var(--bg); padding: 4px 12px; border-radius: 20px; flex-shrink: 0;
    }
    .content {
      flex: 1; overflow-y: auto; padding: 24px;
      scrollbar-width: thin; scrollbar-color: #ccc transparent;
    }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
    .fade-in { animation: fadeIn .2s ease; }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #1a1a2e, #0e4d40);
      border-radius: 14px; padding: 36px; color: #fff;
      margin-bottom: 22px; position: relative; overflow: hidden;
    }
    .hero::after {
      content: '\1F3AE'; position: absolute; right: 28px; top: 50%; transform: translateY(-50%);
      font-size: 96px; opacity: .12; pointer-events: none;
    }
    .hero h1 { font-size: 30px; font-weight: 900; margin-bottom: 6px; }
    .hero .tagline { font-size: 15px; opacity: .82; margin-bottom: 22px; }
    .hero-stats { display: flex; gap: 14px; flex-wrap: wrap; }
    .stat-box { background: rgba(255,255,255,.15); border-radius: 10px; padding: 10px 18px; text-align: center; }
    .stat-box .val { font-size: 24px; font-weight: 900; }
    .stat-box .lbl { font-size: 10px; opacity: .75; text-transform: uppercase; letter-spacing: .5px; }

    /* ── CARD GRIDS ── */
    .row2 { display: grid; grid-template-columns: repeat(auto-fit,minmax(255px,1fr)); gap: 18px; margin-bottom: 20px; }
    .row3 { display: grid; grid-template-columns: repeat(auto-fill,minmax(170px,1fr)); gap: 14px; }

    .card {
      background: #fff; border-radius: 12px; padding: 22px;
      box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .card-title {
      font-size: 14px; font-weight: 700; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-icon {
      width: 28px; height: 28px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .check-list { list-style: none; }
    .check-list li {
      padding: 5px 0; font-size: 13px; color: var(--muted);
      display: flex; align-items: flex-start; gap: 8px; line-height: 1.5;
    }
    .check-list li::before { content: '\2713'; color: #2e7d32; font-weight: 700; flex-shrink: 0; }
    .grade-table { width: 100%; border-collapse: collapse; }
    .grade-table tr { border-bottom: 1px solid var(--border); }
    .grade-table tr:last-child { border-bottom: none; }
    .grade-table td { padding: 8px 0; font-size: 13px; }
    .grade-table td:last-child { text-align: right; font-weight: 700; color: var(--blue); }
    .resource-card {
      background: #fff; border: 1px solid var(--border); border-radius: 10px;
      padding: 14px; cursor: pointer; transition: all .18s;
      display: flex; flex-direction: column; gap: 5px;
    }
    .resource-card:hover {
      border-color: var(--blue);
      box-shadow: 0 4px 12px rgba(0,200,168,.15);
      transform: translateY(-2px);
    }
    .resource-card .r-icon { font-size: 20px; }
    .resource-card .r-title { font-size: 13px; font-weight: 700; }
    .resource-card .r-desc  { font-size: 11px; color: var(--muted); }

    /* ── WEEK HEADER ── */
    .week-hdr {
      background: #fff; border-radius: 12px; padding: 26px;
      margin-bottom: 18px; box-shadow: var(--shadow);
      border: 1px solid var(--border); border-left: 5px solid var(--blue);
    }
    .week-hdr .wk-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--blue); margin-bottom: 5px;
    }
    .week-hdr h2 { font-size: 24px; font-weight: 900; margin-bottom: 14px; }
    .banner {
      border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 600;
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .banner-quiz    { background: #fff3e0; border: 1px solid #f57c00; color: #e65100; }
    .banner-midterm { background: #f3e5f5; border: 1px solid #7b1fa2; color: #6a0d91; }
    .banner-final   { background: #ffebee; border: 1px solid #c62828; color: #b71c1c; }
    .ot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:640px) { .ot-grid { grid-template-columns: 1fr; } }
    .ot-section h4 {
      font-size: 10.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--muted); margin-bottom: 8px;
    }
    .ot-list { list-style: none; }
    .ot-list li {
      padding: 3.5px 0; font-size: 13px; color: var(--muted);
      display: flex; align-items: flex-start; gap: 7px; line-height: 1.45;
    }
    .obj-list li::before { content: '\1F3AF'; font-size: 11px; flex-shrink: 0; margin-top: 2px; }
    .top-list li::before { content: '\00B7'; color: var(--blue); font-weight: 900; font-size: 16px; line-height: 1; flex-shrink: 0; }

    /* ── SECTION CARDS ── */
    .sec {
      border-radius: 12px; padding: 22px; margin-bottom: 18px;
      box-shadow: var(--shadow); border: 1px solid;
    }
    .sec.setup    { background: var(--bg-setup);    border-color: var(--c-setup); }
    .sec.activity { background: var(--bg-activity); border-color: var(--c-activity); }
    .sec.assign   { background: var(--bg-assign);   border-color: var(--c-assign); }
    .sec.assess   { background: var(--bg-assess);   border-color: var(--c-assess); }
    .sec-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .sec-icon {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0;
    }
    .setup    .sec-icon { background: rgba(123,31,162,.13); }
    .activity .sec-icon { background: rgba(55,118,171,.13); }
    .assign   .sec-icon { background: rgba(46,125,50,.13); }
    .assess   .sec-icon { background: rgba(245,124,0,.13); }
    .sec-hdr h3 { font-size: 14.5px; font-weight: 700; flex: 1; line-height: 1.3; }
    .setup    .sec-hdr h3 { color: #6a0d91; }
    .activity .sec-hdr h3 { color: #1a4a7a; }
    .assign   .sec-hdr h3 { color: #1b5e20; }
    .assess   .sec-hdr h3 { color: #bf360c; }
    .due-tag {
      font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; flex-shrink: 0;
    }
    .assign .due-tag { background: rgba(46,125,50,.15); color: #1b5e20; }
    .assess .due-tag { background: rgba(245,124,0,.15); color: #bf360c; }
    .sec p, .sec .desc { font-size: 13.5px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
    .sec ul { list-style: none; }
    .sec ul li {
      font-size: 13.5px; color: var(--muted); padding: 4.5px 0;
      display: flex; align-items: flex-start; gap: 8px; line-height: 1.45;
    }
    .setup  ul li::before { content: '\2610'; color: var(--c-setup); font-size: 15px; line-height: 1.1; flex-shrink: 0; }
    .assign ul li::before { content: '\2192'; color: var(--c-assign); font-weight: 700; flex-shrink: 0; }
    .assess ul li::before { content: '\2022'; color: var(--c-assess); font-weight: 700; font-size: 16px; line-height: 1; flex-shrink: 0; }
    .sample-qs h5 {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: #bf360c; margin: 12px 0 6px;
    }
    .sample-qs ul li::before { content: '?'; color: var(--c-assess); font-weight: 900; flex-shrink: 0; }
    .rubric-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .rubric-table tr { border-bottom: 1px solid rgba(0,0,0,.08); }
    .rubric-table tr:last-child { border-bottom: none; }
    .rubric-table td { padding: 7px 2px; font-size: 13px; }
    .rubric-table td:last-child { text-align: right; font-weight: 700; }
    .assess .rubric-table td:last-child { color: var(--c-assess); }
    .exam-list { list-style: none; margin-bottom: 14px; }
    .exam-list li {
      padding: 4px 0; font-size: 13.5px; color: var(--muted);
      display: flex; align-items: flex-start; gap: 8px;
    }
    .exam-list li::before { content: '\1F4CC'; font-size: 12px; flex-shrink: 0; }
    .sec-label {
      font-size: 11.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; margin: 14px 0 6px; color: #bf360c;
    }

    /* ── CODE BLOCK ── */
    .code-block {
      background: var(--code-bg); border-radius: 9px;
      padding: 16px; margin-top: 14px; overflow-x: auto;
    }
    .code-dots { display: flex; gap: 6px; margin-bottom: 10px; }
    .code-dots span { width: 11px; height: 11px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #28c940; }
    .code-block pre {
      font-family: 'Cascadia Code','Fira Code','Consolas',monospace;
      font-size: 12.5px; line-height: 1.65; color: #cdd9e5; white-space: pre;
    }

    /* ── SCHEDULE TABLE ── */
    .sched-wrap {
      background: #fff; border-radius: 12px; border: 1px solid var(--border);
      box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px;
    }
    .sched-table { width: 100%; border-collapse: collapse; }
    .sched-table thead { background: var(--blue); color: #fff; }
    .sched-table th {
      padding: 11px 16px; text-align: left;
      font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    }
    .sched-table tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
    .sched-table tbody tr:last-child { border-bottom: none; }
    .sched-table tbody tr:hover { background: #f5f8fc; }
    .sched-table td { padding: 11px 16px; font-size: 13px; vertical-align: middle; }
    .sched-table .wk-col { font-weight: 700; color: var(--blue); white-space: nowrap; }
    .tbl-pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .tbl-quiz    { background: #fff3e0; color: #e65100; }
    .tbl-midterm { background: #f3e5f5; color: #6a0d91; }
    .tbl-final   { background: #ffebee; color: #b71c1c; }

    /* ── WEEK NAV BUTTONS ── */
    .wk-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 18px; margin-top: 4px; border-top: 1px solid var(--border);
    }
    .nav-btn {
      background: #fff; border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all .14s; color: var(--text);
    }
    .nav-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
    .nav-btn:disabled { opacity: .35; cursor: default; }

    /* ── MOBILE ── */
    @media(max-width: 768px) {
      body { flex-direction: column; overflow: auto; height: auto; }
      .sidebar { width: 100%; min-width: unset; height: auto; }
      .nav-scroll { display: none; max-height: 320px; }
      .nav-scroll.open { display: block; }
      .hamburger { display: block; }
      .main { overflow: visible; }
      .content { overflow: visible; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-head">
    <div class="logo-row">
      <div class="py-badge">C#</div>
      <div>
        <h1>C# in Unity</h1>
        <div class="sub">16-Week Game Dev Course</div>
      </div>
      <button class="hamburger" onclick="toggleNav()">&#9776;</button>
    </div>
  </div>
  <nav class="nav-scroll" id="navScroll">
    <div class="nav-group-label">Overview</div>
    <div class="nav-item active" id="nav-overview" onclick="go('overview')">
      <div class="nav-num">&#128203;</div>
      <span class="nav-label">Course Overview</span>
    </div>
    <div class="nav-item" id="nav-schedule" onclick="go('schedule')">
      <div class="nav-num">&#128197;</div>
      <span class="nav-label">Full Schedule</span>
    </div>
    <div class="nav-group-label">Weeks</div>
  </nav>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <h2 id="topTitle">Course Overview</h2>
    <span class="chip" id="topChip">16 Weeks &middot; Beginner &middot; No Experience Required</span>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
/* ═══════════════════════════
   COURSE DATA
═══════════════════════════ */
const data = {
  goals: [
    "Set up Unity and a C# development environment",
    "Understand the Unity Editor, GameObjects, and Components",
    "Write C# scripts: variables, conditionals, loops, functions, and classes",
    "Build interactive gameplay with physics, input, and UI systems",
    "Work with prefabs, ScriptableObjects, audio, and particles",
    "Design and build a complete game from concept to presentation"
  ],
  grading: [
    { c: "Weekly Assignments (14)", w: "35%" },
    { c: "In-Class Activities",     w: "10%" },
    { c: "Quizzes (4)",             w: "20%" },
    { c: "Midterm Project",         w: "15%" },
    { c: "Final Project",           w: "20%" }
  ],
  resources: [
    { icon: "\uD83D\uDCD6", title: "Unity Documentation",  desc: "docs.unity3d.com",               url: "https://docs.unity3d.com/" },
    { icon: "\uD83C\uDF93", title: "Unity Learn",           desc: "learn.unity.com",                url: "https://learn.unity.com/" },
    { icon: "\uD83D\uDCBB", title: "Microsoft C# Docs",    desc: "learn.microsoft.com/dotnet/csharp", url: "https://learn.microsoft.com/en-us/dotnet/csharp/" },
    { icon: "\uD83D\uDEE0\uFE0F", title: "Visual Studio",  desc: "visualstudio.microsoft.com",     url: "https://visualstudio.microsoft.com/" },
    { icon: "\u2699\uFE0F", title: "Unity Hub",             desc: "unity.com/download",             url: "https://unity.com/download" },
    { icon: "\uD83C\uDFAE", title: "Unity Asset Store",     desc: "assetstore.unity.com",           url: "https://assetstore.unity.com/" }
  ],
  weeks: [
    {
      n: 1, title: "Setup & Your First Unity Project", badge: null,
      objectives: [
        "Install Unity Hub, Unity Editor, and Visual Studio",
        "Navigate the Unity Editor interface",
        "Create and run a new Unity project"
      ],
      topics: [
        "What is Unity? What is C#?",
        "Installing Unity Hub and choosing an Editor version",
        "Installing Visual Studio with Unity workload",
        "Unity Editor layout: Scene, Game, Hierarchy, Inspector, Project",
        "Creating a new 2D or 3D project",
        "Adding a cube to the scene and pressing Play"
      ],
      setup: [
        "Download Unity Hub from unity.com/download",
        "Install the latest Unity LTS version via the Hub",
        "Install Visual Studio (Community) with the 'Game development with Unity' workload",
        "Create a new 3D project called 'HelloUnity'",
        "Confirm setup: add a Cube to the scene (GameObject > 3D Object > Cube) and press Play"
      ],
      activity: {
        title: '"Hello, Unity!" Playground',
        desc: 'Students add primitive 3D objects (Cube, Sphere, Cylinder) to a scene, change their colors using Materials, and reposition them using the Transform component. Share screens and compare scenes.',
        code: '// No C# code yet!\n// Today is about exploring the Unity Editor.\n// Try these steps:\n// 1. GameObject > 3D Object > Sphere\n// 2. In Inspector, click Transform > Position > set Y to 3\n// 3. Right-click in Project > Create > Material\n// 4. Change the material color, drag it onto the Sphere\n// 5. Press Play and watch!'
      },
      assign: {
        n: 1, title: "Build a Scene", due: 2,
        desc: "Create a Unity scene with at least 6 objects arranged into a simple environment.",
        reqs: [
          "Use at least 3 different primitive types (Cube, Sphere, Cylinder, Plane, etc.)",
          "Create and apply at least 3 different colored Materials",
          "Arrange objects to form a recognizable scene (room, park, robot, etc.)",
          "Rename each GameObject to something descriptive in the Hierarchy"
        ]
      },
      assess: null
    },
    {
      n: 2, title: "GameObjects, Components & Transforms", badge: null,
      objectives: [
        "Understand the GameObject-Component architecture",
        "Manipulate Transform properties: position, rotation, scale",
        "Create your first C# script and attach it to a GameObject"
      ],
      topics: [
        "Everything is a GameObject with Components",
        "Transform component: Position, Rotation, Scale",
        "Inspector: viewing and editing component values",
        "Creating a C# script in the Project window",
        "Attaching a script to a GameObject",
        "The MonoBehaviour class: Start() and Update()"
      ],
      setup: null,
      activity: {
        title: '"Spinning Cube"',
        desc: 'Create a script that rotates a cube continuously. Experiment with different axes and speeds. Discuss: what is Update()? Why does the cube keep spinning?',
        code: 'using UnityEngine;\n\npublic class SpinCube : MonoBehaviour\n{\n    public float speed = 50f;\n\n    void Update()\n    {\n        transform.Rotate(0, speed * Time.deltaTime, 0);\n    }\n}'
      },
      assign: {
        n: 2, title: "Moving Objects", due: 3,
        desc: "Write scripts that move and rotate GameObjects in different ways.",
        reqs: [
          "Create a script that moves an object forward continuously using transform.Translate",
          "Create a script that rotates an object on two axes simultaneously",
          "Use a public float variable for speed so you can adjust it in the Inspector",
          "Add both scripts to different objects in the same scene"
        ]
      },
      assess: null
    },
    {
      n: 3, title: "C# Basics: Variables & Data Types", badge: "Quiz 1",
      objectives: [
        "Declare variables using int, float, string, and bool",
        "Use Debug.Log() to print values to the Console",
        "Understand public vs. private and the Inspector"
      ],
      topics: [
        "C# variable types: int, float, string, bool",

          "Multiple Choice -- 20 questions (1 pt each) covering all topics",
          "Code Reading (10 pts) -- analyze a C# script and answer questions about its behavior",
          "Bug Fix (10 pts) -- identify and fix 3-5 errors in a buggy Unity script",
          "Code Writing (20 pts) -- write two short C# scripts from scratch for given scenarios"
        ],
        rubric: [
          { c: "Gameplay (playable, fun, has win/lose)", p: 30 },
          { c: "Code quality (readable, organized, documented)", p: 20 },
          { c: "Use of course concepts (physics, UI, prefabs, OOP)", p: 25 },
          { c: "Polish (audio, particles, menus)",      p: 10 },
          { c: "Presentation",                          p: 15 }
        ]
      }
    }
  ]
};

/* ═══════════════════════════
   HELPERS
═══════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function codeBlock(code) {
  if (!code) return '';
  return `<div class="code-block">
    <div class="code-dots">
      <span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span>
    </div>
    <pre>${esc(code)}</pre>
  </div>`;
}

function setActive(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + id);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
}

/* ═══════════════════════════
   RENDER: OVERVIEW
═══════════════════════════ */

  document.getElementById('topChip').textContent  = '16 Weeks \u00B7 Beginner \u00B7 No Experience Required';

      <div class="r-desc">${esc(r.desc)}</div>

  document.getElementById('content').innerHTML = `<div class="fade-in">
    <div class="hero">

      <div class="tagline">Game Development with C# &mdash; A Complete 16-Week Beginner Course</div>
      <div class="hero-stats">
        <div class="stat-box"><div class="val">16</div><div class="lbl">Weeks</div></div>
        <div class="stat-box"><div class="val">14</div><div class="lbl">Assignments</div></div>
        <div class="stat-box"><div class="val">4</div><div class="lbl">Quizzes</div></div>
        <div class="stat-box"><div class="val">2</div><div class="lbl">Projects</div></div>
      </div>
    </div>

    <div class="row2">
      <div class="card">
        <div class="card-title"><span class="card-icon" style="background:#e0f7f4">\uD83C\uDFAF</span> Course Goals</div>
        <ul class="check-list">${goals}</ul>
      </div>
      <div class="card">
        <div class="card-title"><span class="card-icon" style="background:#e8f5e9">\uD83D\uDCCA</span> Grading Breakdown</div>
        <table class="grade-table"><tbody>${grading}</tbody></table>
      </div>
      <div class="card">
        <div class="card-title"><span class="card-icon" style="background:#fff3e0">\uD83D\uDCE6</span> What You'll Need</div>
        <ul class="check-list">
          <li>Unity Hub + Unity Editor (LTS) &mdash; free at unity.com</li>
          <li>Visual Studio Community &mdash; free with Unity workload</li>
          <li>A computer with a dedicated GPU recommended</li>
          <li>No prior programming or game dev experience required!</li>
        </ul>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="card-icon" style="background:#f3e5f5">\uD83D\uDD17</span> Recommended Resources</div>
      <div class="row3" style="margin-bottom:0; margin-top:4px">${res}</div>
    </div>
  </div>`;
}

/* ═══════════════════════════
   RENDER: SCHEDULE
═══════════════════════════ */
function renderSchedule() {
  document.getElementById('topTitle').textContent = 'Full Course Schedule';
  document.getElementById('topChip').textContent  = 'All 16 Weeks';

  const rows = data.weeks.map(w => {
    let assess = '<span style="color:#bbb">\u2014</span>';
    if (w.assess) {
      const cls = w.assess.type === 'quiz' ? 'tbl-quiz' : w.assess.type === 'midterm' ? 'tbl-midterm' : 'tbl-final';
      assess = `<span class="tbl-pill ${cls}">${esc(w.assess.label)}</span>`;
    }
    const asgn = w.assign ? `A${w.assign.n}: ${esc(w.assign.title)}` : '<span style="color:#bbb">\u2014</span>';
    return `<tr onclick="go('week-${w.n}')">
      <td class="wk-col">Week ${w.n}</td>
      <td>${esc(w.title)}</td>
      <td>${asgn}</td>
      <td>${assess}</td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `<div class="fade-in">
    <div class="sched-wrap">
      <table class="sched-table">
        <thead><tr><th>Week</th><th>Topic</th><th>Assignment</th><th>Assessment</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p style="font-size:12.5px;color:var(--muted);margin-top:-8px">Click any row to jump to that week.</p>
  </div>`;
}

/* ═══════════════════════════
   RENDER: WEEK
═══════════════════════════ */
function renderWeek(num) {
  const w = data.weeks.find(x => x.n === num);
  if (!w) return;

  document.getElementById('topTitle').textContent = `Week ${w.n}: ${w.title}`;
  document.getElementById('topChip').textContent  = `Week ${w.n} of 16`;

  let html = '<div class="fade-in">';

  // Assessment banner
  let banner = '';
  if (w.assess) {
    const cls = { quiz:'banner-quiz', midterm:'banner-midterm', final:'banner-final' }[w.assess.type];
    const ico = { quiz:'\uD83D\uDCDD', midterm:'\uD83C\uDFC6', final:'\uD83C\uDF93' }[w.assess.type];
    banner = `<div class="banner ${cls}">${ico} Assessment this week: <strong>${esc(w.assess.label)}</strong></div>`;
  }

  // Objectives & Topics
  const objs   = w.objectives.map(o => `<li>${esc(o)}</li>`).join('');
  const topics = w.topics.map(t => `<li>${esc(t)}</li>`).join('');

  html += `<div class="week-hdr">
    <div class="wk-label">Week ${w.n}</div>
    <h2>${esc(w.title)}</h2>
    ${banner}
    <div class="ot-grid">
      <div class="ot-section">
        <h4>Learning Objectives</h4>
        <ul class="ot-list obj-list">${objs}</ul>
      </div>
      <div class="ot-section">
        <h4>Topics Covered</h4>
        <ul class="ot-list top-list">${topics}</ul>
      </div>
    </div>
  </div>`;

  // Setup
  if (w.setup) {
    const items = w.setup.map(s => `<li>${esc(s)}</li>`).join('');
    html += `<div class="sec setup">
      <div class="sec-hdr">
        <div class="sec-icon">\u2699\uFE0F</div>
        <h3>Setup Checklist</h3>
        <span style="margin-left:auto;font-size:11px;font-weight:700;color:var(--c-setup);background:rgba(123,31,162,.1);padding:3px 10px;border-radius:20px">Complete Before Class</span>
      </div>
      <p>Complete all steps below to set up your Unity development environment.</p>
      <ul>${items}</ul>
    </div>`;
  }

  // Activity
  if (w.activity) {
    html += `<div class="sec activity">
      <div class="sec-hdr">
        <div class="sec-icon">\uD83C\uDFAE</div>
        <h3>In-Class Activity: ${esc(w.activity.title)}</h3>
      </div>
      <p class="desc">${esc(w.activity.desc)}</p>
      ${codeBlock(w.activity.code)}
    </div>`;
  }

  // Assignment
  if (w.assign) {
    const reqs = w.assign.reqs.map(r => `<li>${esc(r)}</li>`).join('');
    html += `<div class="sec assign">
      <div class="sec-hdr">
        <div class="sec-icon">\uD83D\uDCDD</div>
        <h3>Assignment ${w.assign.n}: ${esc(w.assign.title)}</h3>
        <span class="due-tag">Due Week ${w.assign.due}</span>
      </div>
      <p class="desc">${esc(w.assign.desc)}</p>
      <ul>${reqs}</ul>
    </div>`;
  }

  // Assessment
  if (w.assess) {
    if (w.assess.type === 'quiz') {
      const samples = w.assess.samples.map(s => `<li>${esc(s)}</li>`).join('');
      html += `<div class="sec assess">
        <div class="sec-hdr">
          <div class="sec-icon">\uD83D\uDCCB</div>
          <h3>${esc(w.assess.label)}</h3>
          <span class="due-tag">End of Week ${w.n}</span>
        </div>
        <p><strong>Topics:</strong> ${esc(w.assess.topics)}</p>
        <p><strong>Format:</strong> ${esc(w.assess.format)}</p>
        <div class="sample-qs">
          <h5>Sample Questions</h5>
          <ul>${samples}</ul>
        </div>
      </div>`;

    } else if (w.assess.type === 'midterm') {
      const reqs   = w.assess.reqs.map(r => `<li>${esc(r)}</li>`).join('');
      const rubric = w.assess.rubric.map(r => `<tr><td>${esc(r.c)}</td><td>${r.p} pts</td></tr>`).join('');
      html += `<div class="sec assess">
        <div class="sec-hdr">
          <div class="sec-icon">\uD83C\uDFC6</div>
          <h3>Midterm Project: Playable Mini-Game</h3>
          <span class="due-tag">Due End of Week 8</span>
        </div>
        <p class="desc">${esc(w.assess.desc)}</p>
        <div class="sec-label">Requirements</div>
        <ul>${reqs}</ul>
        <div class="sec-label">Rubric (100 pts total)</div>
        <table class="rubric-table">
          <tbody>${rubric}
            <tr style="border-top:2px solid rgba(245,124,0,.35)">
              <td><strong>Total</strong></td><td><strong>100 pts</strong></td>
            </tr>
          </tbody>
        </table>
      </div>`;

    } else if (w.assess.type === 'final') {
      const sections = w.assess.examSections.map(s => `<li>${esc(s)}</li>`).join('');
      const rubric   = w.assess.rubric.map(r => `<tr><td>${esc(r.c)}</td><td>${r.p} pts</td></tr>`).join('');
      html += `<div class="sec assess">
        <div class="sec-hdr">
          <div class="sec-icon">\uD83C\uDF93</div>
          <h3>Final Exam + Final Project</h3>
          <span class="due-tag">Week 16</span>
        </div>
        <p class="desc">${esc(w.assess.desc)}</p>
        <div class="sec-label">Exam Sections</div>
        <ul class="exam-list">${sections}</ul>
        <div class="sec-label">Project Rubric (100 pts total)</div>
        <table class="rubric-table">
          <tbody>${rubric}
            <tr style="border-top:2px solid rgba(245,124,0,.35)">
              <td><strong>Total</strong></td><td><strong>100 pts</strong></td>
            </tr>
          </tbody>
        </table>
      </div>`;
    }
  }

  // Prev / Next navigation
  const prev = num > 1  ? num - 1 : null;
  const next = num < 16 ? num + 1 : null;
  html += `<div class="wk-nav">
    <button class="nav-btn" ${!prev ? 'disabled' : ''} onclick="go('week-${prev}')">
      &#8592; Week ${prev ?? ''}
    </button>
    <span style="font-size:12px;color:var(--muted)">Week ${num} of 16</span>
    <button class="nav-btn" ${!next ? 'disabled' : ''} onclick="go('week-${next}')">
      Week ${next ?? ''} &#8594;
    </button>
  </div>`;

  html += '</div>';
  document.getElementById('content').innerHTML = html;
  document.getElementById('content').scrollTop = 0;
}

/* ═══════════════════════════
   NAVIGATION
═══════════════════════════ */
function go(view) {
  setActive(view);
  if (view === 'overview')             renderOverview();
  else if (view === 'schedule')        renderSchedule();
  else if (view.startsWith('week-'))   renderWeek(+view.replace('week-', ''));
}

function toggleNav() {
  document.getElementById('navScroll').classList.toggle('open');
}

/* ═══════════════════════════
   INIT — build sidebar
═══════════════════════════ */
(function buildNav() {
  const nav = document.getElementById('navScroll');
  data.weeks.forEach(w => {
    let pillHtml = '';
    if (w.badge) {
      const cls = w.badge.includes('Quiz') ? 'quiz' : w.badge === 'Midterm' ? 'midterm' : 'final';
      pillHtml = `<span class="pill pill-${cls}">${esc(w.badge)}</span>`;
    }
    const item = document.createElement('div');
    item.className = 'nav-item';
    item.id = `nav-week-${w.n}`;
    item.onclick = () => go(`week-${w.n}`);
    item.innerHTML = `<div class="nav-num">${w.n}</div><span class="nav-label">${esc(w.title)}</span>${pillHtml}`;
    nav.appendChild(item);
  });
})();

renderOverview();
</script>
</body>
</html>
