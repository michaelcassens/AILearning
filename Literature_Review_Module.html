<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Understanding Literature Reviews — A Research Foundations Module</title>
  <style>
    :root {
      --gold:        #b8860b;
      --gold-light:  #d4a017;
      --dark:        #2a2215;
      --dark2:       #3d3525;
      --sidebar-w:   270px;
      --bg:          #faf6ed;
      --border:      #e8dcc8;
      --text:        #2a2215;
      --muted:       #6b5e4a;
      --shadow:      0 2px 10px rgba(42,34,21,.08);
      --c-concept:   #6b5000;
      --c-activity:  #1565c0;
      --c-reflect:   #6a3d8a;
      --c-takeaway:  #2e7d32;
      --c-myth:      #c62828;
      --bg-concept:  #fdf3dc;
      --bg-activity: #e3f0fd;
      --bg-reflect:  #f3e8fa;
      --bg-takeaway: #e8f5e9;
      --bg-myth:     #fce8e6;
      --card-bg:     #fff;
      --topbar-bg:   #fff;
      --hero-grad1:  var(--gold);
      --hero-grad2:  #5a3e1b;
      --map-hover:   #fdf6e3;
      --quiz-opt-bg: #fff;
      --myth-item-bg:#fff;
      --compare-bg:  #fff;
      --order-bg:    #fff;
      --reveal-bg:   #fff;
      --dnd-bg:      #fff;
      --synth-pool-bg: #f9f9f9;
      --synth-group-bg: #fff;
      --decoder-bg:  #fff;
      --decoder-sent-bg: transparent;
    }

    /* ===== DARK MODE ===== */
    [data-theme="dark"] {
      --bg:          #1a1a2e;
      --border:      #2e2e4a;
      --text:        #e0dce8;
      --muted:       #a8a0b8;
      --shadow:      0 2px 10px rgba(0,0,0,.3);
      --dark:        #12121f;
      --dark2:       #1e1e33;
      --c-concept:   #d4a017;
      --c-activity:  #5c9ce6;
      --c-reflect:   #b388d9;
      --c-takeaway:  #66bb6a;
      --c-myth:      #ef5350;
      --bg-concept:  #2a2415;
      --bg-activity: #151e2e;
      --bg-reflect:  #211828;
      --bg-takeaway: #152015;
      --bg-myth:     #2a1515;
      --card-bg:     #22223a;
      --topbar-bg:   #1e1e33;
      --hero-grad1:  #7a5a0b;
      --hero-grad2:  #2a1e0b;
      --map-hover:   #2a2a44;
      --quiz-opt-bg: #2a2a44;
      --myth-item-bg:#2a2a44;
      --compare-bg:  #2a2a44;
      --order-bg:    #2a2a44;
      --reveal-bg:   #2a2a44;
      --dnd-bg:      #2a2a44;
      --synth-pool-bg: #1e1e33;
      --synth-group-bg:#22223a;
      --decoder-bg:  #22223a;
      --decoder-sent-bg: #2a2a44;
      --gold:        #d4a017;
      --gold-light:  #e8b830;
    }
    [data-theme="dark"] .sidebar { background: var(--dark); }
    [data-theme="dark"] .sidebar-head { background: linear-gradient(150deg, #12121f, #1e1e33); }
    [data-theme="dark"] .topbar { background: var(--topbar-bg); border-bottom-color: var(--border); }
    [data-theme="dark"] .card { background: var(--card-bg); border-color: var(--border); }
    [data-theme="dark"] .map-wrap { background: var(--card-bg); border-color: var(--border); }
    [data-theme="dark"] .map-table tbody tr:hover { background: var(--map-hover); }
    [data-theme="dark"] .map-table tbody tr { border-bottom-color: var(--border); }
    [data-theme="dark"] .sec-hdr-block { background: var(--card-bg); border-color: var(--border); border-left-color: var(--gold); }
    [data-theme="dark"] .quiz-opt { background: var(--quiz-opt-bg); border-color: var(--border); color: var(--text); }
    [data-theme="dark"] .quiz-opt:hover { border-color: var(--gold); background: #33334d; }
    [data-theme="dark"] .quiz-opt.correct { border-color: #2e7d32; background: #1a2e1a; color: #66bb6a; }
    [data-theme="dark"] .quiz-opt.wrong { border-color: #c62828; background: #2e1a1a; color: #ef5350; }
    [data-theme="dark"] .quiz-explain { background: rgba(46,125,50,.12); }
    [data-theme="dark"] .myth-item { background: var(--myth-item-bg); border-color: var(--border); }
    [data-theme="dark"] .myth-btn { background: var(--quiz-opt-bg); border-color: var(--border); color: var(--text); }
    [data-theme="dark"] .myth-btn:hover { border-color: var(--gold); }
    [data-theme="dark"] .myth-btn.myth-correct { border-color: #2e7d32; background: #1a2e1a; color: #66bb6a; }
    [data-theme="dark"] .myth-btn.myth-wrong { border-color: #c62828; background: #2e1a1a; color: #ef5350; }
    [data-theme="dark"] .myth-explain { background: rgba(46,125,50,.12); }
    [data-theme="dark"] .compare-panel { background: var(--compare-bg); border-color: var(--border); }
    [data-theme="dark"] .order-item { background: var(--order-bg); border-color: var(--border); color: var(--text); }
    [data-theme="dark"] .reveal-btn { background: var(--card-bg); border-color: var(--gold); color: var(--gold); }
    [data-theme="dark"] .reveal-btn:hover { background: var(--gold); color: #fff; }
    [data-theme="dark"] .key-takeaway { background: linear-gradient(135deg, #2a2415, #221e15); border-color: var(--gold); }
    [data-theme="dark"] .resource-card { background: var(--card-bg); border-color: var(--border); }
    [data-theme="dark"] .resource-card:hover { border-color: var(--gold); }
    [data-theme="dark"] .nav-btn { background: var(--card-bg); border-color: var(--border); color: var(--text); }
    [data-theme="dark"] .nav-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
    [data-theme="dark"] .group-foundations { background: #2a2415; color: #d4a017; }
    [data-theme="dark"] .group-deeper { background: #211828; color: #b388d9; }
    [data-theme="dark"] .group-practical { background: #152015; color: #66bb6a; }
    [data-theme="dark"] .concept .sec-hdr h3 { color: #d4a017; }
    [data-theme="dark"] .activity .sec-hdr h3 { color: #5c9ce6; }
    [data-theme="dark"] .reflect .sec-hdr h3 { color: #b388d9; }
    [data-theme="dark"] .takeaway .sec-hdr h3 { color: #66bb6a; }
    [data-theme="dark"] .myth-card .sec-hdr h3 { color: #ef5350; }
    [data-theme="dark"] .dnd-item { background: var(--dnd-bg); border-color: var(--border); color: var(--text); }
    [data-theme="dark"] .dnd-item:hover { border-color: var(--gold); }
    [data-theme="dark"] .dnd-item.dnd-correct { border-color: #2e7d32; background: #1a2e1a; }
    [data-theme="dark"] .dnd-item.dnd-wrong { border-color: #c62828; background: #2e1a1a; }
    [data-theme="dark"] .synth-pool { background: var(--synth-pool-bg); }
    [data-theme="dark"] .synth-source { background: var(--card-bg); border-color: var(--border); color: var(--text); }
    [data-theme="dark"] .synth-group { background: var(--synth-group-bg); border-color: var(--border); }
    [data-theme="dark"] .synth-textarea { background: #1a1a2e; border-color: var(--border); color: var(--text); }
    [data-theme="dark"] .decoder-card { background: var(--decoder-bg); border-color: var(--border); }
    [data-theme="dark"] .decoder-tag-btn { background: var(--card-bg); border-color: var(--border); color: var(--text); }
    [data-theme="dark"] .reflect-textarea { background: #1a1a2e; border-color: var(--border); color: var(--text); }
    [data-theme="dark"] .progress-wrap { background: rgba(255,255,255,.05); border-top-color: rgba(255,255,255,.08); }
    [data-theme="dark"] .progress-bar-bg { background: rgba(255,255,255,.1); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* SKIP LINK */
    .skip-link {
      position: absolute; top: -100px; left: 0; z-index: 9999;
      background: var(--gold); color: #fff; padding: 8px 16px;
      font-size: 14px; font-weight: 700; text-decoration: none;
      border-radius: 0 0 8px 0;
    }
    .skip-link:focus { top: 0; }

    /* FOCUS VISIBLE */
    *:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; height: 100vh; overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--dark); display: flex; flex-direction: column; height: 100vh;
    }
    .sidebar-head {
      padding: 18px 14px 14px; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(150deg, #2a2215, #3d3525);
    }
    .logo-row { display: flex; align-items: center; gap: 10px; }
    .mod-badge {
      width: 38px; height: 38px; background: var(--gold); border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 14px; color: #fff; flex-shrink: 0;
    }
    .sidebar-head h1 { color: #fff; font-size: 14px; font-weight: 700; line-height: 1.3; }
    .sidebar-head .sub { color: #a89878; font-size: 11px; margin-top: 2px; }
    .hamburger {
      display: none; margin-left: auto;
      background: none; border: none; color: #aaa; font-size: 22px; cursor: pointer; padding: 2px 4px;
    }
    .nav-scroll {
      flex: 1; overflow-y: auto; padding: 6px 0 16px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.15) transparent;
    }
    .nav-scroll::-webkit-scrollbar { width: 4px; }
    .nav-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }
    .nav-group-label {
      padding: 12px 14px 4px; font-size: 9.5px; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase; color: #6b5e4a;
    }
    .nav-item {
      display: flex; align-items: center; padding: 8px 14px; gap: 10px;
      cursor: pointer; color: #97887a; font-size: 13px;
      border-left: 3px solid transparent;
      transition: background .12s, color .12s; user-select: none;
    }
    .nav-item:hover { background: var(--dark2); color: #fff; }
    .nav-item.active { background: rgba(184,134,11,.18); border-left-color: var(--gold); color: #fff; }
    .nav-num {
      width: 26px; height: 26px; background: rgba(255,255,255,.08); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0; color: #887766;
      position: relative;
    }
    .nav-item.active .nav-num { background: var(--gold); color: #fff; }
    .nav-label { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .nav-time {
      font-size: 10px; color: #6b5e4a; flex-shrink: 0; white-space: nowrap;
    }

    /* Visited checkmark */
    .nav-item.visited .nav-num::after {
      content: '\2713';
      position: absolute; bottom: -4px; right: -4px;
      width: 14px; height: 14px; background: #2e7d32; color: #fff;
      border-radius: 50%; font-size: 8px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    /* PROGRESS BAR in sidebar */
    .progress-wrap {
      padding: 12px 14px; flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
    }
    .progress-label {
      font-size: 10px; color: #a89878; margin-bottom: 6px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .progress-bar-bg {
      height: 6px; background: rgba(255,255,255,.08); border-radius: 3px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--gold); border-radius: 3px;
      transition: width .4s ease;
    }
    .export-btn {
      display: block; width: 100%; margin-top: 8px;
      padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,.15);
      background: transparent; color: #a89878; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all .15s; text-align: center;
    }
    .export-btn:hover { background: rgba(255,255,255,.08); color: #fff; }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar {
      height: 54px; flex-shrink: 0; background: var(--topbar-bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px; gap: 12px;
    }
    .topbar h2 {
      font-size: 17px; font-weight: 700; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar .chip {
      font-size: 12px; color: var(--muted);
      background: var(--bg); padding: 4px 12px; border-radius: 20px; flex-shrink: 0;
    }
    .dark-toggle {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 4px 10px; font-size: 16px; cursor: pointer; flex-shrink: 0;
      transition: background .15s;
    }
    .dark-toggle:hover { background: var(--bg); }
    .content {
      flex: 1; overflow-y: auto; padding: 24px;
      scroll-behavior: smooth;
      scrollbar-width: thin; scrollbar-color: #ccc transparent;
    }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
    .fade-in { animation: fadeIn .2s ease; }

    /* SHAKE animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
    .quiz-opt.wrong { animation: shake .4s ease; }
    .myth-btn.myth-wrong { animation: shake .4s ease; }

    /* Counter animation */
    @keyframes countUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* CONFETTI */
    @keyframes confetti-fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9998; overflow: hidden;
    }
    .confetti-particle {
      position: absolute; top: -10px;
      width: 10px; height: 10px; border-radius: 2px;
      animation: confetti-fall 3s ease-out forwards;
    }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, var(--hero-grad1), var(--hero-grad2));
      border-radius: 14px; padding: 36px; color: #fff;
      margin-bottom: 22px; position: relative; overflow: hidden;
    }
    .hero::after {
      content: '\1F4DA'; position: absolute; right: 28px; top: 50%; transform: translateY(-50%);
      font-size: 96px; opacity: .12; pointer-events: none;
    }
    .hero h1 { font-size: 30px; font-weight: 900; margin-bottom: 6px; }
    .hero .tagline { font-size: 15px; opacity: .82; margin-bottom: 22px; }
    .hero-stats { display: flex; gap: 14px; flex-wrap: wrap; }
    .stat-box { background: rgba(255,255,255,.15); border-radius: 10px; padding: 10px 18px; text-align: center; }
    .stat-box .val { font-size: 24px; font-weight: 900; }
    .stat-box .lbl { font-size: 10px; opacity: .75; text-transform: uppercase; letter-spacing: .5px; }

    /* CARD GRIDS */
    .row2 { display: grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap: 18px; margin-bottom: 20px; }
    .row3 { display: grid; grid-template-columns: repeat(auto-fill,minmax(170px,1fr)); gap: 14px; }

    .card {
      background: var(--card-bg); border-radius: 12px; padding: 22px;
      box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .card-title {
      font-size: 14px; font-weight: 700; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-icon {
      width: 28px; height: 28px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .check-list { list-style: none; }
    .check-list li {
      padding: 5px 0; font-size: 13px; color: var(--muted);
      display: flex; align-items: flex-start; gap: 8px; line-height: 1.5;
    }
    .check-list li::before { content: '\2713'; color: #2e7d32; font-weight: 700; flex-shrink: 0; }
    .resource-card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px; cursor: pointer; transition: all .18s;
      display: flex; flex-direction: column; gap: 5px;
    }
    .resource-card:hover {
      border-color: var(--gold);
      box-shadow: 0 4px 12px rgba(184,134,11,.15);
      transform: translateY(-2px);
    }
    .resource-card .r-icon { font-size: 20px; }
    .resource-card .r-title { font-size: 13px; font-weight: 700; }
    .resource-card .r-desc  { font-size: 11px; color: var(--muted); }

    /* SECTION MAP */
    .map-wrap {
      background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border);
      box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px;
    }
    .map-table { width: 100%; border-collapse: collapse; }
    .map-table thead { background: var(--gold); color: #fff; }
    .map-table th {
      padding: 11px 16px; text-align: left;
      font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    }
    .map-table tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
    .map-table tbody tr:last-child { border-bottom: none; }
    .map-table tbody tr:hover { background: var(--map-hover); }
    .map-table td { padding: 11px 16px; font-size: 13px; vertical-align: middle; }
    .map-table .sec-col { font-weight: 700; color: var(--gold); white-space: nowrap; }
    .group-pill {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 700;
    }
    .group-foundations { background: #fdf3dc; color: #6b5000; }
    .group-deeper      { background: #f3e8fa; color: #6a3d8a; }
    .group-practical    { background: #e8f5e9; color: #2e7d32; }

    /* TIME CHIP */
    .time-chip {
      display: inline-block; font-size: 10px; font-weight: 700;
      color: var(--muted); background: var(--bg); padding: 2px 7px;
      border-radius: 10px; margin-left: 6px; vertical-align: middle;
    }

    /* SECTION HEADER */
    .sec-hdr-block {
      background: var(--card-bg); border-radius: 12px; padding: 26px;
      margin-bottom: 18px; box-shadow: var(--shadow);
      border: 1px solid var(--border); border-left: 5px solid var(--gold);
    }
    .sec-hdr-block .sec-label-top {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--gold); margin-bottom: 5px;
    }
    .sec-hdr-block h2 { font-size: 24px; font-weight: 900; margin-bottom: 14px; }
    .ot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:640px) { .ot-grid { grid-template-columns: 1fr; } }
    .ot-section h4 {
      font-size: 10.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--muted); margin-bottom: 8px;
    }
    .ot-list { list-style: none; }
    .ot-list li {
      padding: 3.5px 0; font-size: 13px; color: var(--muted);
      display: flex; align-items: flex-start; gap: 7px; line-height: 1.45;
    }
    .obj-list li::before { content: '\1F3AF'; font-size: 11px; flex-shrink: 0; margin-top: 2px; }
    .top-list li::before { content: '\00B7'; color: var(--gold); font-weight: 900; font-size: 16px; line-height: 1; flex-shrink: 0; }

    /* CONTENT SECTION CARDS */
    .sec {
      border-radius: 12px; padding: 22px; margin-bottom: 18px;
      box-shadow: var(--shadow); border: 1px solid;
    }
    .sec.concept   { background: var(--bg-concept);  border-color: var(--c-concept); }
    .sec.activity  { background: var(--bg-activity); border-color: var(--c-activity); }
    .sec.reflect   { background: var(--bg-reflect);  border-color: var(--c-reflect); }
    .sec.takeaway  { background: var(--bg-takeaway); border-color: var(--c-takeaway); }
    .sec.myth-card { background: var(--bg-myth);     border-color: var(--c-myth); }
    .sec-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .sec-icon {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0;
    }
    .concept  .sec-icon { background: rgba(123,94,0,.13); }
    .activity .sec-icon { background: rgba(21,101,192,.13); }
    .reflect  .sec-icon { background: rgba(106,61,138,.13); }
    .takeaway .sec-icon { background: rgba(46,125,50,.13); }
    .myth-card .sec-icon { background: rgba(198,40,40,.13); }
    .sec-hdr h3 { font-size: 14.5px; font-weight: 700; flex: 1; line-height: 1.3; }
    .concept  .sec-hdr h3 { color: #5a4400; }
    .activity .sec-hdr h3 { color: #0d47a1; }
    .reflect  .sec-hdr h3 { color: #4a148c; }
    .takeaway .sec-hdr h3 { color: #1b5e20; }
    .myth-card .sec-hdr h3 { color: #b71c1c; }
    .sec p, .sec .desc { font-size: 13.5px; color: var(--muted); line-height: 1.7; margin-bottom: 10px; }
    .sec ul { list-style: none; }
    .sec ul li {
      font-size: 13.5px; color: var(--muted); padding: 4.5px 0;
      display: flex; align-items: flex-start; gap: 8px; line-height: 1.5;
    }

    .synth-mobile-btns { display: none; margin-top: 6px; gap: 6px; flex-wrap: wrap; }

      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);

    .synth-group {

    /* ABSTRACT DECODER */
    .decoder-toolbar {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
      padding: 10px 14px; background: var(--bg); border-radius: 8px;

    .decoder-tag-btn {
      padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border);
      background: var(--card-bg); font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all .15s; color: var(--text);
    }
    .decoder-tag-btn:hover { border-color: var(--gold); }
    .decoder-tag-btn.active { color: #fff; }
    .decoder-card {
      background: var(--decoder-bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; margin-bottom: 14px;
    }
    .decoder-difficulty {
      display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px;

    .decoder-card h4 { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
    .decoder-sentence {
      display: inline; padding: 2px 4px; border-radius: 4px; cursor: pointer;
      transition: background .15s; line-height: 1.8; font-size: 13px; color: var(--muted);

    .decoder-sentence:hover { background: rgba(184,134,11,.1); }
    .decoder-sentence.tagged { color: var(--text); font-weight: 500; }
    .decoder-sentence.dec-correct-ring { box-shadow: 0 0 0 2px #2e7d32; }
    .decoder-sentence.dec-wrong-ring { box-shadow: 0 0 0 2px #c62828; }

    /* PREV/NEXT NAV */
    .sec-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 18px; margin-top: 4px; border-top: 1px solid var(--border);
    }
    .nav-btn {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all .14s; color: var(--text);
    }
    .nav-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
    .nav-btn:disabled { opacity: .35; cursor: default; }

    /* ANNOUNCE (screen reader) */
    .sr-announce {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* MOBILE */
    @media(max-width: 768px) {
      body { flex-direction: column; overflow: auto; height: auto; }
      .sidebar { width: 100%; min-width: unset; height: auto; }
      .nav-scroll { display: none; max-height: 320px; }
      .nav-scroll.open { display: block; }
      .hamburger { display: block; }
      .main { overflow: visible; }
      .content { overflow: visible; }
      .progress-wrap.mobile-hide { }
    }

    /* PRINT */
    @media print {
      .sidebar, .topbar, .sec-nav, .dark-toggle, .progress-wrap, .skip-link, .sr-announce { display: none !important; }
      body { display: block; overflow: visible; height: auto; background: #fff; color: #000; }

        break-inside: avoid; page-break-inside: avoid;
      }
      .hero { color: #000; background: #f0f0f0 !important; }
    }
  </style>

<script>

   MODULE DATA

var data = {
  goals: [
    "Explain what a literature review is and how it differs from other academic writing",
    "Articulate why researchers conduct literature reviews before starting new research",
    "Identify how a literature review fits into the broader research process",
    "Read and extract key information from an academic source",
    "Recognize common misconceptions about literature reviews",

    { icon: "\uD83D\uDD0D", title: "Google Scholar",       desc: "Search academic literature",        url: "https://scholar.google.com/" },

  ],
  sections: [
    /* ───── SECTION 1 ───── */
    {
      n: 1, title: "What Even IS a Literature Review?", group: "Foundations", time: 15,
      objectives: [
        "Define a literature review in plain language",
        "Distinguish it from a book report, an annotated bibliography, and a research paper",
        "Identify a literature review when you encounter one"

      topics: [
        "The simplest definition: a survey of what others have already found out about a topic",
        "What it is NOT: not a summary dump, not an opinion essay, not a list of sources",
        "Where you encounter them: introduction sections of papers, standalone review articles, thesis chapters",
        "Think of it as mapping the territory before you explore unknown land"
      ],
      keyTakeaway: "A literature review is your map of what researchers already know \u2014 it shows where knowledge exists, where it overlaps, and where the blank spots are.",
      content: [
        "Imagine you are about to set off on an expedition into uncharted territory. Would you just start walking? Probably not. You would look at every map, journal entry, and field report from previous explorers first. You would want to know: What has already been discovered? Where did others run into trouble? What parts of the landscape remain completely unexplored?",
        "That is exactly what a literature review does for a researcher. It is a careful survey of the existing research on a topic \u2014 not just listing what other people wrote, but weaving those findings together into a story that shows the current state of knowledge.",
        "Here is what catches most new researchers off guard: a literature review is NOT the same as a book report. You are not summarizing sources one by one. Instead, you are organizing ideas by themes, showing how different studies relate to each other, and identifying patterns across the research. The individual sources are the threads; your job is to show the bigger tapestry."

        title: "Spot the Literature Review",
        desc: "Read each excerpt below and decide: Is this from a literature review, or is it a different type of academic writing?",

          {
            q: "\"Smith (2020) found that students who used spaced repetition scored 23% higher on retention tests. Similarly, Jones (2019) and Park (2021) reported significant improvements when spacing was combined with active recall. However, these studies focused primarily on STEM subjects, leaving a gap in our understanding of how these techniques perform in humanities courses.\"",

          {
            q: "\"In Chapter 3, the author argues that social media has fundamentally changed political discourse. She provides several compelling examples from the 2020 election cycle and concludes that platforms should implement stronger fact-checking measures.\"",
            options: ["Literature Review", "Book Report", "Research Paper"],
            correct: 1,
            explain: "This is a book report. It summarizes one author\u2019s argument from a single source. A literature review would bring together findings from multiple researchers and compare their conclusions."

          {

    {

      objectives: [
        "Explain at least three reasons researchers conduct literature reviews",
        "Understand that all research builds on previous work",
        "See the literature review as joining a conversation, not just completing a homework assignment"
      ],
      topics: [
        "Research as conversation: you would not walk into a room mid-conversation and repeat what someone already said",

/* ============================================================
   STORAGE HELPERS
============================================================ */
function storageGet(key, fallback) {
  try {
    var raw = localStorage.getItem('lrmod_' + key);
    return raw !== null ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}

function storageSet(key, val) {
  try { localStorage.setItem('lrmod_' + key, JSON.stringify(val)); } catch (e) {}
}

/* ============================================================
   PROGRESS STATE
============================================================ */
var progress = {
  visited: storageGet('visited', []),
  activities: storageGet('activities', {}),
  reflections: storageGet('reflections', {}),
  synthesis: storageGet('synthesis', {})
};

function markVisited(viewId) {
  if (progress.visited.indexOf(viewId) === -1) {
    progress.visited.push(viewId);
    storageSet('visited', progress.visited);
  }
  updateProgressUI();
  var navEl = document.getElementById('nav-' + viewId);
  if (navEl) navEl.classList.add('visited');
  // Check if all 7 sections visited
  var sectionCount = 0;
  for (var i = 0; i < progress.visited.length; i++) {
    if (progress.visited[i].indexOf('sec-') === 0) sectionCount++;
  }
  if (sectionCount >= 7) renderConfetti();
}

function markActivity(activityId) {
  progress.activities[activityId] = true;
  storageSet('activities', progress.activities);
}

function updateProgressUI() {
  var sectionCount = 0;
  for (var i = 0; i < progress.visited.length; i++) {
    if (progress.visited[i].indexOf('sec-') === 0) sectionCount++;
  }
  var el = document.getElementById('progressText');
  if (el) el.textContent = sectionCount + ' / 7 sections';
  var fill = document.getElementById('progressFill');
  if (fill) fill.style.width = Math.round((sectionCount / 7) * 100) + '%';
}

function saveReflection(secNum, text) {
  progress.reflections[secNum] = text;
  storageSet('reflections', progress.reflections);
}

function saveSynthesisState(secNum) {
  // Gather grouping state
  var state = { placements: {}, statements: {} };
  var groups = document.querySelectorAll('.synth-group[data-secnum="' + secNum + '"]');
  groups.forEach(function(g) {
    var gid = g.getAttribute('data-gid');
    var sources = g.querySelectorAll('.synth-source');
    var ids = [];
    sources.forEach(function(s) { ids.push(s.getAttribute('data-srcid')); });
    state.placements[gid] = ids;
    var ta = g.querySelector('.synth-textarea');
    if (ta) state.statements[gid] = ta.value;
  });
  progress.synthesis[secNum] = state;
  storageSet('synthesis', progress.synthesis);
}

function renderConfetti() {
  var container = document.createElement('div');
  container.className = 'confetti-container';
  var colors = ['#b8860b', '#d4a017', '#2e7d32', '#1565c0', '#6a3d8a', '#c62828', '#ff9800'];
  for (var i = 0; i < 50; i++) {
    var p = document.createElement('div');
    p.className = 'confetti-particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = (Math.random() * 2) + 's';
    p.style.width = (6 + Math.random() * 8) + 'px';
    p.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(p);
  }
  document.body.appendChild(container);
  setTimeout(function() { if (container.parentNode) container.parentNode.removeChild(container); }, 3500);
}

function exportReflections() {
  var lines = ['Literature Review Module - My Reflections', '==========================================', ''];
  data.sections.forEach(function(s) {
    lines.push('Section ' + s.n + ': ' + s.title);
    lines.push('---');
    var text = progress.reflections[s.n] || '(No reflection written)';
    lines.push(text);
    lines.push('');
  });
  var blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'LitReview_Reflections.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

/* ============================================================
   DARK MODE
============================================================ */
function initDarkMode() {
  var dm = storageGet('darkmode', 'light');
  if (dm === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  updateDarkToggleIcon();
}

function toggleDarkMode() {
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  storageSet('darkmode', next);
  updateDarkToggleIcon();
}

function updateDarkToggleIcon() {
  var btn = document.getElementById('darkToggle');
  if (!btn) return;
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  btn.innerHTML = isDark ? '&#9728;' : '&#127769;';
  btn.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
}

// Init dark mode before render to prevent flash
initDarkMode();

/* ============================================================
   ANNOUNCE (accessibility)
============================================================ */
function announce(msg) {
  var el = document.getElementById('announcer');
  if (el) {
    el.textContent = '';

  }
}

/* ============================================================
   HELPERS
============================================================ */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function setActive(id) {
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  var el = document.getElementById('nav-' + id);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
}

function nl2p(text) {
  return text.split('\n\n').map(function(p) { return '<p>' + esc(p) + '</p>'; }).join('');
}

function getTotalTime() {
  var total = 0;
  data.sections.forEach(function(s) { total += (s.time || 15); });
  return total;
}

/* ============================================================
   ANIMATE COUNTERS
============================================================ */
function animateCounters() {
  var boxes = document.querySelectorAll('.stat-box .val[data-target]');
  boxes.forEach(function(box) {
    var target = parseInt(box.getAttribute('data-target'), 10);
    if (isNaN(target)) return;
    var current = 0;
    var step = Math.max(1, Math.floor(target / 30));
    var interval = setInterval(function() {
      current += step;
      if (current >= target) {
        current = target;
        clearInterval(interval);
      }
      box.textContent = current;
    }, 30);
  });
}

/* ============================================================

============================================================ */
function renderSection(num) {
  var s = data.sections.find(function(x) { return x.n === num; });
  if (!s) return;

  document.getElementById('topTitle').textContent = 'Section ' + s.n + ': ' + s.title;
  document.getElementById('topChip').textContent  = 'Section ' + s.n + ' of 7';

  var html = '<div class="fade-in">';

  // Header block
  var objs   = s.objectives.map(function(o) { return '<li>' + esc(o) + '</li>'; }).join('');
  var topics = s.topics.map(function(t) { return '<li>' + esc(t) + '</li>'; }).join('');

  html += '<div class="sec-hdr-block">' +
    '<div class="sec-label-top">Section ' + s.n + ' \u2014 ' + esc(s.group) + '<span class="time-chip">~' + (s.time || 15) + 'min</span></div>' +
    '<h2>' + esc(s.title) + '</h2>' +
    '<div class="ot-grid">' +
      '<div class="ot-section"><h4>Learning Objectives</h4><ul class="ot-list obj-list">' + objs + '</ul></div>' +
      '<div class="ot-section"><h4>Topics Covered</h4><ul class="ot-list top-list">' + topics + '</ul></div>' +
    '</div>' +
  '</div>';

  // Content paragraphs
  if (s.content && s.content.length) {
    html += '<div class="sec concept">';
    html += '<div class="sec-hdr"><div class="sec-icon">\uD83D\uDCD6</div><h3>Understanding the Concept</h3></div>';
    s.content.forEach(function(para) {
      html += '<p>' + esc(para) + '</p>';
    });
    html += '</div>';
  }

  // Key Takeaway
  if (s.keyTakeaway) {
    html += '<div class="key-takeaway">' +
      '<div class="kt-icon">\uD83D\uDCA1</div>' +
      '<div class="kt-text">' + esc(s.keyTakeaway) + '</div>' +
    '</div>';
  }

  // Activity
  if (s.activity) {
    html += renderActivity(s.activity, num);
  }

  // Activity2 (synthesis or decoder)
  if (s.activity2) {
    html += renderActivity(s.activity2, num);
  }

  // Reflection
  if (s.reflection) {
    var savedRef = progress.reflections[num] || '';
    html += '<div class="sec reflect">' +
      '<div class="sec-hdr"><div class="sec-icon">\uD83D\uDCAD</div><h3>Pause and Reflect</h3></div>' +
      '<p>' + esc(s.reflection) + '</p>' +
      '<textarea class="reflect-textarea" placeholder="Write your reflection here..." aria-label="Your reflection for section ' + num + '" oninput="saveReflection(' + num + ', this.value)">' + esc(savedRef) + '</textarea>' +
    '</div>';
  }

  // Prev / Next
  var prev = num > 1 ? num - 1 : null;
  var next = num < 7 ? num + 1 : null;
  html += '<div class="sec-nav">' +
    '<button class="nav-btn" ' + (!prev ? 'disabled' : '') + ' onclick="go(\'sec-' + (prev || '') + '\')">' +
      '\u2190 Section ' + (prev || '') +
    '</button>' +
    '<span style="font-size:12px;color:var(--muted)">Section ' + num + ' of 7</span>' +
    '<button class="nav-btn" ' + (!next ? 'disabled' : '') + ' onclick="go(\'sec-' + (next || '') + '\')">' +
      'Section ' + (next || '') + ' \u2192' +
    '</button>' +
  '</div>';

  html += '</div>';
  document.getElementById('content').innerHTML = html;
  document.getElementById('content').scrollTop = 0;

  // Init DnD for ordering (section 3)
  if (s.activity && s.activity.type === 'ordering') {
    initDnD(num);
  }
  // Init Synthesis DnD
  if (s.activity2 && s.activity2.type === 'synthesis') {
    initSynthesisDnD(num);
  }
  // Init Decoder
  if (s.activity2 && s.activity2.type === 'decoder') {
    initDecoderKeyboard(num);
  }
}

/* ============================================================
   RENDER: ACTIVITIES (dispatch by type)
============================================================ */
function renderActivity(act, secNum) {
  var html = '<div class="sec activity">' +
    '<div class="sec-hdr"><div class="sec-icon">\uD83C\uDFAE</div><h3>Activity: ' + esc(act.title) + '</h3></div>' +
    '<p class="desc">' + esc(act.desc) + '</p>';

  if (act.type === 'quiz') {
    html += renderQuiz(act.items, secNum);
  } else if (act.type === 'myth') {
    html += renderMyth(act.items, secNum);
  } else if (act.type === 'scenario') {
    html += renderScenario(act.items, secNum);
  } else if (act.type === 'ordering') {
    html += renderOrdering(act, secNum);
  } else if (act.type === 'comparison') {
    html += renderComparison(act.items, secNum);
  } else if (act.type === 'synthesis') {
    html += renderSynthesis(act, secNum);
  } else if (act.type === 'decoder') {
    html += renderDecoder(act, secNum);
  }

  html += '</div>';
  return html;
}

function renderQuiz(items, secNum) {
  var html = '';
  items.forEach(function(item, qi) {
    var id = 'q' + secNum + '_' + qi;
    html += '<div class="quiz-item">';
    html += '<div class="quiz-q">' + (qi + 1) + '. ' + esc(item.q) + '</div>';
    html += '<div class="quiz-opts" id="opts_' + id + '" role="listbox" aria-label="Answer options for question ' + (qi + 1) + '">';
    item.options.forEach(function(opt, oi) {
      html += '<button class="quiz-opt" role="option" onclick="checkQuiz(\'' + id + '\',' + oi + ',' + item.correct + ',' + secNum + ')">' + esc(opt) + '</button>';
    });
    html += '</div>';
    html += '<div class="quiz-explain" id="exp_' + id + '">' + esc(item.explain) + '</div>';
    html += '</div>';
  });
  return html;
}

function renderMyth(items, secNum) {
  var html = '';
  items.forEach(function(item, mi) {
    var id = 'm' + secNum + '_' + mi;
    html += '<div class="myth-item">';
    html += '<div class="myth-statement">"' + esc(item.statement) + '"</div>';
    html += '<div class="myth-btns" id="btns_' + id + '">';

    html += '<button class="myth-btn" aria-label="Mark as reality" onclick="checkMyth(\'' + id + '\',\'reality\',\'' + item.answer + '\',' + secNum + ')">Reality</button>';
    html += '</div>';
    html += '<div class="myth-explain" id="mexp_' + id + '">' + esc(item.explain) + '</div>';
    html += '</div>';
  });
  return html;
}

function renderScenario(items, secNum) {

/* ============================================================
   RENDER: SYNTHESIS BUILDER
============================================================ */
function renderSynthesis(act, secNum) {
  var html = '';

  // Source pool
  html += '<div class="synth-pool" id="synthPool_' + secNum + '">';
  html += '<div class="synth-pool-label">Source Pool &mdash; ' + esc(act.topic) + '</div>';
  act.sources.forEach(function(src) {
    html += '<div class="synth-source" draggable="true" data-srcid="' + src.id + '" data-correct="' + src.correctGroup + '" data-secnum="' + secNum + '">' +
      '<div class="synth-cite">' + esc(src.citation) + '</div>' +
      '<div class="synth-snip">' + esc(src.snippet) + '</div>' +
      '<div class="synth-mobile-btns">';
    act.groups.forEach(function(g) {
      html += '<button class="synth-mobile-btn" onclick="event.stopPropagation();moveSynthSource(\'' + src.id + '\',' + g.id + ',' + secNum + ')" style="border-left:3px solid ' + g.color + '">' + esc(g.label) + '</button>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  // Group drop zones
  html += '<div class="synth-groups-wrap">';
  act.groups.forEach(function(g) {
    html += '<div class="synth-group" data-gid="' + g.id + '" data-secnum="' + secNum + '">' +
      '<div class="synth-group-label" style="border-bottom-color:' + g.color + ';color:' + g.color + '">' + esc(g.label) + '</div>' +
      '<div class="synth-sources-area"></div>' +
      '<div class="synth-textarea-label">Your synthesis statement:</div>' +
      '<textarea class="synth-textarea" placeholder="Write a one-sentence synthesis for this group..." aria-label="Synthesis statement for ' + esc(g.label) + '" oninput="saveSynthesisState(' + secNum + ')"></textarea>' +
    '</div>';
  });
  html += '</div>';

  html += '<button class="dnd-check-btn" onclick="checkSynthesis(' + secNum + ')">Check My Groupings</button>';

  return html;
}

/* ============================================================
   RENDER: ABSTRACT DECODER
============================================================ */
function renderDecoder(act, secNum) {
  var html = '';

  // Toolbar
  html += '<div class="decoder-toolbar" role="radiogroup" aria-label="Select tag type">';
  act.tagTypes.forEach(function(t, ti) {
    html += '<button class="decoder-tag-btn" role="radio" aria-checked="false" data-tagid="' + t.id + '" ' +
      'style="border-color:' + t.color + '" ' +
      'onclick="selectDecoderTag(\'' + t.id + '\',this,' + secNum + ')">' +
      esc(t.label) + '</button>';
  });
  html += '</div>';

  // Abstracts
  act.abstracts.forEach(function(abs, ai) {
    var diffColor = abs.difficulty === 'Introductory' ? '#2e7d32' : (abs.difficulty === 'Intermediate' ? '#1565c0' : '#6a3d8a');
    var diffBg = abs.difficulty === 'Introductory' ? '#e8f5e9' : (abs.difficulty === 'Intermediate' ? '#e3f0fd' : '#f3e8fa');
    html += '<div class="decoder-card">';
    html += '<span class="decoder-difficulty" style="background:' + diffBg + ';color:' + diffColor + '">' + esc(abs.difficulty) + '</span>';
    html += '<h4>' + esc(abs.title) + '</h4>';
    html += '<p style="line-height:1.8;margin-bottom:10px">';
    abs.sentences.forEach(function(sent, si) {
      html += '<span class="decoder-sentence" tabindex="0" data-secnum="' + secNum + '" data-absidx="' + ai + '" data-sentidx="' + si + '" data-correct="' + sent.tag + '" onclick="tagSentence(' + secNum + ',' + ai + ',' + si + ')">' + esc(sent.text) + ' </span>';
    });
    html += '</p>';
    html += '<button class="dnd-check-btn" onclick="checkDecoder(' + secNum + ',' + ai + ')">Check Abstract ' + (ai + 1) + '</button>';
    html += '</div>';
  });

  return html;
}

/* ============================================================
   DnD: ORDERING (Section 3)
============================================================ */
var dndDragIdx = null;

function initDnD(secNum) {
  var list = document.getElementById('dndList_' + secNum);
  if (!list) return;
  var items = list.querySelectorAll('.dnd-item');

  items.forEach(function(item) {
    item.addEventListener('dragstart', function(e) {
      dndDragIdx = Array.prototype.indexOf.call(list.children, item);
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dndDragIdx);
    });

    item.addEventListener('dragend', function() {
      item.classList.remove('dragging');
      list.querySelectorAll('.dnd-item').forEach(function(el) { el.classList.remove('drag-over'); });
    });

    item.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      list.querySelectorAll('.dnd-item').forEach(function(el) { el.classList.remove('drag-over'); });
      item.classList.add('drag-over');
    });

    item.addEventListener('drop', function(e) {
      e.preventDefault();
      item.classList.remove('drag-over');
      var fromIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
      var toIdx = Array.prototype.indexOf.call(list.children, item);
      if (fromIdx === toIdx) return;
      var allItems = Array.prototype.slice.call(list.children);
      var moved = allItems.splice(fromIdx, 1)[0];
      allItems.splice(toIdx, 0, moved);
      // Re-append
      allItems.forEach(function(el, i) {
        list.appendChild(el);
        el.querySelector('.dnd-num').textContent = (i + 1);
      });
      renumberDnDArrows(secNum);
    });

    // Keyboard
    item.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        var idx = Array.prototype.indexOf.call(list.children, item);
        var dir = e.key === 'ArrowUp' ? -1 : 1;
        moveDnD(secNum, idx, dir);
      }
    });
  });
}

function moveDnD(secNum, fromIdx, dir) {
  var list = document.getElementById('dndList_' + secNum);
  if (!list) return;
  var items = Array.prototype.slice.call(list.children);
  var toIdx = fromIdx + dir;
  if (toIdx < 0 || toIdx >= items.length) return;
  var moved = items.splice(fromIdx, 1)[0];
  items.splice(toIdx, 0, moved);
  items.forEach(function(el, i) {
    list.appendChild(el);
    el.querySelector('.dnd-num').textContent = (i + 1);
  });
  // Focus the moved item
  moved.focus();
  renumberDnDArrows(secNum);
}

function renumberDnDArrows(secNum) {
  var list = document.getElementById('dndList_' + secNum);
  if (!list) return;
  var items = list.querySelectorAll('.dnd-item');
  items.forEach(function(item, i) {
    var arrows = item.querySelectorAll('.dnd-arrow-btn');
    if (arrows.length >= 2) {
      arrows[0].setAttribute('onclick', 'event.stopPropagation();moveDnD(' + secNum + ',' + i + ',-1)');
      arrows[1].setAttribute('onclick', 'event.stopPropagation();moveDnD(' + secNum + ',' + i + ',1)');
    }
    item.setAttribute('aria-label', 'Step: ' + item.querySelector('.dnd-text').textContent + '. Position ' + (i + 1) + ' of ' + items.length);
  });
}

function checkOrdering(secNum) {
  var s = data.sections.find(function(x) { return x.n === secNum; });
  if (!s || !s.activity || s.activity.type !== 'ordering') return;
  var list = document.getElementById('dndList_' + secNum);
  if (!list) return;
  var items = list.querySelectorAll('.dnd-item');
  var correctCount = 0;
  items.forEach(function(item, i) {
    var text = item.querySelector('.dnd-text').textContent;
    item.classList.remove('dnd-correct', 'dnd-wrong');
    if (text === s.activity.correct[i].step) {
      item.classList.add('dnd-correct');
      correctCount++;
    } else {
      item.classList.add('dnd-wrong');
    }
  });
  markActivity('ordering_' + secNum);
  announce(correctCount + ' of ' + items.length + ' steps in the correct position.');
}

/* ============================================================
   DnD: SYNTHESIS BUILDER
============================================================ */
function initSynthesisDnD(secNum) {
  var sources = document.querySelectorAll('.synth-source[data-secnum="' + secNum + '"]');
  var groups = document.querySelectorAll('.synth-group[data-secnum="' + secNum + '"]');
  var pool = document.getElementById('synthPool_' + secNum);

  sources.forEach(function(src) {
    src.addEventListener('dragstart', function(e) {
      e.dataTransfer.setData('text/plain', src.getAttribute('data-srcid'));
      e.dataTransfer.effectAllowed = 'move';
      src.classList.add('dragging');
    });
    src.addEventListener('dragend', function() {
      src.classList.remove('dragging');
      groups.forEach(function(g) { g.classList.remove('drag-over'); });
      if (pool) pool.classList.remove('drag-over');
    });
  });

  function handleGroupDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    this.classList.add('drag-over');
  }
  function handleGroupDragLeave() {
    this.classList.remove('drag-over');
  }
  function handleGroupDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    var srcId = e.dataTransfer.getData('text/plain');
    var srcEl = document.querySelector('.synth-source[data-srcid="' + srcId + '"]');
    if (srcEl) {
      this.querySelector('.synth-sources-area').appendChild(srcEl);
      saveSynthesisState(secNum);
    }
  }

  groups.forEach(function(g) {
    g.addEventListener('dragover', handleGroupDragOver);
    g.addEventListener('dragleave', handleGroupDragLeave);
    g.addEventListener('drop', handleGroupDrop);
  });

  // Allow dragging back to pool
  if (pool) {
    pool.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      pool.classList.add('drag-over');
    });
    pool.addEventListener('dragleave', function() {
      pool.classList.remove('drag-over');
    });
    pool.addEventListener('drop', function(e) {
      e.preventDefault();
      pool.classList.remove('drag-over');
      var srcId = e.dataTransfer.getData('text/plain');
      var srcEl = document.querySelector('.synth-source[data-srcid="' + srcId + '"]');
      if (srcEl) {
        pool.appendChild(srcEl);
        saveSynthesisState(secNum);
      }
    });
  }
}

function moveSynthSource(srcId, groupId, secNum) {
  var srcEl = document.querySelector('.synth-source[data-srcid="' + srcId + '"]');
  var groupEl = document.querySelector('.synth-group[data-gid="' + groupId + '"][data-secnum="' + secNum + '"]');
  if (srcEl && groupEl) {
    groupEl.querySelector('.synth-sources-area').appendChild(srcEl);
    saveSynthesisState(secNum);
  }
}

function checkSynthesis(secNum) {
  var sources = document.querySelectorAll('.synth-source[data-secnum="' + secNum + '"]');
  var correctCount = 0;
  var total = 0;
  sources.forEach(function(src) {
    src.classList.remove('synth-correct', 'synth-wrong');
    var parent = src.closest('.synth-group');
    if (!parent) return; // still in pool
    total++;
    var gid = parseInt(parent.getAttribute('data-gid'), 10);
    var correct = parseInt(src.getAttribute('data-correct'), 10);
    if (gid === correct) {
      src.classList.add('synth-correct');
      correctCount++;
    } else {
      src.classList.add('synth-wrong');
    }
  });
  markActivity('synthesis_' + secNum);
  announce(correctCount + ' of ' + total + ' sources correctly grouped.');
}

/* ============================================================
   ABSTRACT DECODER
============================================================ */
var activeDecoderTag = null;

function selectDecoderTag(tagId, btn, secNum) {
  var s = data.sections.find(function(x) { return x.n === secNum; });
  if (!s || !s.activity2 || s.activity2.type !== 'decoder') return;
  var toolbar = btn.closest('.decoder-toolbar');
  var buttons = toolbar.querySelectorAll('.decoder-tag-btn');
  var tagType = s.activity2.tagTypes.find(function(t) { return t.id === tagId; });

  buttons.forEach(function(b) {
    b.classList.remove('active');
    b.setAttribute('aria-checked', 'false');
    b.style.background = '';
    b.style.color = '';
  });
  btn.classList.add('active');
  btn.setAttribute('aria-checked', 'true');
  if (tagType) {
    btn.style.background = tagType.color;
    btn.style.color = '#fff';
  }
  activeDecoderTag = tagId;
}

function tagSentence(secNum, absIdx, sentIdx) {
  if (!activeDecoderTag) return;
  var s = data.sections.find(function(x) { return x.n === secNum; });
  if (!s || !s.activity2) return;
  var tagType = s.activity2.tagTypes.find(function(t) { return t.id === activeDecoderTag; });
  if (!tagType) return;

  var sentence = document.querySelector('.decoder-sentence[data-secnum="' + secNum + '"][data-absidx="' + absIdx + '"][data-sentidx="' + sentIdx + '"]');
  if (!sentence) return;

  var currentTag = sentence.getAttribute('data-usertag');
  if (currentTag === activeDecoderTag) {
    // Remove tag
    sentence.removeAttribute('data-usertag');
    sentence.style.background = '';
    sentence.classList.remove('tagged');
    sentence.setAttribute('aria-label', '');
  } else {
    // Apply tag
    sentence.setAttribute('data-usertag', activeDecoderTag);
    sentence.style.background = tagType.bg;
    sentence.classList.add('tagged');
    sentence.setAttribute('aria-label', 'Tagged as ' + tagType.label);
  }
}

function checkDecoder(secNum, absIdx) {
  var sentences = document.querySelectorAll('.decoder-sentence[data-secnum="' + secNum + '"][data-absidx="' + absIdx + '"]');
  var correctCount = 0;
  var total = sentences.length;
  sentences.forEach(function(sent) {
    sent.classList.remove('dec-correct-ring', 'dec-wrong-ring');
    var userTag = sent.getAttribute('data-usertag');
    var correctTag = sent.getAttribute('data-correct');
    if (userTag === correctTag) {
      sent.classList.add('dec-correct-ring');
      correctCount++;
    } else {
      sent.classList.add('dec-wrong-ring');
    }
  });
  markActivity('decoder_' + secNum + '_' + absIdx);
  announce('Abstract ' + (absIdx + 1) + ': ' + correctCount + ' of ' + total + ' sentences correctly tagged.');
}

function initDecoderKeyboard(secNum) {
  var sentences = document.querySelectorAll('.decoder-sentence[data-secnum="' + secNum + '"]');
  sentences.forEach(function(sent) {
    sent.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        var ai = parseInt(sent.getAttribute('data-absidx'), 10);
        var si = parseInt(sent.getAttribute('data-sentidx'), 10);
        tagSentence(secNum, ai, si);
      }
    });
  });
}

/* ============================================================
   INTERACTIVE HANDLERS
============================================================ */
function checkQuiz(id, chosen, correct, secNum) {
  var opts = document.getElementById('opts_' + id);
  var buttons = opts.querySelectorAll('.quiz-opt');
  buttons.forEach(function(btn, i) {
    btn.classList.add('disabled');
    if (i === correct) btn.classList.add('correct');
    else if (i === chosen && chosen !== correct) btn.classList.add('wrong');
  });
  document.getElementById('exp_' + id).classList.add('show');
  if (secNum) markActivity('quiz_' + id);
  var isCorrect = chosen === correct;
  announce(isCorrect ? 'Correct! Explanation shown below.' : 'Incorrect. The correct answer is highlighted. Explanation shown below.');
}

function checkMyth(id, chosen, answer, secNum) {
  var btns = document.getElementById('btns_' + id).querySelectorAll('.myth-btn');
  btns.forEach(function(btn) { btn.classList.add('disabled'); });
  if (chosen === answer) {
    btns[chosen === 'myth' ? 0 : 1].classList.add('myth-correct');
  } else {
    btns[chosen === 'myth' ? 0 : 1].classList.add('myth-wrong');
    btns[answer === 'myth' ? 0 : 1].classList.add('myth-correct');
  }
  document.getElementById('mexp_' + id).classList.add('show');
  if (secNum) markActivity('myth_' + id);
  announce(chosen === answer ? 'Correct!' : 'Incorrect. The correct answer is highlighted.');
}

function toggleScenario(id) {
  var el = document.getElementById('scexp_' + id);
  el.classList.toggle('show');
  var parent = el.closest('[aria-expanded]');
  if (parent) {
    parent.setAttribute('aria-expanded', el.classList.contains('show') ? 'true' : 'false');
  }
}

/* ============================================================
   NAVIGATION
============================================================ */
function go(view) {
  setActive(view);
  if (view === 'overview')           renderOverview();
  else if (view === 'map')           renderMap();
  else if (view.startsWith('sec-'))  renderSection(+view.replace('sec-', ''));

  // Mark visited
  markVisited(view);

  // Announce navigation
  if (view === 'overview') announce('Navigated to Module Overview.');
  else if (view === 'map') announce('Navigated to Section Map.');
  else if (view.startsWith('sec-')) {
    var secN = +view.replace('sec-', '');
    var secData = data.sections.find(function(x) { return x.n === secN; });
    if (secData) announce('Navigated to Section ' + secN + ': ' + secData.title + '.');
  }

  // Close mobile nav
  if (window.innerWidth <= 768) {
    document.getElementById('navScroll').classList.remove('open');
  }
}

function toggleNav() {
  document.getElementById('navScroll').classList.toggle('open');
}

/* ============================================================
   GLOBAL KEYBOARD NAVIGATION
============================================================ */
document.addEventListener('keydown', function(e) {
  // Don't intercept if user is typing in an input/textarea
  var tag = document.activeElement ? document.activeElement.tagName : '';
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if (document.activeElement && document.activeElement.getAttribute('contenteditable') === 'true') return;

  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    var currentActive = document.querySelector('.nav-item.active');
    if (!currentActive) return;
    var currentId = currentActive.id.replace('nav-', '');
    if (currentId.indexOf('sec-') === 0) {
      var num = parseInt(currentId.replace('sec-', ''), 10);
      if (e.key === 'ArrowLeft' && num > 1) { e.preventDefault(); go('sec-' + (num - 1)); }
      else if (e.key === 'ArrowRight' && num < 7) { e.preventDefault(); go('sec-' + (num + 1)); }
    }
  }

  // Nav items: Enter/Space to activate
  if ((e.key === 'Enter' || e.key === ' ') && document.activeElement && document.activeElement.classList.contains('nav-item')) {
    e.preventDefault();
    document.activeElement.click();
  }
});

/* ============================================================
   INIT - build sidebar nav
============================================================ */
(function buildNav() {
  var nav = document.getElementById('navScroll');
  var currentGroup = '';
  data.sections.forEach(function(s) {
    if (s.group !== currentGroup) {
      currentGroup = s.group;
      var label = document.createElement('div');
      label.className = 'nav-group-label';
      label.textContent = currentGroup;
      nav.appendChild(label);
    }
    var item = document.createElement('div');
    item.className = 'nav-item';
    item.id = 'nav-sec-' + s.n;
    item.setAttribute('tabindex', '0');
    item.setAttribute('role', 'button');
    item.onclick = function() { go('sec-' + s.n); };
    item.innerHTML = '<div class="nav-num">' + s.n + '</div><span class="nav-label">' + esc(s.title) + '</span><span class="nav-time">~' + (s.time || 15) + 'min</span>';
    nav.appendChild(item);

    // Restore visited state
    if (progress.visited.indexOf('sec-' + s.n) !== -1) {
      item.classList.add('visited');
    }
  });
})();

// Init progress UI
updateProgressUI();

// Render overview
renderOverview();
</script>
