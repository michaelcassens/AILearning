<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS & jQuery Error Checker — Educational Tool</title>

  <!-- CodeMirror Editor -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.js"></script>

  <!-- Acorn JS Parser (syntax + AST) -->
  <script src="https://unpkg.com/acorn@8.11.3/dist/acorn.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #12121e;
      --surface:   #1a1a2e;
      --surface2:  #20203a;
      --border:    #2d2d50;
      --accent:    #e94560;
      --blue:      #00b4d8;
      --text:      #e4e4f0;
      --dim:       #7a7a9a;
      --c-syntax:  #ff6b6b;
      --c-runtime: #ff9f43;
      --c-logical: #ffe066;
      --c-jquery:  #c084fc;
      --c-info:    #60a5fa;
      --c-ok:      #4ade80;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .header-title { font-size: 1.1rem; font-weight: 700; color: var(--blue); }
    .header-title span { color: var(--accent); }
    .header-sub { font-size: 0.75rem; color: var(--dim); }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    /* toggle switch */
    .toggle-wrap { display: flex; align-items: center; gap: 7px; font-size: 0.82rem; color: var(--dim); cursor: pointer; }
    .toggle-wrap input { display: none; }
    .toggle-slider {
      width: 40px; height: 20px; background: var(--border);
      border-radius: 20px; position: relative; transition: .3s; cursor: pointer;
    }
    .toggle-slider::after {
      content: ''; position: absolute;
      width: 14px; height: 14px; background: #fff;
      border-radius: 50%; top: 3px; left: 3px; transition: .3s;
    }
    .toggle-wrap input:checked ~ .toggle-slider { background: var(--c-jquery); }
    .toggle-wrap input:checked ~ .toggle-slider::after { transform: translateX(20px); }

    /* example dropdown */
    select.example-picker {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 10px; font-size: 0.82rem; cursor: pointer;
    }
    select.example-picker option { background: var(--surface2); }

    .btn {
      border: none; border-radius: 6px; padding: 7px 16px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: transparent; color: var(--dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--dim); }

    /* ── MAIN LAYOUT ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── EDITOR ── */
    .editor-panel {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      border-right: 2px solid var(--border);
    }
    .panel-label {
      background: var(--surface);
      padding: 6px 14px;
      font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 1px; color: var(--dim);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .editor-panel .CodeMirror { height: 100%; font-size: 13.5px; line-height: 1.65; }

    /* line highlights */
    .hl-syntax  { background: rgba(255,107,107,.18) !important; }
    .hl-runtime { background: rgba(255,159, 67,.18) !important; }
    .hl-logical { background: rgba(255,224,102,.12) !important; }
    .hl-jquery  { background: rgba(192,132,252,.18) !important; }

    /* ── RESULTS PANEL ── */
    .results-panel {
      width: 430px; min-width: 380px;
      display: flex; flex-direction: column;
      overflow: hidden; flex-shrink: 0;
    }

    /* filter tabs */
    .filter-row {
      background: var(--surface);
      display: flex; gap: 4px;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; flex-wrap: wrap;
    }
    .ftab {
      padding: 3px 9px; border-radius: 12px;
      font-size: 0.72rem; cursor: pointer;
      border: 1px solid var(--border);
      background: transparent; color: var(--dim);
      transition: all .2s;
    }
    .ftab:hover { color: var(--text); }
    .ftab.active-all    { color: var(--text); border-color: var(--text); background: rgba(255,255,255,.08); }
    .ftab.active-syntax  { color: var(--c-syntax);  border-color: var(--c-syntax);  background: rgba(255,107,107,.1); }
    .ftab.active-runtime { color: var(--c-runtime); border-color: var(--c-runtime); background: rgba(255,159, 67,.1); }
    .ftab.active-logical { color: var(--c-logical); border-color: var(--c-logical); background: rgba(255,224,102,.1); }
    .ftab.active-jquery  { color: var(--c-jquery);  border-color: var(--c-jquery);  background: rgba(192,132,252,.1); }

    /* results list */
    .results-list {
      flex: 1; overflow-y: auto;
      padding: 10px; display: flex; flex-direction: column; gap: 8px;
    }
    .results-list::-webkit-scrollbar { width: 5px; }
    .results-list::-webkit-scrollbar-track { background: var(--surface); }
    .results-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* empty / ok states */
    .state-box {
      text-align: center; padding: 40px 20px; color: var(--dim);
    }
    .state-box .ico { font-size: 2.6rem; margin-bottom: 10px; }
    .state-box h3 { font-size: .95rem; color: var(--text); margin-bottom: 6px; }
    .state-box p  { font-size: .82rem; line-height: 1.5; }
    .state-box.ok h3 { color: var(--c-ok); }

    /* ── ERROR CARD ── */
    .ecard {
      background: var(--surface);
      border-left: 4px solid;
      border-radius: 7px;
      overflow: hidden;
      transition: transform .1s;
    }
    .ecard:hover { transform: translateX(2px); }
    .ecard.syntax  { border-color: var(--c-syntax); }
    .ecard.runtime { border-color: var(--c-runtime); }
    .ecard.logical { border-color: var(--c-logical); }
    .ecard.jquery  { border-color: var(--c-jquery); }
    .ecard.info    { border-color: var(--c-info); }

    .ecard-head {
      padding: 9px 13px;
      display: flex; align-items: flex-start; gap: 9px;
      cursor: pointer;
    }
    .ecard-head:hover { background: rgba(255,255,255,.03); }

    .ebadge {
      font-size: .62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; padding: 2px 6px;
      border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 2px;
    }
    .bs { background: rgba(255,107,107,.2);  color: var(--c-syntax); }
    .br { background: rgba(255,159, 67,.2);  color: var(--c-runtime); }
    .bl { background: rgba(255,224,102,.18); color: var(--c-logical); }
    .bj { background: rgba(192,132,252,.2);  color: var(--c-jquery); }
    .bi { background: rgba( 96,165,250,.2);  color: var(--c-info); }

    .etitle-area { flex: 1; min-width: 0; }
    .etitle { font-size: .86rem; font-weight: 600; line-height: 1.3; }
    .eline  { font-size: .73rem; color: var(--dim); margin-top: 3px; }
    .eline a { color: var(--blue); cursor: pointer; text-decoration: none; }
    .eline a:hover { text-decoration: underline; }
    .earrow { color: var(--dim); font-size: .85rem; flex-shrink: 0; transition: transform .2s; }
    .earrow.open { transform: rotate(180deg); }

    .ecard-body { padding: 0 13px 13px; display: none; }
    .ecard-body.open { display: block; }

    .esection { margin-bottom: 9px; }
    .eslabel {
      font-size: .65rem; text-transform: uppercase;
      letter-spacing: .5px; color: var(--dim); margin-bottom: 4px;
    }
    .escontent {
      font-size: .81rem; line-height: 1.65; color: var(--text);
    }
    .escontent code {
      background: rgba(255,255,255,.09);
      padding: 1px 4px; border-radius: 3px;
      font-family: 'Consolas', monospace; font-size: .88em;
    }
    .fix-box {
      background: rgba(74,222,128,.07);
      border: 1px solid rgba(74,222,128,.2);
      border-radius: 5px; padding: 8px 11px;
    }
    .fix-box .escontent { color: #a7f3c8; }

    /* context section */
    .ctx-section {
      background: rgba(0,180,216,.07);
      border: 1px solid rgba(0,180,216,.25);
      border-radius: 5px; padding: 9px 11px; margin-top: 8px;
    }
    .ctx-label { font-size: .72rem; color: var(--blue); margin-bottom: 6px; }
    .ctx-q { font-size: .8rem; line-height: 1.55; color: var(--text); margin-bottom: 8px; }
    textarea.ctx-input {
      width: 100%; background: rgba(255,255,255,.05);
      border: 1px solid var(--border); color: var(--text);
      padding: 6px 9px; border-radius: 5px; font-size: .8rem;
      resize: vertical; min-height: 55px; font-family: inherit;
      margin-bottom: 7px;
    }
    textarea.ctx-input:focus { outline: none; border-color: var(--blue); }
    .ctx-submit {
      background: var(--blue); color: #000;
      border: none; padding: 5px 13px; border-radius: 4px;
      cursor: pointer; font-size: .78rem; font-weight: 700;
    }
    .ctx-response {
      margin-top: 9px; padding: 8px 10px;
      background: rgba(255,255,255,.05); border-radius: 5px;
      font-size: .8rem; line-height: 1.55; color: var(--text);
    }
  </style>

<body>

<!-- ══════════════ HEADER ══════════════ -->
<div class="header">
  <div>
    <div class="header-title">JS &amp; <span>jQuery</span> Error Checker</div>
    <div class="header-sub">Syntax · Runtime · Logical — Educational Tool</div>
  </div>
  <div class="header-controls">
    <label class="toggle-wrap">
      <input type="checkbox" id="jqMode">
      <span class="toggle-slider"></span>
      jQuery Mode
    </label>
    <select class="example-picker" id="examplePicker" onchange="loadExample(this.value)">
      <option value="">⬇ Load Example…</option>
      <option value="syntax">Syntax Errors</option>
      <option value="runtime">Runtime Errors</option>
      <option value="logical">Logical Errors</option>

      <option value="mixed">Mixed (All Types)</option>
    </select>
    <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
    <button class="btn btn-primary" onclick="checkCode()">▶ Check Code</button>
  </div>
</div>

<!-- ══════════════ MAIN ══════════════ -->
<div class="main">

  <!-- Editor -->
  <div class="editor-panel">
    <div class="panel-label">Code Editor — JavaScript / jQuery &nbsp;·&nbsp; Ctrl+Enter to check</div>
    <textarea id="codeEditor">// Paste or type your JavaScript here, then click "Check Code"
// Or use "Load Example" to see the checker in action!

function greetUser(name) {
  if (name == null) {
    console.log("Hello, stranger!");
  } else {
    console.log("Hello, " + name + "!");
  }
}

// Classic var-in-loop closure trap
for (var i = 0; i < 3; i++) {
  setTimeout(function() {
    console.log(i); // prints 3, 3, 3 — not 0, 1, 2
  }, 100);
}

// Accidental assignment in condition
var score = 10;
if (score = 5) {
  console.log("score is five");
}
</textarea>
  </div>

  <!-- Results -->
  <div class="results-panel">
    <div class="filter-row" id="filterRow">
      <button class="ftab active-all" data-filter="all"     onclick="setFilter('all')">All</button>
      <button class="ftab"            data-filter="syntax"  onclick="setFilter('syntax')">Syntax</button>
      <button class="ftab"            data-filter="runtime" onclick="setFilter('runtime')">Runtime</button>
      <button class="ftab"            data-filter="logical" onclick="setFilter('logical')">Logical</button>
      <button class="ftab"            data-filter="jquery"  onclick="setFilter('jquery')">jQuery</button>
    </div>
    <div class="results-list" id="resultsList">
      <div class="state-box">
        <div class="ico">🔍</div>
        <h3>Ready to Analyze</h3>
        <p>Paste your JavaScript or jQuery code in the editor and click <strong>Check Code</strong>.</p>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ SCRIPTS ══════════════ -->
<script>
// ─────────────────────────────────────────────────────────
//  CODEMIRROR SETUP
// ─────────────────────────────────────────────────────────
let editor;
let lineMarks = []; // stores {ln, type} pairs for removal
let allFindings = [];
let renderedFindings = [];
let currentFilter = 'all';

window.addEventListener('load', () => {
  editor = CodeMirror.fromTextArea(document.getElementById('codeEditor'), {
    mode: 'javascript', theme: 'dracula',
    lineNumbers: true, styleActiveLine: true,
    matchBrackets: true, indentUnit: 2, tabSize: 2,
    lineWrapping: true
  });
});

// ─────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────
function clearMarks() {
  lineMarks.forEach(({ ln, type }) => {
    editor.removeLineClass(ln, 'background', `hl-${type}`);
  });
  lineMarks = [];
}

function markLine(lineNum, type) {
  const ln = lineNum - 1;
  if (ln < 0 || ln >= editor.lineCount()) return;
  editor.addLineClass(ln, 'background', `hl-${type}`);
  lineMarks.push({ ln, type });
}

function jumpToLine(ln) {
  const line = ln - 1;
  editor.setCursor({ line, ch: 0 });
  editor.scrollIntoView({ line, ch: 0 }, 120);
  editor.focus();
}

function clearAll() {
  editor.setValue('');
  clearMarks();
  allFindings = [];
  showEmpty();
}

function showEmpty() {
  document.getElementById('resultsList').innerHTML = `
    <div class="state-box">
      <div class="ico">🔍</div>
      <h3>Ready to Analyze</h3>
      <p>Paste your JavaScript or jQuery code in the editor and click <strong>Check Code</strong>.</p>
    </div>`;
}

// Safely escape html AND convert `backtick` spans to <code>
function fmt(str) {
  const esc = String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  return esc.replace(/`([^`]+)`/g, '<code>$1</code>');
}

// ─────────────────────────────────────────────────────────
//  MINIMAL AST WALKER (no external walk library needed)
// ─────────────────────────────────────────────────────────
const SKIP_KEYS = new Set(['type','start','end','loc','sourceType','raw']);

function walk(node, visitors, ancestors) {
  if (!node || typeof node !== 'object' || !node.type) return;
  ancestors = ancestors || [];
  const fn = visitors[node.type];
  if (fn) fn(node, ancestors);
  const ch = [...ancestors, node];
  for (const k of Object.keys(node)) {
    if (SKIP_KEYS.has(k)) continue;
    const v = node[k];
    if (Array.isArray(v)) v.forEach(c => walk(c, visitors, ch));
    else if (v && typeof v === 'object' && v.type) walk(v, visitors, ch);
  }
}

// ─────────────────────────────────────────────────────────
//  SYNTAX ERROR HINT
// ─────────────────────────────────────────────────────────
function syntaxHint(msg) {
  const m = msg.toLowerCase();
  if (m.includes('unexpected token }')) return 'You have an extra `}`. Check that every opening `{` has a matching closing `}`.';
  if (m.includes('unexpected token )')) return 'You have an extra `)`. Check that every `(` has a matching `)`.';
  if (m.includes('unexpected token ]')) return 'You have an extra `]`. Check that every `[` has a matching `]`.';
  if (m.includes('unexpected end of input')) return 'The code ends abruptly. You likely have an unclosed `{`, `(`, or `[`. Count your opening and closing delimiters.';
  if (m.includes('invalid left-hand side')) return 'The left side of an assignment is not assignable. You might be doing `5 = x` or `fn() = value` by mistake.';
  if (m.includes('identifier')) return 'A variable name was expected here. You may have used a reserved keyword or left a name blank.';
  if (m.includes('unexpected token')) return 'Unexpected character found. Check for typos, stray symbols, or missing operators near this line.';
  return 'Review the syntax near this line. Look for missing commas, unclosed strings, or wrong keywords.';
}

// ─────────────────────────────────────────────────────────
//  RULES
// ─────────────────────────────────────────────────────────

// ── RULE: Loose Equality ──────────────────────────────────
function rLooseEquality(ast) {
  const out = [];
  walk(ast, {
    BinaryExpression(node) {
      if (node.operator !== '==' && node.operator !== '!=') return;
      const L = node.left, R = node.right;
      const isNullCheck =
        (R.type === 'Literal' && R.value === null) || (L.type === 'Literal' && L.value === null) ||
        (R.type === 'Identifier' && R.name === 'undefined') || (L.type === 'Identifier' && L.name === 'undefined');
      out.push({
        type: 'logical', line: node.loc.start.line, col: node.loc.start.column + 1,
        title: `Loose equality \`${node.operator}\` — type coercion may cause bugs`,
        explain: `The \`${node.operator}\` operator converts both sides to the same type before comparing (type coercion). This causes surprises:\n• \`0 == ""\` → \`true\`\n• \`false == 0\` → \`true\`\n• \`"5" == 5\` → \`true\`\n• \`null == undefined\` → \`true\`\nThese silent type conversions make bugs very hard to find.`,
        fix: `Replace \`${node.operator}\` with \`${node.operator === '==' ? '===' : '!=='}\` (strict equality). It checks both **value** and **type** with no conversion.\n• Before: \`x ${node.operator} y\`\n• After:  \`x ${node.operator === '==' ? '===' : '!=='} y\``,
        ctx: isNullCheck,
        ctxQ: isNullCheck ? `Using \`${node.operator} null\` checks for **both** \`null\` and \`undefined\` at once (a known JS pattern). Is that intentional? If you only want to match \`null\`, use \`=== null\`. If you want both null/undefined, the \`== null\` pattern is acceptable — just add a comment explaining the intent.` : null
      });
    }
  });
  return out;
}

// ── RULE: Assignment in Condition ────────────────────────
function rAssignInCond(ast) {
  const out = [];
  const testNodes = new Set();
  walk(ast, {
    IfStatement(n)          { if (n.test) testNodes.add(n.test); },
    WhileStatement(n)       { if (n.test) testNodes.add(n.test); },
    DoWhileStatement(n)     { if (n.test) testNodes.add(n.test); },
    ConditionalExpression(n){ if (n.test) testNodes.add(n.test); },
    ForStatement(n)         { if (n.test) testNodes.add(n.test); }
  });
  testNodes.forEach(t => {
    if (t && t.type === 'AssignmentExpression') {
      out.push({
        type: 'logical', line: t.loc.start.line, col: t.loc.start.column + 1,
        title: `Assignment \`=\` inside a condition (did you mean \`===\`?)`,
        explain: `You used \`=\` (assignment) where a comparison was expected. JavaScript will **assign** the value and then use the result as the condition — not compare.\n\nFor example: \`if (x = 5)\` sets \`x\` to \`5\` and then the condition is \`5\` (truthy), so it always runs. This is almost always a typo.`,
        fix: `If you meant to **compare**, change \`=\` to \`===\`:\n• \`if (x === 5)\`\n\nIf you truly meant to assign inside a condition (rare), wrap in double parentheses to make it obvious:\n• \`if ((x = getValue()))\``,
        ctx: false, ctxQ: null
      });
    }
  });
  return out;
}

// ── RULE: Unreachable Code ────────────────────────────────
function rUnreachable(ast) {
  const out = [];
  function checkBlock(stmts) {
    if (!stmts) return;
    for (let i = 0; i < stmts.length - 1; i++) {
      const s = stmts[i];
      if (['ReturnStatement','ThrowStatement','BreakStatement','ContinueStatement'].includes(s.type)) {
        const next = stmts[i + 1];
        if (next.type !== 'FunctionDeclaration') {
          out.push({
            type: 'logical', line: next.loc.start.line, col: next.loc.start.column + 1,
            title: `Unreachable code after \`${s.type.replace('Statement','').toLowerCase()}\``,
            explain: `The code on this line can **never execute** because the \`${s.type.replace('Statement','').toLowerCase()}\` on line ${s.loc.start.line} always exits before reaching it. JavaScript silently skips unreachable code, which usually means there's a logic error.`,
            fix: `Options:\n1. **Remove** the unreachable code if it shouldn't be there.\n2. **Move** it before the \`${s.type.replace('Statement','').toLowerCase()}\` if it should run.\n3. **Restructure** the logic (e.g., use \`if/else\` instead of an early return).`,
            ctx: false, ctxQ: null
          });
          break;
        }
      }
    }
  }
  walk(ast, {
    BlockStatement(n) { checkBlock(n.body); },
    Program(n)        { checkBlock(n.body); },
    SwitchCase(n)     { checkBlock(n.consequent); }
  });
  return out;
}

// ── RULE: var in loop with callback ──────────────────────
function rVarInLoop(ast) {
  const out = [];
  const loopTypes = new Set(['ForStatement','ForInStatement','ForOfStatement','WhileStatement','DoWhileStatement']);

  walk(ast, {
    ForStatement(node, ancestors) {
      if (!node.init || node.init.type !== 'VariableDeclaration' || node.init.kind !== 'var') return;
      let hasCallback = false;
      walk(node.body, {
        FunctionExpression()      { hasCallback = true; },
        ArrowFunctionExpression() { hasCallback = true; }
      });
      if (hasCallback) {
        out.push({
          type: 'logical', line: node.loc.start.line, col: node.loc.start.column + 1,
          title: `\`var\` loop variable + callback = closure trap`,
          explain: `Using \`var\` in a \`for\` loop with a callback (like \`setTimeout\`, event listeners, etc.) is a classic JavaScript bug. All the callbacks share **one single variable** — not a copy per iteration. By the time they run, the loop is done and they all see the final value.\n\nExample: \`for (var i=0; i<3; i++) { setTimeout(() => console.log(i), 0); }\` prints \`3, 3, 3\` — not \`0, 1, 2\`.`,

          explain: `AJAX calls can fail for many reasons: network error, server error (404, 500), timeout, CORS blocked. Without an error handler, failures are **silently ignored** — users see nothing happen and you have no diagnostic information.`,
          fix: `Chain a \`.fail()\` handler:\n\`$.get("/api/data")\n  .done(function(data) { /* handle data */ })\n  .fail(function(jqXHR, status, err) {\n    console.error("Request failed:", status, err);\n  });\`\n\nFor \`$.ajax()\`, add an \`error:\` option in the settings object.`,
          ctx: true, ctxQ: `Do you have a \`.fail()\` or \`.catch()\` chained elsewhere that wasn't detected here? If error handling is attached in a separate chain, this warning may not apply.`
        });
      }
    }
  });
  return out;
}

// ─────────────────────────────────────────────────────────
//  MAIN ANALYSIS
// ─────────────────────────────────────────────────────────
function analyzeCode(code, jqMode) {
  let ast;
  try {
    ast = acorn.parse(code, { ecmaVersion: 2020, sourceType: 'script', locations: true, allowReserved: false });
  } catch (e) {
    return [{
      type: 'syntax', line: e.loc ? e.loc.line : 1, col: e.loc ? e.loc.column + 1 : 1,
      title: `Syntax Error: ${e.message.split(' (')[0]}`,
      explain: `JavaScript's parser could not understand your code:\n"${e.message}"\n\nSyntax errors prevent the entire file from running — the browser won't execute a single line if there's a syntax error anywhere.`,
      fix: syntaxHint(e.message),
      ctx: false, ctxQ: null
    }];
  }

  const findings = [
    ...rLooseEquality(ast),
    ...rAssignInCond(ast),
    ...rUnreachable(ast),
    ...rVarInLoop(ast),
    ...rForIn(ast),
    ...rNaN(ast),
    ...rParseInt(ast),
    ...rEmptyCatch(ast),
    ...rDupKeys(ast),
    ...rTypeofString(ast),
    ...rNullAccess(ast),
    ...rConstReassign(ast),
    ...rDivByZero(ast),
    ...rLiteralCondition(ast),
    ...rEval(ast),
    ...rWith(ast),
    ...(jqMode ? [
      ...rjqDeprecated(ast),
      ...rjqParseJSON(ast),
      ...rjqArrowThis(ast),
      ...rjqReady(ast),
      ...rjqAjaxNoError(ast)
    ] : [])
  ];

  findings.sort((a, b) => (a.line - b.line) || (a.col - b.col));
  return findings;
}

// ─────────────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────────────
const BADGE_CLASS = { syntax:'bs', runtime:'br', logical:'bl', jquery:'bj', info:'bi' };
const BADGE_LABEL = { syntax:'Syntax', runtime:'Runtime', logical:'Logical', jquery:'jQuery', info:'Info' };

function renderFindings(findings) {
  clearMarks();
  const list = document.getElementById('resultsList');

  const filtered = currentFilter === 'all' ? findings : findings.filter(f => f.type === currentFilter);
  renderedFindings = filtered;

  if (findings.length === 0) {
    list.innerHTML = `<div class="state-box ok"><div class="ico">✅</div><h3>No Issues Found!</h3><p>Your code passed all checks. Well done!</p></div>`;
    return;
  }
  if (filtered.length === 0) {
    list.innerHTML = `<div class="state-box"><div class="ico">🎉</div><h3>No ${currentFilter} issues</h3><p>No ${currentFilter} problems detected. Check other categories.</p></div>`;
    findings.forEach(f => markLine(f.line, f.type));
    return;
  }

  findings.forEach(f => markLine(f.line, f.type));

  let html = '';
  filtered.forEach((f, idx) => {
    const bc = BADGE_CLASS[f.type] || 'bi';
    const bl = BADGE_LABEL[f.type] || f.type;
    const expHtml = f.explain ? fmt(f.explain).replace(/\n/g, '<br>') : '';
    const fixHtml = f.fix    ? fmt(f.fix).replace(/\n/g, '<br>')    : '';

    html += `
      <div class="ecard ${f.type}" id="card-${idx}">
        <div class="ecard-head" onclick="toggleCard(${idx})">
          <span class="ebadge ${bc}">${bl}</span>
          <div class="etitle-area">
            <div class="etitle">${fmt(f.title)}</div>
            <div class="eline">Line <a onclick="event.stopPropagation();jumpToLine(${f.line})">${f.line}</a>, Col ${f.col}</div>
          </div>
          <span class="earrow" id="arr-${idx}">▼</span>
        </div>
        <div class="ecard-body" id="body-${idx}">
          ${expHtml ? `<div class="esection"><div class="eslabel">What's wrong</div><div class="escontent">${expHtml}</div></div>` : ''}
          ${fixHtml ? `<div class="esection"><div class="eslabel">How to fix it</div><div class="fix-box"><div class="escontent">${fixHtml}</div></div></div>` : ''}
          ${f.ctx && f.ctxQ ? `
          <div class="ctx-section" id="ctx-${idx}">
            <div class="ctx-label">🤔 Need more context to be sure</div>
            <div class="ctx-q">${fmt(f.ctxQ)}</div>
            <textarea class="ctx-input" id="ctxIn-${idx}" placeholder="Describe your situation…"></textarea>
            <button class="ctx-submit" onclick="answerCtx(${idx})">Get Guidance</button>
            <div id="ctxRes-${idx}"></div>
          </div>` : ''}
        </div>
      </div>`;
  });

  list.innerHTML = html;
  if (filtered.length > 0) toggleCard(0); // auto-expand first
}

function toggleCard(idx) {
  const body = document.getElementById(`body-${idx}`);
  const arr  = document.getElementById(`arr-${idx}`);
  if (!body) return;
  body.classList.toggle('open');
  arr.classList.toggle('open');
}

// ─────────────────────────────────────────────────────────
//  CONTEXT GUIDANCE
// ─────────────────────────────────────────────────────────
function answerCtx(idx) {
  const input = document.getElementById(`ctxIn-${idx}`);
  const res   = document.getElementById(`ctxRes-${idx}`);
  const answer = (input?.value || '').trim();
  if (!answer) { res.innerHTML = '<div style="color:var(--c-syntax);font-size:.78rem;margin-top:6px">Please provide some context first.</div>'; return; }

  const f = renderedFindings[idx];
  let msg = '';
  const a = answer.toLowerCase();
  const q = (f.ctxQ || '').toLowerCase();

  if (q.includes('ready') || q.includes('defer') || q.includes('</body>')) {
    if (a.includes('bottom') || a.includes('defer') || a.includes('body'))
      msg = `✅ Great — if your script is at the bottom of the page or uses \`defer\`, the DOM is ready when it runs. This warning doesn't apply to you.`;
    else
      msg = `⚠️ If the script is in \`<head>\` without \`defer\`, the DOM may not be ready. Wrap in \`$(function() { ... })\` to be safe.`;
  } else if (q.includes('var') && q.includes('let')) {
    if (a.includes('let') || a.includes('const'))
      msg = `✅ You're already using \`let\` — each loop iteration gets its own binding. The closure trap doesn't apply here. You're fine!`;
    else if (a.includes('var'))
      msg = `⚠️ With \`var\`, all callbacks share one variable. Change it to \`let\` to give each iteration its own copy.`;
    else
      msg = `If you're using \`var\`, change it to \`let\`. If you're already using \`let\`, this warning doesn't apply.`;
  } else if (q.includes('null') && q.includes('undefined')) {
    if (a.includes('both') || a.includes('null and undef') || a.includes('either'))
      msg = `✅ Using \`== null\` to match both \`null\` and \`undefined\` is an accepted pattern. Add a comment like \`// checks for null or undefined\` to make the intent obvious.`;
    else if (a.includes('only null') || a.includes('just null'))
      msg = `✅ Use \`=== null\` to check only for \`null\` — this won't match \`undefined\`.`;
    else
      msg = `\`== null\` matches both \`null\` and \`undefined\`. Use \`=== null\` if you only want \`null\`.`;
  } else if (q.includes('array') || q.includes('object')) {
    if (a.includes('array') || a.includes('arr') || a.includes('list'))
      msg = `⚠️ \`for...in\` on arrays is problematic. Use \`for (const item of arr)\` or \`.forEach()\` to iterate values safely.`;
    else if (a.includes('object') || a.includes('key') || a.includes('prop'))
      msg = `✅ \`for...in\` is designed for objects. Just consider \`if (obj.hasOwnProperty(key))\` to skip inherited properties.`;
    else
      msg = `If iterating an array, switch to \`for...of\`. If iterating an object's keys, \`for...in\` is appropriate.`;
  } else if (q.includes('ajax') || q.includes('.fail')) {
    if (a.includes('.fail') || a.includes('error') || a.includes('catch') || a.includes('handled'))
      msg = `✅ If your error handling is chained elsewhere or in a \`catch\` block, this warning may not apply. The checker only detects \`error:\` option inside \`$.ajax()\`.`;
    else
      msg = `Add a \`.fail(fn)\` to handle network/server errors and inform the user something went wrong.`;
  } else if (q.includes('eval')) {
    if (a.includes('property') || a.includes('lookup') || a.includes('dynamic key'))
      msg = `✅ Use bracket notation instead: \`obj[propName]\` — no need for \`eval\`.`;
    else if (a.includes('json') || a.includes('parse'))
      msg = `✅ Use \`JSON.parse(str)\` — it's safer, faster, and specifically designed for this.`;
    else if (a.includes('function') || a.includes('call by name'))
      msg = `✅ Use a lookup table: \`const fns = { doA, doB }; fns[name]();\` — much safer than \`eval\`.`;
    else
      msg = `Describe what you're doing and I can suggest the right alternative. \`eval\` can almost always be replaced.`;
  } else {
    msg = `Thanks for the context: "${answer}". Review the fix suggestion above — if your situation matches a safe exception, this warning may not apply.`;
  }

  res.innerHTML = `<div class="ctx-response">${fmt(msg)}</div>`;
}

// ─────────────────────────────────────────────────────────
//  FILTER
// ─────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t => {
    t.className = 'ftab';
    if (t.dataset.filter === f) t.classList.add(`active-${f}`);
  });
  renderFindings(allFindings);
}

function updateFilterCounts(findings) {
  const counts = { syntax:0, runtime:0, logical:0, jquery:0 };
  findings.forEach(f => { if (f.type in counts) counts[f.type]++; });
  document.querySelectorAll('.ftab').forEach(t => {
    const type = t.dataset.filter;
    if (type === 'all') {
      t.textContent = findings.length > 0 ? `All (${findings.length})` : 'All';
    } else {
      const n = counts[type] || 0;
      const label = type.charAt(0).toUpperCase() + type.slice(1);
      t.textContent = n > 0 ? `${label} (${n})` : label;
    }
  });
}

// ─────────────────────────────────────────────────────────
//  CHECK
// ─────────────────────────────────────────────────────────
function checkCode() {
  const code = editor.getValue();
  if (!code.trim()) { showEmpty(); return; }
  const jqMode = document.getElementById('jqMode').checked;
  allFindings = analyzeCode(code, jqMode);
  updateFilterCounts(allFindings);
  renderFindings(allFindings);
  document.getElementById('examplePicker').value = '';
}

// ─────────────────────────────────────────────────────────
//  EXAMPLE SNIPPETS
// ─────────────────────────────────────────────────────────
const EXAMPLES = {
  syntax: `// ── SYNTAX ERRORS ──────────────────────────────────
// These prevent the file from running at all.

function greet(name {   // missing closing ) for params
  console.log("Hello, " + name);
}

var obj = {
  key: "value"
  missing: "comma"   // missing comma between properties
};`,

  runtime: `// ── RUNTIME ERRORS ──────────────────────────────────
// These crash the program when the code actually runs.

// 1. Property access on null (throws TypeError immediately)
var element = null;
console.log(element.innerHTML);

// 2. Reassigning a const variable
const MAX_SIZE = 100;
MAX_SIZE = 200;    // TypeError: Assignment to constant variable

// 3. Division by zero
var speed = 60;
var time = 0;
var distance = speed / 0;   // produces Infinity

// 4. Incrementing a const
const counter = 0;
counter++;   // TypeError`,

  logical: `// ── LOGICAL ERRORS ──────────────────────────────────
// These don't crash — they just produce wrong results.

// 1. Loose equality type coercion
if (0 == "") {
  console.log("This runs! 0 == '' is true in JS");
}

// 2. Accidental assignment in condition
var userLevel = 3;
if (userLevel = 1) {   // sets level to 1, always truthy
  console.log("This always runs no matter what level was");
}

// 3. var in loop closure trap
for (var i = 0; i < 3; i++) {
  setTimeout(function() {
    console.log(i);   // prints 3, 3, 3 — not 0, 1, 2
  }, 100);
}

// 4. Comparing with NaN
var result = parseInt("abc");
if (result === NaN) {   // always false — NaN !== NaN
  console.log("Not a number");
}

// 5. Unreachable code
function calculate(x) {
  return x * 2;
  console.log("done");   // never reached
}

// 6. parseInt without radix
var num = parseInt("09");   // ambiguous base

// 7. Duplicate object key
var config = {
  host: "localhost",
  port: 3000,
  host: "production.server.com"   // silent overwrite!
};`,

  jquery: `// ── JQUERY ERRORS ────────────────────────────────────
// Enable "jQuery Mode" toggle to detect these.
// These require jQuery to be loaded on the page.

// 1. Using removed .live() method (jQuery 1.9+)
$("button").live("click", function() {
  alert("clicked!");
});

// 2. Arrow function with $(this) — this won't be the element
$(".item").on("click", (event) => {
  $(this).addClass("selected");   // 'this' is wrong here!
});

// 3. $.parseJSON is deprecated
var data = $.parseJSON('{"name":"Alice"}');

// 4. $.trim is deprecated
var clean = $.trim("  hello  ");

// 5. Ajax without error handler
$.get("/api/users", function(data) {
  console.log(data);
});   // what if the request fails?

// 6. .bind() is deprecated
$(".btn").bind("click", function() {
  console.log("clicked");
});`,

  mixed: `// ── MIXED: ALL ERROR TYPES ────────────────────────────
// A sampling of syntax, runtime, and logical errors.
// Turn on jQuery Mode to see jQuery checks too.

// SYNTAX: missing closing brace on function (uncomment to test)
// function broken(x {
//   return x * 2;
// }

// RUNTIME: null dereference
var user = null;
var name = user.firstName;   // TypeError!

// LOGICAL: assignment in if-condition
var score = 0;
if (score = 100) {   // assigns 100, always true!
  console.log("Perfect score!");
}

// LOGICAL: NaN comparison
var input = parseInt("hello");
if (input === NaN) {   // always false — use Number.isNaN()
  console.log("Invalid number");
}

// LOGICAL: var closure in loop
for (var j = 0; j < 5; j++) {
  setTimeout(function() {
    console.log("j is: " + j);   // always prints 5
  }, j * 100);
}

// LOGICAL: loose equality
console.log(false == 0);   // true? Really?
console.log("" == false);  // also true!

// LOGICAL: unreachable code
function getDiscount(member) {
  if (member) return 0.2;
  return 0;
  console.log("Calculating...");   // never runs
}`
};

function loadExample(key) {
  if (!key) return;
  editor.setValue(EXAMPLES[key] || '');
  clearMarks();
  allFindings = [];
  showEmpty();
  updateFilterCounts([]);
  // Auto-enable jQuery mode for jQuery example
  document.getElementById('jqMode').checked = (key === 'jquery' || key === 'mixed');
}

// Keyboard shortcut: Ctrl/Cmd+Enter = check
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') checkCode();
});
</script>
</body>
