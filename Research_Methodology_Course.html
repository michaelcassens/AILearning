<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Research Quest — Gamified Research Methodology</title>
<style>
:root{
  --pri:#1565c0;--pri-d:#0d47a1;--pri-l:#42a5f5;
  --sec:#ff8f00;--sec-l:#ffca28;--sec-d:#e65100;
  --acc:#00c853;--acc-d:#00953e;
  --xp:#7c4dff;--xp-l:#b388ff;
  --bg:#f5f6fa;--card:#fff;--txt:#1a1a2e;--muted:#637381;
  --side-w:280px;--radius:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--txt);display:flex;min-height:100vh}

/* ── Sidebar ── */
.side{width:var(--side-w);background:linear-gradient(180deg,var(--pri-d),#0a1929);color:#fff;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.side::-webkit-scrollbar{width:4px}.side::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:4px}
.side-head{padding:24px 20px 16px;text-align:center;border-bottom:1px solid rgba(255,255,255,.1)}
.logo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--sec),var(--sec-d));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;box-shadow:0 4px 20px rgba(255,143,0,.3)}
.side-head h2{font-size:16px;font-weight:700;letter-spacing:.5px}
.side-head p{font-size:11px;opacity:.6;margin-top:2px}

.xp-panel{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.xp-level{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.xp-level .badge{background:var(--xp);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
.xp-level span{font-size:12px;opacity:.8}
.xp-bar-outer{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.xp-bar-inner{height:100%;background:linear-gradient(90deg,var(--xp),var(--xp-l));border-radius:4px;transition:width .6s ease}
.xp-numbers{display:flex;justify-content:space-between;font-size:10px;opacity:.5;margin-top:4px}

.achievements{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;flex-wrap:wrap;gap:6px}
.ach{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;position:relative;transition:.3s}
.ach.locked{background:rgba(255,255,255,.06);filter:grayscale(1) opacity(.3)}
.ach.unlocked{background:rgba(255,255,255,.15);box-shadow:0 0 12px rgba(124,77,255,.5);filter:none;animation:achPop .5s ease}
@keyframes achPop{0%{transform:scale(0.5)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.ach:hover::after{content:attr(data-tip);position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:#1a1a2e;padding:4px 8px;border-radius:6px;font-size:10px;white-space:nowrap;z-index:10}

.nav-items{flex:1;padding:8px 0;overflow-y:auto}
.nav-i{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:13px;transition:.12s;border-left:3px solid transparent}
.nav-i:hover{background:rgba(255,255,255,.06)}
.nav-i.act{background:rgba(255,255,255,.1);border-left-color:var(--sec)}
.nav-i .icon{width:24px;text-align:center;font-size:14px}
.nav-i .quest-status{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.quest-status.done{background:var(--acc);color:#fff}
.quest-status.active{background:var(--sec);color:#fff}

.ham{display:none;position:fixed;top:12px;left:12px;z-index:200;width:40px;height:40px;border-radius:10px;background:var(--pri);color:#fff;border:none;font-size:20px;cursor:pointer}

/* ── Main ── */
.main{margin-left:var(--side-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--card);padding:14px 32px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e8e8e8;position:sticky;top:0;z-index:50}
.topbar h3{font-size:15px;font-weight:600}
.topbar .chip{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--pri);color:#fff;font-weight:600}
.topbar .xp-chip{background:var(--xp);margin-left:auto;cursor:pointer;transition:.2s}
.topbar .xp-chip:hover{transform:scale(1.05)}

.content{flex:1;padding:32px;max-width:960px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── Hero ── */
.hero{background:linear-gradient(135deg,var(--pri),var(--pri-d));border-radius:var(--radius);padding:48px 40px;color:#fff;position:relative;overflow:hidden;margin-bottom:32px}
.hero::after{content:'🔬';position:absolute;right:30px;bottom:-10px;font-size:120px;opacity:.08}
.hero h1{font-size:32px;font-weight:800;margin-bottom:8px}
.hero p{font-size:15px;opacity:.85;max-width:560px;line-height:1.6}
.hero-stats{display:flex;gap:16px;margin-top:24px;flex-wrap:wrap}
.hero-stat{background:rgba(255,255,255,.12);border-radius:10px;padding:12px 20px;min-width:140px;transition:.2s;cursor:default}
.hero-stat:hover{background:rgba(255,255,255,.2);transform:translateY(-2px)}
.hero-stat strong{display:block;font-size:20px}.hero-stat span{font-size:11px;opacity:.7}

/* ── Skill Tree ── */
.skill-tree{background:var(--card);border-radius:var(--radius);padding:28px;margin-bottom:28px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.skill-tree h3{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.skill-tracks{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
.track{border:2px solid #e8e8e8;border-radius:10px;padding:16px;text-align:center;transition:.3s;cursor:pointer}
.track:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.track.active{border-color:var(--pri);background:rgba(21,101,192,.04)}
.track.completed{border-color:var(--acc);background:rgba(0,200,83,.04)}
.track .track-icon{font-size:28px;margin-bottom:8px}
.track h4{font-size:13px;font-weight:600;margin-bottom:4px}
.track .track-prog{height:6px;background:#e8e8e8;border-radius:3px;margin-top:8px;overflow:hidden}
.track .track-prog-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.track.active .track-prog-fill{background:linear-gradient(90deg,var(--pri),var(--pri-l))}
.track.completed .track-prog-fill{background:linear-gradient(90deg,var(--acc),#69f0ae)}
.track .track-pct{font-size:11px;color:var(--muted);margin-top:4px;font-weight:600}

/* ── Cards ── */
.card{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.card h3{font-size:16px;margin-bottom:12px}

/* ── Section blocks ── */
.sec{border-radius:10px;padding:20px 24px;margin-bottom:16px}
.sec h4{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec ul{list-style:none;padding-left:4px}.sec li{padding:4px 0;font-size:13px;line-height:1.5}
.sec.objectives{background:#e3f2fd;border-left:4px solid var(--pri)}
.sec.objectives li::before{content:'🎯 '}
.sec.concepts{background:#fff3e0;border-left:4px solid var(--sec)}
.sec.concepts li::before{content:'💡 '}
.sec.quest{background:#e8f5e9;border-left:4px solid var(--acc)}
.sec.boss{background:linear-gradient(135deg,#fce4ec,#fff3e0);border-left:4px solid #e53935}
.sec.ai-tool{background:#ede7f6;border-left:4px solid var(--xp)}
.sec.ai-tool li::before{content:'🤖 '}
.sec.assess{background:#fff8e1;border-left:4px solid var(--sec-d)}
.sec.assess li::before{content:'• '}
.sec.tips{background:#e0f7fa;border-left:4px solid #00acc1}
.sec.tips li::before{content:'💎 '}

/* ── Interactive Checklist ── */
.checklist{list-style:none;padding:0}
.check-item-wrap{margin:4px 0}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:.2s;user-select:none}
.check-item:hover{background:rgba(0,0,0,.04)}
.check-item.checked{opacity:.6}
.check-item.checked .check-text{text-decoration:line-through}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid #bdbdbd;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.3s;margin-top:1px}
.check-item.checked .check-box{background:var(--acc);border-color:var(--acc);color:#fff}
.check-text{font-size:13px;line-height:1.5;flex:1}
.guide-toggle{width:22px;height:22px;border-radius:50%;border:none;background:var(--pri);color:#fff;font-size:12px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;margin-top:1px;font-weight:700;font-family:var(--font)}
.guide-toggle:hover{background:var(--pri-d);transform:scale(1.1)}
.guide-panel{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;margin:0 12px;border-radius:0 0 10px 10px}
.guide-panel.open{max-height:800px;padding:14px 16px;background:rgba(21,101,192,.04);border:1px solid rgba(21,101,192,.12);border-top:none;border-radius:0 0 10px 10px;margin-bottom:4px}
.guide-panel h5{font-size:12px;font-weight:700;color:var(--pri-d);margin-bottom:6px}
.guide-panel p{font-size:12px;line-height:1.6;color:#444;margin-bottom:8px}
.guide-panel .guide-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--pri);text-decoration:none;font-weight:600;padding:4px 10px;background:rgba(21,101,192,.08);border-radius:6px;margin:2px 4px 2px 0;transition:.15s}
.guide-panel .guide-link:hover{background:rgba(21,101,192,.15)}
.guide-panel .guide-example{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px;margin:8px 0;font-size:12px;line-height:1.6;color:#555;font-style:italic}
.guide-panel .guide-example strong{color:var(--txt);font-style:normal}
.guide-panel .guide-img{width:100%;border-radius:8px;margin:8px 0;border:1px solid #e0e0e0}
.xp-reward{display:inline-block;background:var(--xp);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;margin-left:8px}
.xp-reward.boss-xp{background:#e53935}
.xp-reward.assess-xp{background:var(--sec-d)}

/* ── Diagram ── */
.cycle-diagram{display:flex;justify-content:center;margin:20px 0}
.cycle-diagram svg{max-width:100%;height:auto}
.resource-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin:12px 0}
.resource-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px;transition:.2s;cursor:pointer;text-decoration:none;color:var(--txt)}
.resource-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.resource-card .rc-icon{font-size:24px;margin-bottom:6px}
.resource-card h5{font-size:13px;font-weight:600;margin-bottom:2px}
.resource-card p{font-size:11px;color:var(--muted);line-height:1.4}

/* ── Progress ring on quest header ── */
.quest-progress{display:flex;align-items:center;gap:8px;margin-top:8px}
.quest-prog-bar{flex:1;height:8px;background:rgba(0,0,0,.08);border-radius:4px;overflow:hidden}
.quest-prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),#69f0ae);border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.quest-prog-text{font-size:11px;font-weight:700;color:var(--acc-d);min-width:40px;text-align:right}

/* ── Quiz ── */
.quiz-container{margin-top:12px}
.quiz-q{background:var(--card);border:2px solid #e8e8e8;border-radius:10px;padding:20px;margin-bottom:16px;transition:.3s}
.quiz-q.correct{border-color:var(--acc);background:rgba(0,200,83,.04)}
.quiz-q.wrong{border-color:#e53935;background:rgba(229,57,53,.04)}
.quiz-q h5{font-size:14px;margin-bottom:12px;font-weight:600}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:4px 0;border-radius:8px;border:2px solid #e8e8e8;cursor:pointer;transition:.2s;font-size:13px}
.quiz-opt:hover{border-color:var(--pri-l);background:rgba(21,101,192,.03)}
.quiz-opt.selected{border-color:var(--pri);background:rgba(21,101,192,.06);font-weight:600}
.quiz-opt.correct-answer{border-color:var(--acc);background:rgba(0,200,83,.08)}
.quiz-opt.wrong-answer{border-color:#e53935;background:rgba(229,57,53,.06)}
.quiz-opt .opt-marker{width:20px;height:20px;border-radius:50%;border:2px solid #bdbdbd;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:.2s}
.quiz-opt.selected .opt-marker{border-color:var(--pri);background:var(--pri);color:#fff}
.quiz-opt.correct-answer .opt-marker{border-color:var(--acc);background:var(--acc);color:#fff}
.quiz-opt.wrong-answer .opt-marker{border-color:#e53935;background:#e53935;color:#fff}
.quiz-feedback{margin-top:8px;padding:8px 12px;border-radius:6px;font-size:12px;font-weight:600;display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.correct{background:rgba(0,200,83,.1);color:var(--acc-d)}
.quiz-feedback.wrong{background:rgba(229,57,53,.1);color:#c62828}
.quiz-btn{padding:10px 28px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;font-family:var(--font);margin-top:12px}
.quiz-btn.submit{background:var(--pri);color:#fff}.quiz-btn.submit:hover{background:var(--pri-d)}
.quiz-btn:disabled{opacity:.4;cursor:not-allowed}
.quiz-score{text-align:center;padding:24px;background:linear-gradient(135deg,var(--xp),var(--xp-l));border-radius:12px;color:#fff;margin-top:16px}
.quiz-score h4{font-size:20px;margin-bottom:4px}
.quiz-score p{opacity:.8;font-size:13px}

/* ── Toast ── */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 20px;border-radius:10px;color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;animation:toastIn .4s ease,toastOut .4s ease forwards;animation-delay:0s,2.5s;box-shadow:0 4px 20px rgba(0,0,0,.2);pointer-events:auto}
.toast.xp{background:linear-gradient(135deg,var(--xp),#651fff)}
.toast.ach{background:linear-gradient(135deg,var(--sec),var(--sec-d))}
.toast.level{background:linear-gradient(135deg,#e53935,#ff6f00)}
.toast.info{background:linear-gradient(135deg,var(--pri),var(--pri-d))}
@keyframes toastIn{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:none}}
@keyframes toastOut{from{opacity:1;transform:none}to{opacity:0;transform:translateX(100px)}}

/* ── Level Up Overlay ── */
.levelup-overlay{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);opacity:0;pointer-events:none;transition:opacity .3s}
.levelup-overlay.show{opacity:1;pointer-events:auto}
.levelup-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:20px;padding:48px;text-align:center;color:#fff;transform:scale(.8);transition:transform .4s cubic-bezier(.34,1.56,.64,1);max-width:400px}
.levelup-overlay.show .levelup-card{transform:scale(1)}
.levelup-card .lvl-icon{font-size:64px;margin-bottom:16px;animation:lvlBounce 1s ease infinite}
@keyframes lvlBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.levelup-card h2{font-size:28px;margin-bottom:4px;background:linear-gradient(90deg,var(--sec-l),var(--sec));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.levelup-card p{opacity:.7;font-size:14px;margin-bottom:24px}
.levelup-card button{padding:12px 36px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--xp),var(--xp-l));color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;font-family:var(--font)}
.levelup-card button:hover{transform:scale(1.05)}

/* ── Confetti ── */
.confetti-piece{position:fixed;z-index:10001;width:8px;height:8px;border-radius:2px;pointer-events:none;animation:confettiFall 3s ease-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* ── Schedule ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:var(--pri);color:#fff;font-weight:600}
td{padding:10px 12px;border-bottom:1px solid #eee}
tr:hover td{background:rgba(21,101,192,.03)}
tr{cursor:pointer;transition:.15s}
.pill{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;color:#fff}
.pill.quest{background:var(--acc)}.pill.boss{background:#e53935}.pill.skill{background:var(--xp)}.pill.midterm{background:var(--sec)}.pill.final{background:var(--sec-d)}.pill.quiz{background:var(--pri)}

/* ── Nav Buttons ── */
.nav-btns{display:flex;justify-content:space-between;margin-top:28px;gap:12px}
.nav-btn{padding:10px 24px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;font-family:var(--font)}
.nav-btn.prev{background:#e8e8e8;color:var(--txt)}.nav-btn.prev:hover{background:#d5d5d5}
.nav-btn.next{background:var(--pri);color:#fff}.nav-btn.next:hover{background:var(--pri-d)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── Leaderboard ── */
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--card);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:8px;transition:.2s}
.lb-row:hover{transform:translateX(4px)}
.lb-row.you{border:2px solid var(--xp);background:rgba(124,77,255,.04)}
.lb-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.lb-rank.g{background:linear-gradient(135deg,#ffd700,#ffb300)}.lb-rank.s{background:linear-gradient(135deg,#bdbdbd,#9e9e9e)}.lb-rank.b{background:linear-gradient(135deg,#cd7f32,#a0522d)}
.lb-rank.n{background:#e0e0e0;color:#666}
.lb-name{flex:1;font-size:13px;font-weight:500}
.lb-xp{font-size:12px;color:var(--xp);font-weight:700}
.lb-bar{flex:1;height:6px;background:#e8e8e8;border-radius:3px;overflow:hidden;max-width:120px}
.lb-bar-fill{height:100%;background:linear-gradient(90deg,var(--xp),var(--xp-l));border-radius:3px;transition:width .8s ease}

/* ── Reset Button ── */
.reset-btn{padding:6px 16px;border-radius:8px;border:2px solid #e53935;background:transparent;color:#e53935;font-size:11px;font-weight:600;cursor:pointer;transition:.2s;font-family:var(--font)}
.reset-btn:hover{background:#e53935;color:#fff}

/* ── Responsive ── */
@media(max-width:768px){
  .side{transform:translateX(-100%);transition:.3s}.side.open{transform:none}
  .ham{display:flex;align-items:center;justify-content:center}
  .main{margin-left:0}.content{padding:20px 16px}
  .hero{padding:32px 24px}.hero h1{font-size:24px}
  .hero-stats{gap:10px}.hero-stat{min-width:120px;padding:10px 14px}
  .skill-tracks{grid-template-columns:1fr 1fr}
  .topbar{padding:14px 16px 14px 56px}
  .toast-container{right:10px;left:10px}
}
</style>
</head>
<body>

<button class="ham" onclick="toggleNav()">☰</button>

<div class="toast-container" id="toasts"></div>

<div class="levelup-overlay" id="levelup">
  <div class="levelup-card">
    <div class="lvl-icon">🏆</div>
    <h2 id="lvl-up-title">Level Up!</h2>
    <p id="lvl-up-desc">You've reached a new rank</p>
    <button onclick="closeLevelUp()">Continue Quest →</button>
  </div>
</div>

<aside class="side" id="side">
  <div class="side-head">
    <div class="logo">🔬</div>
    <h2>Research Quest</h2>
    <p>Master the Art of Research</p>
  </div>
  <div class="xp-panel">
    <div class="xp-level">
      <span class="badge" id="lvl-badge">Lvl 1</span>
      <span id="lvl-title">Research Intern</span>
    </div>
    <div class="xp-bar-outer"><div class="xp-bar-inner" id="xp-bar" style="width:0%"></div></div>
    <div class="xp-numbers"><span id="xp-cur">0 XP</span><span id="xp-next">/ 500 XP</span></div>
  </div>
  <div class="achievements" id="ach-row"></div>
  <nav class="nav-items" id="nav"></nav>
</aside>

<div class="main">
  <div class="topbar">
    <h3 id="topbar-title">Overview</h3>
    <span class="chip" id="topbar-chip">16 Weeks</span>
    <span class="chip xp-chip" id="topbar-xp" title="Click to view stats">0 XP</span>
  </div>

  concepts:['Research is a systematic inquiry designed to discover new knowledge or validate existing findings','The lifecycle is iterative — findings often loop back to generate new questions','Integrity is the foundation: fabrication, falsification, and plagiarism are career-ending','Your ORCID and researcher profile are your academic identity'],
  diagram:`<div class="card"><h3>🔄 The Research Lifecycle</h3><p style="font-size:13px;color:var(--muted);margin-bottom:16px">Research is not a straight line — it is a cycle. Each phase feeds into the next, and findings often loop back to generate new questions.</p><div class="cycle-diagram"><svg viewBox="0 0 600 400" width="600" height="400" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/></marker></defs><ellipse cx="300" cy="200" rx="220" ry="150" fill="none" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="8,4"/><g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600"><circle cx="300" cy="50" r="36" fill="#1565c0"/><text x="300" y="46" text-anchor="middle" fill="#fff">💡</text><text x="300" y="60" text-anchor="middle" fill="#fff" font-size="10">Ideation</text><circle cx="480" cy="110" r="36" fill="#ff8f00"/><text x="480" y="106" text-anchor="middle" fill="#fff">💰</text><text x="480" y="120" text-anchor="middle" fill="#fff" font-size="10">Funding</text><circle cx="520" cy="250" r="36" fill="#7c4dff"/><text x="520" y="246" text-anchor="middle" fill="#fff">📚</text><text x="520" y="260" text-anchor="middle" fill="#fff" font-size="10">Literature</text><circle cx="420" cy="360" r="36" fill="#00c853"/><text x="420" y="356" text-anchor="middle" fill="#fff">🔬</text><text x="420" y="370" text-anchor="middle" fill="#fff" font-size="10">Methods</text><circle cx="180" cy="360" r="36" fill="#e53935"/><text x="180" y="356" text-anchor="middle" fill="#fff">📊</text><text x="180" y="370" text-anchor="middle" fill="#fff" font-size="10">Analysis</text><circle cx="80" cy="250" r="36" fill="#00acc1"/><text x="80" y="246" text-anchor="middle" fill="#fff">📝</text><text x="80" y="260" text-anchor="middle" fill="#fff" font-size="10">Writing</text><circle cx="120" cy="110" r="36"   quest:{title:'Create Your Researcher Profile',xp:50,desc:'Set up your academic identity and research journal.',
    reqs:['Create an ORCID account and note your ID','Write a 200-word research interest statement','Identify 3 potential research areas you want to explore','Set up a digital research journal (Notion, OneNote, or similar)','Map out where you are in the research lifecycle'],
    guidance:[
      `<h5>What is ORCID?</h5><p>ORCID (Open Researcher and Contributor ID) is a free, unique identifier for researchers — like a social security number for your academic career. It connects you to all your publications, grants, and reviews regardless of name changes or institutional moves.</p><p><strong>How to create one:</strong></p><p>1. Go to <a class="guide-link" href="https://orcid.org/register" target="_blank">orcid.org/register</a><br>2. Fill in your name and email<br>3. Set your visibility preferences (recommended: "Everyone" for name, "Trusted" for email)<br>4. Your ORCID will look like: <strong>0000-0002-1234-5678</strong></p><p>You will use this ORCID on every grant application, journal submission, and academic profile from now on.</p>`,
      `<h5>How to Write a Research Interest Statement</h5><p>A research interest statement is a brief summary of what you study, why it matters, and where you want to go. Think of it as your "elevator pitch" for your academic identity.</p><div class="guide-example"><strong>Example (Education Technology):</strong><br><br>"My research interests center on how artificial intelligence can personalize learning experiences for undergraduate students in STEM disciplines. I am particularly interested in adaptive learning platforms that respond to individual student misconceptions in real-time. Drawing on my background in computer science and cognitive psychology, I aim to develop AI tutoring systems that are equitable across diverse student populations. My long-term goal is to reduce achievement gaps in introductory physics and mathematics courses through technology-enhanced instruction."</div><p><strong>Structure to follow:</strong> (1) What you study, (2) Your specific focus area, (3) Your background/approach, (4) Your long-term vision.</p>`,
      `<h5>How to Identify Research Areas</h5><p>Think about problems that fascinate you. Good research areas sit at the intersection of:</p><p>• <strong>Your passion</strong> — What keeps you up at night thinking?<br>• <strong>Your skills</strong> — What methods or knowledge do you already have?<br>• <strong>Real-world need</strong> — Who benefits from answers to these questions?</p><div class="guide-example"><strong>Example brainstorm:</strong><br>1. "How does social media affect adolescent mental health?" (Psychology + Public Health)<br>2. "Can machine learning predict crop failures earlier?" (CS + Agriculture)<br>3. "What teaching methods work best for first-generation college students?" (Education + Equity)</div><p>Try browsing recent issues of top journals in your field to see what topics are trending.</p>`,
      `<h5>Setting Up Your Digital Research Journal</h5><p>A research journal is your personal knowledge base — a place to capture ideas, notes, summaries, and reflections. Pick a tool and stick with it:</p><p><a class="guide-link" href="https://www.notion.so" target="_blank">📓 Notion</a> <a class="guide-link" href="https://www.onenote.com" target="_blank">📝 OneNote</a> <a class="guide-link" href="https://obsidian.md" target="_blank">📋 Obsidian</a></p><p><strong>Suggested structure:</strong></p><p>📁 <strong>Research Journal</strong><br>&nbsp;&nbsp;📁 Ideas & Questions<br>&nbsp;&nbsp;📁 Literature Notes<br>&nbsp;&nbsp;📁 Methods & Techniques<br>&nbsp;&nbsp;📁 Weekly Reflections<br>&nbsp;&nbsp;📁 Meeting Notes<br>&nbsp;&nbsp;📁 Grant Ideas</p><p>Commit to writing in it at least once a week. The most valuable ideas come from reviewing old notes months later.</p>`,
      `<h5>Mapping Your Position in the Research Lifecycle</h5><p>Look at the research lifecycle diagram above and honestly assess where you are. Most new researchers are at the <strong>Ideation</strong> stage, but you may have some experience in other phases.</p><div class="guide-example"><strong>Example self-assessment:</strong><br><br>✅ <strong>Ideation:</strong> I have several questions I'm curious about<br>⚠️ <strong>Funding:</strong> I've never applied for a grant<br>⚠️ <strong>Literature:</strong> I've read some papers but never done a systematic review<br>❌ <strong>Methods:</strong> I need to learn research design<br>❌ <strong>Analysis:</strong> Basic stats knowledge only<br>❌ <strong>Writing:</strong> Never written a research paper<br>❌ <strong>Publication:</strong> No experience with journals</div><p>This honest assessment will help you focus your energy on the areas where you need the most growth throughout this course.</p>`
    ]},

  tips:['Start building your network from day one — attend seminars, join research groups','Keep a "questions journal" — great research starts with great questions']},
{n:2,title:'Finding Your Research Question',badge:null,
  objectives:['Develop skills to identify meaningful research gaps','Learn to refine broad topics into specific, testable questions','Understand feasibility assessment for research projects'],
  topics:['From curiosity to research question','The FINER framework (Feasible, Interesting, Novel, Ethical, Relevant)','Narrowing your scope: too broad vs. too narrow','Preliminary literature scanning','Identifying gaps in existing knowledge'],
  concepts:['A good research question is specific enough to answer but broad enough to matter','FINER criteria help evaluate whether a question is worth pursuing','Preliminary scanning saves months of wasted effort on already-answered questions','Your question should excite you — passion sustains long research projects'],
  quest:{title:'Forge Your Research Question',xp:75,desc:'Develop and refine a research question using the FINER framework.',reqs:['Brainstorm 10 potential research questions in your area of interest','Apply the FINER framework to each — score them 1-5 on each criterion','Select your top 3 and do a quick literature scan (15 min each)','Refine your #1 choice into a specific, testable research question','Write a 1-page justification for why this question matters'],
    guidance:[
      `<h5>Brainstorming Research Questions</h5><p>Great questions come from observing problems, reading widely, and talking to people. Try these brainstorming techniques:</p><p><strong>The "So What?" Ladder:</strong> Start with an observation, then keep asking "so what?" until you reach something meaningful.</p><div class="guide-example"><strong>Example:</strong><br>"Students struggle with online learning" → So what? → "They perform worse on exams" → So what? → "Graduation rates drop" → So what? → <strong>"What instructional design strategies improve learning outcomes in asynchronous online STEM courses?"</strong></div><p><strong>Other techniques:</strong> Mind mapping, reading review articles for "future directions" sections, talking to practitioners in the field.</p>`,
      `<h5>The FINER Framework</h5><p>Score each question 1-5 on these criteria:</p><p>🟢 <strong>F — Feasible:</strong> Can you actually do this with your time, money, skills, and access to participants?<br>🔵 <strong>I — Interesting:</strong> Will this engage you for months/years? Will others care about the results?<br>🟡 <strong>N — Novel:</strong> Does this add something new? A new finding, method, or perspective?<br>🔴 <strong>E — Ethical:</strong> Can this be done without harming participants or violating standards?<br>🟣 <strong>R — Relevant:</strong> Does this matter to your field, to policy, or to society?</p><div class="guide-example"><strong>Scoring Example:</strong><br>Question: "Does mindfulness meditation reduce test anxiety in nursing students?"<br>F: 4/5 — feasible with university sample<br>I: 4/5 — growing interest in student wellness<br>N: 3/5 — some studies exist, but not in nursing<br>E: 5/5 — low risk, standard IRB<br>R: 5/5 — nursing retention is a national concern<br><strong>Total: 21/25 — Strong candidate!</strong></div>`,
      `<h5>Quick Literature Scanning</h5><p>Spend exactly 15 minutes per question to check if it has already been answered. Use these tools:</p><p><a class="guide-link" href="https://scholar.google.com" target="_blank">🔍 Google Scholar</a> <a class="guide-link" href="https://pubmed.ncbi.nlm.nih.gov" target="_blank">🏥 PubMed</a> <a class="guide-link" href="https://www.semanticscholar.org" target="_blank">🤖 Semantic Scholar</a></p><p><strong>Quick scan checklist:</strong><br>1. Search your question as a phrase<br>2. Search key terms combined with AND<br>3. Look at the first 20 results — are there already reviews on this topic?<br>4. Check dates — is this actively being studied or abandoned?</p><p>If you find 100+ papers already answering your question, narrow your focus. If you find 0, your question may be too specific or too novel (both need investigation).</p>`,
      `<h5>Refining Into a Testable Question</h5><p>A testable question has <strong>clear variables</strong> and an <strong>implied method</strong>. Use the PICO framework for structure:</p><p><strong>P</strong> — Population: Who are you studying?<br><strong>I</strong> — Intervention/Exposure: What is being done or examined?<br><strong>C</strong> — Comparison: What are you comparing it to?<br><strong>O</strong> — Outcome: What are you measuring?</p><div class="guide-example"><strong>Before:</strong> "How does technology affect learning?"<br><strong>After (PICO):</strong> "Among first-year biology students (P), does the use of AI-powered tutoring systems (I) compared to traditional office hours (C) improve exam scores and course completion rates (O)?"</div>`,
      `<h5>Writing Your Justification</h5><p>Your 1-page justification should answer four questions:</p><p>1. <strong>What is the problem?</strong> (2-3 sentences with citations)<br>2. <strong>Why hasn't it been solved?</strong> (What gap exists?)<br>3. <strong>Why does your approach work?</strong> (What's different about your question?)<br>4. <strong>Who benefits?</strong> (Impact statement)</p><div class="guide-example"><strong>Example opening:</strong><br>"Despite $2.3 billion invested in educational technology annually, first-generation college students continue to underperform peers by 15% on standardized assessments (Smith, 2024). Current interventions focus on content delivery but overlook the role of adaptive feedback in building academic self-efficacy. This study addresses that gap by..."</div>`
    ]},
  boss:null,ai:null,assess:null,
  tips:['Talk to people outside your field — interdisciplinary conversations spark the best questions','If your question can be answered with a simple Google search, it is not a research question']},

  quest:{title:'Map the Funding Landscape',xp:100,desc:'Research and catalog funding opportunities relevant to your field.',reqs:['Identify 5 federal funding agencies relevant to your research area','Find 3 private foundations that fund work in your domain','Create a funding calendar with deadlines for the next 12 months','Research one program officer and draft a 150-word introductory email','Compare grant mechanisms: create a table of eligibility, amount, and duration'],
    guidance:[
      `<h5>Major Federal Funding Agencies</h5><p>Here are the primary US federal agencies that fund research. Most fields have 2-3 relevant agencies:</p><p>🏛️ <strong>NSF</strong> — Science, engineering, education, social sciences ($8B/year)<br>🏥 <strong>NIH</strong> — Health and biomedical research ($47B/year — the biggest funder)<br>⚡ <strong>DOE</strong> — Energy, physics, materials science, computing<br>🛡️ <strong>DoD (DARPA, ONR, AFOSR)</strong> — Defense-related research, also basic science<br>📚 <strong>NEH/NEA</strong> — Humanities, arts, cultural research<br>🌍 <strong>NASA</strong> — Space, earth science, aeronautics<br>📊 <strong>IES</strong> — Education research specifically<br>🌾 <strong>USDA/NIFA</strong> — Agriculture, food science, rural development</p><p><a class="guide-link" href="https://www.nsf.gov/funding/" target="_blank">Browse NSF</a> <a class="guide-link" href="https://reporter.nih.gov" target="_blank">Browse NIH</a></p>`,
      `<h5>Finding Private Foundations</h5><p>Private foundations often fund more niche topics and can be less competitive than federal grants. Key tools:</p><p><a class="guide-link" href="https://fconline.foundationcenter.org" target="_blank">📋 Foundation Directory Online</a> (may need library access)<br><a class="guide-link" href="https://www.grantforward.com" target="_blank">🔍 GrantForward</a> (university subscription)<br><a class="guide-link" href="https://spin.infoedglobal.com" target="_blank">🔄 SPIN</a> (university subscription)</p><div class="guide-example"><strong>Example foundations by field:</strong><br>• Health: Robert Wood Johnson, Gates Foundation, Wellcome Trust<br>• Education: Spencer Foundation, Carnegie Corporation, Lumina Foundation<br>• Technology: Alfred P. Sloan, Moore Foundation, Simons Foundation<br>• Social Justice: Ford Foundation, MacArthur Foundation, Open Society</div>`,
      `<h5>Creating a Funding Calendar</h5><p>Most grants have fixed annual deadlines. Missing a deadline by even one minute means waiting another year. Create a spreadsheet or calendar with:</p><div class="guide-example"><strong>Calendar columns:</strong><br>| Funder | Program | Deadline | Amount | Duration | Eligibility | Status |<br>| NSF | CAREER | July 26 | $500K | 5 yr | Jr faculty | Planning |<br>| NIH | R21 | Feb 16, Jun 16, Oct 16 | $275K | 2 yr | Any PI | Drafting |<br>| Spencer | Small Grant | Rolling | $50K | 1-2 yr | Any | Ready |</div><p><strong>Pro tip:</strong> Work backwards from deadlines. Most proposals need 3-6 months of preparation, plus internal review time. Mark "start writing" dates too.</p>`,
      `<h5>Contacting a Program Officer</h5><p>Program officers <strong>want to hear from you</strong> — it is literally their job to connect researchers with funding. A brief introductory email can save you months of work on a mismatched proposal.</p><div class="guide-example"><strong>Example email:</strong><br><br>Subject: Pre-submission inquiry — [Program Name]<br><br>Dear Dr. [Name],<br><br>I am an assistant professor of [field] at [institution], and I am writing to inquire about the fit of my proposed research with the [specific program name].<br><br>My project investigates [1-2 sentences about your research question]. The proposed work would [1 sentence about approach] and contribute to [1 sentence about impact].<br><br>Would this topic fall within the scope of [program name]? I would welcome any guidance on the most appropriate program or mechanism for this work.<br><br>Thank you for your time.<br>Best regards, [Your name]</div>`,
      `<h5>Comparing Grant Mechanisms</h5><p>Different mechanisms serve different career stages and project sizes. Here's a quick comparison for NIH:</p><div class="guide-example"><strong>NIH mechanism comparison:</strong><br>| Mechanism | Who | Amount | Duration | Purpose |<br>|-----------|-----|--------|----------|---------|<br>| F31/F32 | Pre/Postdoc | $50-60K/yr | 2-3 yr | Training fellowship |<br>| K99/R00 | Postdoc→Faculty | $100K/yr | 5 yr | Career transition |<br>| R21 | Any PI | $275K total | 2 yr | Exploratory/pilot |<br>| R01 | Established | $250K/yr | 3-5 yr | Major research project |<br>| R15 (AREA) | PUI faculty | $300K total | 3 yr | Undergrad institutions |<br><br><strong>NSF equivalents:</strong><br>• CAREER ($500K, 5yr) — Jr faculty, combines research + education<br>• Standard Grant — varies by program<br>• EAGER — high-risk exploratory ($50-300K)</div>`
    ]},

  quest:{title:'The Grant Hunter Quest',xp:100,desc:'Find and evaluate real grant opportunities for your research.',reqs:['Search Grants.gov using at least 3 different keyword strategies','Find one open RFP that matches your research question','Annotate the RFP: highlight evaluation criteria, eligibility, and key dates','Score your research fit against the RFP on a scale of 1-10 for each criterion','Create a 1-page "go/no-go" decision document for the opportunity'],
    guidance:[
      `<h5>Searching Grants.gov Effectively</h5><p>Grants.gov is the single largest portal for federal grants, but its search can be tricky. Try multiple strategies:</p><p><a class="guide-link" href="https://www.grants.gov/search-grants" target="_blank">🔍 Open Grants.gov Search</a></p><p><strong>Strategy 1 — Broad keywords:</strong> Use your field name + "research" (e.g., "education research")<br><strong>Strategy 2 — Specific terms:</strong> Use your method or topic (e.g., "machine learning STEM")<br><strong>Strategy 3 — Agency filter:</strong> Select your target agency and browse open opportunities<br><strong>Strategy 4 — CFDA codes:</strong> Use Catalog of Federal Domestic Assistance codes for precise matches</p><p><strong>Pro tip:</strong> Grants.gov search is limited. Also search directly on agency sites: <a class="guide-link" href="https://www.nsf.gov/funding/" target="_blank">NSF</a>, <a class="guide-link" href="https://grants.nih.gov/funding/searchguide/index.htm" target="_blank">NIH Guide</a></p>`,
      `<h5>Finding an RFP That Matches</h5><p>An RFP (Request for Proposals) or FOA (Funding Opportunity Announcement) describes exactly what the funder wants. Look for these signals of good fit:</p><p>✅ Your topic is explicitly mentioned in the program description<br>✅ Your methods align with what they are seeking<br>✅ You meet all eligibility criteria<br>✅ The budget range matches your needs<br>✅ The timeline works for your research</p><p>🚩 <strong>Red flags of poor fit:</strong> Needing to reshape your project significantly, borderline eligibility, budget too small for your scope.</p>`,
      `<h5>Reading an RFP Like a Pro</h5><p>RFPs are dense legal documents. Here's what to highlight and annotate:</p><div class="guide-example"><strong>Critical sections to annotate:</strong><br>🔴 <strong>Eligibility</strong> — Who can apply? PI requirements? Institution type?<br>🟡 <strong>Evaluation Criteria</strong> — How will proposals be scored? What weight per section?<br>🟢 <strong>Budget</strong> — Max amount? Duration? Allowed costs? Cost-sharing?<br>🔵 <strong>Key Dates</strong> — LOI deadline, full proposal deadline, start date<br>🟣 <strong>Page Limits</strong> — These are strict. Going over = desk reject.<br>⚫ <strong>Required Components</strong> — Every document they want (bio, data plan, letters, etc.)</div><p>Print it out and use colored highlighters. You will reference this document constantly.</p>`,
      `<h5>Scoring Your Fit</h5><p>Create a simple fit matrix. Score yourself honestly — a low score now saves months of wasted writing later.</p><div class="guide-example"><strong>Fit Assessment Matrix:</strong><br>| Criterion | Score (1-10) | Notes |<br>|-----------|:---:|-------|<br>| Topic alignment | 8 | Core topic matches well |<br>| Methods match | 6 | Need to add survey component |<br>| Eligibility | 10 | Meet all criteria |<br>| Budget fit | 7 | Slightly under max |<br>| Team expertise | 5 | Need a stats collaborator |<br>| Preliminary data | 4 | Limited pilot data |<br>| <strong>Average</strong> | <strong>6.7</strong> | <strong>Worth pursuing with prep work</strong> |</div><p><strong>Rule of thumb:</strong> Average ≥ 7 = strong fit. 5-7 = consider with modifications. Below 5 = look elsewhere.</p>`,
      `<h5>The Go/No-Go Decision</h5><p>Before investing 100+ hours writing a proposal, make a formal decision. Your go/no-go document should cover:</p><div class="guide-example"><strong>Go/No-Go Template:</strong><br><br><strong>Opportunity:</strong> [Program name, agency, deadline]<br><strong>Fit Score:</strong> [Your average from the matrix]<br><br><strong>GO Factors:</strong><br>• Strong topic alignment<br>• We have preliminary data<br>• Collaborators confirmed<br><br><strong>NO-GO Factors:</strong><br>• Limited budget for needed equipment<br>• PI needs more publications in this area<br><br><strong>Resources Needed:</strong><br>• 3 months writing time, stats consultant, 2 letters of support<br><br><strong>DECISION: GO / NO-GO / WAIT FOR NEXT CYCLE</strong></div>`
    ]},

{n:5,title:'Grant Writing: Narrative & Structure',badge:'Quiz 1',
  objectives:['Master the structure of a winning grant proposal','Write compelling specific aims and project narratives','Understand what reviewers look for and how scoring works'],
  topics:['Anatomy of a grant proposal: cover page, abstract, specific aims, narrative, budget, bios','The Specific Aims page — the most important page you will write','Writing a compelling project narrative: significance, innovation, approach','Addressing reviewer concerns proactively','Common mistakes that sink proposals'],
  concepts:['Reviewers spend 30-60 minutes on your proposal — make every sentence count','The Specific Aims page is your elevator pitch: problem → gap → your solution → impact','Significance answers "why should we care?", Innovation answers "what is new?", Approach answers "how will you do it?"','Write for a smart non-expert — your reviewer may not be in your exact subfield'],
  resources:[

  quest:{title:'Write Your Specific Aims',xp:150,desc:'Draft the most critical page of a grant proposal.',reqs:['Read 3 example Specific Aims pages from your field (search for funded examples)','Draft a Specific Aims page for your research question (1 page max)','Include: opening paragraph with hook, gap statement, 2-3 specific aims, impact statement','Have a colleague read it and provide feedback','Revise based on feedback — track what changed and why'],
    guidance:[
      `<h5>Where to Find Funded Specific Aims Examples</h5><p>Reading real funded proposals is the single best way to learn grant writing. Here's where to find them:</p><p><a class="guide-link" href="https://www.niaid.nih.gov/grants-contracts/sample-applications" target="_blank">📄 NIH NIAID Sample Apps</a> <a class="guide-link" href="https://reporter.nih.gov" target="_blank">🔍 NIH RePORTER</a></p><p><strong>Other sources:</strong><br>• Ask your mentor or department for successful proposals<br>• Your grants office may have a library of funded proposals<br>• Some universities post examples online (search "[your field] funded R01 example")<br>• NSF's award search shows abstracts of funded projects</p>`,
      `<h5>Specific Aims Structure</h5><p>The Specific Aims page follows a precise formula. Here's the structure most reviewers expect:</p><div class="guide-example"><strong>Paragraph 1 — The Hook (3-4 sentences):</strong><br>Open with the big-picture problem. Use a compelling statistic or statement that makes the reviewer care.<br><br><strong>Paragraph 2 — The Gap (2-3 sentences):</strong><br>"Despite [progress], a critical barrier remains..." Explain what we do NOT know.<br><br><strong>Paragraph 3 — Your Solution (2-3 sentences):</strong><br>"The long-term goal is... The objective of this proposal is... Our central hypothesis is..."<br><br><strong>The Aims (numbered):</strong><br>Aim 1: [Verb] [what] [how] — Hypothesis: ...<br>Aim 2: [Verb] [what] [how] — Hypothesis: ...<br>Aim 3: (if applicable)<br><br><strong>Final Paragraph — Impact (2-3 sentences):</strong><br>"The expected outcomes are... This work is significant because... This work is innovative because..."</div>`,
      `<h5>Writing a Strong Opening Hook</h5><p>Your opening paragraph determines whether the reviewer keeps reading with interest or obligation. Strong hooks:</p><div class="guide-example"><strong>🟢 Strong:</strong> "Pancreatic cancer kills 47,000 Americans annually and has a 5-year survival rate of just 11% — the lowest of any major cancer."<br><br><strong>🔴 Weak:</strong> "Cancer is a major health concern that affects many people worldwide."<br><br><strong>🟢 Strong:</strong> "Despite $2.1B invested in reading interventions since 2015, 65% of American fourth-graders still read below grade level."<br><br><strong>🔴 Weak:</strong> "Reading is an important skill for student success."</div><p><strong>Formula:</strong> Specific statistic + scope of problem + urgency = compelling hook</p>`,
      `<h5>Getting Effective Feedback</h5><p>Not all feedback is equal. Here's how to get useful feedback on your Aims page:</p><p><strong>Who to ask:</strong><br>• Someone IN your field (for scientific accuracy)<br>• Someone OUTSIDE your field (for clarity — if they can't follow it, neither can a reviewer)<br>• Someone who has written or reviewed grants before</p><p><strong>What to ask them:</strong><br>1. "After reading the first paragraph, do you understand why this matters?"<br>2. "Is the gap clearly stated?"<br>3. "Can you tell me what each aim will do without rereading?"<br>4. "What is the weakest part?"<br>5. "Would you fund this? Why or why not?"</p>`,
      `<h5>Tracking Your Revisions</h5><p>Revision tracking is a skill you will use throughout your career. For each revision:</p><p>1. Save the previous version with a date (e.g., "SpecificAims_v2_2024-03-15.docx")<br>2. Use Track Changes or a comparison tool<br>3. Keep a revision log:</p><div class="guide-example"><strong>Revision log example:</strong><br>| Feedback | Change Made | Reason |<br>|----------|-------------|--------|<br>| "Opening is too vague" | Added NCES statistic | More compelling hook |<br>| "Aim 2 is too ambitious" | Split into 2a and 2b | More feasible scope |<br>| "No mention of innovation" | Added innovation sentence | Addresses reviewer criterion |</div>`
    ]},

  tips:['Write the Specific Aims page first — everything else flows from it','Use strong verbs: "We will determine..." not "We hope to explore..."']},
{n:6,title:'Grant Writing: Budgets & Justification',badge:null,
  objectives:['Create realistic and defensible research budgets','Write budget justifications that strengthen your proposal','Understand direct costs, indirect costs, and cost-sharing'],
  topics:['Budget categories: personnel, equipment, supplies, travel, other, indirect','Salary calculations: effort, fringe benefits, annual increases','Equipment vs. supplies: the $5,000 threshold','Subcontracts and consultants','Budget justification: connecting every dollar to your aims','Cost-sharing: when and how to offer it'],
  concepts:['Your budget tells a story — it should reflect your methodology step by step','Indirect costs (F&A) are real institutional costs — do not ignore them','Reviewers flag budgets that are too high OR too low — both signal poor planning','Every budget line needs a justification tied to a specific aim or activity'],
  quest:{title:'Build Your Research Budget',xp:125,desc:'Create a complete budget for your proposed research project.',reqs:['Create a 2-year budget spreadsheet with all standard categories','Calculate personnel costs including fringe benefits for at least 2 positions','Justify every line item with a 1-2 sentence explanation tied to your aims','Calculate indirect costs using your institution\'s negotiated rate','Write a 1-page budget justification narrative','Total budget should be realistic for your field (research typical award sizes)'],
    guidance:[
      `<h5>Budget Categories Explained</h5><p>Every research budget uses these standard categories:</p><div class="guide-example"><strong>Standard Budget Template:</strong><br><br>📊 <strong>A. Personnel</strong> — Salaries for PI, co-PIs, postdocs, grad students, staff<br>📊 <strong>B. Fringe Benefits</strong> — Health insurance, retirement, FICA (rates set by your institution)<br>📊 <strong>C. Equipment</strong> — Single items over $5,000 (varies by institution)<br>📊 <strong>D. Travel</strong> — Conferences, fieldwork, collaboration visits<br>📊 <strong>E. Participant Support</strong> — Stipends, travel, subsistence for participants<br>📊 <strong>F. Other Direct Costs</strong><br>&nbsp;&nbsp;F1. Materials & Supplies — lab supplies, software licenses, printing<br>&nbsp;&nbsp;F2. Publication Costs — open access fees, page charges<br>&nbsp;&nbsp;F3. Consultant Services — expert consultants<br>&nbsp;&nbsp;F4. Subawards — work done at partner institutions<br>📊 <strong>G. Indirect Costs (F&A)</strong> — Facilities & administrative rate × modified total direct costs</div>`,
      `<h5>Calculating Personnel Costs</h5><p>Personnel is typically 60-80% of a research budget. Here's how to calculate:</p><div class="guide-example"><strong>Example calculation:</strong><br><br>PI (Dr. Smith) — 2 months summer salary<br>&nbsp;&nbsp;Annual salary: $95,000<br>&nbsp;&nbsp;Monthly rate: $95,000 / 12 = $7,917<br>&nbsp;&nbsp;2 months effort: $7,917 × 2 = <strong>$15,834</strong><br>&nbsp;&nbsp;Fringe (28%): $15,834 × 0.28 = <strong>$4,434</strong><br>&nbsp;&nbsp;Year 1 total: <strong>$20,268</strong><br>&nbsp;&nbsp;Year 2 (3% raise): $20,268 × 1.03 = <strong>$20,876</strong><br><br>Graduate Research Assistant — 50% time, 12 months<br>&nbsp;&nbsp;Stipend: $28,000 × 0.50 = <strong>$14,000</strong><br>&nbsp;&nbsp;Tuition remission: <strong>$12,500</strong><br>&nbsp;&nbsp;Fringe (8%): $14,000 × 0.08 = <strong>$1,120</strong></div><p><strong>Ask your grants office</strong> for current fringe benefit rates and minimum stipend requirements.</p>`,
      `<h5>Writing Budget Justifications</h5><p>Every dollar needs a reason tied to your specific aims. Use this formula:</p><p><strong>[Who/What] is needed to [do what activity] under [which Aim].</strong></p><div class="guide-example"><strong>Good justification examples:</strong><br><br>"A graduate research assistant (50% time, 12 months) will conduct participant interviews, code qualitative data, and assist with analysis under Aims 1 and 2."<br><br>"Travel funds ($1,500) support attendance at the American Educational Research Association annual meeting to present preliminary findings from Aim 1."<br><br>"Qualtrics survey license ($500/yr) is required to administer the validated assessment instrument under Aim 2."</div>`,
      `<h5>Understanding Indirect Costs (F&A)</h5><p>Indirect costs cover institutional overhead — lights, heat, admin support, libraries, etc. Your institution has a <strong>negotiated rate</strong> with the federal government.</p><p><strong>How to find your rate:</strong> Ask your grants/sponsored programs office. Typical rates are 40-60% of Modified Total Direct Costs (MTDC).</p><div class="guide-example"><strong>Calculation example:</strong><br>Total Direct Costs: $150,000<br>Minus exclusions (equipment, tuition, subawards over $25K): -$20,000<br>Modified Total Direct Costs (MTDC): $130,000<br>F&A Rate (52%): $130,000 × 0.52 = <strong>$67,600</strong><br><br><strong>Total project cost: $150,000 + $67,600 = $217,600</strong></div><p>Some foundations and internal grants do not allow indirect costs or cap them at 10-15%.</p>`,
      `<h5>The Budget Justification Narrative</h5><p>This is a 1-2 page document that tells the story of your budget. Structure it by category and connect everything to your research plan.</p><p><strong>Structure:</strong><br>1. <strong>Personnel</strong> — Describe each person's role and % effort<br>2. <strong>Equipment</strong> — Justify why existing equipment won't work<br>3. <strong>Travel</strong> — Specify conferences or fieldwork<br>4. <strong>Other</strong> — Connect each item to a specific aim<br>5. <strong>Indirect</strong> — State your negotiated rate</p>`,
      `<h5>Researching Typical Award Sizes</h5><p>Proposing too much or too little signals poor planning. Research typical awards:</p><p><a class="guide-link" href="https://reporter.nih.gov" target="_blank">🔍 NIH RePORTER</a> — Search funded projects to see actual award amounts<br><a class="guide-link" href="https://www.nsf.gov/awardsearch/" target="_blank">🔍 NSF Award Search</a> — View amounts for funded NSF projects</p><div class="guide-example"><strong>Typical ranges by mechanism:</strong><br>• Internal seed grant: $5K - $25K<br>• Foundation small grant: $10K - $50K<br>• NSF Standard Grant: $100K - $500K<br>• NIH R21 (exploratory): $275K total over 2 years<br>• NIH R01: $250K - $500K/year for 3-5 years<br>• NSF CAREER: ~$500K over 5 years</div>`
    ]},
  boss:{title:'BOSS CHALLENGE: Mock Grant Review',xp:300,desc:'Submit your complete proposal package for peer review.',reqs:['Compile: Specific Aims, budget, budget justification, and a 2-page project narrative','Exchange proposals with a peer from the course','Score their proposal using NIH-style criteria (1-9 scale)','Write a 1-page summary review with strengths, weaknesses, and overall score','Debrief with your review partner — discuss scores and improvements'],
    guidance:[
      null,null,
      `<h5>NIH-Style Scoring Criteria</h5><p>NIH uses a 1-9 scale for each criterion. Score each independently:</p><div class="guide-example"><strong>Scoring Scale:</strong><br>1 = Exceptional — Outstanding, no weaknesses<br>2 = Outstanding — Very minor weaknesses<br>3 = Excellent — Minor weaknesses<br>4 = Very Good — Some moderate weaknesses<br>5 = Good — Moderate weaknesses<br>6 = Satisfactory — Some major weaknesses<br>7 = Fair — Major weaknesses<br>8 = Marginal — Numerous major weaknesses<br>9 = Poor — Little merit<br><br><strong>Review Criteria:</strong><br>• Significance — Does the project address an important problem?<br>• Investigators — Are the investigators well-suited?<br>• Innovation — Is the approach novel?<br>• Approach — Are the methods sound?<br>• Environment — Is the institutional support adequate?</div>`,
      null,null
    ]},

  quest:{title:'The Literature Hunt',xp:125,desc:'Design and execute a systematic search strategy.',reqs:['Define 3-5 search concepts from your research question','Build search queries for at least 2 databases using Boolean operators','Execute searches and document: database, query, date, number of results','Screen titles and abstracts of at least 50 papers — keep/reject with brief reason','Set up a reference manager and import your "keep" papers','Create a PRISMA-style flow diagram of your search and screening process'],
    guidance:[
      `<h5>Breaking Your Question Into Search Concepts</h5><p>Decompose your research question into its core concepts, then brainstorm synonyms for each:</p><div class="guide-example"><strong>Example question:</strong> "Does mindfulness meditation reduce test anxiety in nursing students?"<br><br><strong>Concept 1 — Intervention:</strong> mindfulness, meditation, mindfulness-based stress reduction, MBSR, contemplative practice<br><strong>Concept 2 — Outcome:</strong> test anxiety, exam anxiety, evaluation anxiety, academic stress, performance anxiety<br><strong>Concept 3 — Population:</strong> nursing students, undergraduate nursing, BSN students, nursing education<br><br><strong>Your search combines these:</strong><br>(mindfulness OR meditation OR MBSR) AND ("test anxiety" OR "exam anxiety") AND ("nursing student*")</div>`,
      `<h5>Building Boolean Search Queries</h5><p>Boolean operators control how search terms are combined:</p><p><strong>AND</strong> — narrows results (both terms must appear)<br><strong>OR</strong> — broadens results (either term can appear)<br><strong>NOT</strong> — excludes results (use sparingly — you might exclude relevant papers)<br><strong>"quotes"</strong> — exact phrase matching<br><strong>*</strong> — truncation/wildcard (student* finds students, student, student's)</p><div class="guide-example"><strong>Query for PubMed:</strong><br>("artificial intelligence" OR "machine learning" OR "deep learning") AND ("medical diagnosis" OR "clinical decision") AND (accuracy OR performance)<br><br><strong>Query for Web of Science:</strong><br>TS=("adaptive learning" OR "personalized learning") AND TS=(STEM OR science OR mathematics) AND TS=(undergraduate* OR "higher education")</div><p>Each database has slightly different syntax — check the help pages.</p>`,
      `<h5>Documenting Your Search</h5><p>Reproducibility is key. Create a search log spreadsheet:</p><div class="guide-example"><strong>Search Log Template:</strong><br>| # | Database | Date | Query | Filters | Results | Notes |<br>|---|----------|------|-------|---------|---------|-------|<br>| 1 | PubMed | 3/15/26 | (mindfulness OR MBSR) AND "test anxiety" | 2015-2026, English | 127 | Good starting set |<br>| 2 | Web of Science | 3/15/26 | Same terms | Article type, 2015+ | 94 | 52 overlap with PubMed |<br>| 3 | ERIC | 3/16/26 | Modified for education terms | Peer-reviewed | 45 | Found 12 unique |</div>`,
      `<h5>Screening Efficiently</h5><p>Screening 50+ papers sounds overwhelming. Here's how to do it in 2-3 hours:</p><p><strong>Step 1 — Title scan (30 seconds each):</strong> Reject obviously irrelevant papers<br><strong>Step 2 — Abstract scan (2 minutes each):</strong> Read abstract of remaining papers, decide keep/reject<br><strong>Step 3 — Mark reasons:</strong> For each rejected paper, note why in 3-5 words</p><div class="guide-example"><strong>Screening decisions:</strong><br>✅ Keep — Directly addresses my question<br>✅ Keep — Relevant methods I should review<br>❌ Reject — Wrong population (K-12, not college)<br>❌ Reject — Not empirical (opinion piece)<br>❌ Reject — Duplicate from other database<br>⚠️ Maybe — Tangentially relevant, revisit later</div>`,
      `<h5>Setting Up Zotero (Recommended)</h5><p>Zotero is free, open-source, and integrates with Word/Google Docs for citations.</p><p><a class="guide-link" href="https://www.zotero.org/download/" target="_blank">⬇️ Download Zotero</a></p><p><strong>Setup steps:</strong><br>1. Install Zotero desktop app<br>2. Install the Zotero Connector browser extension<br>3. Create folders for your project<br>4. When you find a paper, click the Zotero browser icon to save it<br>5. Install the Word/Google Docs plugin for inserting citations</p><p><strong>Organizing tips:</strong><br>• Create a folder per research project<br>• Use tags for themes (e.g., "methods", "theory", "key finding")<br>• Add notes directly to each paper in Zotero<br>• Use the "Related" feature to link connected papers</p>`,
      `<h5>PRISMA Flow Diagram</h5><p>PRISMA (Preferred Reporting Items for Systematic Reviews) provides a standard way to visualize your search process:</p><div class="guide-example"><strong>PRISMA Flow Structure:</strong><br><br>┌─────────────────────────┐<br>│ IDENTIFICATION           │<br>│ Records from databases:  │<br>│ PubMed (127) + WoS (94) │<br>│ + ERIC (45) = 266 total  │<br>└─────────┬───────────────┘<br>          ▼<br>┌─────────────────────────┐<br>│ Duplicates removed: 52  │<br>│ Records screened: 214   │<br>└─────────┬───────────────┘<br>          ▼<br>┌─────────────────────────┐<br>│ SCREENING                │<br>│ Excluded by title: 98   │<br>│ Excluded by abstract: 64│<br>│ Full-text assessed: 52  │<br>└─────────┬───────────────┘<br>          ▼<br>┌─────────────────────────┐<br>│ INCLUDED                 │<br>│ Studies in review: 28   │<br>└─────────────────────────┘</div><p>Free tools to create PRISMA diagrams: <a class="guide-link" href="https://www.prisma-statement.org/prisma-2020-flow-diagram" target="_blank">PRISMA Generator</a></p>`
    ]},

  quest:{title:'Synthesize the Knowledge',xp:150,desc:'Transform your collected literature into a synthesis.',reqs:['Create a concept matrix with at least 15 papers across 4-5 themes','Identify 3 patterns or trends in the literature','Identify 2 contradictions or debates in the field','Articulate the specific gap your research addresses','Write a 3-5 page literature review with proper citations','Include a "future directions" paragraph leading to your research question'],
    guidance:[
      `<h5>Building a Concept Matrix</h5><p>A concept matrix is the bridge between reading papers and writing a synthesis. Papers go in rows, themes in columns.</p><div class="guide-example"><strong>Example Concept Matrix:</strong><br><br>| Paper | Sample Size | Method | Found Benefits? | Duration | Setting |<br>|-------|:-----------:|--------|:---------------:|----------|---------|<br>| Smith 2023 | 120 | RCT | Yes | 8 weeks | University |<br>| Jones 2022 | 85 | Quasi-exp | Partial | 12 weeks | Community |<br>| Lee 2024 | 200 | Survey | Yes | N/A | Online |<br>| Chen 2023 | 45 | Qualitative | Mixed | 6 months | Clinic |<br><br><strong>Now you can synthesize:</strong><br>• "Studies with larger samples (Lee, Smith) found stronger effects..."<br>• "Duration ranged from 8 weeks to 6 months, suggesting..."<br>• "Only one study (Chen) used qualitative methods, revealing a gap..."</div>`,
      `<h5>Finding Patterns and Trends</h5><p>Look across your matrix for these types of patterns:</p><p>📈 <strong>Convergence:</strong> Most studies agree on a finding<br>📊 <strong>Methodological trends:</strong> Shift from one method to another over time<br>🌍 <strong>Geographic patterns:</strong> Most research from certain regions<br>📅 <strong>Temporal trends:</strong> Findings changing as field evolves<br>👥 <strong>Population gaps:</strong> Certain groups understudied</p><div class="guide-example"><strong>Example pattern statement:</strong><br>"A consistent finding across seven of the twelve quantitative studies reviewed is that intervention duration of at least 8 weeks is associated with significant outcomes (Smith, 2023; Jones, 2022; Park, 2024). Studies with shorter interventions (Rivera, 2023; Kim, 2022) reported non-significant effects, suggesting a minimum dosage threshold."</div>`,
      `<h5>Identifying Contradictions</h5><p>Contradictions are not problems — they are opportunities. They often reveal where your research is needed most.</p><div class="guide-example"><strong>How to frame contradictions:</strong><br><br>"While Smith (2023) found that X significantly improved outcomes in university settings, Jones (2022) found no effect in community contexts. This discrepancy may be explained by differences in participant characteristics, implementation fidelity, or outcome measures used. The present study addresses this contradiction by..."</div><p><strong>Common sources of contradictions:</strong> different populations, different measures, different contexts, different time periods, or methodological quality differences.</p>`,
      `<h5>Articulating the Gap</h5><p>Your gap statement is the most important sentence in your literature review. It bridges what IS known to what is NOT known — and directly sets up your research question.</p><div class="guide-example"><strong>Gap statement formula:</strong><br>"While existing research has established [what we know], [what remains unknown or unaddressed] represents a critical gap. Specifically, [precise gap]. This study addresses this gap by [your approach]."<br><br><strong>Example:</strong><br>"While existing research has established that mindfulness interventions can reduce general anxiety in college students (Smith, 2023; Lee, 2024), no study has examined whether these benefits extend to discipline-specific test anxiety in nursing education. This gap is significant because nursing exams involve unique stressors including clinical simulation evaluations. The present study addresses this gap by testing a tailored mindfulness protocol designed specifically for nursing assessment contexts."</div>`,
      null,null
    ]},

  tips:['Write your literature review BEFORE finalizing your methods','Use a citation manager from the start — reformatting references manually is painful']},
{n:9,title:'AI Agents for Research',badge:'Skill Unlocked',
  objectives:['Understand how AI agents can enhance every phase of research','Evaluate AI tools critically — capabilities, limitations, ethics','Build practical AI-assisted research workflows'],
  topics:['AI in research: current landscape and rapid evolution','AI for literature discovery: Semantic Scholar, Elicit, Consensus, Research Rabbit','AI for writing and editing: drafting, feedback, grammar, clarity','AI for data analysis: pattern recognition, coding assistance, visualization','AI for grant writing: brainstorming, review, compliance checking','Ethical considerations: disclosure, bias, over-reliance, academic integrity'],
  concepts:['AI agents are research accelerators, not replacements — you are the expert','Always verify AI outputs against primary sources — AI can hallucinate','Transparency is essential: disclose AI use in methods and acknowledgments','AI tools evolve rapidly — build workflows around capabilities, not products','The biggest AI risk in research is trusting it uncritically'],
  resources:[
    {icon:'🤖',name:'Elicit',url:'https://elicit.com',desc:'AI research assistant — finds papers, extracts data, summarizes findings'},
    {icon:'🔍',name:'Semantic Scholar',url:'https://www.semanticscholar.org',desc:'AI-powered academic search with citation analysis'},
    {icon:'📊',name:'Consensus',url:'https://consensus.app',desc:'AI search engine that finds answers backed by scientific research'},
    {icon:'🐰',name:'Research Rabbit',url:'https://www.researchrabbit.ai',desc:'Discover related papers through citation networks'},
    {icon:'💬',name:'Claude',url:'https://claude.ai',desc:'AI assistant for research analysis, writing, and brainstorming'},

  quest:{title:'Build Your AI Research Toolkit',xp:150,desc:'Explore and evaluate AI tools for research workflows.',reqs:['Test at least 3 AI research tools (Elicit, Semantic Scholar, Consensus, ChatGPT, Claude)','For each tool: document strengths, weaknesses, and limitations','Use an AI agent to find 5 papers your manual search missed','Ask AI to critique your Specific Aims page — evaluate the feedback quality','Create a personal "AI Research Toolkit" document','Write a 1-page reflection on ethical AI use in your research context'],
    guidance:[
      `<h5>AI Research Tools to Test</h5><p>Each tool excels at different tasks. Try these with your actual research question:</p><p><a class="guide-link" href="https://elicit.com" target="_blank">🤖 Elicit</a> — Best for: finding papers, extracting data from abstracts, summarizing findings across studies<br><a class="guide-link" href="https://www.semanticscholar.org" target="_blank">🔍 Semantic Scholar</a> — Best for: citation analysis, finding influential papers, TLDR summaries<br><a class="guide-link" href="https://consensus.app" target="_blank">📊 Consensus</a> — Best for: finding evidence-based answers to specific questions<br><a class="guide-link" href="https://www.researchrabbit.ai" target="_blank">🐰 Research Rabbit</a> — Best for: discovering related papers through citation networks (like Spotify for papers)<br><a class="guide-link" href="https://claude.ai" target="_blank">💬 Claude / ChatGPT</a> — Best for: brainstorming, writing feedback, explaining complex concepts, coding help</p>`,
      `<h5>How to Evaluate AI Tools</h5><p>For each tool, create an evaluation using this template:</p><div class="guide-example"><strong>AI Tool Evaluation Template:</strong><br><br><strong>Tool:</strong> [Name, URL, free/paid]<br><strong>Task tested:</strong> [What did you ask it to do?]<br><br><strong>Strengths:</strong><br>• [What did it do well?]<br>• [What was faster/better than manual?]<br><br><strong>Weaknesses:</strong><br>• [What did it get wrong?]<br>• [What was it unable to do?]<br><br><strong>Accuracy check:</strong> [Did you verify 3+ outputs against sources?]<br><strong>Hallucination rate:</strong> [How many citations/claims were fabricated?]<br><strong>Verdict:</strong> [Would you use this regularly? For what tasks?]</div>`,
      `<h5>Using AI to Find Missed Papers</h5><p>AI can discover papers that keyword-based searches miss. Try these approaches:</p><p>1. <strong>Concept-based search:</strong> Describe your research topic in natural language to Elicit or Consensus<br>2. <strong>Citation network:</strong> Put a key paper into Research Rabbit and explore the "similar works" graph<br>3. <strong>Seed-based discovery:</strong> Give Semantic Scholar 3-5 of your key papers and use "recommended papers"<br>4. <strong>Ask directly:</strong> Tell Claude/ChatGPT: "I'm studying [topic]. Here are 10 papers I've found. What seminal papers or recent studies am I missing?"</p><p><strong>Important:</strong> Always verify that AI-suggested papers actually exist. Check the DOI or search the title in Google Scholar.</p>`,
      `<h5>Getting AI to Critique Your Writing</h5><p>AI can serve as a first-round reviewer for your writing. Use specific prompts for better feedback:</p><div class="guide-example"><strong>Effective critique prompts:</strong><br><br>"Review my Specific Aims page as if you were an NIH study section reviewer. Score each aim on significance, innovation, and approach (1-9 scale). Identify the top 3 weaknesses."<br><br>"Read this aims page and identify: (1) any logical gaps, (2) unsupported claims, (3) jargon a non-specialist wouldn't understand, and (4) where the argument is weakest."<br><br>"Compare my aims structure to the standard NIH format. What sections am I missing or underemphasizing?"</div><p><strong>Evaluate the feedback:</strong> Was it generic or specific? Did it identify real issues? Would a human reviewer say the same things?</p>`,
      null,
      `<h5>Ethical AI Use in Research</h5><p>Your reflection should address these key questions:</p><p><strong>Transparency:</strong> When and how should you disclose AI use?<br><strong>Accuracy:</strong> How do you verify AI-generated content?<br><strong>Bias:</strong> What biases might AI tools introduce?<br><strong>Authorship:</strong> Can AI be an author? (Most journals say no)<br><strong>Academic integrity:</strong> Where is the line between AI assistance and AI dependence?</p><div class="guide-example"><strong>Example disclosure statement:</strong><br>"Artificial intelligence tools were used in this research for the following purposes: literature search expansion (Semantic Scholar, Elicit), initial screening of abstracts, and grammar review of the manuscript. All AI outputs were verified against primary sources by the research team. The study design, analysis, interpretation, and writing of this manuscript were performed by the human authors."</div><p>Check your institution's AI policy and your target journal's AI disclosure requirements.</p>`
    ]},
  boss:null,ai:null,assess:null,
  tips:['Keep a log of AI interactions that inform your research','Check your institution\'s AI policy before using AI in submitted work']},
{n:10,title:'Research Design & Methodology',badge:null,
  objectives:['Select appropriate research designs for your question','Understand validity threats and how to mitigate them','Develop a detailed methodology section'],
  topics:['Research paradigms: quantitative, qualitative, mixed methods','Experimental vs. observational designs','Sampling strategies and power analysis','Validity: internal, external, construct, statistical conclusion','Reliability and reproducibility','Writing a methods section that enables replication'],
  concepts:['Your research question dictates your method, not the other way around','The best design is the simplest one that rigorously answers your question','Every design decision is a tradeoff — document your reasoning','Reproducibility means another researcher could follow your methods and get comparable results'],
  quest:{title:'Design Your Study',xp:150,desc:'Create a detailed research design for your project.',reqs:['Justify your chosen research paradigm (quantitative, qualitative, or mixed)','Describe your study design with a visual diagram','Define your population, sampling strategy, and target sample size','List potential validity threats and your mitigation strategies','Write a detailed methods section (2-3 pages)','Include a timeline with milestones for your research activities'],
    guidance:[
      `<h5>Choosing Your Research Paradigm</h5><p>Your research question dictates your paradigm. Use this decision guide:</p><div class="guide-example"><strong>🔢 Quantitative — Choose when:</strong><br>• Your question asks "how much," "how many," or "what is the relationship"<br>• You want to test a hypothesis<br>• You need generalizable results<br>• Example: "Does X improve Y scores?"<br><br><strong>📝 Qualitative — Choose when:</strong><br>• Your question asks "how," "why," or "what is the experience"<br>• You want to explore a phenomenon in depth<br>• You need rich, contextual understanding<br>• Example: "How do students experience X?"<br><br><strong>🔀 Mixed Methods — Choose when:</strong><br>• You need both breadth and depth<br>• Quantitative alone can't capture the complexity<br>• You want to triangulate findings<br>• Example: "Does X improve scores AND how do students experience it?"</div>`,
      `<h5>Creating a Study Design Diagram</h5><p>A visual diagram makes your design immediately clear. Common formats:</p><div class="guide-example"><strong>Experimental design (RCT):</strong><br><br>Recruit Participants (N=120)<br>         │<br>    Random Assignment<br>    ┌─────┴─────┐<br>Treatment    Control<br> (n=60)      (n=60)<br>    │           │<br> Pretest     Pretest<br>    │           │<br>Intervention  Usual Care<br> (8 weeks)   (8 weeks)<br>    │           │<br> Posttest    Posttest<br>    │           │<br> Follow-up   Follow-up<br> (3 months)  (3 months)<br><br><strong>Mixed methods sequential:</strong><br>Phase 1: Survey (n=200) → Analyze → Inform<br>                                      ↓<br>Phase 2: Interviews (n=15) → Analyze → Integrate → Report</div>`,
      `<h5>Sampling and Sample Size</h5><p>Your sampling strategy and sample size must be justified:</p><p><a class="guide-link" href="https://www.gpower.hhu.de" target="_blank">📊 G*Power (free power analysis)</a></p><div class="guide-example"><strong>Common sampling strategies:</strong><br>• <strong>Random sampling:</strong> Everyone has equal chance (gold standard)<br>• <strong>Stratified:</strong> Random within defined groups (ensures representation)<br>• <strong>Convenience:</strong> Whoever is available (weakest, but most common)<br>• <strong>Purposive:</strong> Deliberately selected for qualitative depth<br><br><strong>Sample size rules of thumb:</strong><br>• Power analysis is the right way (G*Power is free)<br>• Surveys: minimum 100-200 for basic analyses<br>• Experiments: 30+ per group for t-tests<br>• Qualitative interviews: 12-25 for saturation<br>• Always oversample by 20% to account for attrition</div>`,
      `<h5>Validity Threats and Mitigations</h5><p>Every design has threats to validity. Identifying them upfront shows rigor:</p><div class="guide-example"><strong>Common validity threats:</strong><br><br><strong>Internal validity</strong> (did X really cause Y?):<br>• History — external events affect outcomes → Use control group<br>• Maturation — natural change over time → Use control group<br>• Selection bias — groups differ at baseline → Randomize<br>• Attrition — participants drop out → Track reasons, intent-to-treat analysis<br><br><strong>External validity</strong> (can results generalize?):<br>• Sample not representative → Describe limitations, use diverse sample<br>• Setting-specific → Multi-site study or describe context clearly<br><br><strong>Construct validity</strong> (are you measuring what you think?):<br>• Poor measures → Use validated instruments, report reliability</div>`,
      null,
      `<h5>Creating a Research Timeline</h5><p>Use a Gantt chart or table format. Be realistic — everything takes longer than expected.</p><div class="guide-example"><strong>Example 2-Year Timeline:</strong><br><br>| Activity | Q1 | Q2 | Q3 | Q4 | Q5 | Q6 | Q7 | Q8 |<br>|----------|:--:|:--:|:--:|:--:|:--:|:--:|:--:|:--:|<br>| IRB application | ██ | | | | | | | |<br>| Recruit participants | | ██ | ██ | | | | | |<br>| Data collection | | | ██ | ██ | ██ | | | |<br>| Data analysis | | | | | ██ | ██ | | |<br>| Write manuscript | | | | | | ██ | ██ | |<br>| Submit & revise | | | | | | | ██ | ██ |<br>| Present at conference | | | | | | | | ██ |<br><br><strong>Milestones:</strong><br>• Month 3: IRB approved<br>• Month 6: 50% enrollment<br>• Month 12: Data collection complete<br>• Month 18: Draft manuscript<br>• Month 24: Submit for publication</div>`
    ]},

  concepts:['Data management is not glamorous but bad data management kills research careers','Most funders now require a Data Management Plan','IRB approval takes weeks to months — start early','Version control for data is just as important as version control for code','Raw data should be immutable — never edit the original'],
