  quest:{title:'Prepare Your Data Pipeline',xp:125,desc:'Design your data collection and management strategy.',reqs:['Design or select a data collection instrument for your study','Create a Data Management Plan following your funder\'s template','Design a file naming convention and folder structure','Identify all ethical/IRB requirements for your research','Create a data dictionary defining every variable','Document your backup and data security plan'],
    guidance:[
      `<h5>Choosing Data Collection Instruments</h5><p>Use validated instruments whenever possible — creating your own is a last resort.</p><p><strong>Where to find validated instruments:</strong></p><p><a class="guide-link" href="https://www.apa.org/pubs/databases/psyctests" target="_blank">📊 PsycTESTS</a> (psychology measures) — <a class="guide-link" href="https://www.buros.org" target="_blank">📋 Buros Center</a> (test reviews)</p><div class="guide-example"><strong>Choosing the right tool:</strong><br>• <strong>Surveys:</strong> Qualtrics, REDCap, Google Forms<br>• <strong>Interviews:</strong> Semi-structured protocol + recording (Otter.ai for transcription)<br>• <strong>Observations:</strong> Structured rubric + inter-rater reliability<br>• <strong>Physiological:</strong> Calibrated equipment with documented protocols<br>• <strong>Existing data:</strong> Public datasets (ICPSR, Census, NCES)</div><p>Report reliability (Cronbach's alpha) and validity evidence for every instrument.</p>`,
      `<h5>Creating a Data Management Plan</h5><p>Most federal funders now require a DMP. Use the free DMPTool for templates:</p><p><a class="guide-link" href="https://dmptool.org" target="_blank">📋 DMPTool — Free DMP Generator</a></p><div class="guide-example"><strong>DMP sections (NSF format):</strong><br><br>1. <strong>Types of data:</strong> What data will you collect? Formats? Volume?<br>2. <strong>Standards:</strong> What metadata standards? Naming conventions?<br>3. <strong>Access & sharing:</strong> How will data be shared? When? Restrictions?<br>4. <strong>Re-use:</strong> What are the licensing terms?<br>5. <strong>Archiving:</strong> Where will data be stored long-term? How long?</div>`,
      `<h5>File Naming & Folder Structure</h5><p>A consistent system prevents chaos as your project grows. Adopt rules from day one:</p><div class="guide-example"><strong>Recommended file naming convention:</strong><br><br>ProjectName_DataType_YYYYMMDD_Version<br><br>Examples:<br>MindfulnessStudy_Survey_20260315_v1.csv<br>MindfulnessStudy_Interviews_20260320_raw.mp3<br>MindfulnessStudy_Analysis_20260401_v2.R<br><br><strong>Folder structure:</strong><br>📁 MindfulnessStudy/<br>&nbsp;&nbsp;📁 01_RawData/ (NEVER modify these files)<br>&nbsp;&nbsp;📁 02_CleanedData/<br>&nbsp;&nbsp;📁 03_Analysis/<br>&nbsp;&nbsp;📁 04_Results/<br>&nbsp;&nbsp;📁 05_Manuscripts/<br>&nbsp;&nbsp;📁 06_Admin/ (IRB, consent, correspondence)<br>&nbsp;&nbsp;📄 README.txt</div>`,
      `<h5>IRB/Ethics Requirements</h5><p>If your research involves human subjects, you need IRB (Institutional Review Board) approval. Start early — it takes 2-8 weeks.</p><div class="guide-example"><strong>IRB review levels:</strong><br>• <strong>Exempt:</strong> Minimal risk, existing data, educational research (still needs submission)<br>• <strong>Expedited:</strong> Minimal risk with identifiable data<br>• <strong>Full Board:</strong> Greater than minimal risk, vulnerable populations<br><br><strong>Required documents:</strong><br>• Protocol/research plan<br>• Informed consent form<br>• Data collection instruments (surveys, interview guides)<br>• Recruitment materials<br>• CITI training certificates</div><p><a class="guide-link" href="https://about.citiprogram.org" target="_blank">🎓 Complete CITI Training</a> — Required by most US institutions before IRB submission.</p>`,
      `<h5>Creating a Data Dictionary</h5><p>A data dictionary defines every variable in your dataset. This is essential for reproducibility and collaboration.</p><div class="guide-example"><strong>Data Dictionary Template:</strong><br><br>| Variable | Label | Type | Values | Source |<br>|----------|-------|------|--------|--------|<br>| ID | Participant ID | String | P001-P200 | Assigned |<br>| age | Age in years | Integer | 18-65 | Survey Q1 |<br>| group | Treatment group | Categorical | 1=treatment, 0=control | Randomization |<br>| pre_anx | Pre-test anxiety | Continuous | 10-50 (TAI score) | TAI instrument |<br>| post_anx | Post-test anxiety | Continuous | 10-50 (TAI score) | TAI instrument |<br>| complete | Study completion | Binary | 1=yes, 0=no | Tracking |<br>| notes | Researcher notes | Text | Free text | Researcher |</div>`,
      null
    ]},

    {icon:'📊',name:'R / RStudio',url:'https://posit.co/download/rstudio-desktop/',desc:'Free statistical computing environment — the standard for academic research'},

  quest:{title:'Analyze and Visualize',xp:150,desc:'Create an analysis plan and practice with sample data.',reqs:['Write a pre-analysis plan specifying your statistical tests','Find or create a sample dataset relevant to your research','Perform at least 2 different analyses appropriate to your question','Create 3 publication-quality visualizations of your results','Write a results section (1-2 pages) reporting findings objectively','Reflect on how you would handle unexpected or negative results'],
    guidance:[
      `<h5>Writing a Pre-Analysis Plan</h5><p>Specifying your analyses BEFORE seeing data prevents unconscious bias (p-hacking, HARKing). Your plan should include:</p><div class="guide-example"><strong>Pre-Analysis Plan Template:</strong><br><br><strong>Research Question:</strong> [Your question]<br><strong>Hypotheses:</strong><br>H1: [Specific, directional prediction]<br>H2: [Second prediction if applicable]<br><br><strong>Primary Analysis:</strong><br>• Test: [e.g., independent samples t-test]<br>• IV: [group assignment]<br>• DV: [post-test score]<br>• Covariates: [pre-test score, if applicable]<br>• Alpha level: .05<br>• Effect size measure: Cohen's d<br><br><strong>Secondary Analyses:</strong><br>• [Subgroup analysis, moderation, etc.]<br><br><strong>Data Exclusion Rules:</strong><br>• [When would you exclude a participant? Define a priori.]</div><p>Consider registering your plan on <a class="guide-link" href="https://osf.io" target="_blank">OSF (Open Science Framework)</a> for credibility.</p>`,
      `<h5>Finding Sample Datasets</h5><p>Practice with real data before collecting your own:</p><p><a class="guide-link" href="https://www.icpsr.umich.edu" target="_blank">📊 ICPSR</a> — Social science data archive<br><a class="guide-link" href="https://www.kaggle.com/datasets" target="_blank">📈 Kaggle Datasets</a> — Large collection across domains<br><a class="guide-link" href="https://data.gov" target="_blank">🏛️ Data.gov</a> — US government open data<br><a class="guide-link" href="https://nces.ed.gov/datalab/" target="_blank">🎓 NCES DataLab</a> — Education statistics<br><a class="guide-link" href="https://www.cdc.gov/nchs/data_access/ftp_data.htm" target="_blank">🏥 CDC/NCHS</a> — Health data</p><p>Alternatively, simulate data in R or Python that matches your expected study structure.</p>`,
      `<h5>Choosing the Right Statistical Test</h5><p>Use this decision guide based on your variables:</p><div class="guide-example"><strong>Quick test selection guide:</strong><br><br>Comparing 2 group means → <strong>t-test</strong> (independent or paired)<br>Comparing 3+ group means → <strong>ANOVA</strong> (one-way or factorial)<br>Relationship between 2 continuous variables → <strong>Correlation / Regression</strong><br>Predicting an outcome from multiple variables → <strong>Multiple Regression</strong><br>Categorical outcome → <strong>Logistic Regression / Chi-square</strong><br>Repeated measures over time → <strong>Repeated-measures ANOVA / Mixed models</strong><br>Non-normal data → <strong>Mann-Whitney U, Kruskal-Wallis</strong> (nonparametric)<br><br><strong>Qualitative data:</strong><br>Interview transcripts → <strong>Thematic analysis, Grounded theory</strong><br>Documents → <strong>Content analysis</strong><br>Observations → <strong>Narrative analysis</strong></div>`,
      `<h5>Publication-Quality Visualizations</h5><p>Journal figures must be clear, properly labeled, and high resolution. Key principles:</p><p>• <strong>Axes:</strong> Labeled with units, readable font (10-12pt)<br>• <strong>Colors:</strong> Accessible to colorblind readers (use colorbrewer palettes)<br>• <strong>Format:</strong> Vector formats (SVG, PDF, EPS) for best quality<br>• <strong>Resolution:</strong> 300+ DPI for raster images</p><div class="guide-example"><strong>Essential figure types:</strong><br>• <strong>Bar chart:</strong> Comparing group means (add error bars!)<br>• <strong>Scatter plot:</strong> Showing relationships between variables<br>• <strong>Box plot:</strong> Showing distribution and outliers<br>• <strong>Line graph:</strong> Showing change over time<br>• <strong>Table:</strong> For exact values and complex comparisons</div><p>Free tools: <a class="guide-link" href="https://posit.co/download/rstudio-desktop/" target="_blank">R/ggplot2</a>, <a class="guide-link" href="https://matplotlib.org" target="_blank">Python/matplotlib</a></p>`,

      `<h5>Selecting a Target Journal</h5><p>Choose your journal BEFORE writing — it dictates format, length, audience, and style.</p><p><a class="guide-link" href="https://jane.biosemantics.org" target="_blank">🔍 Jane</a> — Paste your abstract to find matching journals<br><a class="guide-link" href="https://journalfinder.elsevier.com" target="_blank">📊 Elsevier Journal Finder</a></p><div class="guide-example"><strong>Journal selection criteria:</strong><br><br>• <strong>Scope:</strong> Does the journal publish work like yours?<br>• <strong>Audience:</strong> Who reads it? Your target audience?<br>• <strong>Impact:</strong> Impact factor / CiteScore (higher = more competitive)<br>• <strong>Turnaround:</strong> How long from submission to decision? (Check Publons)<br>• <strong>Open Access:</strong> Required by your funder? APC costs ($0-$5,000+)?<br>• <strong>Acceptance rate:</strong> Top journals: 5-15%, good journals: 15-30%<br><br>⚠️ <strong>Avoid predatory journals!</strong> Check <a class="guide-link" href="https://beallslist.net" target="_blank">Beall's List</a> and <a class="guide-link" href="https://doaj.org" target="_blank">DOAJ</a></div>`,

      `<h5>The Funnel Introduction Structure</h5><p>Your introduction should funnel from broad context to your specific contribution:</p><div class="guide-example"><strong>Introduction Funnel (4-6 paragraphs):</strong><br><br><strong>¶1 — Big Picture:</strong> Why does this topic matter? (Broad context, statistics, societal relevance)<br><br><strong>¶2 — What We Know:</strong> Brief summary of key findings in the field (cite major studies)<br><br><strong>¶3 — What We Don't Know:</strong> The gap. What's missing, contradictory, or unexplored?<br><br><strong>¶4 — Why It Matters:</strong> Why does this gap need to be filled? Who benefits?<br><br><strong>¶5 — What You Did:</strong> "The purpose of this study was to..." State your question, approach, and hypotheses.<br><br><strong>¶6 (optional) — Preview:</strong> Brief roadmap of the paper's structure.</div><p><strong>First sentence tip:</strong> Start with a compelling fact or statistic, not a dictionary definition. Never begin with "Since the dawn of time..."</p>`,
      `<h5>Writing the Discussion</h5><p>The Discussion is where you show you are a scholar, not just a data reporter. Structure:</p><div class="guide-example"><strong>Discussion Structure (4-6 paragraphs):</strong><br><br><strong>¶1 — Summary:</strong> Restate the purpose and key findings (2-3 sentences, no new stats)<br><br><strong>¶2-3 — Interpretation:</strong> What do the results mean? How do they compare to previous research? Why might you have found what you found?<br><br><strong>¶4 — Limitations:</strong> Be honest. Address design weaknesses, sampling, measurement, generalizability. Show you understand the constraints.<br><br><strong>¶5 — Implications:</strong> For practice, for policy, for the field. "So what?"<br><br><strong>¶6 — Future Directions:</strong> What should researchers do next? What questions remain?<br><br><strong>Final Sentence:</strong> End with a strong concluding statement about contribution.</div>`,
      `<h5>Writing a Structured Abstract</h5><p>Your abstract is the most-read part of your paper. Many journals require a structured format (250 words max):</p><div class="guide-example"><strong>Structured Abstract Template:</strong><br><br><strong>Background:</strong> 1-2 sentences on the problem and gap (why this study?)<br><br><strong>Purpose:</strong> 1 sentence stating the aim of the study<br><br><strong>Methods:</strong> 2-3 sentences on design, participants, measures, analysis<br><br><strong>Results:</strong> 2-3 sentences on key findings with specific numbers (not just "significant")<br><br><strong>Conclusions:</strong> 1-2 sentences on implications and significance</div><p><strong>Write the abstract LAST</strong> — after the full paper is drafted. It should accurately represent what's actually in the paper, not what you planned.</p>`,

    guidance:[
      `<h5>The Reverse Outline Technique</h5><p>A reverse outline checks if your paper actually says what you think it says:</p><div class="guide-example"><strong>How to reverse outline:</strong><br><br>1. Read each paragraph of your paper<br>2. Write ONE sentence summarizing what that paragraph actually says<br>3. List these sentences in order<br><br><strong>Now check:</strong><br>• Does each paragraph have one clear point?<br>• Do the points flow logically?<br>• Are any points repeated?<br>• Is anything missing?<br>• Does the order make sense?<br><br><strong>Common problems revealed:</strong><br>• Paragraph about methods buried in the introduction<br>• Same finding discussed in 3 different places<br>• A key limitation never mentioned<br>• Results section contains interpretation (belongs in Discussion)</div>`,

      `<h5>Writing a Point-by-Point Response</h5><p>When reviewers give feedback (or later, when you respond to journal reviews), use this structured format:</p><div class="guide-example"><strong>Response letter format:</strong><br><br>Dear Editor,<br><br>We thank the reviewers for their thoughtful feedback. We have addressed each comment below. Reviewer comments are in <strong>bold</strong>, our responses in plain text, and changes to the manuscript are in <em>italics</em>.<br><br><strong>Reviewer 1, Comment 1:</strong> "The sample size seems insufficient for the proposed analyses."<br><br>Response: We appreciate this concern. We have added a post-hoc power analysis showing that our sample of 120 participants provides 85% power to detect a medium effect size (d=0.5) at alpha=.05. <em>This has been added to the Methods section, paragraph 3, page 8.</em><br><br><strong>Reviewer 1, Comment 2:</strong> "The limitation about generalizability is too brief."<br><br>Response: We have expanded the limitations section to address generalizability more thoroughly. <em>See Discussion, paragraph 4, pages 14-15.</em></div><p><strong>Key rule:</strong> Address EVERY comment. Even if you disagree, explain why respectfully.</p>`,

/* ═══════════════════════════════════════════════════════════════
   STATE (persisted to localStorage)
   ═══════════════════════════════════════════════════════════════ */
const SAVE_KEY='researchquest_save';
let state=loadState();

function defaultState(){
  return {xp:0,completed:{},quizScores:{},unlockedAch:[],currentView:'overview'};
}
function loadState(){
  try{const s=localStorage.getItem(SAVE_KEY);return s?{...defaultState(),...JSON.parse(s)}:defaultState();}
  catch(e){return defaultState();}
}
function saveState(){localStorage.setItem(SAVE_KEY,JSON.stringify(state));}
function resetProgress(){
  if(confirm('Reset all progress? This cannot be undone.')){
    state=defaultState();saveState();updateXP();renderAchievements();go(state.currentView);
    showToast('Progress reset','info');
  }
}

/* ═══════════════════════════════════════════════════════════════
   XP & LEVELS
   ═══════════════════════════════════════════════════════════════ */
function getLevel(xp){
  let l=levels[0];for(const lv of levels)if(xp>=lv.xp)l=lv;return l;
}
function getNextLevel(xp){
  const cur=getLevel(xp);return levels.find(l=>l.xp>cur.xp)||cur;
}
function getTotalXP(){
  return weeks.reduce((s,w)=>{let t=w.quest?w.quest.xp:0;if(w.boss)t+=w.boss.xp;if(w.assess)t+=w.assess.xp;return s+t;},0);
}

function addXP(amount,source){
  const oldLevel=getLevel(state.xp);
  state.xp+=amount;
  const newLevel=getLevel(state.xp);
  saveState();updateXP();
  showToast(`+${amount} XP — ${source}`,'xp');
  if(newLevel.n>oldLevel.n){
    setTimeout(()=>showLevelUp(newLevel),600);
  }
  checkAchievements();
}

function updateXP(){
  const cur=getLevel(state.xp),nxt=getNextLevel(state.xp);
  const pct=nxt.xp>cur.xp?((state.xp-cur.xp)/(nxt.xp-cur.xp)*100):100;
  document.getElementById('lvl-badge').textContent='Lvl '+cur.n;
  document.getElementById('lvl-title').textContent=cur.title;
  document.getElementById('xp-bar').style.width=pct+'%';
  document.getElementById('xp-cur').textContent=state.xp+' XP';
  document.getElementById('xp-next').textContent='/ '+nxt.xp+' XP';
  document.getElementById('topbar-xp').textContent=state.xp+' XP';
}

/* ═══════════════════════════════════════════════════════════════
   TOASTS
   ═══════════════════════════════════════════════════════════════ */
function showToast(msg,type='info'){
  const c=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className='toast '+type;
  const icons={xp:'✨',ach:'🏅',level:'🎉',info:'ℹ️'};
  t.innerHTML=`${icons[type]||'ℹ️'} ${msg}`;
  c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

/* ═══════════════════════════════════════════════════════════════
   LEVEL UP
   ═══════════════════════════════════════════════════════════════ */
function showLevelUp(level){
  document.getElementById('lvl-up-title').textContent=`Level ${level.n}!`;

  document.getElementById('levelup').classList.add('show');

function spawnConfetti(){
  const colors=['#ff5722','#ff9800','#ffeb3b','#4caf50','#2196f3','#9c27b0','#e91e63'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.left=Math.random()*100+'vw';
    c.style.top=-10+'px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(2+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*.5)+'s';
    c.style.width=(6+Math.random()*6)+'px';
    c.style.height=(6+Math.random()*6)+'px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

/* ═══════════════════════════════════════════════════════════════
   ACHIEVEMENTS
   ═══════════════════════════════════════════════════════════════ */
function checkAchievements(){
  const totalTasks=Object.keys(state.completed).filter(k=>state.completed[k]).length;
  const totalXP=getTotalXP();

  achievements.forEach(a=>{
    if(state.unlockedAch.includes(a.id))return;
    let unlocked=false;
    if(a.trigger==='taskCount'&&totalTasks>=a.threshold) unlocked=true;
    if(a.trigger==='xpPercent'&&(state.xp/totalXP*100)>=a.threshold) unlocked=true;
    if(a.trigger==='quizPerfect'){
      for(const k in state.quizScores){if(state.quizScores[k]===100)unlocked=true;}
    }
    if(a.trigger==='weekComplete'){
      unlocked=a.threshold.every(wn=>{
        const w=weeks.find(x=>x.n===wn);
        if(!w||!w.quest)return false;
        return w.quest.reqs.every((_,i)=>state.completed[`w${wn}-q-${i}`]);
      });
    }
    if(unlocked){
      state.unlockedAch.push(a.id);saveState();
      showToast(`Achievement Unlocked: ${a.name}!`,'ach');
      renderAchievements();
    }
  });
}

function renderAchievements(){
  const row=document.getElementById('ach-row');
  row.innerHTML=achievements.map(a=>{
    const u=state.unlockedAch.includes(a.id);
    return `<div class="ach ${u?'unlocked':'locked'}" data-tip="${a.name}: ${a.desc}">${a.icon}</div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════════
   TASK COMPLETION
   ═══════════════════════════════════════════════════════════════ */
function toggleTask(key,weekN,type,totalTasks,xpPerTask){
  if(state.completed[key])return; // no un-checking
  state.completed[key]=true;saveState();
  addXP(xpPerTask, type==='quest'?'Quest Task':type==='boss'?'Boss Challenge':'Task');
  // Re-render current week to update UI
  const c=document.getElementById('content');
  renderWeek(c,weekN);
  buildNav();
}

function getWeekCompletion(wn){
  const w=weeks.find(x=>x.n===wn);if(!w)return 0;
  let total=0,done=0;
  if(w.quest){total+=w.quest.reqs.length;w.quest.reqs.forEach((_,i)=>{if(state.completed[`w${wn}-q-${i}`])done++;});}
  if(w.boss){total+=w.boss.reqs.length;w.boss.reqs.forEach((_,i)=>{if(state.completed[`w${wn}-b-${i}`])done++;});}
  return total>0?Math.round(done/total*100):0;
}

function getTrackCompletion(track){
  const pcts=track.weeks.map(wn=>getWeekCompletion(wn));
  return Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length);
}

/* ═══════════════════════════════════════════════════════════════
   QUIZ
   ═══════════════════════════════════════════════════════════════ */
function renderQuiz(weekN){
  const qs=quizData[weekN];if(!qs)return '<p style="color:var(--muted);font-size:13px"><em>Full quiz available during class — sample questions shown above.</em></p>';
  const existing=state.quizScores[`quiz-${weekN}`];
  if(existing!==undefined){
    const w=weeks.find(x=>x.n===weekN);
    return `<div class="quiz-score"><h4>Quiz Complete! Score: ${existing}%</h4><p>You earned ${Math.round(w.assess.xp*(existing/100))} XP from this quiz</p></div>`;
  }
  let h='<div class="quiz-container" id="quiz-'+weekN+'">';
  qs.forEach((q,qi)=>{
    h+=`<div class="quiz-q" id="qq-${weekN}-${qi}">
      <h5>Q${qi+1}. ${q.q}</h5>
      ${q.opts.map((o,oi)=>`<div class="quiz-opt" id="qo-${weekN}-${qi}-${oi}" onclick="selectQuizOpt(${weekN},${qi},${oi})"><span class="opt-marker">${String.fromCharCode(65+oi)}</span>${o}</div>`).join('')}
      <div class="quiz-feedback" id="qf-${weekN}-${qi}"></div>
    </div>`;
  });
  h+=`<button class="quiz-btn submit" onclick="submitQuiz(${weekN})">Submit Quiz</button></div>`;
  return h;
}

let quizSelections={};
function selectQuizOpt(wn,qi,oi){
  if(state.quizScores[`quiz-${wn}`]!==undefined)return;
  quizSelections[`${wn}-${qi}`]=oi;
  const qs=quizData[wn];
  qs[qi].opts.forEach((_,o)=>{
    const el=document.getElementById(`qo-${wn}-${qi}-${o}`);
    el.classList.toggle('selected',o===oi);
  });
}

function submitQuiz(wn){
  const qs=quizData[wn];
  let correct=0;
  qs.forEach((q,qi)=>{
    const sel=quizSelections[`${wn}-${qi}`];
    const fb=document.getElementById(`qf-${wn}-${qi}`);
    const qbox=document.getElementById(`qq-${wn}-${qi}`);
    if(sel===q.answer){
      correct++;
      qbox.classList.add('correct');
      fb.className='quiz-feedback show correct';
      fb.textContent='✓ Correct! '+q.explain;
      document.getElementById(`qo-${wn}-${qi}-${sel}`).classList.add('correct-answer');
    } else {
      qbox.classList.add('wrong');
      fb.className='quiz-feedback show wrong';
      fb.textContent='✗ '+(sel!==undefined?q.explain:'No answer selected. '+q.explain);
      if(sel!==undefined) document.getElementById(`qo-${wn}-${qi}-${sel}`).classList.add('wrong-answer');
      document.getElementById(`qo-${wn}-${qi}-${q.answer}`).classList.add('correct-answer');
    }
  });
  const pct=Math.round(correct/qs.length*100);
  state.quizScores[`quiz-${wn}`]=pct;saveState();
  const w=weeks.find(x=>x.n===wn);
  const earnedXP=Math.round(w.assess.xp*(pct/100));
  addXP(earnedXP,`Quiz — ${pct}%`);
  // Disable further interaction
  document.querySelectorAll(`#quiz-${wn} .quiz-opt`).forEach(el=>el.style.pointerEvents='none');
  document.querySelector(`#quiz-${wn} .quiz-btn`).disabled=true;
  // Add score display
  const cont=document.getElementById(`quiz-${wn}`);
  cont.insertAdjacentHTML('beforeend',`<div class="quiz-score" style="margin-top:16px"><h4>Score: ${pct}% (${correct}/${qs.length})</h4><p>+${earnedXP} XP earned</p></div>`);
  checkAchievements();
}

function buildNav(){
  const nav=document.getElementById('nav');
  let h='';
  const views=[['overview','🏠','Overview'],['schedule','📅','Schedule'],['leaderboard','🏆','Leaderboard'],['skills','🌳','Skill Tree']];
  views.forEach(([id,icon,label])=>{
    h+=`<div class="nav-i${state.currentView===id?' act':''}" onclick="go('${id}')"><span class="icon">${icon}</span>${label}</div>`;
  });
  h+='<div style="padding:8px 20px;font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.4;margin-top:8px">Quests</div>';
  weeks.forEach(w=>{
    const active=state.currentView==='week-'+w.n;
    const pct=getWeekCompletion(w.n);
    let status='';
    if(pct===100) status='<span class="quest-status done">✓</span>';
    else if(pct>0) status=`<span class="quest-status active">${pct}%</span>`;
    else if(w.badge) status=`<span class="quest-status active">${w.badge}</span>`;
    h+=`<div class="nav-i${active?' act':''}" onclick="go('week-${w.n}')"><span class="icon">${pct===100?'✅':'⚔️'}</span>W${w.n}: ${w.title.length>18?w.title.slice(0,18)+'…':w.title}${status}</div>`;
  });
  nav.innerHTML=h;
}

function go(view){
  state.currentView=view;saveState();
  buildNav();
  const c=document.getElementById('content');
  c.style.animation='none';c.offsetHeight;c.style.animation='fadeIn .3s ease';
  if(view==='overview') renderOverview(c);
  else if(view==='schedule') renderSchedule(c);
  else if(view==='leaderboard') renderLeaderboard(c);
  else if(view==='skills') renderSkillTree(c);
  else if(view.startsWith('week-')) renderWeek(c,parseInt(view.split('-')[1]));
  document.getElementById('topbar-title').textContent=view==='overview'?'Overview':view==='schedule'?'Quest Schedule':view==='leaderboard'?'Leaderboard':view==='skills'?'Skill Tree':'Week '+view.split('-')[1];
  document.getElementById('topbar-chip').textContent=view==='overview'?'16 Weeks':view==='schedule'?'Full Map':view==='leaderboard'?'Rankings':view==='skills'?'Progress':getLevel(state.xp).title;
  window.scrollTo(0,0);
  if(window.innerWidth<=768)document.getElementById('side').classList.remove('open');
}

            <div class="check-box">${done?'✓':''}</div>
            <span class="check-text">${r}</span>
            ${g?`<button class="guide-toggle" onclick="event.stopPropagation();toggleGuide('${gid}')" title="Show guidance">?</button>`:''}
          </div>
          ${g?`<div class="guide-panel" id="${gid}">${g}</div>`:''}
        </li>`;
      }).join('')}</ul>
    </div>`;
  }

  // Interactive Quiz
  if(w.assess){
    h+=`<div class="sec assess"><h4>📋 ${w.assess.label} <span class="xp-reward assess-xp">Up to +${w.assess.xp} XP</span></h4>
      <ul><li><strong>Covers:</strong> ${w.assess.topics}</li><li><strong>Format:</strong> ${w.assess.format}</li></ul>
      ${quizData[n]?renderQuiz(n):'<p style="font-size:12px;color:var(--muted);margin-top:8px"><em>This assessment is completed in class with your instructor.</em></p>'}
    </div>`;
  }

  if(w.tips){
    h+=`<div class="sec tips"><h4>💎 Pro Tips</h4><ul>${w.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
  }

  h+=`<div class="nav-btns">
    <button class="nav-btn prev" ${n<=1?'disabled ':''} onclick="go('week-${n-1}')">← Previous Quest</button>
    <button class="nav-btn next" ${n>=16?'disabled ':''} onclick="go('week-${n+1}')">Next Quest →</button>
  </div>`;

  c.innerHTML=h;
}

function toggleNav(){document.getElementById('side').classList.toggle('open')}
function toggleGuide(id){document.getElementById(id).classList.toggle('open');}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
renderAchievements();
updateXP();
go(state.currentView);
</script>
