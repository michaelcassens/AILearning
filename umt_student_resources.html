<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --maroon:#6d2047;
  --maroon-dark:#4e1633;
  --maroon-light:#f8f0f4;
  --silver:#a7a9ac;
  --silver-light:#d9dadb;
  --gold:#d4a843;
  --bg:#f4f3f1;
  --card-bg:#fff;
  --text:#2c2c2c;
  --text-light:#555;
  --radius:12px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-hover:0 8px 28px rgba(109,32,71,.15);
  --transition:0.25s ease;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--maroon);text-decoration:none;transition:color var(--transition)}
a:hover{color:var(--maroon-dark);text-decoration:underline}
a:focus-visible{outline:2px solid var(--maroon);outline-offset:2px;border-radius:3px}

/* ── Hero ── */
.hero{background:linear-gradient(135deg,var(--maroon) 0%,var(--maroon-dark) 100%);color:#fff;padding:48px 24px 40px;text-align:center}
.hero h1{font-size:2.4rem;font-weight:800;margin-bottom:6px;letter-spacing:-.02em}
.hero p{font-size:1.1rem;opacity:.88;max-width:560px;margin:0 auto 28px}
.search-wrap{max-width:520px;margin:0 auto;position:relative}
.search-wrap input{width:100%;padding:14px 18px 14px 48px;font-size:1rem;border:none;border-radius:50px;background:rgba(255,255,255,.95);color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.search-wrap input::placeholder{color:var(--silver)}
.search-wrap input:focus{outline:3px solid var(--gold);outline-offset:0}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:20px;height:20px;opacity:.45;pointer-events:none}

/* ── Filter Pills ── */
.filters{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:20px 24px 0;max-width:900px;margin:0 auto}
.pill{padding:8px 18px;border-radius:50px;border:2px solid var(--silver-light);background:#fff;font-size:.88rem;font-weight:600;cursor:pointer;transition:all var(--transition);color:var(--text-light);white-space:nowrap}
.pill:hover{border-color:var(--maroon);color:var(--maroon)}
.pill:focus-visible{outline:2px solid var(--maroon);outline-offset:2px}
.pill.active{background:var(--maroon);color:#fff;border-color:var(--maroon)}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:28px 32px 60px;max-width:1200px;margin:0 auto}
@media(max-width:1024px){.grid{grid-template-columns:repeat(2,1fr);padding:24px 20px 48px}}
@media(max-width:640px){.grid{grid-template-columns:1fr;padding:20px 16px 40px}}

/* ── Cards ── */
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:transform var(--transition),box-shadow var(--transition);display:flex;flex-direction:column;opacity:0;animation:fadeUp .45s ease forwards;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card-header{background:var(--maroon);color:#fff;padding:18px 20px;display:flex;align-items:center;gap:12px}
.card-icon{font-size:1.6rem;flex-shrink:0}
.card-header h2{font-size:1.1rem;font-weight:700;line-height:1.3}
.card-body{padding:18px 20px;flex:1;display:flex;flex-direction:column}
.card-desc{font-size:.92rem;color:var(--text-light);margin-bottom:12px;line-height:1.55}

/* ── Highlight Chips ── */
.card-highlights{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.highlight-chip{padding:4px 12px;border-radius:50px;font-size:.75rem;font-weight:600;background:var(--maroon-light);color:var(--maroon);border:1px solid rgba(109,32,71,.12);white-space:nowrap}

/* ── Quote Preview (on card) ── */
.card-quote-preview{font-style:italic;font-size:.84rem;color:var(--text-light);padding:10px 14px;margin-bottom:14px;background:linear-gradient(135deg,#faf8f9,#f5f0f3);border-radius:8px;border-left:3px solid var(--gold);line-height:1.5;position:relative}
.card-quote-preview::before{content:"\201C";font-size:1.8rem;color:var(--gold);position:absolute;top:2px;left:8px;line-height:1;opacity:.5}
.card-quote-preview .quote-text{padding-left:16px}
.card-quote-preview .quote-author{display:block;font-style:normal;font-size:.76rem;font-weight:600;color:var(--maroon);margin-top:4px;text-align:right}

/* ── Contact ── */
.card-contact{display:flex;align-items:center;gap:10px;padding:12px 14px;margin-bottom:14px;background:#f8f5f7;border-radius:8px;border-left:3px solid var(--maroon)}
.card-contact .contact-avatar{width:36px;height:36px;border-radius:50%;background:var(--maroon);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0}
.card-contact .contact-info{font-size:.82rem;line-height:1.4}
.card-contact .contact-name{font-weight:700;color:var(--text)}
.card-contact .contact-title{color:var(--text-light)}
.card-contact .contact-email a{color:var(--maroon);font-size:.78rem}

/* ── Card Details & Links ── */
.card-details{font-size:.82rem;color:var(--text-light);margin-bottom:14px;display:flex;flex-direction:column;gap:4px}
.card-details span{display:flex;align-items:baseline;gap:6px}
.card-details .label{font-weight:600;color:var(--text);min-width:60px}
.card-links{list-style:none;margin-top:auto;display:flex;flex-direction:column;gap:6px}
.card-links li a{display:inline-flex;align-items:center;gap:6px;font-size:.9rem;font-weight:600;padding:4px 0;transition:color var(--transition)}
.card-links li a::before{content:"\2192";color:var(--maroon);font-weight:700}
.card-links li a:hover{color:var(--maroon-dark)}

/* ── Learn More Button ── */
.card-learn-more{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;padding:10px 20px;background:var(--maroon);color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;transition:all var(--transition)}
.card-learn-more:hover{background:var(--maroon-dark);transform:scale(1.02)}
.card-learn-more:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

.card.hidden{display:none}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s ease}
.modal-overlay.open{opacity:1;visibility:visible}
.modal-content{background:#fff;border-radius:16px;max-width:640px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);transform:translateY(20px) scale(.97);transition:transform .3s ease;position:relative}
.modal-overlay.open .modal-content{transform:translateY(0) scale(1)}
.modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.9);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background var(--transition);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.modal-close:hover{background:#fff}
.modal-close:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

.modal-header{background:var(--maroon);color:#fff;padding:28px 24px;display:flex;align-items:center;gap:14px}
.modal-header .card-icon{font-size:2rem}
.modal-header h2{font-size:1.4rem;font-weight:800}
.modal-body{padding:24px}
.modal-desc{font-size:1rem;color:var(--text-light);line-height:1.65;margin-bottom:20px}

/* ── Modal Highlights ── */
.modal-highlights{margin-bottom:24px}
.modal-highlights h3{font-size:.88rem;font-weight:700;color:var(--maroon);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.modal-highlights .chips{display:flex;flex-wrap:wrap;gap:8px}
.modal-highlights .highlight-chip{padding:6px 16px;font-size:.84rem}

/* ── Modal Quote Carousel ── */
.modal-quotes{margin-bottom:24px;background:linear-gradient(135deg,#faf8f9,#f5f0f3);border-radius:12px;padding:24px;position:relative;min-height:120px}
.modal-quotes h3{font-size:.88rem;font-weight:700;color:var(--maroon);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.quote-slide{opacity:0;position:absolute;left:24px;right:24px;top:48px;transition:opacity .5s ease}
.quote-slide.active{opacity:1;position:relative;left:auto;right:auto;top:auto}
.quote-slide blockquote{font-style:italic;font-size:1rem;color:var(--text);line-height:1.6;margin:0;padding-left:20px;border-left:3px solid var(--gold)}
.quote-slide .quote-author{display:block;font-style:normal;font-size:.84rem;font-weight:600;color:var(--maroon);margin-top:10px;padding-left:20px}
.quote-nav{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px}
.quote-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--maroon);background:transparent;cursor:pointer;transition:all var(--transition);padding:0}
.quote-dot.active{background:var(--maroon)}
.quote-dot:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.quote-arrow{width:28px;height:28px;border-radius:50%;border:2px solid var(--silver-light);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--text);transition:all var(--transition)}
.quote-arrow:hover{border-color:var(--maroon);color:var(--maroon)}

/* ── Modal Contact & Details ── */
.modal-contact{display:flex;align-items:center;gap:14px;padding:16px 18px;margin-bottom:20px;background:#f8f5f7;border-radius:10px;border-left:4px solid var(--maroon)}
.modal-contact .contact-avatar{width:44px;height:44px;font-size:1rem}
.modal-contact .contact-info{font-size:.9rem}
.modal-contact .contact-name{font-weight:700;font-size:.95rem}
.modal-details{margin-bottom:20px}
.modal-details span{display:flex;align-items:baseline;gap:8px;font-size:.9rem;color:var(--text-light);padding:3px 0}
.modal-details .label{font-weight:600;color:var(--text);min-width:70px}
.modal-links{list-style:none;display:flex;flex-direction:column;gap:8px}
.modal-links li a{display:inline-flex;align-items:center;gap:8px;font-size:.95rem;font-weight:600;padding:6px 0;transition:color var(--transition)}
.modal-links li a::before{content:"\2192";color:var(--maroon);font-weight:700}
.modal-links li a:hover{color:var(--maroon-dark)}

/* ── No Results ── */
.no-results{display:none;text-align:center;padding:60px 24px;color:var(--text-light);font-size:1.1rem;grid-column:1/-1}
.no-results.show{display:block}

/* ── Footer ── */
footer{text-align:center;padding:24px;font-size:.82rem;color:var(--silver);border-top:1px solid var(--silver-light)}

@media(max-width:640px){
  .modal-content{max-height:92vh;border-radius:12px}
  .modal-header{padding:20px 18px}
  .modal-body{padding:18px}
}
</style>
</head>

/* ── Render Cards ── */
const grid = document.getElementById("grid");
const noResults = document.getElementById("no-results");
const searchInput = document.getElementById("search");

function buildCard(r, i) {
  const c = r.contact || {};
  const initials = (c.name || "").split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();

  const chipsHTML = (r.highlights || []).map(h => `<span class="highlight-chip">${h}</span>`).join("");

  const q = (r.quotes || [])[0];
  const quoteHTML = q
    ? `<div class="card-quote-preview"><span class="quote-text">${q.text.length > 100 ? q.text.slice(0, 100) + "\u2026" : q.text}</span><span class="quote-author">\u2014 ${q.author}</span></div>`
    : "";

  const contactHTML = c.name
    ? `<div class="card-contact">
        <div class="contact-avatar">${initials}</div>
        <div class="contact-info">
          <div class="contact-name">${c.name}</div>
          <div class="contact-title">${c.title || ""}</div>
          ${c.email ? `<div class="contact-email"><a href="mailto:${c.email}">${c.email}</a></div>` : ""}
        </div>
      </div>`
    : "";

  const detailsHTML = Object.keys(r.details).length
    ? `<div class="card-details">${Object.entries(r.details).map(([k,v]) => `<span><span class="label">${k}:</span> ${v}</span>`).join("")}</div>`
    : "";

  const linksHTML = r.links.slice(0, 3).map(([text, url]) => `<li><a href="${url}" target="_blank" rel="noopener">${text}</a></li>`).join("");

  return `<article class="card" data-group="${r.group}" data-index="${i}" style="animation-delay:${i * 40}ms" role="region" aria-label="${r.title}">
    <div class="card-header"><span class="card-icon" aria-hidden="true">${r.icon}</span><h2>${r.title}</h2></div>
    <div class="card-body">
      <p class="card-desc">${r.desc}</p>
      <div class="card-highlights">${chipsHTML}</div>
      ${quoteHTML}
      ${contactHTML}
      ${detailsHTML}
      <ul class="card-links">${linksHTML}</ul>
      <button class="card-learn-more" data-index="${i}" aria-label="Learn more about ${r.title}">Learn More &amp; Student Stories</button>
    </div>
  </article>`;
}

grid.insertAdjacentHTML("afterbegin", resources.map((r, i) => buildCard(r, i)).join(""));

/* ── Search ── */
function filterCards() {
  const query = searchInput.value.toLowerCase().trim();
  const activeGroup = document.querySelector(".pill.active")?.dataset.filter || "all";
  const cards = grid.querySelectorAll(".card");
  let visible = 0;
  cards.forEach(card => {
    const matchesGroup = activeGroup === "all" || card.dataset.group === activeGroup;
    const text = card.textContent.toLowerCase();
    const matchesSearch = !query || text.includes(query);
    const show = matchesGroup && matchesSearch;
    card.classList.toggle("hidden", !show);
    if (show) visible++;
  });
  noResults.classList.toggle("show", visible === 0);
}
searchInput.addEventListener("input", filterCards);

/* ── Pills ── */
document.querySelectorAll(".pill").forEach(pill => {
  pill.addEventListener("click", () => {
    document.querySelector(".pill.active").classList.remove("active");
    pill.classList.add("active");
    filterCards();
  });
});

/* ── Modal ── */
const modal = document.getElementById("modal");
const modalInner = document.getElementById("modal-inner");
const modalClose = document.getElementById("modal-close");
let currentQuoteIndex = 0;

function openModal(index) {
  const r = resources[index];
  const c = r.contact || {};
  const initials = (c.name || "").split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();

  const chipsHTML = (r.highlights || []).map(h => `<span class="highlight-chip">${h}</span>`).join("");

  const quotesHTML = (r.quotes || []).map((q, qi) =>
    `<div class="quote-slide${qi === 0 ? " active" : ""}" data-qi="${qi}">
      <blockquote>${q.text}</blockquote>
      <span class="quote-author">\u2014 ${q.author}</span>
    </div>`
  ).join("");

  const dotsHTML = (r.quotes || []).length > 1
    ? `<div class="quote-nav">
        <button class="quote-arrow" data-dir="-1" aria-label="Previous quote">\u25C0</button>
        ${(r.quotes || []).map((_, qi) => `<button class="quote-dot${qi === 0 ? " active" : ""}" data-qi="${qi}" aria-label="Quote ${qi + 1}"></button>`).join("")}
        <button class="quote-arrow" data-dir="1" aria-label="Next quote">\u25B6</button>
      </div>`
    : "";

  const contactHTML = c.name
    ? `<div class="modal-contact card-contact">
        <div class="contact-avatar">${initials}</div>
        <div class="contact-info">
          <div class="contact-name">${c.name}</div>
          <div class="contact-title">${c.title || ""}</div>
          ${c.email ? `<div class="contact-email"><a href="mailto:${c.email}">${c.email}</a></div>` : ""}
        </div>
      </div>`
    : "";

  const detailsHTML = Object.keys(r.details).length
    ? `<div class="modal-details">${Object.entries(r.details).map(([k,v]) => `<span><span class="label">${k}:</span> ${v}</span>`).join("")}</div>`
    : "";

  const linksHTML = r.links.map(([text, url]) => `<li><a href="${url}" target="_blank" rel="noopener">${text}</a></li>`).join("");

  modalInner.innerHTML = `
    <div class="modal-header"><span class="card-icon" aria-hidden="true">${r.icon}</span><h2>${r.title}</h2></div>
    <div class="modal-body">
      <p class="modal-desc">${r.desc}</p>
      ${chipsHTML ? `<div class="modal-highlights"><h3>What We Offer</h3><div class="chips">${chipsHTML}</div></div>` : ""}
      ${quotesHTML ? `<div class="modal-quotes" id="quote-carousel"><h3>Student Voices</h3>${quotesHTML}${dotsHTML}</div>` : ""}
      ${contactHTML}
      ${detailsHTML}
      <ul class="modal-links">${linksHTML}</ul>
    </div>
  `;

  modal.classList.add("open");
  document.body.style.overflow = "hidden";
  modalClose.focus();
  currentQuoteIndex = 0;
}

function closeModal() {
  modal.classList.remove("open");
  document.body.style.overflow = "";
}

function goToQuote(quotes, qi) {
  if (!quotes.length) return;
  currentQuoteIndex = ((qi % quotes.length) + quotes.length) % quotes.length;
  const carousel = document.getElementById("quote-carousel");
  if (!carousel) return;
  carousel.querySelectorAll(".quote-slide").forEach((s, i) => s.classList.toggle("active", i === currentQuoteIndex));
  carousel.querySelectorAll(".quote-dot").forEach((d, i) => d.classList.toggle("active", i === currentQuoteIndex));
}

modalClose.addEventListener("click", closeModal);
modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
document.addEventListener("keydown", e => {
  if (!modal.classList.contains("open")) return;
  if (e.key === "Escape") closeModal();
  if (e.key === "ArrowRight" || e.key === "ArrowLeft") {
    const idx = parseInt(modalInner.querySelector(".modal-header")?.closest(".modal-content")?.dataset.index);
    const r = resources.find((_, i) => modalInner.innerHTML.includes(resources[i]?.title));
    // Use carousel dots for navigation
    const dir = e.key === "ArrowRight" ? 1 : -1;
    const slides = document.querySelectorAll("#quote-carousel .quote-slide");
    if (slides.length > 1) {
      goToQuote(Array.from(slides), currentQuoteIndex + dir);
    }
  }
});

// Delegate clicks for Learn More buttons and quote nav
document.addEventListener("click", e => {
  const learnMore = e.target.closest(".card-learn-more");
  if (learnMore) {
    e.stopPropagation();
    openModal(parseInt(learnMore.dataset.index));
    return;
  }
  const card = e.target.closest(".card");
  if (card && !e.target.closest("a") && !e.target.closest("button")) {
    openModal(parseInt(card.dataset.index));
    return;
  }
  const dot = e.target.closest(".quote-dot");
  if (dot) {
    const qi = parseInt(dot.dataset.qi);
    const slides = document.querySelectorAll("#quote-carousel .quote-slide");
    goToQuote(Array.from(slides), qi);
    return;
  }
  const arrow = e.target.closest(".quote-arrow");
  if (arrow) {
    const dir = parseInt(arrow.dataset.dir);
    const slides = document.querySelectorAll("#quote-carousel .quote-slide");
    goToQuote(Array.from(slides), currentQuoteIndex + dir);
  }
});
</script>
