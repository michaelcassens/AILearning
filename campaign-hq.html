<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign HQ: Master the Claude Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">


<style>
/* ===== CSS RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #1B2A4A;
  --navy-light: #243660;
  --navy-lighter: #2d4275;
  --red: #E63946;
  --red-dark: #c02e3a;
  --white: #FFFFFF;
  --gold: #FFD166;
  --gold-dark: #e6b84a;
  --green: #2DC653;
  --yellow: #FFC107;
  --gray: #8892a4;
  --card-bg: rgba(255,255,255,0.06);
  --card-border: rgba(255,255,255,0.12);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--navy);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

h1, h2, h3, .font-display {
  font-family: 'Bebas Neue', cursive;
  letter-spacing: 0.04em;
}

/* ===== SCREEN SYSTEM ===== */
.screen {
  display: none;
  min-height: 100vh;
  animation: slideIn 0.35s ease;
}
.screen.active { display: flex; flex-direction: column; }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(30px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ===== SPLASH SCREEN ===== */
#screen-splash {
  position: relative;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  overflow: hidden;
}

#star-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.splash-content {
  position: relative;
  z-index: 1;
  max-width: 520px;
  width: 100%;
}

.splash-logo {
  font-size: clamp(3rem, 10vw, 5.5rem);
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 40px rgba(255,209,102,0.4);
}

.splash-subtitle {
  font-size: clamp(1rem, 3vw, 1.4rem);
  color: var(--white);
  margin-bottom: 2.5rem;
  opacity: 0.9;
  font-family: 'Bebas Neue', cursive;
  letter-spacing: 0.1em;
}

.splash-tagline {
  font-size: 0.9rem;
  color: var(--gray);
  margin-top: 1.5rem;
}

.red-bar {
  width: 80px;
  height: 5px;
  background: var(--red);
  border-radius: 3px;
  margin: 0.75rem auto 1.5rem;
}

/* ===== INPUTS & BUTTONS ===== */
.input-field {
  width: 100%;
  padding: 0.9rem 1.2rem;
  border-radius: 10px;
  border: 2px solid var(--card-border);
  background: rgba(255,255,255,0.08);
  color: var(--white);
  font-size: 1.05rem;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 1rem;
}
.input-field::placeholder { color: var(--gray); }
.input-field:focus { border-color: var(--gold); }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 0.85rem 1.8rem;
  border-radius: 10px;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  text-decoration: none;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.35); }
.btn:active { transform: translateY(0); }

.btn-primary {
  background: var(--red);
  color: var(--white);
  width: 100%;
  font-size: 1.1rem;
  padding: 1rem;
}
.btn-primary:hover { background: var(--red-dark); }

.btn-gold {
  background: var(--gold);
  color: var(--navy);
  font-weight: 800;
}
.btn-gold:hover { background: var(--gold-dark); }

.btn-outline {
  background: transparent;
  border: 2px solid var(--card-border);
  color: var(--white);
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }

.btn-ghost {
  background: rgba(255,255,255,0.08);
  color: var(--white);
  border: 1px solid var(--card-border);
}

/* ===== TRACK SELECT SCREEN ===== */
#screen-tracks {
  padding: 0;
  flex-direction: column;
}

.screen-header {
  background: var(--navy-light);
  border-bottom: 2px solid var(--red);
  padding: 1.2rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

.screen-header h2 {
  font-size: clamp(1.3rem, 4vw, 2rem);
  color: var(--gold);
}

.tracks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.2rem;
  padding: 1.5rem;
  flex: 1;
}

.track-card {
  background: var(--card-bg);
  border: 1.5px solid var(--card-border);
  border-radius: 14px;
  padding: 1.5rem;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}
.track-card:hover {
  border-color: var(--gold);
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.track-card.completed {
  border-color: var(--green);
  background: rgba(45, 198, 83, 0.07);
}

.track-icon { font-size: 2.8rem; margin-bottom: 0.5rem; }
.track-name {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.5rem;
  color: var(--gold);
  letter-spacing: 0.05em;
}
.track-desc { font-size: 0.875rem; color: var(--gray); margin: 0.3rem 0 0.8rem; }
.track-count { font-size: 0.8rem; color: var(--white); opacity: 0.7; }

.track-badge {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: var(--red);
  color: var(--white);
  font-size: 0.65rem;
  font-weight: 800;
  padding: 0.2rem 0.5rem;
  border-radius: 20px;
  letter-spacing: 0.08em;
}

.track-play {
  margin-top: 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.completed-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  background: var(--green);
  color: var(--white);
  font-size: 0.75rem;
  font-weight: 700;
  padding: 0.25rem 0.6rem;
  border-radius: 20px;
}

/* ===== SCENARIO SCREEN ===== */
#screen-scenario {
  flex-direction: column;
  min-height: 100vh;
}

.scenario-topbar {
  background: var(--navy-light);
  border-bottom: 2px solid var(--red);
  padding: 0.8rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.topbar-track {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.1rem;
  color: var(--gold);
  letter-spacing: 0.05em;
}

.topbar-score {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--white);
  margin-left: auto;
}

.topbar-progress { font-size: 0.85rem; color: var(--gray); }

.progress-bar-wrap {
  height: 6px;
  background: rgba(255,255,255,0.12);
  border-radius: 3px;
  overflow: hidden;
  margin: 0 1.2rem;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), var(--gold));
  border-radius: 3px;
  transition: width 0.5s ease;
}

.scenario-body {
  flex: 1;
  padding: 1.5rem;
  max-width: 760px;
  width: 100%;
  margin: 0 auto;
}

.situation-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  background: var(--red);
  color: var(--white);
  font-size: 0.75rem;
  font-weight: 800;
  padding: 0.3rem 0.75rem;
  border-radius: 20px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

.scenario-title {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 0.75rem;
}

.scenario-desc {
  font-size: 1rem;
  color: rgba(255,255,255,0.85);
  line-height: 1.6;
  margin-bottom: 1.5rem;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-left: 4px solid var(--gold);
  padding: 1rem 1.2rem;
  border-radius: 0 10px 10px 0;
}

.your-move {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

.answer-btn {
  width: 100%;
  text-align: left;
  padding: 1rem 1.2rem;
  margin-bottom: 0.7rem;
  border-radius: 10px;
  border: 1.5px solid var(--card-border);
  background: var(--card-bg);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  line-height: 1.5;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  display: flex;
  gap: 0.75rem;
  align-items: flex-start;
}
.answer-btn:hover:not(:disabled) {
  border-color: var(--gold);
  background: rgba(255,209,102,0.08);
  transform: translateX(3px);
}
.answer-btn:disabled { cursor: default; }

.answer-btn.correct   { border-color: var(--green);  background: rgba(45,198,83,0.15); }
.answer-btn.good      { border-color: var(--yellow);  background: rgba(255,193,7,0.15); }
.answer-btn.okay      { border-color: var(--yellow);  background: rgba(255,193,7,0.1); }
.answer-btn.weak      { border-color: var(--red);     background: rgba(230,57,70,0.12); }

.answer-letter {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.8rem;
  color: var(--gold);
}

.score-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-family: 'Bebas Neue', cursive;
  font-size: 1.6rem;
  letter-spacing: 0.05em;
  padding: 0.3rem 1rem;
  border-radius: 8px;
  animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.score-badge.s100 { background: rgba(45,198,83,0.2);  color: var(--green); }
.score-badge.s75  { background: rgba(255,209,102,0.2); color: var(--gold); }
.score-badge.s50  { background: rgba(255,193,7,0.2);   color: var(--yellow); }
.score-badge.s25  { background: rgba(230,57,70,0.2);   color: var(--red); }

.feedback-panel {
  background: var(--navy-light);
  border: 1.5px solid var(--card-border);
  border-radius: 12px;
  padding: 1.2rem;
  margin-top: 1rem;
  animation: slideIn 0.3s ease;
}

.feedback-text {
  font-size: 0.95rem;
  line-height: 1.6;
  color: rgba(255,255,255,0.9);
  margin-bottom: 0.8rem;
}

.pro-tip {
  background: rgba(255,209,102,0.1);
  border: 1px solid rgba(255,209,102,0.3);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  font-size: 0.875rem;
  color: var(--gold);
  line-height: 1.5;
}

.pro-tip-label {
  font-weight: 800;
  display: block;
  margin-bottom: 0.3rem;
}

#btn-next {
  margin-top: 1.2rem;
  display: none;
  background: var(--red);
  color: var(--white);
  padding: 0.9rem 2rem;
  font-size: 1rem;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
#btn-next:hover { background: var(--red-dark); transform: translateY(-2px); }

/* ===== MISSION COMPLETE ===== */
#screen-complete {
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}

#confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.complete-content {
  position: relative;
  z-index: 1;
  max-width: 520px;
  width: 100%;
}

.complete-title {
  font-size: clamp(2.5rem, 8vw, 4rem);
  color: var(--gold);
  line-height: 1;
}

.stars-display {
  font-size: 2.5rem;
  margin: 0.75rem 0;
  letter-spacing: 0.2rem;
}

.complete-score {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(2rem, 6vw, 3rem);
  color: var(--white);
  margin: 0.5rem 0;
}

.mission-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(255,209,102,0.15);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 0.8rem 1.5rem;
  margin: 1rem 0;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gold);
}

.complete-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 1.5rem;
}

/* ===== LEADERBOARD ===== */
#screen-leaderboard {
  flex-direction: column;
}

.leaderboard-body {
  flex: 1;
  padding: 1.5rem;
  max-width: 700px;
  width: 100%;
  margin: 0 auto;
}

.leaderboard-table {
  width: 100%;
  border-collapse: collapse;
}

.leaderboard-table th {
  text-align: left;
  padding: 0.6rem 0.8rem;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--gray);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--card-border);
}

.leaderboard-table td {
  padding: 0.75rem 0.8rem;
  font-size: 0.9rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.leaderboard-table tr.mine td {
  background: rgba(255,209,102,0.1);
  color: var(--gold);
  font-weight: 700;
}

.rank-1 { color: var(--gold); font-weight: 800; }
.rank-2 { color: #C0C0C0; }
.rank-3 { color: #CD7F32; }

.local-note {
  background: rgba(255,209,102,0.08);
  border: 1px solid rgba(255,209,102,0.25);
  border-radius: 10px;
  padding: 1rem;
  font-size: 0.875rem;
  color: rgba(255,255,255,0.8);
  margin-bottom: 1.5rem;
}

.spinner {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== SCORE COUNTER ===== */
#score-counter {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.1rem;
  color: var(--gold);
  transition: transform 0.2s;
}
#score-counter.bump {
  transform: scale(1.4);
}

/* ===== UTILITY ===== */
.text-center { text-align: center; }
.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.mt-3 { margin-top: 1.5rem; }
.mb-1 { margin-bottom: 0.5rem; }
.mb-2 { margin-bottom: 1rem; }
.hidden { display: none !important; }
.gold { color: var(--gold); }
.red { color: var(--red); }
.green { color: var(--green); }

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .tracks-grid { grid-template-columns: 1fr; padding: 1rem; gap: 1rem; }
  .scenario-body { padding: 1rem; }
  .screen-header { padding: 0.9rem 1rem; }
  .complete-actions { flex-direction: column; }
  .complete-actions .btn { width: 100%; }
  .leaderboard-table th:nth-child(4),
  .leaderboard-table td:nth-child(4) { display: none; }
}

/* ===== SCORE ANIMATION ===== */
@keyframes scoreFloat {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-60px); }
}
.score-float {
  position: fixed;
  font-family: 'Bebas Neue', cursive;
  font-size: 2rem;
  color: var(--gold);
  pointer-events: none;
  animation: scoreFloat 1.2s ease forwards;
  z-index: 999;
}
</style>
</head>
<body>

<!-- ============================
     SCREEN 1: SPLASH
     ============================ -->
<div id="screen-splash" class="screen active">
  <canvas id="star-canvas"></canvas>
  <div class="splash-content">
    <div class="splash-logo">Campaign HQ</div>
    <div class="red-bar"></div>
    <div class="splash-subtitle">Master the Claude Toolkit</div>
    <input id="player-name" class="input-field" type="text" placeholder="Enter your volunteer name" maxlength="30" autocomplete="off">
    <button class="btn btn-primary" onclick="startGame()">Join the Mission →</button>
    <p class="splash-tagline">Learn Claude tools through real campaign scenarios</p>
  </div>
</div>

<!-- ============================
     SCREEN 2: TRACK SELECT
     ============================ -->
<div id="screen-tracks" class="screen">
  <div class="screen-header">
    <h2 id="tracks-heading">Choose Your Mission</h2>
    <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
      <span style="font-size:0.9rem;color:var(--gray);">Total Score: <span id="total-score-display" style="color:var(--gold);font-weight:800;">0</span></span>
    </div>
  </div>
  <div class="tracks-grid" id="tracks-grid"></div>
</div>

<!-- ============================
     SCREEN 3: SCENARIO
     ============================ -->
<div id="screen-scenario" class="screen">
  <div class="scenario-topbar">
    <span class="topbar-track" id="topbar-track-name"></span>
    <span class="topbar-progress" id="topbar-progress"></span>
    <span class="topbar-score">Score: <span id="score-counter">0</span></span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div>
  </div>
  <div class="scenario-body" id="scenario-body"></div>
</div>

<!-- ============================
     SCREEN 4: MISSION COMPLETE
     ============================ -->
<div id="screen-complete" class="screen">
  <canvas id="confetti-canvas"></canvas>
  <div class="complete-content">
    <div class="complete-title">Mission Complete!</div>
    <div style="font-size:1.5rem;margin:0.3rem 0;">🎉</div>
    <div class="stars-display" id="stars-display">⭐⭐⭐</div>
    <div class="complete-score" id="complete-score-display">+500 pts</div>
    <div style="font-size:0.85rem;color:var(--gray);margin-bottom:0.5rem;">Mission Score</div>
    <div class="mission-badge" id="mission-badge-display"></div>
    <div style="font-size:0.85rem;color:var(--gray);">
      Total Campaign Score: <span id="complete-total" style="color:var(--gold);font-weight:700;">0</span> pts
    </div>
    <div class="complete-actions">
      <button class="btn btn-gold" onclick="showScreen('tracks')">Pick Another Mission</button>
    </div>
  </div>
</div>


<script>

// =====================================================================
// GAME DATA
// =====================================================================
const TRACKS = [
  {
    id: "chat",
    icon: "🗣️",
    name: "Chat Central",
    desc: "Master Claude Chat",
    badge: null,
    earnedBadge: "🗣️ Chat Champion",
    scenarios: [
      {
        situationBadge: "🚨 RAPID RESPONSE",
        title: "The candidate is going on local TV in 20 minutes",
        desc: "You need to get them 5 talking points on housing affordability — fast. How do you prompt Claude?",
        answers: [
          { letter:"A", text:'Claude, give me housing talking points', pts:50,
            feedback:"Not bad, but vague! Claude will give you something generic. You didn't specify the format, count, audience, or length.",
            tip:"Always specify: how many, for whom, what format, and how long." },
          { letter:"B", text:'Give me 5 punchy talking points on housing affordability for a 2-minute TV interview in Montana. Use plain language, focus on solutions voters can visualize, and avoid policy jargon.', pts:100,
            feedback:"Excellent! You gave Claude the format (5 punchy points), context (TV interview, Montana), style (plain language, solution-focused), and constraint (no jargon).",
            tip:"Context + Task + Format + Constraints = 🔥 prompt." },
          { letter:"C", text:'Help me with housing', pts:25,
            feedback:"Too vague! Claude has no idea what you need — a summary? A speech? Stats? It'll guess, and probably guess wrong.",
            tip:"Think: what would I tell a very smart intern to do?" },
          { letter:"D", text:'Open Google and search for housing talking points', pts:25,
            feedback:"Claude can synthesize and customize talking points for your specific candidate and audience in seconds. Google won't do that!",
            tip:"Claude is faster than search for drafting because it can customize to your exact needs." }
        ]
      },
      {
        situationBadge: "✏️ REVISION TIME",
        title: "The draft came back too stiff",
        desc: "You asked Claude to write a volunteer recruitment post but it sounds like a corporate press release. What do you do next?",
        answers: [
          { letter:"A", text:'Delete it and start over with a new prompt', pts:25,
            feedback:"You're throwing away a good first draft! Claude already has all the context. A revision prompt is faster.",
            tip:"Never start over — refine. Claude holds the context of what it wrote." },
          { letter:"B", text:'"Make this sound warmer and more personal, like a friend texting a friend — keep all the facts but lose the formality"', pts:100,

// =====================================================================
// GAME STATE
// =====================================================================
let gameState = {
  playerName: "",
  currentTrack: null,
  currentScenarioIndex: 0,
  sessionScore: 0,
  trackScores: {},
  earnedBadges: [],
  completedTracks: [],
  currentTrackScore: 0,
};

// =====================================================================
// SCREEN MANAGEMENT
// =====================================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + name);
  if (el) el.classList.add('active');

  if (name === 'tracks') renderTracks();
}

// =====================================================================
// SPLASH SCREEN
// =====================================================================
function startGame() {
  const nameInput = document.getElementById('player-name');
  const name = nameInput.value.trim();
  if (!name) {
    nameInput.style.borderColor = 'var(--red)';
    nameInput.placeholder = 'Please enter your name first!';
    nameInput.focus();
    return;
  }
  gameState.playerName = name;
  document.getElementById('tracks-heading').textContent = `Choose Your Mission, ${name}!`;
  showScreen('tracks');
}

document.getElementById('player-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});

// =====================================================================
// STAR BACKGROUND
// =====================================================================
(function initStars() {
  const canvas = document.getElementById('star-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({length: 120}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.005 + 0.002,
      phase: Math.random() * Math.PI * 2,
    }));
  }
  resize();
  window.addEventListener('resize', resize);

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

// =====================================================================
// TRACK SELECT SCREEN
// =====================================================================
function renderTracks() {
  document.getElementById('total-score-display').textContent = gameState.sessionScore;
  const grid = document.getElementById('tracks-grid');
  grid.innerHTML = '';

  TRACKS.forEach(track => {
    const completed = gameState.completedTracks.includes(track.id);
    const div = document.createElement('div');
    div.className = 'track-card' + (completed ? ' completed' : '');
    div.innerHTML = `
      ${track.badge ? `<div class="track-badge">${track.badge}</div>` : ''}
      <div class="track-icon">${track.icon}</div>
      <div class="track-name">${track.name}</div>
      <div class="track-desc">${track.desc}</div>
      <div class="track-count">${track.scenarios.length} scenarios</div>
      <div class="track-play">
        ${completed
          ? `<span class="completed-badge">✓ Completed</span>`
          : ''}
        <button class="btn btn-primary" style="flex:1;margin-left:${completed?'0.5rem':'0'}" onclick="startTrack('${track.id}')">
          ${completed ? 'Play Again' : 'Play →'}
        </button>
      </div>
    `;
    grid.appendChild(div);
  });
}

// =====================================================================
// SCENARIO SCREEN
// =====================================================================
function startTrack(trackId) {
  const track = TRACKS.find(t => t.id === trackId);
  if (!track) return;
  gameState.currentTrack = track;
  gameState.currentScenarioIndex = 0;
  gameState.currentTrackScore = 0;
  renderScenario();
  showScreen('scenario');
}

function renderScenario() {
  const track = gameState.currentTrack;
  const idx = gameState.currentScenarioIndex;
  const scenario = track.scenarios[idx];
  const total = track.scenarios.length;

  // Topbar
  document.getElementById('topbar-track-name').textContent = `${track.icon} ${track.name}`;
  document.getElementById('topbar-progress').textContent = `Scenario ${idx + 1} of ${total}`;
  updateScoreDisplay();

  // Progress bar
  const pct = (idx / total) * 100;
  document.getElementById('progress-bar-fill').style.width = pct + '%';

  // Body
  const body = document.getElementById('scenario-body');
  body.innerHTML = `
    <div class="situation-badge">${scenario.situationBadge}</div>
    <div class="scenario-title">${scenario.title}</div>
    <div class="scenario-desc">${scenario.desc}</div>
    <div class="your-move">— Your Move —</div>
    <div id="answers-container">
      ${scenario.answers.map((a, i) => `
        <button class="answer-btn" onclick="selectAnswer(${i})" data-index="${i}">
          <span class="answer-letter">${a.letter}</span>
          <span>${a.text}</span>
        </button>
      `).join('')}
    </div>
    <div id="feedback-container"></div>
    <button id="btn-next" onclick="nextScenario()"></button>
  `;
}

function selectAnswer(answerIndex) {
  const track = gameState.currentTrack;
  const scenario = track.scenarios[gameState.currentScenarioIndex];
  const answer = scenario.answers[answerIndex];
  const pts = answer.pts;
  const isLast = gameState.currentScenarioIndex === track.scenarios.length - 1;

  // Disable all buttons
  document.querySelectorAll('.answer-btn').forEach(btn => {
    btn.disabled = true;
    const idx = parseInt(btn.getAttribute('data-index'));
    const aPts = scenario.answers[idx].pts;
    if (idx === answerIndex) {
      if (aPts === 100) btn.classList.add('correct');
      else if (aPts === 75) btn.classList.add('good');
      else if (aPts === 50) btn.classList.add('okay');
      else btn.classList.add('weak');
    }
  });

  // Update scores
  gameState.currentTrackScore += pts;
  gameState.sessionScore += pts;
  updateScoreDisplay(true);

  // Score float animation
  floatScore(pts);

  // Score badge
  const scoreClass = pts === 100 ? 's100' : pts === 75 ? 's75' : pts === 50 ? 's50' : 's25';
  const scoreLabel = pts === 100 ? '🔥 +100 pts!' : pts === 75 ? '👍 +75 pts' : pts === 50 ? '✓ +50 pts' : '⚠ +25 pts';

  // Feedback
  const feedbackEl = document.getElementById('feedback-container');
  feedbackEl.innerHTML = `
    <div style="margin: 0.75rem 0;">
      <span class="score-badge ${scoreClass}">${scoreLabel}</span>
    </div>
    <div class="feedback-panel">
      <div class="feedback-text">${answer.feedback}</div>
      <div class="pro-tip">
        <span class="pro-tip-label">Claude Pro Tip 💡</span>
        ${answer.tip}
      </div>
    </div>
  `;

  // Next button
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = isLast ? '🎉 Complete Mission!' : 'Next →';
  nextBtn.style.display = 'block';
  nextBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextScenario() {
  const track = gameState.currentTrack;
  gameState.currentScenarioIndex++;
  if (gameState.currentScenarioIndex >= track.scenarios.length) {
    completeMission();
  } else {
    renderScenario();
    document.getElementById('scenario-body').scrollIntoView({ behavior: 'smooth' });
  }
}

function updateScoreDisplay(animate = false) {
  const el = document.getElementById('score-counter');
  animateCount(el, parseInt(el.textContent) || 0, gameState.sessionScore, 600);
  if (animate) {
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 300);
  }
  document.getElementById('total-score-display').textContent = gameState.sessionScore;
}

function animateCount(el, from, to, duration) {
  const start = performance.now();
  function step(now) {
    const progress = Math.min((now - start) / duration, 1);
    const value = Math.round(from + (to - from) * easeOut(progress));
    el.textContent = value;
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function floatScore(pts) {
  const el = document.createElement('div');
  el.className = 'score-float';
  el.textContent = '+' + pts;
  el.style.left = (Math.random() * 60 + 20) + '%';
  el.style.top = '30%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

// =====================================================================
// MISSION COMPLETE
// =====================================================================
function completeMission() {
  const track = gameState.currentTrack;
  const maxPossible = track.scenarios.length * 100;
  const pct = gameState.currentTrackScore / maxPossible;

  // Stars
  let stars = pct >= 0.9 ? '⭐⭐⭐' : pct >= 0.7 ? '⭐⭐' : '⭐';

  // Badge
  const badge = track.earnedBadge;
  if (!gameState.earnedBadges.includes(badge)) {
    gameState.earnedBadges.push(badge);
  }
  if (!gameState.completedTracks.includes(track.id)) {
    gameState.completedTracks.push(track.id);
  }
  gameState.trackScores[track.id] = (gameState.trackScores[track.id] || 0) + gameState.currentTrackScore;

  // Check for legend badge
  if (gameState.completedTracks.length === TRACKS.length && !gameState.earnedBadges.includes('🌟 Campaign Legend')) {
    gameState.earnedBadges.push('🌟 Campaign Legend');
  }

  // Update UI
  document.getElementById('stars-display').textContent = stars;
  document.getElementById('complete-score-display').textContent = `+${gameState.currentTrackScore} pts`;
  document.getElementById('complete-total').textContent = gameState.sessionScore;

  const badgesHtml = gameState.earnedBadges.map(b => `<span class="mission-badge">${b}</span>`).join(' ');
  document.getElementById('mission-badge-display').outerHTML = `<div id="mission-badge-display" style="display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin:0.75rem 0;">${badgesHtml}</div>`;

  showScreen('complete');
  startConfetti();
}

// =====================================================================
// CONFETTI
// =====================================================================
function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const COLORS = ['#E63946','#FFD166','#2DC653','#4ECDC4','#FFFFFF','#FF6B6B'];
  const pieces = Array.from({length: 160}, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * 200,
    w: 8 + Math.random() * 8,
    h: 4 + Math.random() * 4,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.2,
    vx: (Math.random() - 0.5) * 3,
    vy: 2 + Math.random() * 3,
  }));

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.angle += p.spin;
      p.vy += 0.05; // gravity
    });
    frame++;
    if (frame < 240) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  requestAnimationFrame(draw);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

showScreen('splash');
