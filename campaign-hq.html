<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign HQ: Master the Claude Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">


<style>
/* ===== CSS RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #1B2A4A;
  --navy-light: #243660;
  --navy-lighter: #2d4275;
  --red: #E63946;
  --red-dark: #c02e3a;
  --white: #FFFFFF;
  --gold: #FFD166;
  --gold-dark: #e6b84a;
  --green: #2DC653;
  --yellow: #FFC107;
  --gray: #8892a4;
  --card-bg: rgba(255,255,255,0.06);
  --card-border: rgba(255,255,255,0.12);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--navy);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

h1, h2, h3, .font-display {
  font-family: 'Bebas Neue', cursive;
  letter-spacing: 0.04em;
}

/* ===== SCREEN SYSTEM ===== */
.screen {
  display: none;
  min-height: 100vh;
  animation: slideIn 0.35s ease;
}
.screen.active { display: flex; flex-direction: column; }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(30px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ===== SPLASH SCREEN ===== */
#screen-splash {
  position: relative;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  overflow: hidden;
}

#star-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.splash-content {
  position: relative;
  z-index: 1;
  max-width: 520px;
  width: 100%;
}

.splash-logo {
  font-size: clamp(3rem, 10vw, 5.5rem);
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 40px rgba(255,209,102,0.4);
}

.splash-subtitle {
  font-size: clamp(1rem, 3vw, 1.4rem);
  color: var(--white);
  margin-bottom: 2.5rem;
  opacity: 0.9;
  font-family: 'Bebas Neue', cursive;
  letter-spacing: 0.1em;
}

.splash-tagline {
  font-size: 0.9rem;
  color: var(--gray);
  margin-top: 1.5rem;
}

.red-bar {
  width: 80px;
  height: 5px;
  background: var(--red);
  border-radius: 3px;
  margin: 0.75rem auto 1.5rem;
}

/* ===== INPUTS & BUTTONS ===== */
.input-field {
  width: 100%;
  padding: 0.9rem 1.2rem;
  border-radius: 10px;
  border: 2px solid var(--card-border);
  background: rgba(255,255,255,0.08);
  color: var(--white);
  font-size: 1.05rem;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 1rem;
}
.input-field::placeholder { color: var(--gray); }
.input-field:focus { border-color: var(--gold); }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 0.85rem 1.8rem;
  border-radius: 10px;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  text-decoration: none;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.35); }
.btn:active { transform: translateY(0); }

.btn-primary {
  background: var(--red);
  color: var(--white);
  width: 100%;
  font-size: 1.1rem;
  padding: 1rem;
}
.btn-primary:hover { background: var(--red-dark); }

.btn-gold {
  background: var(--gold);
  color: var(--navy);
  font-weight: 800;
}
.btn-gold:hover { background: var(--gold-dark); }

.btn-outline {
  background: transparent;
  border: 2px solid var(--card-border);
  color: var(--white);
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }

.btn-ghost {
  background: rgba(255,255,255,0.08);
  color: var(--white);
  border: 1px solid var(--card-border);
}

/* ===== TRACK SELECT SCREEN ===== */
#screen-tracks {
  padding: 0;
  flex-direction: column;
}

.screen-header {
  background: var(--navy-light);
  border-bottom: 2px solid var(--red);
  padding: 1.2rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

.screen-header h2 {
  font-size: clamp(1.3rem, 4vw, 2rem);
  color: var(--gold);
}

.tracks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.2rem;
  padding: 1.5rem;
  flex: 1;
}

.track-card {
  background: var(--card-bg);
  border: 1.5px solid var(--card-border);
  border-radius: 14px;
  padding: 1.5rem;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}
.track-card:hover {
  border-color: var(--gold);
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.track-card.completed {
  border-color: var(--green);
  background: rgba(45, 198, 83, 0.07);
}

.track-icon { font-size: 2.8rem; margin-bottom: 0.5rem; }
.track-name {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.5rem;
  color: var(--gold);
  letter-spacing: 0.05em;
}
.track-desc { font-size: 0.875rem; color: var(--gray); margin: 0.3rem 0 0.8rem; }
.track-count { font-size: 0.8rem; color: var(--white); opacity: 0.7; }

.track-badge {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: var(--red);
  color: var(--white);
  font-size: 0.65rem;
  font-weight: 800;
  padding: 0.2rem 0.5rem;
  border-radius: 20px;
  letter-spacing: 0.08em;
}

.track-play {
  margin-top: 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.completed-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  background: var(--green);
  color: var(--white);
  font-size: 0.75rem;
  font-weight: 700;
  padding: 0.25rem 0.6rem;
  border-radius: 20px;
}

/* ===== SCENARIO SCREEN ===== */
#screen-scenario {
  flex-direction: column;
  min-height: 100vh;
}

.scenario-topbar {
  background: var(--navy-light);
  border-bottom: 2px solid var(--red);
  padding: 0.8rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.topbar-track {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.1rem;
  color: var(--gold);
  letter-spacing: 0.05em;
}

.topbar-score {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--white);
  margin-left: auto;
}

.topbar-progress { font-size: 0.85rem; color: var(--gray); }

.progress-bar-wrap {
  height: 6px;
  background: rgba(255,255,255,0.12);
  border-radius: 3px;
  overflow: hidden;
  margin: 0 1.2rem;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), var(--gold));
  border-radius: 3px;
  transition: width 0.5s ease;
}

.scenario-body {
  flex: 1;
  padding: 1.5rem;
  max-width: 760px;
  width: 100%;
  margin: 0 auto;
}

.situation-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  background: var(--red);
  color: var(--white);
  font-size: 0.75rem;
  font-weight: 800;
  padding: 0.3rem 0.75rem;
  border-radius: 20px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

.scenario-title {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 0.75rem;
}

.scenario-desc {
  font-size: 1rem;
  color: rgba(255,255,255,0.85);
  line-height: 1.6;
  margin-bottom: 1.5rem;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-left: 4px solid var(--gold);
  padding: 1rem 1.2rem;
  border-radius: 0 10px 10px 0;
}

.your-move {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

.answer-btn {
  width: 100%;
  text-align: left;
  padding: 1rem 1.2rem;
  margin-bottom: 0.7rem;
  border-radius: 10px;
  border: 1.5px solid var(--card-border);
  background: var(--card-bg);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  line-height: 1.5;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  display: flex;
  gap: 0.75rem;
  align-items: flex-start;
}
.answer-btn:hover:not(:disabled) {
  border-color: var(--gold);
  background: rgba(255,209,102,0.08);
  transform: translateX(3px);
}
.answer-btn:disabled { cursor: default; }

.answer-btn.correct   { border-color: var(--green);  background: rgba(45,198,83,0.15); }
.answer-btn.good      { border-color: var(--yellow);  background: rgba(255,193,7,0.15); }
.answer-btn.okay      { border-color: var(--yellow);  background: rgba(255,193,7,0.1); }
.answer-btn.weak      { border-color: var(--red);     background: rgba(230,57,70,0.12); }

.answer-letter {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.8rem;
  color: var(--gold);
}

.score-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-family: 'Bebas Neue', cursive;
  font-size: 1.6rem;
  letter-spacing: 0.05em;
  padding: 0.3rem 1rem;
  border-radius: 8px;
  animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.score-badge.s100 { background: rgba(45,198,83,0.2);  color: var(--green); }
.score-badge.s75  { background: rgba(255,209,102,0.2); color: var(--gold); }
.score-badge.s50  { background: rgba(255,193,7,0.2);   color: var(--yellow); }
.score-badge.s25  { background: rgba(230,57,70,0.2);   color: var(--red); }

.feedback-panel {
  background: var(--navy-light);
  border: 1.5px solid var(--card-border);
  border-radius: 12px;
  padding: 1.2rem;
  margin-top: 1rem;
  animation: slideIn 0.3s ease;
}

.feedback-text {
  font-size: 0.95rem;
  line-height: 1.6;
  color: rgba(255,255,255,0.9);
  margin-bottom: 0.8rem;
}

.pro-tip {
  background: rgba(255,209,102,0.1);
  border: 1px solid rgba(255,209,102,0.3);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  font-size: 0.875rem;
  color: var(--gold);
  line-height: 1.5;
}

.pro-tip-label {
  font-weight: 800;
  display: block;
  margin-bottom: 0.3rem;
}

#btn-next {
  margin-top: 1.2rem;
  display: none;
  background: var(--red);
  color: var(--white);
  padding: 0.9rem 2rem;
  font-size: 1rem;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
#btn-next:hover { background: var(--red-dark); transform: translateY(-2px); }

/* ===== MISSION COMPLETE ===== */
#screen-complete {
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}

#confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.complete-content {
  position: relative;
  z-index: 1;
  max-width: 520px;
  width: 100%;
}

.complete-title {
  font-size: clamp(2.5rem, 8vw, 4rem);
  color: var(--gold);
  line-height: 1;
}

.stars-display {
  font-size: 2.5rem;
  margin: 0.75rem 0;
  letter-spacing: 0.2rem;
}

.complete-score {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(2rem, 6vw, 3rem);
  color: var(--white);
  margin: 0.5rem 0;
}

.mission-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(255,209,102,0.15);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 0.8rem 1.5rem;
  margin: 1rem 0;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gold);
}

.complete-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 1.5rem;
}

/* ===== LEADERBOARD ===== */
#screen-leaderboard {
  flex-direction: column;
}

.leaderboard-body {
  flex: 1;
  padding: 1.5rem;
  max-width: 700px;
  width: 100%;
  margin: 0 auto;
}

.leaderboard-table {
  width: 100%;
  border-collapse: collapse;
}

.leaderboard-table th {
  text-align: left;
  padding: 0.6rem 0.8rem;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--gray);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--card-border);
}

.leaderboard-table td {
  padding: 0.75rem 0.8rem;
  font-size: 0.9rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.leaderboard-table tr.mine td {
  background: rgba(255,209,102,0.1);
  color: var(--gold);
  font-weight: 700;
}

.rank-1 { color: var(--gold); font-weight: 800; }
.rank-2 { color: #C0C0C0; }
.rank-3 { color: #CD7F32; }

.local-note {
  background: rgba(255,209,102,0.08);
  border: 1px solid rgba(255,209,102,0.25);
  border-radius: 10px;
  padding: 1rem;
  font-size: 0.875rem;
  color: rgba(255,255,255,0.8);
  margin-bottom: 1.5rem;
}

.spinner {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== SCORE COUNTER ===== */
#score-counter {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.1rem;
  color: var(--gold);
  transition: transform 0.2s;
}
#score-counter.bump {
  transform: scale(1.4);
}

/* ===== UTILITY ===== */
.text-center { text-align: center; }
.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.mt-3 { margin-top: 1.5rem; }
.mb-1 { margin-bottom: 0.5rem; }
.mb-2 { margin-bottom: 1rem; }
.hidden { display: none !important; }
.gold { color: var(--gold); }
.red { color: var(--red); }
.green { color: var(--green); }

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .tracks-grid { grid-template-columns: 1fr; padding: 1rem; gap: 1rem; }
  .scenario-body { padding: 1rem; }
  .screen-header { padding: 0.9rem 1rem; }
  .complete-actions { flex-direction: column; }
  .complete-actions .btn { width: 100%; }
  .leaderboard-table th:nth-child(4),
  .leaderboard-table td:nth-child(4) { display: none; }
}

/* ===== SCORE ANIMATION ===== */
@keyframes scoreFloat {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-60px); }
}
.score-float {
  position: fixed;
  font-family: 'Bebas Neue', cursive;
  font-size: 2rem;
  color: var(--gold);
  pointer-events: none;
  animation: scoreFloat 1.2s ease forwards;
  z-index: 999;
}

/* ===== RANK INTERACTION ===== */
.rank-list { display:flex; flex-direction:column; gap:0.6rem; margin:1rem 0; }
.rank-item {
  display:flex; align-items:center; gap:0.75rem;
  background:var(--card-bg); border:1.5px solid var(--card-border);
  border-radius:10px; padding:0.75rem 1rem; cursor:pointer;
  transition: border-color 0.2s, background 0.2s;
}
.rank-item:hover { border-color: var(--gold); }
.rank-item.ranked { border-color: var(--gold); background: rgba(255,209,102,0.08); }
.rank-item.rank-correct { border-color: var(--green); background: rgba(45,198,83,0.1); }
.rank-item.rank-wrong { border-color: var(--red); background: rgba(230,57,70,0.1); }
.rank-badge {
  min-width:2rem; height:2rem; border-radius:50%;
  background:var(--navy-lighter); display:flex; align-items:center; justify-content:center;
  font-size:0.8rem; font-weight:800; color:var(--gold); flex-shrink:0;
}
.rank-badge.empty { color:var(--gray); }
.rank-instructions { font-size:0.85rem; color:var(--gray); margin-bottom:0.5rem; text-align:center; }
.rank-labels { display:flex; justify-content:space-between; font-size:0.75rem; color:var(--gray); padding:0 0.5rem; margin-bottom:0.25rem; }

/* ===== BUILD INTERACTION ===== */
.build-prompt-preview {
  background:rgba(0,0,0,0.3); border:1.5px dashed var(--card-border);
  border-radius:10px; padding:1rem; margin:1rem 0; min-height:3rem;
  font-size:0.85rem; line-height:1.6; color:var(--white);
  font-style:italic;
}
.build-prompt-preview.has-content { border-color: var(--gold); font-style:normal; }
.chips-grid { display:flex; flex-wrap:wrap; gap:0.5rem; margin:1rem 0; }
.chip {
  padding:0.4rem 0.85rem; border-radius:20px; border:1.5px solid var(--card-border);
  background:var(--card-bg); cursor:pointer; font-size:0.82rem; font-weight:500;
  transition:all 0.18s; user-select:none;
}
.chip:hover { border-color:var(--gold); }
.chip.selected { background:rgba(255,209,102,0.15); border-color:var(--gold); color:var(--gold); }
.chip.chip-correct { border-color:var(--green); background:rgba(45,198,83,0.12); color:var(--green); }
.chip.chip-wrong { border-color:var(--red); background:rgba(230,57,70,0.12); color:var(--red); }
.build-legend { font-size:0.8rem; color:var(--gray); margin-top:0.25rem; }

/* ===== SPOT INTERACTION ===== */
.bad-prompt-box {
  background:rgba(230,57,70,0.08); border:1.5px solid rgba(230,57,70,0.3);
  border-radius:10px; padding:1rem 1.25rem; margin:1rem 0;
  font-size:0.9rem; line-height:1.6; color:#ffc0c0;
}
.bad-prompt-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--red); font-weight:700; margin-bottom:0.35rem; }
.flaw-list { display:flex; flex-direction:column; gap:0.5rem; margin:1rem 0; }
.flaw-item {
  display:flex; align-items:flex-start; gap:0.75rem;
  background:var(--card-bg); border:1.5px solid var(--card-border);
  border-radius:8px; padding:0.65rem 0.9rem; cursor:pointer;
  transition:all 0.18s;
}
.flaw-item:hover { border-color:var(--gold); }
.flaw-item.checked { background:rgba(255,209,102,0.08); border-color:var(--gold); }
.flaw-item.flaw-correct { border-color:var(--green); background:rgba(45,198,83,0.1); }
.flaw-item.flaw-wrong { border-color:var(--red); background:rgba(230,57,70,0.1); }
.flaw-check {
  width:1.1rem; height:1.1rem; border:2px solid var(--gray);
  border-radius:4px; flex-shrink:0; margin-top:0.1rem;
  display:flex; align-items:center; justify-content:center; font-size:0.75rem;
}
.flaw-item.checked .flaw-check { border-color:var(--gold); background:var(--gold); color:var(--navy); }

/* ===== CHALLENGE INTERACTION ===== */
.challenge-box {
  background:rgba(78,204,196,0.08); border:1.5px solid rgba(78,204,196,0.3);
  border-radius:10px; padding:1.25rem; margin:1rem 0;
}
.challenge-step { font-size:0.8rem; text-transform:uppercase; letter-spacing:0.08em; color:#4ECDC4; font-weight:700; margin-bottom:0.5rem; }
.challenge-prompt-text {
  background:rgba(0,0,0,0.25); border-radius:8px; padding:0.75rem 1rem;
  font-size:0.85rem; line-height:1.65; color:var(--white); font-family:monospace;
  margin:0.5rem 0 1rem; white-space:pre-wrap;
}
.btn-claude { background:#7C5CBF; color:white; border:none; padding:0.65rem 1.25rem; border-radius:8px; font-weight:700; cursor:pointer; font-size:0.9rem; }

// =====================================================================
// GAME STATE
// =====================================================================
let gameState = {
  playerName: "",
  currentTrack: null,
  currentScenarioIndex: 0,
  sessionScore: 0,
  trackScores: {},
  earnedBadges: [],
  completedTracks: [],
  currentTrackScore: 0,
};

// =====================================================================
// SCREEN MANAGEMENT
// =====================================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + name);
  if (el) el.classList.add('active');

  if (name === 'tracks') renderTracks();
}

// =====================================================================
// SPLASH SCREEN
// =====================================================================
function startGame() {
  const nameInput = document.getElementById('player-name');
  const name = nameInput.value.trim();
  if (!name) {
    nameInput.style.borderColor = 'var(--red)';
    nameInput.placeholder = 'Please enter your name first!';
    nameInput.focus();
    return;
  }
  gameState.playerName = name;
  document.getElementById('tracks-heading').textContent = `Choose Your Mission, ${name}!`;
  showScreen('tracks');
}

document.getElementById('player-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});

// =====================================================================
// STAR BACKGROUND
// =====================================================================
(function initStars() {
  const canvas = document.getElementById('star-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({length: 120}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.005 + 0.002,
      phase: Math.random() * Math.PI * 2,
    }));
  }
  resize();
  window.addEventListener('resize', resize);

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

// =====================================================================
// TRACK SELECT SCREEN
// =====================================================================
function renderTracks() {
  document.getElementById('total-score-display').textContent = gameState.sessionScore;
  const grid = document.getElementById('tracks-grid');
  grid.innerHTML = '';

  TRACKS.forEach(track => {
    const completed = gameState.completedTracks.includes(track.id);
    const div = document.createElement('div');
    div.className = 'track-card' + (completed ? ' completed' : '');
    div.innerHTML = `
      ${track.badge ? `<div class="track-badge">${track.badge}</div>` : ''}
      <div class="track-icon">${track.icon}</div>
      <div class="track-name">${track.name}</div>
      <div class="track-desc">${track.desc}</div>
      <div class="track-count">${track.scenarios.length} scenarios</div>
      <div class="track-play">
        ${completed
          ? `<span class="completed-badge">✓ Completed</span>`
          : ''}
        <button class="btn btn-primary" style="flex:1;margin-left:${completed?'0.5rem':'0'}" onclick="startTrack('${track.id}')">
          ${completed ? 'Play Again' : 'Play →'}
        </button>
      </div>
    `;
    grid.appendChild(div);
  });
}

// =====================================================================
// SCENARIO SCREEN
// =====================================================================
function startTrack(trackId) {
  const track = TRACKS.find(t => t.id === trackId);
  if (!track) return;
  gameState.currentTrack = track;
  gameState.currentScenarioIndex = 0;
  gameState.currentTrackScore = 0;
  renderScenario();
  showScreen('scenario');
}

function renderScenario() {
  const track = gameState.currentTrack;
  const idx = gameState.currentScenarioIndex;
  const scenario = track.scenarios[idx];
  const total = track.scenarios.length;

  document.getElementById('topbar-track-name').textContent = `${track.icon} ${track.name}`;
  document.getElementById('topbar-progress').textContent = `Scenario ${idx + 1} of ${total}`;
  updateScoreDisplay();
  document.getElementById('progress-bar-fill').style.width = (idx / total * 100) + '%';

  const body = document.getElementById('scenario-body');

  const header = `
    <div class="situation-badge">${scenario.situationBadge}</div>
    <div class="scenario-title">${scenario.title}</div>
    <div class="scenario-desc">${scenario.desc}</div>
    <div class="your-move">— Your Move —</div>
  `;

  let interaction = '';
  if (scenario.type === 'mc')        interaction = renderMC(scenario);
  else if (scenario.type === 'rank') interaction = renderRank(scenario);
  else if (scenario.type === 'build') interaction = renderBuild(scenario);
  else if (scenario.type === 'spot') interaction = renderSpot(scenario);
  else if (scenario.type === 'challenge') interaction = renderChallenge(scenario);

  body.innerHTML = header + interaction + `
    <div id="feedback-container"></div>
    <button id="btn-next" onclick="nextScenario()"></button>
  `;

  // Post-render wiring
  if (scenario.type === 'rank') wireRank(scenario);
  if (scenario.type === 'build') wireBuild(scenario);
  if (scenario.type === 'spot') wireSpot(scenario);
}

/* --- MC --- */
function renderMC(scenario) {
  return `<div id="answers-container">
    ${scenario.answers.map((a, i) => `
      <button class="answer-btn" onclick="selectMC(${i})" data-index="${i}">
        <span class="answer-letter">${a.letter}</span>
        <span>${a.text}</span>
      </button>`).join('')}
  </div>`;
}

function selectMC(answerIndex) {
  const scenario = currentScenario();
  const answer = scenario.answers[answerIndex];
  const pts = answer.pts;

  document.querySelectorAll('.answer-btn').forEach((btn, idx) => {
    btn.disabled = true;
    if (idx === answerIndex) {
      btn.classList.add(pts === 100 ? 'correct' : pts === 75 ? 'good' : pts === 50 ? 'okay' : 'weak');
    }
    // Reveal the correct answer if user got it wrong
    if (scenario.answers[idx].pts === 100 && idx !== answerIndex) {
      btn.classList.add('correct');
    }
  });

  awardPoints(pts, answer.feedback, answer.tip);
}

/* --- RANK --- */
function renderRank(scenario) {
  const items = scenario.rankItems.map((item, i) =>
    `<div class="rank-item" data-rank-idx="${i}" onclick="toggleRank(${i})">
      <div class="rank-badge empty" id="rank-badge-${i}">?</div>
      <span>${item.text}</span>
    </div>`
  ).join('');

  return `
    <div class="rank-labels"><span>Click prompts in order: weakest first → strongest last</span></div>
    <div class="rank-list" id="rank-list">${items}</div>
    <button class="btn-submit" id="btn-submit-rank" onclick="submitRank()">Submit Ranking →</button>
  `;
}

function wireRank(scenario) {
  window._rankOrder = []; // indices in order clicked (first = weakest)
}

function toggleRank(idx) {
  const submitBtn = document.getElementById('btn-submit-rank');
  // Already ranked? Remove it
  const pos = window._rankOrder.indexOf(idx);
  if (pos !== -1) {
    window._rankOrder.splice(pos, 1);
    refreshRankBadges();
    submitBtn.classList.remove('visible');
    return;
  }
  window._rankOrder.push(idx);
  refreshRankBadges();
  const scenario = currentScenario();
  if (window._rankOrder.length === scenario.rankItems.length) {
    submitBtn.classList.add('visible');
  }
}

function refreshRankBadges() {
  const labels = ['1st','2nd','3rd','4th'];
  document.querySelectorAll('.rank-item').forEach(el => {
    el.classList.remove('ranked');
    const idx = parseInt(el.getAttribute('data-rank-idx'));
    const badge = document.getElementById('rank-badge-' + idx);
    const pos = window._rankOrder.indexOf(idx);
    if (pos !== -1) {
      el.classList.add('ranked');
      badge.classList.remove('empty');
      badge.textContent = labels[pos];
    } else {
      badge.classList.add('empty');
      badge.textContent = '?';
    }
  });
}

function submitRank() {
  const scenario = currentScenario();
  let correct = 0;
  window._rankOrder.forEach((itemIdx, position) => {
    if (scenario.rankItems[itemIdx].correctPosition === position) correct++;
  });
  const pts = correct * 25;

  document.querySelectorAll('.rank-item').forEach(el => {
    const idx = parseInt(el.getAttribute('data-rank-idx'));
    const pos = window._rankOrder.indexOf(idx);
    const correctPos = scenario.rankItems[idx].correctPosition;
    el.classList.add(pos === correctPos ? 'rank-correct' : 'rank-wrong');
  });
  document.getElementById('btn-submit-rank').style.display = 'none';

  awardPoints(pts, scenario.feedback, scenario.tip);
}

/* --- BUILD --- */
function renderBuild(scenario) {
  const chips = scenario.chips.map((chip, i) =>
    `<div class="chip" data-chip-idx="${i}" onclick="toggleChip(${i})">${chip.label}</div>`
  ).join('');

  return `
    <div class="build-legend">Click the components that belong in a great prompt for this task. Avoid adding ones that hurt.</div>
    <div class="chips-grid" id="chips-grid">${chips}</div>
    <div class="bad-prompt-label" style="margin-top:0.75rem;">Prompt preview</div>
    <div class="build-prompt-preview" id="build-preview">Click chips above to build your prompt...</div>
    <button class="btn-submit" id="btn-submit-build" onclick="submitBuild()">Submit Prompt →</button>
  `;
}

function wireBuild(scenario) {
  window._selectedChips = new Set();
  document.getElementById('btn-submit-build').classList.add('visible');
}

function toggleChip(idx) {
  const scenario = currentScenario();
  if (window._selectedChips.has(idx)) {
    window._selectedChips.delete(idx);
  } else {
    window._selectedChips.add(idx);
  }
  document.querySelectorAll('.chip').forEach((el, i) => {
    el.classList.toggle('selected', window._selectedChips.has(i));
  });
  const preview = document.getElementById('build-preview');
  const selected = [...window._selectedChips].map(i => scenario.chips[i].label).join(' + ');
  if (selected) {
    preview.textContent = selected;
    preview.classList.add('has-content');
  } else {
    preview.textContent = 'Click chips above to build your prompt...';
    preview.classList.remove('has-content');
  }
}

function submitBuild() {
  const scenario = currentScenario();
  let pts = 0;
  document.querySelectorAll('.chip').forEach((el, i) => {
    const chip = scenario.chips[i];
    const selected = window._selectedChips.has(i);
    if (chip.correct && selected)  { pts += chip.pts || 20; el.classList.add('chip-correct'); }
    if (chip.correct && !selected) { el.style.borderColor = 'rgba(45,198,83,0.4)'; }
    if (!chip.correct && selected) { pts -= 20; el.classList.add('chip-wrong'); }
  });
  pts = Math.max(0, Math.min(100, pts));
  document.getElementById('btn-submit-build').style.display = 'none';
  document.querySelectorAll('.chip').forEach(el => el.style.pointerEvents = 'none');
  awardPoints(pts, scenario.feedback, scenario.tip);
}

/* --- SPOT --- */
function renderSpot(scenario) {
  const flaws = scenario.flaws.map((flaw, i) =>
    `<div class="flaw-item" data-flaw-idx="${i}" onclick="toggleFlaw(${i})">
      <div class="flaw-check" id="flaw-check-${i}"></div>
      <span>${flaw.text}</span>
    </div>`
  ).join('');

  return `
    <div class="bad-prompt-label">The prompt to analyze:</div>
    <div class="bad-prompt-box">${scenario.badPrompt}</div>
    <div style="font-size:0.85rem;color:var(--gray);margin-bottom:0.5rem;">Check all the real problems with this prompt:</div>
    <div class="flaw-list" id="flaw-list">${flaws}</div>
    <button class="btn-submit visible" id="btn-submit-spot" onclick="submitSpot()">Submit Analysis →</button>
  `;
}

function wireSpot(scenario) {
  window._selectedFlaws = new Set();
}

function toggleFlaw(idx) {
  if (window._selectedFlaws.has(idx)) {
    window._selectedFlaws.delete(idx);
    document.querySelector(`[data-flaw-idx="${idx}"]`).classList.remove('checked');
    document.getElementById('flaw-check-' + idx).textContent = '';
  } else {
    window._selectedFlaws.add(idx);
    document.querySelector(`[data-flaw-idx="${idx}"]`).classList.add('checked');
    document.getElementById('flaw-check-' + idx).textContent = '✓';
  }
}

function submitSpot() {
  const scenario = currentScenario();
  let pts = 0;
  scenario.flaws.forEach((flaw, i) => {
    const selected = window._selectedFlaws.has(i);
    const el = document.querySelector(`[data-flaw-idx="${i}"]`);
    el.style.pointerEvents = 'none';
    if (flaw.isReal && selected)   { pts += 20; el.classList.add('flaw-correct'); }
    if (flaw.isReal && !selected)  { el.style.borderColor = 'rgba(45,198,83,0.4)'; }
    if (!flaw.isReal && selected)  { pts -= 15; el.classList.add('flaw-wrong'); }
  });
  pts = Math.max(0, Math.min(100, pts));
  document.getElementById('btn-submit-spot').style.display = 'none';
  awardPoints(pts, scenario.feedback, scenario.tip);
}

/* --- CHALLENGE --- */
function renderChallenge(scenario) {
  return `
    <div class="challenge-box">
      <div class="challenge-step">Step 1: Try it in Claude</div>
      <p style="font-size:0.85rem;color:var(--gray);margin-bottom:0.5rem;">${scenario.instructions}</p>
      <div class="challenge-prompt-text">${scenario.promptToTry}</div>
      <a href="https://claude.ai/new" target="_blank">
        <button class="btn-claude" onclick="revealChallengeReturn()">Open Claude Chat →</button>
      </a>
    </div>
    <hr class="challenge-divider">
    <div class="challenge-return" id="challenge-return">
      <div class="challenge-step">Step 2: Reflect</div>
      <p style="font-size:0.85rem;color:var(--gray);margin-bottom:0.75rem;">${scenario.returnQuestion}</p>
      <div id="challenge-answers">
        ${scenario.answers.map((a, i) => `
          <button class="answer-btn" onclick="selectMC(${i})" data-index="${i}">
            <span class="answer-letter">${a.letter}</span>
            <span>${a.text}</span>
          </button>`).join('')}
      </div>
    </div>
    <button class="btn-submit" id="btn-tried-it" onclick="revealChallengeReturn()" style="background:var(--navy-lighter);border:1.5px solid var(--card-border);color:var(--white);">I tried it — show the reflection question →</button>
  `;
}

function revealChallengeReturn() {
  document.getElementById('challenge-return').classList.add('visible');
  document.getElementById('btn-tried-it').style.display = 'none';
}

/* --- SHARED AWARD --- */
function currentScenario() {
  return gameState.currentTrack.scenarios[gameState.currentScenarioIndex];
}

function awardPoints(pts, feedback, tip) {
  gameState.currentTrackScore += pts;
  gameState.sessionScore += pts;
  updateScoreDisplay(true);
  floatScore(pts);

  const isLast = gameState.currentScenarioIndex === gameState.currentTrack.scenarios.length - 1;
  const scoreClass = pts >= 90 ? 's100' : pts >= 70 ? 's75' : pts >= 45 ? 's50' : 's25';
  const scoreLabel = pts >= 90 ? '🔥 Excellent!' : pts >= 70 ? '👍 Good' : pts >= 45 ? '✓ Partial' : '⚠ Needs work';

  document.getElementById('feedback-container').innerHTML = `
    <div style="margin:0.75rem 0;">
      <span class="score-badge ${scoreClass}">${scoreLabel} (+${pts} pts)</span>
    </div>
    <div class="feedback-panel">
      <div class="feedback-text">${feedback}</div>
      <div class="pro-tip"><span class="pro-tip-label">Claude Pro Tip 💡</span>${tip}</div>
    </div>
  `;

  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = isLast ? '🎉 Complete Mission!' : 'Next →';
  nextBtn.style.display = 'block';
  nextBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextScenario() {
  gameState.currentScenarioIndex++;
  if (gameState.currentScenarioIndex >= gameState.currentTrack.scenarios.length) {
    completeMission();
  } else {
    renderScenario();
    document.getElementById('scenario-body').scrollIntoView({ behavior: 'smooth' });
  }
}

function updateScoreDisplay(animate = false) {
  const el = document.getElementById('score-counter');
  animateCount(el, parseInt(el.textContent) || 0, gameState.sessionScore, 600);
  if (animate) {
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 300);
  }
  document.getElementById('total-score-display').textContent = gameState.sessionScore;
}

function animateCount(el, from, to, duration) {
  const start = performance.now();
  function step(now) {
    const progress = Math.min((now - start) / duration, 1);
    const value = Math.round(from + (to - from) * easeOut(progress));
    el.textContent = value;
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function floatScore(pts) {
  const el = document.createElement('div');
  el.className = 'score-float';
  el.textContent = '+' + pts;
  el.style.left = (Math.random() * 60 + 20) + '%';
  el.style.top = '30%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

// =====================================================================
// MISSION COMPLETE
// =====================================================================
function completeMission() {
  const track = gameState.currentTrack;
  const maxPossible = track.scenarios.length * 100;
  const pct = gameState.currentTrackScore / maxPossible;

  // Stars
  let stars = pct >= 0.9 ? '⭐⭐⭐' : pct >= 0.7 ? '⭐⭐' : '⭐';

  // Badge
  const badge = track.earnedBadge;
  if (!gameState.earnedBadges.includes(badge)) {
    gameState.earnedBadges.push(badge);
  }
  if (!gameState.completedTracks.includes(track.id)) {
    gameState.completedTracks.push(track.id);
  }
  gameState.trackScores[track.id] = (gameState.trackScores[track.id] || 0) + gameState.currentTrackScore;

  // Check for legend badge
  if (gameState.completedTracks.length === TRACKS.length && !gameState.earnedBadges.includes('🌟 Campaign Legend')) {
    gameState.earnedBadges.push('🌟 Campaign Legend');
  }

  // Update UI
  document.getElementById('stars-display').textContent = stars;
  document.getElementById('complete-score-display').textContent = `+${gameState.currentTrackScore} pts`;
  document.getElementById('complete-total').textContent = gameState.sessionScore;

  const badgesHtml = gameState.earnedBadges.map(b => `<span class="mission-badge">${b}</span>`).join(' ');
  document.getElementById('mission-badge-display').outerHTML = `<div id="mission-badge-display" style="display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin:0.75rem 0;">${badgesHtml}</div>`;

  showScreen('complete');
  startConfetti();
}

// =====================================================================
// CONFETTI
// =====================================================================
function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const COLORS = ['#E63946','#FFD166','#2DC653','#4ECDC4','#FFFFFF','#FF6B6B'];
  const pieces = Array.from({length: 160}, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * 200,
    w: 8 + Math.random() * 8,
    h: 4 + Math.random() * 4,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.2,
    vx: (Math.random() - 0.5) * 3,
    vy: 2 + Math.random() * 3,
  }));

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.angle += p.spin;
      p.vy += 0.05; // gravity
    });
    frame++;
    if (frame < 240) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  requestAnimationFrame(draw);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =====================================================================
// INIT
// =====================================================================
// Start with splash
showScreen('splash');
</script>
